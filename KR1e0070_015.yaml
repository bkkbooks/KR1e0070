body:
  text: 春秋屬辭卷十五元趙汸撰辭從主人第八辭從主人者謂從主人之辭也語出永嘉陳氏主人與公羊傳主人習其讀問其傳之主人同謂魯君也春秋本魯史成書雖孔子作經亦必禀君命而後得施筆削自非有所是正皆從史氏舊文然其所是正者亦不多見故曰辭從主人葢本孟子其文則史而榖梁傳亦有從史文之云實經之逸義也當春秋成時孔子恐門人不得其意故告以制作之原曰其事則齊桓晉文其文則史其義則某竊取之矣此曽子以授子思而孟子述之實千萬世學春秋者之指南也至公羊氏乃曰其辭則丘有罪焉爾又曰定哀多㣲辭主人習其讀而問其傳則不知已之有罪焉爾又曰所見異辭所聞異辭所傳聞異辭其意以為春秋製言之體皆出聖人而又不得其所以為言者故曲為之説夫策書之法内惡諱之而外事從告與史氏雜志以訐為直者不同韓宣子晉卿也觀書而大史氏不隠者以其文辭猶存成周舊典非史氏私書比也孔子非史官亦非見大夫也請修國史而時君時相不以為疑者其事與文皆仍魯史之舊雖有筆削而無所増加也則其辭何罪之云定哀之際書事與隠桓以後不殊而亦何㣲之有葢孔子甞曰知我者其唯春秋乎罪我者其唯春秋乎非其辭之謂也其言之所自出與孟子同而口傳失真則去之逺矣葢其所聞於不修春秋者雨星不及地尺而復而已則又安知魯史記之為周禮哉司馬遷有言孔子西觀周室論史記舊聞興於魯而次春秋七十子之徒口授其傳指為有所刺譏襃諱抑損之文辭不可以書見也則由公羊之説而意其當然然愈誕矣自是以來家自為學人自為書穿穴支離傳㑹膠固其甚者乃若法吏深文巧詆之為皆坐以春秋為孔氏所創一家之言而不知其本故也榖梁以國地之異名者謂之從史文不能通諸全經左氏所發多史例也而記韓宣子之言謂之周禮且曰非聖人莫能脩之則其失在不知有筆有削而已至永嘉陳氏乃専主筆削求經然猶以爵號名氏為襃貶誤指左氏所録即魯史舊文而經之成言皆為聖筆所脩其所謂從主人之辭者亦無幾焉則猶惑於公羊而於孟子所傳述者未甞少致思也故今特取陳氏語名篇以矯其失凡天道人紀爵號名氏郊廟師田昬姻朝聘史氏之恒辭皆以類發例而赴告之情策書之體可得而論者亦一二附見焉一編年類凡君之首年曰元王之始月曰正元者首也以吾君即位之首年故曰元年正者長也以時王所改一嵗之長月故曰正月呉先生曰尊其在首特立殊稱故不曰一年而曰元年尊其在始特立殊稱故不曰一月而曰正月二災異類凡闕於所不見曰日有食之不言為月所食曰星隕如雨不言至地之形曰隕石于宋五不言隕星曰六鷁退飛過宋都不言風凡常無曰有有蜚有􅈮有年有星孛有鸜鵒來巢常有曰無無水無麥苖過常曰大大雨雹大雨雪大旱大水大饑大有年大無麥禾大雩大蒐甚有曰多多麋始出曰生蝝生三郊廟類凡除地祀天曰郊本天子孟春祈穀于上帝之祭其禮於郊外掃地而行之故名其祭為郊魯僭用之僖三十一年始見經可否聴于神曰卜郊有禱而為曰用郊牛卜吉日曰牲不用曰免望祭三方曰三望詳見第一萹凡設壇祈澤曰雩用盛樂曰大雩禮天子大雩帝用盛樂魯僭用之雩而得雨則書雩雩不得雨則書不雨為災則書旱詳見第一篇凡三年大祭曰禘本天子之禮魯僭用之僖八年始見經譏在祭則曰祭譏不在祭則大廟曰大事略之曰有事詳見第一篇逆祀曰躋順祀曰從前言躋則後為降後言從則前為逆互文見義已絶而祔曰致祭而安主曰考得已不已曰猶周公曰太廟魯公曰太室從穀梁世大古字通用吳氏曰左穀誤世為大杜氏氏以為大廟之室諸儒多從之夫廟制中央一室謂之大大室書洛誥成王祭文王武王而曰王入大室祼彼文武廟亦有大室若果大廟屋壞當書大廟羣公曰宫禰宫曰新宫羣公以諡名宫婦人以姓名宫已毁更作曰立凡時祭秋曰嘗冬曰烝本公羊傳春曰祠夏曰禴秋曰嘗冬曰烝與周禮合不書祠禴者春夏禮薄鮮過舉常事不書例見後四名號類凡侯國之史稱天王若王朝之史但稱王或曰天子錫成公命劉氏曰臨諸侯曰天王臨天下曰天子然名號當歸一葢特筆也姑存之王不在辭端不加天從王伐鄭凡言天以其無上故不加於語中凡王世子不名首止㑹惠王太子鄭王子稱字王季子來聘頃王子必見殺若相殺而後稱名弟佞夫王札子争立名王子朝凡王朝公卿不名稱爵以配國邑僖九宰周公孔三十宰周公閲成十二周公楚隠元祭伯七凡伯僖十温子蘓氏文元文九宣十五毛伯衛昭二十六毛伯得文五召伯昭公宣十五召伯戴公成八召伯桓公昭二十六召伯莊公成十六十七尹子武公莊元十四單伯文十四單伯成十七單子襄公襄三單子頃公昭二十二單子穆公旗昭十三劉子獻公摯二十二劉子蚠即定四劉子文公卷呉氏曰王朝三公八命有封國則從九命之爵稱公六卿六命有封國則從七命之爵稱伯中下大夫四命有封邑則從五命之爵稱子爵止三等必冢宰而後兼稱宰宰周公宰渠伯糾父在子襲其爵則兼稱名渠伯糾父老子代其使則稱某人之子仍叔之子舉其族稱氏昭二十三二十六尹氏父卒子未命稱某氏子武氏子凡王朝大夫未爵稱字南季仍叔家父榮叔叔服傳稱内史叔服内史於周禮為中大夫呉氏曰王朝中下大夫四命無封邑者以字配氏上士中士稱氏名宰咺官師劉夏石尚下士稱人凡王者之都自諸侯言曰京師不敢斥其地嫌若外辭自王者言則以地舉曰成周曰王城王者不自稱京師諸侯城王都亦以地舉曰城成周王者有遷都之義故城築當以地舉與城楚丘城夷儀不言城衛城邢同王所在曰王所不敢直言朝王自其家人而言曰王室不及外廷之辭凡諸侯内生稱公𦵏稱我君順吾臣子之辭外生稱爵正周班也卒稱爵稱名重王爵謹世繫𦵏則舉諡稱公順彼臣子之辭案公食大夫禮五等諸侯同稱公葢國中臣庶不敢斥其君之爵通得稱公實周制也必見弑然後稱其君苟閽弑盜殺則不稱其君閽與盗皆賤不得以君臣之辭書之凡嗣子未𦵏稱名莊三十二十月子般閔元六月𦵏荘公襄二十一九月子野十月𦵏襄公既𦵏稱子文十八十月子卒是年六月𦵏文公公羊傳曰君在稱世子君薨稱子某既𦵏稱子踰年稱君何氏曰緣民臣之義不可一日無君故稱子某明繼父也名者尸柩尚存猶以君前臣名也既𦵏不名者無所屈也一年不二君故稱子踰年稱公不可曠年無君也此説合經意必有所傳左氏不知此義於子卒曰諱之也杜氏謂魯諱弑既𦵏不稱君於里克弑其君之子曰未𦵏也為左氏學者遂以為未𦵏稱子之例而既𦵏稱君據里克弑其君卓不思奚齊稱其君之子與在喪稱子文既不同卓踰年見弑自其恒稱與在喪亦異苟子惡冝稱君而諱之則當如隠公稱公薨亦不稱子卒皆失其義類非經㫖明矣㑹諸侯稱子僖九宋子㑹葵丘未𦵏二十五衛子盟于洮既𦵏未踰年定四陳子會召陵未𦵏傳曰宋桓公卒未𦵏而襄公㑹諸侯故曰子此諸侯在喪出㑹稱子之例以其去喪位無所屈故雖未𦵏不稱名據衛成公既𦵏未踰年稱子文九年春毛伯來求金雖踰年而未𦵏不稱王可見必既𦵏又踰年乃得稱君杜氏之失明矣以師行稱爵桓十三衛侯與戰踰年未𦵏成二宋公衛侯㑹伐鄭踰年未𦵏四年鄭伯伐許既𦵏未踰年皆以其用軍禮變喪容將兵出令不可復冐喪主之稱故稱爵趙伯循曰凡諸侯在喪而有竟外之事以喪行者稱子以吉行者稱爵志惡之淺深也今考出外稱子唯施于盟會行師皆稱爵其説未當未踰年遇弑稱爵齊公子商人弑其君舍禮記曰君薨太子號稱子待猶君也然則稱子者乃嗣君在喪之號臣子事之則猶成君也故遇弑則稱君所以正君臣之名以明弑逆之罪為左氏學者有既𦵏未踰年稱君之説失一年不二君之義矣穀梁又謂成舍之為君所以重商人之弑失待猶君之義矣夫既曰待猶君則不待春秋成之而商人之罪亦豈待成之而後重哉由膠於踰年稱君之説而不知遇弑當變文以正名此所以失也出奔稱名鄭忽曹羈莒展輿東者嗣君在喪之稱既失國非復在喪之子故不得比出㑹諸侯稱子也君狀國滅見執以歸稱世子蔡世子有昭十一年四月楚子䖍誘蔡侯般殺之楚公子棄疾帥師圍蔡十一月滅蔡執蔡世子有以歸用之以楚人誘殺其君父即進兵圍其國都執有以歸用之岡山蔡無有孑遺矣書曰世子示不絶于蔡也外子卒不志衛載略外凡諸侯不生名去國辯二君名鄭突辯於忽衛朔辯於黔牟蔡朱辯於子國莒庚輿辯於郊公邾益辯於革齊侯將納簡公晏子曰燕有君矣則其出不可無辯也衛鄭使元咺奉叔武受盟則非二君也既而晉侯命叔武稱子序莒子上衛侯歸卒殺叔武則疑于二君矣故歸自楚名之既又見執於伯主而元咺立公子瑕故再歸名之衛衎立二十一年而大臣出之代其位者亦貴戚之卿也臣無出君之義無攝之之道則非二君也既而剽列於諸侯之㑹則不可無辯矣故書以名之有謂書剽書衎者乃筆削之微辭見衎之不禮大臣至于失國剽之不禀王命立由甯喜者俱非也見納不名頓子北燕伯諸侯不相名復國繼絶名蔡侯廬陳侯呉從繼故例小國之君來朝詳之名穀伯綏鄧侯吾離傳言賤之杜氏謂僻陋小國禮不足故今案來朝唯附庸小國稱名以其未爵命也有降爵成禮者滕杞薛之君是也有以不敬見伐者杞君是也史皆不敢斥其名穀鄧逺於魯素無交好既以侯伯成禮復賤之而書名非人情也以當時事理推之穀鄧於魯交好不通事無本末二年蔡侯鄭伯懼楚而會于鄧穀鄧二君亦以懼楚故始來朝於上國旋則亡滅不復再見故書名以詳之附庸之君名介葛盧郳黎來以其未爵命于天子不得從五等邦君例稱爵而從卿大夫例稱名大者稱字邾本附庸至儀父彊大比於列國魯人喜其來盟不敢以名命之蕭者宋附庸叔者其君之字蕭叔大心之後邂逅朝公亦不以名命之皆從王朝命大夫例稱字凡諸侯朝㑹降爵成禮録其實滕子杞子杞伯薛伯諸侯世子來奔逆以諸侯之禮書爵郕伯傳曰郕大子朱儒以夫鍾儒與郕邽來奔公以諸侯逆之先多不信其説今案郕伯卒郕人立君而郕大子以地來奔公以其冝為君者故以諸侯禮逆之雖非禮亦與他叛人不同左氏非妄孔氏曰史遂從公之意不可反公之心追言世子王氏曰若書朱儒以地來奔則不見公以諸侯禮叛人之意伯國立大子為君㑹諸侯書爵成十晉侯伐鄭傳曰晉侯有疾五月晉立太子州蒲以為君而㑹諸侯伐鄭據傳晉人生立太子為君此後世内禪之禮所從起也然非王制則悖甚矣劉侍讀謂經但言晉侯無以明之若有其事當書名非也州蒲既稱君以主諸侯非爭國失國不當名之亦無稱君書名列㑹之法諸侯之弟攝位受盟稱子僖二十八衛子從未成君之禮附庸世子攝君來朝稱人邾牟葛凡畿内諸侯卒不稱爵王子虎劉卷孔氏曰有諡必當有爵不書爵者畿内之國不得外交其臣不敢赴必天子為之赴不言其爵也𦵏則舉諡稱公同諸侯畿内諸侯得置臣屬治其國邑凡夫人生以姓配氏卒以諡配姓𦵏稱我小君順吾臣子之辭内女以字配姓字叔或加子孔氏曰文十二子叔姬杞桓夫人十五子叔姬齊昭夫人宣五子叔姬高固妻成五有杞叔姬來歸其娣也娣亦字叔者周之法積叔也今案伯仲叔季唯可字四人故字法或積叔既積叔故或加子以自異如公孫嬰齊稱子叔嬰齊其後叔老叔弓或稱子叔子葢欲别于叔孫氏也大夫書名氏故字不得見經婦人唯書字故從其加子以自異也自趙伯循謂時君之女曰子學者固謂齊子叔姬為文公女計其年又謂非齊舍母而杞伯來朝謂絶叔姬等事皆以為非由一字之義不明而左傳有數處不可信矣凡諸侯之子曰公子公子之子曰公孫公孫之子賜族稱氏隠八無駭卒羽父請諡與族劉氏曰杜云無駭公子展之孫非也若無駭真公孫之子當其繼大宗也賜氏久矣何待死而賜氏乎且禮云公孫之子以王父字為氏非言其死而後氏之也然則無駭固公孫也無駭請族者為無駭之子請族也子展稱公子無駭稱公孫無駭之子未有稱也此其所以請之也若公孫之子死然後賜族則無駭為終身無所氏也杜氏不明于禮矣公孫為兄後卒稱族成十五仲嬰齊卒公羊傳曰公孫嬰齊也曷為謂之仲嬰齊為人後者為之子孫以王父字為氏歸父奔齊魯人徐傷歸父之無後也使嬰齊後之今案歸父者仲遂之子嬰齊其弟也弟無後兄之義而昭穆無積法為人後者為之子大典不可亂也故嬰齊不得稱公孫比叔肸之子而稱族同叔老者以其為歸父後則祖仲遂從以王父字為氏之法也不稱仲孫者以别於仲慶父之後與叔肸之後不稱叔孫以别於叔牙之後周何氏謂不書仲孫明子不為父孫非也子不得為父孫不待異文而後見凡公子公孫為卿書屬公子益師公子買之類非卿稱名衛公子州吁齊公孫無知宋督戴公孫攝卿稱名無駭與翬之類傳荀林父曰攝卿以往可也隠不爵命大夫故用攝禮必爵命然後書屬録異恩兼書字公子季友仲遂公弟叔肸繼故名之衛晉爭國名之鄭突曹赤齊小白陽生之類去屬見非復臣子簒立未㑹諸侯名之衛州吁齊無知陳佗莒展輿諸侯無定其位者皆録實殺之雖非卿書公子諸侯公子不言大夫者在位見殺書其大夫君臣之辭書屬與氏同外殺若放不言大夫非君臣凡母兄稱兄母弟稱弟宣十七年傳例曰凡稱弟皆母弟也此適庶貴賤之别史得為例非謂庶公子非兄弟陸氏駁之過矣杜氏曰庶弟不得稱弟而母弟或稱公子若嘉好之事則仍舊史之文唯相殺害然後據例以示義昭元年陳公子招不稱弟者與莊二十五年公子友同今案杜説未當故陳氏併傳例排之凡稱兄弟者或為卿或非卿皆以恩寵録實因見禍福所由故先儒考諸稱弟鮮能善其後者是以内唯叔肸卒稱弟若季友則内外異辭任使之際無謂稱弟陳公子招列序於諸侯大夫之間亦不得獨異其文稱陳侯之弟又宣十五年天王使王季子來聘公羊以為天王母弟孔氏亦推杜説言之不知天子大夫例稱字不可言天王使其弟某來聘嫌斥尊也稱王季子則王弟可知與諸侯來聘以稱弟為貴者不同史文各有攸當以為筆削之㫖尤非凡諸侯之兄弟有謂得稱字祭叔為祭公來聘宗國稱字紀季以紀侯命分邑入齊許叔復國繼絶蔡叔攝君盟折皆稱字其季子蔡季從許叔蔡叔例别以罪歸國者有筆削之㫖凡大夫為卿二命三命皆稱氏名舊説大夫三命書氏二命書名一命書人案傳言叔孫昭子三命踰父兄則叔孫豹二命豹二命書氏則云二命書名者非矣小國之卿二命然非接我不書苟接我雖非卿亦名則云一命書人者亦非又吳楚皆子爵而其臣書氏名與中國公侯之大夫等當時書法豈皆據周禮命數為準左氏所言卿大夫之等與周官合公穀但據經文言之書名氏為大夫書人通謂之㣲者未賜族稱名魯挾桑溺鄭宛詹宋萬秦術之類皆異姓初為卿者卒乃賜族啖氏謂未命不書族非東遷諸侯猶不請命其大夫豈待請命者皆其國自命之爾自後世卿無不書族可見矣命於天子稱字宋孔父嘉陳女叔鄭祭仲足莊二十五年春陳侯使女叔來聘穀梁傳曰其不名天子之命大夫也王制大國三卿皆命於天子次國三卿二卿命於天子先儒推穀梁知孔父祭仲皆天子命大夫從天子大夫例舉其族稱氏宣十齊崔氏外卿以事來不見公不名齊仲孫高子不以使禮見公無所屈主盟㑹非卿稱氏名文二晉士縠晉司空非卿而書尊伯國傳言堪其事非孔氏曰成二年傳稱魯賜晉三帥三命之服司空亞旅皆受一命之服知司空非卿也内大夫非卿但志其事逆言逆𦵏言𦵏伐言伐戌言戌之類皆大夫往外大夫非卿稱人諸大國非由貶責而稱人如宋人盟宿鄭人序邾人下者皆其下大夫小國之卿稱人邾莒滕薛杞以下小國盟㑹征伐稱人皆其卿穀梁謂曹莒無大夫皆據經文書人不見大夫名氏而言啖氏謂無命大夫亦非接我稱名莒慶莒挐邾快邾畀我以地來雖㣲者稱名邾庶其黒肱莒牟夷傳皆曰非卿也以地來雖賤必書重地也楚卿稱氏名同大國自屈完始啖氏謂楚嬰齊大會中國教請玉命所以自後亦書族楚既僭號豈復通于周室其失事實如此安可輕訾左氏學者吳楚始聘稱名楚椒呉札必見殺若放而後書其大夫已絶見討不言其大夫晉欒盈鄭良霄之類盜殺不言其大夫與不言其君同義非見殺而書大夫者衆辭公及齊大夫盟于蔇豹及諸侯之大夫盟之類如文七年公㑹諸侯晉大夫盟于扈乃聖筆所修文同義異凡大夫既卒不名原仲夷伯禮臣既卒不名凡大夫見執稱行人苟非専使不稱行人行父意如從公祭仲見誘轅濤塗在師甯喜在㑹宋仲幾在京師唯鄭詹事不可考葢齊人以伯令召而執之專使唯王卿士不稱行人單伯可決不稱行人非皆有罪凡士作亂稱盜襄十年鄭尉止司臣侯堵等五人皆士傳曰書曰盗言無大夫焉陽虎家臣齊豹奪司寇呉先生曰不命雖食禄與庶人同以庶人而竊物聚衆殺人均之為盜也蔡公孫翩從赴凡外裔舉號君臣同辭荆吳徐越本非外裔以其僻陋棄禮皆僭王竊號故用外裔例書之荆後稱楚與中國盟㑹故史書其君臣以見其實若茅戎北戎山戎赤狄白狄之類本皆外裔舒鳩舒庸亦其類也蠻氏潞氏皆稱子潞其國也仍加赤狄者以别他狄等也四裔大者曰子經書潞子戎蠻子傳記皷子肥子陸渾子正例也史避吳楚僭號亦以子稱以其叛中國同諸外裔也史記不言呉始封何爵外傳謂命圭曰吳伯武王襃大泰伯之後冝然陸氏曰封呉子非也五昬姻類凡納徴曰納幣親迎曰逆女趙伯循曰昬禮有六一納采二問名三納吉四納徵納徴即納幣也五請期六親迎親迎即逆女也史獨書其二以納幣方契成迎女為事終舉重之義也凡魯君親逆稱逆女至稱夫人某氏至自某夫人不與公俱至書入録失禮凡卿為君逆稱逆女禮無君使卿逆之文故從君逆稱女至稱以夫人某氏至稱以録其失禮有姑稱婦某氏以婦禮至如盥饋特豕於室之類㣲者逆稱逆婦某于某禮不備不書夫人至内女適諸侯曰歸王女同來寧反國曰歸鄫季姬國亡反其宗祀所在曰歸紀叔姬皆從一之義適諸侯逆稱字歸稱字明齊大夫稱所逆之字姑逆稱婦凡卿為君逆不稱使逆女使卿非禮與來聘以使禮接者不同故不稱使來稱逆女曰女從内辭以别親迎凡諸侯送女稱某氏父母辭凡王臣為天子逆稱王后尊王命杜氏曰天子無外所命則成故不言逆女歸稱字明齊凡王臣送女稱王姬歸稱王姬不稱字尊王女凡致女内致外曰致女父母辭外致内但言聘凡夫人歸寧曰如出曰歸内女歸寕曰來出曰來歸六喪紀類凡天子曰崩上壊之形君夫人曰薨上壞之聲未踰年君曰卒降成君内女為夫人書卒為之服許嫁書卒成其喪王女書卒主其昬大夫曰卒終其事諸侯曰卒别於内凡天子崩不地略於王史公薨必言地詳内諱弑則不地明變夫人薨不地有常處婦人無外事在外則地明變大夫卒不地降於君在外則地詳有事諸侯卒不地略外卒于外則地去國都公羊傳封内不地非是在㑹曰㑹在師曰師著其勞在他國書其國録失所吳楚之君雖卒于外不地吳子光楚子軫略夷狄凡夫人不赴於諸侯不反哭于寢不祔于姑故不曰薨不稱夫人故不言𦵏隠三年傳為君氏卒發例赴而不反哭稱夫人而不書𦵏子氏反哭而不赴書𦵏而不言小君定姒妾母成喪祔廟稱夫人薨書𦵏小君録實七禍福類凡繼故言立衛晉簒言立王子朝挈乎大臣言以王猛子朝此所謂美惡不嫌同辭二傳槩云不冝非也成尊不言以傳著敬王出入亦曰以凡公在他國曰在在楚在乾侯出在境内曰居居鄆天王雖在畿外亦曰居出居于鄭王者無外范大史脩唐鑑書帝在房陵誤用諸侯出在他國之文也凡遁赴曰奔君臣同辭宥之他國曰放既無待放之禮亦與虞書流放不同穀梁傳曰放猶屏也凡自内曰出王者内京師諸侯大夫内其國在外不言出敬王自劉居狄泉公孫敖在道奔王子瑕子朝皆叛在外奔南里者宋城内里名故華向以叛入言出奔國滅不言出無所出自其邑奔曰自某出曹公孫會凡拘之曰執君臣同辭執之以去曰以歸以歸王都曰歸于京師彊致之曰歸之于以詐致之曰誘㑹滅不言以歸偪陽子賴子文不便獲不言以歸從可知凡執恒稱人諸侯無相執之道亦無執外臣之法故略言之㑹而後執别稱人㑹列諸侯執由盟主明非衆執其變文皆筆削之法凡内大夫反國曰來歸凡反其君曰歸邾子益潛反曰逃君臣同辭見獲而反不言歸晉侯不足言凡君大夫反國易曰歸衛侯曹伯釋其罪蔡侯廬陳侯吳復其封鄭突挈乎蔡仲曹赤歸在羈出後趙鞅有請於君而復之者難曰入許叔因鄭亂鄭伯衛侯莒去疾皆國有君齊小白陽生簒鄭良霄宋樂大心以惡入國君已絶于位曰復歸出奔言復歸位絶也諸侯無出出則絶矣見執不言復歸位未絶也曹伯獨言復歸者由叛中國見討執畀宋人比之位絶者也大夫抗其君以歸則曰復歸衛元咺趙鞅以君命歸故不言復賊其國則曰復入宋魚石晉欒盈連結仇敵皆欲覆其本國陸氏曰良霄不書復入志在復讎非謀害國觀子産之言可見凡歸入必言所自著其挾外援苟言故則不言所自突歸于鄭上言宋人執祭仲國逆而立之不言所自齊小白陽生凡興師以送之曰納非專納則言自某入自某歸莒去疾羣公子召之陳公子黄楚屈建從陳侯圍陳不書苟言故則不言所自赤歸于曹上言戎侵曹晉欒盈復入于晉下言齊侯遂伐晉凡大夫據邑書叛苟大國納之不書叛宋魚石晉欒盈以伐宋伐晉為重志復私讎雖入國不言叛鄭良宵原情定罪内㣲者以邑叛不書其人據獲麟後書成叛外邑叛不書凡自賊其君曰弑自外曰戕左氏傳例八朝聘類凡公行未成禮曰如杜氏曰據内出多有在道而復者不果彼國必成其禮故但言如既成禮曰朝公朝于王所非朝則直言其事納幣觀社夫人越竟皆曰如如齊如莒以事往直言其事享齊侯㑹齊侯大夫行皆言如以事往直言其事𦵏原仲致女納幣告糴凡諸侯來朝皆成禮而後書故言朝同時俱至兼言之滕侯薛侯同時異至殊言之穀伯鄧侯非朝則直言其事獻戎捷奔䘮㑹𦵏畿内諸侯不言朝祭伯州公魯以王臣之禮接之不二尊也外裔來不言朝不能行朝禮公在外不言朝蕭叔凡王在外曰公朝于王所公在外曰某君朝公世子來朝曰某君使其世子某來朝内女以其子來曰來朝其子代父行朝禮故曰使來朝卒不成朝禮故曰朝其子凡王臣來聘皆稱使在喪不稱使天子諒閽聼于冡宰以事來者直書其事求賻求車求金錫命㑹𦵏歸脤歸賵以其私來不稱使祭叔寰内諸侯不外交凡外臣來聘皆稱使凡便皆吾君以禮受之於廟以事來者直言其事歸祊獻捷言田言公事不可書但言來不以使禮見君不稱使齊仲孫齊高子吳先生曰皆季友以兩臣相見以其私來不稱使宋司馬華孫來盟為公子鮑結援㣲者不稱使諸稱人來皆不以賓禮接凡致物曰歸自外曰來歸無専使不言來公孫敖之喪濟西田讙闡受之於㑹曰取郜大鼎凡與下曰錫相與曰畀借物曰假輸物曰納婉辭以徴曰求直辭以請曰告卑辭以請曰乞諭意曰言弔亡曰唁凡繼事曰遂兼事曰且不得已曰乃九盟㑹類凡載書歃血曰盟不相盟而結言曰胥命凡内特相盟内為志稱及外為志稱㑹傳例君臣同辭自參以上皆稱㑹魯無專合諸侯之事君臣同辭公如伯國受盟稱及公與外大夫盟稱及與戎盟稱及大夫與戎盟稱㑹彼盟於我曰來盟我盟於彼曰蒞盟聘而後盟曰及某盟彼故不盟曰弗及盟此不得盟曰不與盟皆説見第一篇凡伯者服貳曰同盟非為諸侯之叛服而盟者皆不言同請與曰乞盟後期曰㑹盟别盟稱及又及襄十三雞澤凡釋怨曰平平亂曰成内欲平曰及某平外欲平曰暨某平外相平曰某及某平内平外曰平某及某凡以㑹禮相見曰會不以㑹禮相見曰遇凡謀伐稱㑹如桓㑹伐鄭莊㑹伐衛之類前定稱及桓十二公㑹鄭伯盟于武父十二月及鄭師伐宋旣盟而後伐不言㑹十七年秋及宋人衛人伐邾㣲者受命于國不言㑹僖四年秋及江人黄人伐陳同受命於伯主不言㑹凡伯主避不敢主言及以㑹公及齊侯㑹王世子于首止桓公帥諸侯以會王世子而不自主會乃禮之冝非是特設以尊王世子亦非夫子特筆殊外裔言㑹又會成十五鍾離襄十柤十四向此與及以會異者晉君臣既以主㑹之禮㑹諸侯而後會吳也陳氏均謂之殊㑹誤矣兩主之言㑹以及公會晉侯及吳子于黄池凡諸侯會外裔曰㑹之宣十一櫕函殊之不使夷狄之君與諸侯序㑹其師曰及僖三十二殽杜説非義同上師與大夫不言及宣八伐秦成九伐晉不殊便文稱人僖二十盟于邢襄五㑹戚之類外裔自相㑹如其序昭四淮夷此皆史氏所及陳説誤凡公在外而諸侯㑹之曰㑹公於某公在内而諸侯㑹之曰某來㑹公諸侯已㑹而我獨見外曰不見公諸侯不期而及於會曰如會不及㑹曰未見諸侯又案桓十三年公會紀侯鄭伯及齊侯宋公衛人戰傳曰不書所戰後也凡諸侯之㑹公不與皆不書與㑹傳皆曰後也據經所書是已以經合傳以傳翼經春秋但與其成事亦不得復有異文此三傳之例所以互相發明者也非期㑹而與盟曰㑹諸侯盟于某僖二十一薄二十七宋外非期㑹而與盟曰某㑹盟于某僖十九鄫子凡魯君特㑹外君不言故自參以上必言故中丘伐宋稷成宋亂袲伐鄭曹伐鄭唯伯主之㑹不言故不言者皆從可知魯臣㑹外臣苟非天下之事則言故澶淵宋災故凡特相㑹往來稱地傳例曰讓事也杜氏曰㑹必有主二人獨㑹莫肯為主故但書地自參以上往稱地來稱㑹傳例曰成事也凡因伐而㑹致伐謀伐在㑹前桓十六成三㑹伐鄭之類志不在伐致㑹生事在㑹後成十六伐鄭不成伐大夫侵陳蔡一出有二事則致其重者僖四侵蔡伐楚致伐楚僖六伐鄭救許致伐鄭成七救鄭同盟十七伐鄭同盟皆至會一事偶則以後事致僖二十九㑹温遂圍許致圍許及襄十一會伐鄭㑹蕭魚致㑹之類凡内地不致伐叛則致定十二圍成凡伐而戰不致莊九乾時敗之不致僖元于偃邾地㑹戰不致桓十三㑹紀鄭㑹伐而戰亦不致桓十二及鄭師哀十一㑹吳據傳皆公與戰戰者危國亡師之道傳曰戰不必勝雖勝亦未必全師而反况公親戰尤危事凡師公與戰或此敗績或彼敗績或此敗之其安危得失已著舉其重者故不書至凡大夫不致降于君見執則致季孫意如叔孫婼重事變公與之俱反則亦不致季孫行父大夫出入從公不書穀梁傳曰執者致而不致公在也凡至彼而反曰還還者事畢之辭公還自晉歸父還自晉之類未及彼而反曰復復者事未畢之辭公如晉至河公子遂如晉至黄此啖氏考經正穀梁之失入其竟曰至某乃復公子遂如齊未入其竟曰弗至而復公孫敖如京師凡周班諸侯序爵爵均尚徳據定四祝佗告萇𢎞德指始封之君而言王入序諸侯上僖八王人僖九宰周公之類何氏曰王人銜王命㑹諸侯諸侯當北面受之故尊序于上寰内諸侯之師序列國上僖二虞師晉師大夫如其班隠五伐宋鄭人序邾人下僖二十八㑹温秦人序邾人下皆以大夫序卿下莊十五伐郳十六伐鄭二十六伐徐僖二十一鹿上二十九翟泉皆宋人序齊人上時齊卿猶不先宋莊十九伐我西鄙二十八救鄭僖五侵陳皆齊人序宋人上時宋非卿文十七伐宋陳人序衛人下傳曰衛孔達陳公孫寧杜氏曰寧位非上卿成二蜀之盟齊人序鄭人下杜氏曰齊在鄭下非卿襄二十七㑹宋陳孔奐序蔡公孫歸生衛石惡下昭元㑹虢陳公子招序衛齊惡下蔡公孫歸生上襄昭以後陳從楚則陳侯序蔡侯下其後蔡從中國則蔡侯序衛侯上如大夫自如其班周禮大司馬設議辨位以等邦國春秋之初魯以周班後鄭而鄭怒有郎之師小國諸侯亦降爵來朝不待伯者出而班序已亂矣凡主㑹者所序公羊傳曰其序則主㑹者為之主㑹謂伯者伯主序諸侯上齊桓創伯自單伯㑹諸侯于鄄以後齊侯恒序宋公上唯遇梁丘序爵葢見禮相見書如其班與主會不同晉自文公以後終春秋序齊侯宋公上齊侯序宋公上桓十三年紀鄭之戰齊侯始序宋公上外傳齊僖於是乎小伯其先宋葢以彊大爾自桓伯以後終春秋齊君序宋君上陳侯序衛侯上衛侯序蔡侯上入春秋皆以蔡衛陳為序桓十六年伐鄭衛侯陳侯序蔡侯上杜氏以為蔡後至亦時衛彊齊宋皆以為黨故也自後陳常先蔡莊十五年齊桓㑹鄄而後陳侯復先衛杜氏以為陳介於齊楚之間為三恪之客故桓公進之今案時蔡已從楚故桓公進陳以勉勵之自後陳當在衛上至襄昭之世陳侯從楚恒序蔡侯下葢楚人以蔡先服故先蔡至定四年㑹召陵侵楚蔡侯始復從中國故序衛侯上子男序侯伯上男序子上莊十六年同盟于幽許男序滑伯上僖四年伐楚以後恒序曹伯上十六年㑹淮序邢侯上成五年同盟蟲牢邾子序杞伯上六年同盟馬陵莒子邾子序杞伯上以後莒邾恒在杞上世子序小國之君上晉悼之㑹齊世子光恒序薛伯杞伯小邾子下襄十年序滕子薜伯上十一年序莒子邾子上傳以為先至非也齊大國也而毎貳于晉故悼公違禮進其世子以説齊在喪稱子居本班或降其班僖九葵丘宋襄稱子在本班二十八㑹温陳共稱子班鄭下定四㑹召陵陳懐稱子班鄭上杜氏曰無義例葢主㑹者所為衛侯之弟攝位受盟稱子序鄭伯下僖二十八踐土衛叔武晉卿序齊宋上僖二十九盟翟泉晉人序宋人齊人上以後晉卿恒序齊宋卿上齊卿序宋卿上襄二㑹戚齊崔杼序宋華元上以後齊卿恒序宋卿上唯師以國序莊十齊師宋師僖元齊師宋師二十八晉侯齊師宋師秦師襄二晉師宋師衛甯殖凡楚主盟㑹序諸侯上楚得諸侯與中國伯主待與國不同陳蔡以下服役僅同縣鄙其序於所從諸侯上史文之實録也唯其能用諸侯禮交於中國故史從周制四夷大者稱子以紀事而孫氏陳氏皆有與楚以伯之説葢不知春秋辭從主人而或以變文見義策書大體自若也蔡從楚序陳上説見上秦卿序宋卿上成二盟蜀秦右大夫説序宋華元上僖二十二㑹盟翟泉秦人序陳蔡下者晉文以周班次之秦伯爵其臣不得先侯國之卿也蜀盟超宋卿上者楚嬰齊主㑹崇其與國以形勢軋諸侯也十戰争類凡將尊師少稱將將卑師衆稱師將卑師少稱人將尊師衆稱某帥師君將不言帥師舉其重者此公羊傳例師重與大夫等故兼稱之今考未經筆削之文若邾人鄭人伐宋晉師宋師衛甯殖侵鄭之類知此例實得當時史法其君大夫將而稱師稱人者皆筆削之法不入例趙伯循謂稱人以圍者甚衆將卑師少何能圍國葢不知春秋所謂師者不可以二千五百人為限經言帥師固非一師傳言師少非不成師其曰師衆師少皆以成師而言將尊謂卿將卑謂大夫之非卿者何以不能圍國也凡聲罪致討曰伐潛師掠境曰侵胡氏例本左氏傳例有鐘鼔曰伐無曰侵而辭意稍備據春秋稱伐者或討其罪或求其成或已致其戰皆必鳴鐘鼔以警告之若侵則但務俘掠而如傳言鄭伯侵陳大獲之類是也凡經書圍書戰書取書滅皆是伐國之事則侵伐之例左氏之説未可全非也啖氏排之太過葢不知鐘鼓之節在軍禮為尤重爾狄師雖法不備亦不可謂無鐘鼓也環而攻之曰圍掩其不備曰襲以兵守之曰戍迎服曰降盡殺曰殱凡兵破其國曰入入郛入邑義同夷其社稷曰滅非國不言滅㣲國不絶其祀曰取内取根牟鄟邿外取舒皆㣲國不列于諸侯不祥滅之者曰亡非其有而奪之曰取諸取田邑受之於師曰取濟西田汶陽田凡戰稱將敗稱師穀梁傳例重衆也侵我稱人追稱師人指將身追逐其衆僖二十六年穀梁傳例非凡師敵未陳曰敗某師皆陳曰戰大崩曰敗績京師敗績曰王師敗績于某此左氏傳例今以經考之唯書敗例不合葢筆削之後别有其義非左氏所知説見變文篇凡國君戰而死曰滅生得曰獲大夫生死皆曰獲君獲君滅君敗績不言師敗績晉侯蔡侯獻舞胡子沈子楚子舉其重者唯大夫兼言之宋華元齊國書師重與大夫䓁凡内師㑹伐君大夫將皆言㑹以㑹禮合謀唯㣲者言及㣲者各受成命于國故但言及如僖四及江人黄人伐陳則又同受命于伯主也宣七傳例曰凡師出與謀曰及不與謀曰㑹豈有為人出師而不與謀者劉氏譏其例與事違是也凡㑹盟而後伐書及某伐某桓十二㑹侵而後伐書遂伐某僖四如京師而後㑹伐書自京師遂會某伐某成十三皆一役再有事之辭凡諸侯會天子伐罪言從啖氏曰不言㑹及臣從君之辭也凡諸侯已伐國而王臣濟師但書㑹伐某單伯重序嫌再舉大夫已出師而諸侯㑹之但書㑹某師瓦與棐林卿不㑹公侯故舉師為重凡戰以主及客以内及外以中國及外裔皆曰及某戰公羊傳例伐人者為客被伐者為主孔氏曰令狐河曲彭衙長岸泓韓之屬皆以主及客也乾時升陘及鞌皆魯與人戰以魯為主城濮鄢陵與邲外楚而内晉柏舉内蔡而外楚今案陸氏曰主人服則客不戰故戰由主人而成為主客恒法言之也若以内及外以中國及外裔則不得以受伐為主内及伐言戰于某桓十一從内録不得以受伐為主苟會外裔伐中國而戰則從外辭哀十一艾陵凡諸侯以兵屬外裔不書故㑹伐雖從内録而戰則魯不序還以齊主之不以外裔先諸夏二義皆通也凡侵伐而不應但書侵伐趙氏曰主人不出戰殺掠而還侵伐而敗之書其重者荆敗蔡師于莘不書伐諸侯之師敗鄭徒兵不書敗之類應而敗之但書敗不書侵伐以應兵見之勝敗相當但書戰必敗績而後言伐言戰言敗績大崩當詳言其故凡不合者皆筆削之㫖非卿帥師不言敗績凡中國與外裔不言戰穀梁傳例如荆敗蔡師以蔡侯獻舞歸此戰也而不言戰又晉每書敗狄不言戰必外裔稱將稱師而後言戰楚子㑹盂伐宋已稱爵泓戰稱人經變文城濮稱楚師凡徙國曰遷自遷曰某遷于某衛遷帝丘遷之而有其地曰某人遷某宿陽雖有遷之者而不失其地文同自遷邢許蔡凡赴難曰救躡敵曰追用人之師曰以凡背君曰叛民散曰潰凡兵得曰俘器物同兵囚曰捷俘曰歸捷曰獻凡外師加魯四竟曰某鄙直逼國都言伐我凡師所止過信宿為次故案兵待事曰次君行所止曰次君行師從無成事則書如滑不成㑹雍榆不成救之類匡為諸侯不親救餘可推之十一師田類凡時田春曰蒐冬曰狩本左氏傳春蒐夏苗秋獮冬狩與周禮合不書苗獮者夏秋五穀在野其禮略鮮過舉故史不書蒐狩禮偹而魯人每假蒐擇之義以治兵講武故所書皆非時過禮之事過常曰大蒐火田曰焚凡譏在狩書地郎非國内常狩之處譏不在狩不書地大野國内狩地杜氏曰古者民多地狹必於封内擇隙地為之傳曰鄭之有原圃猶秦之有具囿是也譏在公書公狩郎狩禚譏不在公不書公蒐大蒐經書邾子來㑹公見公在不書凡蒐軍曰大閲習武曰治兵十二興作類凡城邑備制曰城不備制曰築傳例非囿曰築臺曰築館曰築凡木工曰作改制曰新作易舊曰新凡脩舊不書故大室但書屋壊泮宫公宫長府冝皆不志魯頌新廟僖公廟也閟宫有侐吕氏謂推本之辭是也凡自毁曰壊故壤曰毁毁城曰墮凡深川曰浚界田曰疆十三賦稅類凡師衆曰軍戰士曰甲制軍曰作毁軍曰舎凡田租曰稅田財曰賦本何氏始稅曰初以田為率曰用十四内辭類凡君舉必書傳文如納幣親迎矢魚觀社之類不成禮不書不行即位禮不書即位不成喪不書𦵏改𦵏恵公公弗臨不書衛侯來㑹𦵏不見公亦不書大夫不以卿禮終不書卒之類非公命不書費伯帥師城郎新作南門之類以上皆隠元年傳發不書之例實史例也陳氏誤以為筆削之法非左氏本意常事不書公羊傳時祭常事不書時田常事不書與左氏凡祀過則書合葢田祭皆有常時常禮書之則不勝書必過禮而後書以防失禮戒踰節皆史法也公羊誤以為筆削之㫖葢不知夫子所脩乃魯史成書穀梁亦發親迎恒事不志之例葢知昬姻有常事不書者而誤於親迎發例今考于經納幣不書使卿則書内女適大夫不書公自主則書内媵不與適俱行則書外媵踰制則書所謂常事不書不過此三事以其皆是常禮故也後儒求之大過又非二傳之失非卿不書下大夫名氏不登于策内言其事如㑹曰㑹伐曰伐之類外雖接我不書事不可没但書人小國之卿與大國下大夫等故盟㑹征伐皆書人必接我然後書名氏凡崩卒弔則書𦵏㑹則書天王崩諸侯卒不往弔不書崩卒不㑹𦵏不書葬二傳不知此義遂為君弑賊不討不書𦵏之説歐陽公作五代史亦承以為例後世脩史為二傳所誤若此者多矣𦵏外裔不書𦵏當順彼臣子之辭吳楚僭王避其號不書莒用夷禮無諡不書同外裔凡内諱弑書薨夫人以罪殺同未成君書卒奔曰孫杜氏曰使若自孫位而去諱殺大夫書卒公子殺曰刺據周禮三刺小司寇以斷獄訟而已大司寇凡諸侯之獄訟以邦典定之凡卿大夫之獄訟以邦法斷之春秋時皆専殺大夫在大司馬九法為犯令陵政故内變殺言刺以崇國體示恭順而外直斥殺以見其非則文雖為内諱而實不可掩矣諱在外則不書其事宣七傳曰晉人止公于㑹盟于黄父公不與盟以賂免故黑壤之盟不書諱之也成十年公如晉晉人止公使送𦵏景公公送𦵏諸侯莫在魯人辱之故不書諱之也傳發此明皆魯史諱法其筆削亦有諱義然非史氏所及矣左氏亦不能明也啖氏曰諱者避辭言之示尊敬也今案諱有淺深有全没其事者則諱其恥也有但避其名者有辭雖諱而上下文猶有以見之者其事不可全没也由説者一槩言之故不通凡諸侯侵叛不書為王室諱若衛師燕師伐周之類外裔犯京師不書為中國諱若揚拒泉臯伊洛之戎同伐京師之類當襄王之世無不告諸侯者交質子雖内不書為世道諱事在成二年凡内外恒異辭内大夫直言名氏外大夫各繫其國外㣲者稱人内㣲者直言其事之類唯王人則以内辭書之書㑹伐書㑹書執書至書卒皆同内大夫不得外王朝言周啖趙不逹此義誤謂單伯為魯大夫伯令則以内辭書之城楚丘城虎牢戌鄭虎牢戌陳書之一如内事叔孫豹鄫世子如晉仲孫蔑衛孫林父㑹呉皆不言及以有伯令也楚丘不繫衛縁陵不繫杞虎牢不繫鄭取濟西田不繋曹皆以伯令書十五從赴告類凡王師令不及魯不書隠元伐衛五年伐曲沃桓四圍魏之類成元年王人來告敗傳於此始發例蔡衛陳從王伐鄭葢三國具其事來告如隠九鄭人以王命來告伐宋也傳於隠桓之世毎記王師唯此二處發來告之例明他皆不告也伯主有事于諸侯令不及魯不書僖九傳例凡諸侯有命告則書不然則否師出臧否亦如之雖及滅國滅不告敗勝不告克不書于䇿隠十一傳例據隠五邾人鄭人伐宋入其郛宋人使來告命公欲救之以使者失辭而止九年鄭伯以王命伐宋宋以入郛之役怨公不告命公怒絶宋使傳發此以明不告之例也凡諸侯告命有恒此以宋好中絶發傳如鄭人以王命來告伐宋亦為告王命發傳爾唯僖五年春晉侯使以殺太子申生之故來告十一年晉侯使以㔻鄭之亂來告葢欲見晉自獻公以來告命始通于魯凡僖以前傳所記晉事皆不見于經由晉不來告策書所無也又以見國君苟有討意於其臣子雖自殺以殺告故䇿書一以君殺書之雖用事者殺之亦以殺告故策書一以國殺志之凡莊以前傳所記楚事不見于經者亦由不告也陳氏一切以為聖人所削非傳意明矣凡崩薨不赴則不書禍福不告亦不書文十四年傳例曰懲不敬也襄二十八年十一月傳曰癸巳天王崩未來赴亦未書禮也例同杜氏曰奔亡禍也歸復福也凡赴以往日者書往日平王以來日者書來日靈王齊桓公靈公再赴而異日者再書之陳侯鮑不以時告者即告時書之如成元年三月癸未王師敗績于徐吾氏秋王人來告敗史繫其事於秋僖四年冬十二月戊申晉太子縊于新城五年春來告史繫其事於春傳志此類甚多葢欲見赴告策書之體晉恵公卒在僖二十三年九月史書在明年冬杜氏曰文公定位而後告又以僖九年九月戊辰諸侯盟于葵丘甲子晉侯佹諸卒甲子九月十一日戊辰十五日也又如成九年齊侯無野定四年陳侯呉皆以前月卒日繫來告之月書之可見策書日法之嚴凡諸侯同盟死則赴以名赴以名則亦書之不然則否僖二十三年傳例曰辟不敏也諸家皆不信此例以未同盟而書名者多也今考姻隣同姓諸大國相與者素厚當其身雖不同盟而皆赴以名所謂赴以名則亦書之謂未同盟也其他小國自得從禮唯秦先書名後不書名葢其初不知赴告之法凡諸侯之大夫違告於諸侯曰某氏之守臣某失守宗廟敢告所有玉帛之使則告不然則否宣十年傳例據杜氏謂奔者恩好不接則不告劉炫謂國家有玉帛交好之國皆告非指奔者之身今經所書列國大夫來聘出奔名氏具可考而二家之説如此殊可怪也如蔡與曹何甞聘魯但通好命同㑹盟則皆告爾凡弑君以賊赴者稱名氏苟國有臣子則稱弑者當國亦赴以名㣲者稱人㣲謂非卿閽稱閽盗稱盜昭公四年閽弑吴子餘祭傳曰吴人伐越獲俘焉使守舟吴子餘祭觀舟閽以刀弑之定公四年盗殺蔡侯申傳曰蔡昭侯将如吴諸大夫恐其又遷也承公孫翩射而殺之凡殺大夫以國討赴稱國僖十一晉告殺㔻鄭父宣十四衛告殺孔達例陳氏曰有司法守之辭也凡書國殺者皆同衆殺稱人宋大夫司馬討亂稱人陳御寇公子過晉先都士縠殺簒弑者稱人非有司所能治必以國人討之上討亂同稱盜衛齊豹雖闕當坐盜殺十六變例類凡夫人有不赴不袝而稱夫人薨書𦵏小君者哀姜僖公以齊桓為魯討哀姜特請其喪歸備夫人禮以𦵏欲從厚以説齊史亦變文紀實大夫卒有公不與小斂而書日者禮有所不得行𦵏有不由魯㑹而書者齊侯𦵏紀伯姬楚滅陳𦵏陳哀公來有不見公而書者僖二十九年春介葛盧來公在㑹亦書者魯人喜能來逺人特屢書之魯頌所夸淮夷獻琛即是其事可見時史之情滅國有非公命而書者僖十七滅項陳氏曰公猶在㑹非公命也案僖公雖在㑹滅項恐猶是公意自政在三家非公命而書者多矣皆國史變法以紀魯君失政大夫擅國不可以常例拘也外相如有來告而書者外相如本無來告得書之法齊鄭謀襲紀紀人懼而來告非實相朝州公如曹度其國危遂不復為將來魯故以告焉此二者所以得書于策獲有非卿而書者宋樂吕齊公孫夏非卿不書公子友獲莒子之弟挐傳曰非卿也嘉獲之也亂亡有不由赴告而書者僖二十一年冬㑹陳人蔡人楚人鄭人盟于齊梁亡昭二十二年六月叔鞅如京師葬景王王室亂傳曰叔鞅至自京師言王室之亂也葢國史承叔鞅之言而書知書梁亡亦是此例葢大夫㑹于齊于㑹聞之歸以告公公命國史書之以其不由赴告故但言亂而不言作亂者言亡而不言見滅之人亦辟不敏之意魯君唯僖公稱賢知閔亡國而録之爾外災有國亡而書者昭八楚滅陳九年春叔弓㑹楚子于陳夏四月書陳災時楚已縣陳必不以陳災告葢叔弓反自陳言其事而書之十七無費辭類凡一事再見前目後凡前序諸侯則後緫言諸侯僖十三公㑹齊侯宋公陳侯衛侯鄭伯許男曹伯于鹹十四年春諸侯城縁陵二十八公㑹晉侯齊侯宋公蔡侯鄭伯陳子莒子邾人秦人于温諸侯遂圍許之類大夫曰諸侯之大夫僖十五公孫敖帥師及諸侯之大夫救徐襄三十叔孫豹及諸侯之大夫及陳袁僑盟唯師從其恒稱僖元齊師宋師曹師次于聶北救邢齊師宋師曹師城邢凡一事再見卒名之宣元公羊傳例逆女稱公子遂叔孫僑如以夫天至但稱遂稱僑如會稱叔孫豹盟但稱豹之類有蒙上文者隠五年冬宋人伐鄭圍長葛六年冬宋人取長葛間一年不言鄭蒙伐鄭之文桓五年州公如曹六年春正月寔來昭六年冬齊侯伐北燕七年春王正月暨齊平此二事皆以正月無異事得蒙前年冬文桓十一年九月宋人執鄭祭仲突歸于鄭莊二十四年戎侵曹曹羈出奔陳赤歸于曹不言鄭突曹赤蒙上文鄭曹見是一事莊九年公伐齊納子糾不言齊糾僖二十八年晉侯入曹執曹伯畀宋人不别言晉侯亦同僖八年禘于大廟用致夫人蒙上文夫人薨𦵏我小君哀姜從可知二十一年楚人使冝申來獻捷不言宋捷蒙上文伐宋為中國諱也若齊侯獻戎捷則直書之成三年晉使荀庚來聘衛使孫良夫來聘下及荀庚孫良夫盟不言晉衛餘可類推有併上文者鄭伯髠頑如曹未見諸侯卒于鄭不言鄭伯髠頑卒併上鄭伯且見以如㑹卒呉子遏伐楚門于巢卒不言吳子遏卒于巢併上呉子且見以門巢卒有併下文者僖元年秋夫人姜氏薨于夷齊人以歸不言以喪歸者為下文夫人氏之喪至自齊者文也文十四年納捷菑于邾孔氏曰不言邾㨗菑者下有于邾之文凡諸侯卒于外書地于㑹書師僖四㑹伐楚次于䣆夏許男新臣卒應言卒于師茲不言卒于師者以下文楚屈完來盟于師從可知曰許男卒為下文于師之詞也凡盟㑹以國地者國主不序桓十四㑹曹僖十九盟齊二十盟邢皆國主與盟㑹不復序從可知也唯隠五盟宿杜氏云宿亦與盟案宿乃東平無鹽之小邑也無與于宋魯之故何為例之盟㑹故説者不取僖二十七年公㑹諸侯盟于宋宋方見圍雖地以宋不嫌與盟凡㣲者雖有諸侯之事不序㑹于宋邾滕與㑹而屬齊宋雖有諸侯之事亦不序其人也凡諸侯以兵屬夷狄不序僖二十八年城濮之戰蔡陳以兵從楚不見經成二年蜀之盟楚公子嬰齊帥師蔡景公為左許靈公為右二君失位亦不見經下逮吴伐齊郯子邾子之類皆是餘可推類凡美惡不嫌同辭凡以國事行稱㑹夫人以姦出亦稱㑹諸小國来朝書来四裔来朝亦書来衛晉継故言立王子朝簒位亦言立皆美惡同辭之文十八辭費以其故類凡不雨歴時緫書則不言雨文二文十十三及得雨而後書從此可知毎時一書則言雨僖二三徒以告廟書不言六月雨則不見其歴時不雨凡不郊猶三望言免牲不言不郊從可知間有事言不郊為三望言故言牛死言不郊牛傷得再卜凡復之曰歸某于某歸邾子益于邾致之曰歸于某晉侯執曹伯歸于京師晉人執戎蠻子赤歸于楚不以道致之曰歸之于某晉人執衛侯歸之于京師晉侯使韓穿來言汶陽之田歸之于齊晉文公再會諸侯致天子専復衛侯釋曹伯乃以元咺之訢執衛侯歸于京師晉景公鞌之戰命齊人反魯汶陽之田既與齊好又使魯歸汶陽之田于齊故皆言歸之于者明其歸之不以道也凡㑹而後盟閒有事書諸侯盟于某襄十九祝柯二十五重丘定四臯鼬閒無事不書諸侯成七馬陵十七柯陵襄九戲十一亳城北昭十三平丘有不盟者雖閒無事書諸侯盟于某僖五首止無主盟者書公及諸侯盟于某定四臯鼬凡㑹盟同地則地會地盟僖九葵丘雖閒無異事地㑹地盟僖五首止昭十三平丘盟重於㑹苟諸侯㑹而大夫盟則地㑹不地盟襄三雞澤十六溴梁臣統于君不再言地必大夫自為㑹而盟則地㑹地盟襄二十七宋大夫専盟㑹與君同公特㑹楚大夫又及列國大夫盟則地㑹地盟成二蜀會盟異事凡使不稱介僖二十六東門襄仲臧文仲如楚乞師杜氏曰臧文仲為襄仲副使故不書各以事行則列序之文十八公子遂叔孫得臣定六季孫斯仲孫何忌㑹志親事襄二十一㑹城把傳鄭子大叔與伯石往杜註大叔不書不親事昭三十二㑹城成周魏獻子屬役于韓簡子原夀過故魏舒不書並列于㑹則列序之襄十四季孫宿叔老哀二叔孫州仇仲孫何忌將書元帥襄元晉韓厥荀偃帥諸侯之師伐鄭杜註荀偃不書非元帥定八齊國夏高張伐我西鄙高張不書唯内卿悉書之成二季孫行父臧孫許叔孫僑如公孫嬰齊成六仲孫蔑叔孫僑如昭十季孫意如叔弓仲孫貜定六季孫斯仲孫何忌定八季孫斯仲孫何忌定十叔孫州仇仲孫何忌冄見哀二季孫斯叔孫州仇仲孫何忌哀三季孫斯叔孫州仇又叔孫州仇仲孫何忌凡卿從公不書成公從京師孟獻子從襄公如晉孟獻子從會伐鄭季武子從如楚叔孫穆子從之類苟有故則書之公孫敖帥師及諸侯之大夫救徐晉人執季孫行父舍之于苕丘叔孫豹及諸侯之大夫及陳袁僑盟公子憖出奔齊之類凡君將不言帥師敗則稱師凡常事不書公穀例如昬姻時祀時田有常禮為下事言故則書之媵為遂盟書冬烝為再烝書有事為仲遂卒猶繹書為叔弓卒去樂書衛人來媵晉人來媵為下齊人來媵書春秋屬辭卷十五
