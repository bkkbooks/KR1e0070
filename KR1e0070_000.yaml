body:
  text: 春秋屬辭春秋類提要臣等謹案春秋屬辭十五卷元趙汸撰汸於春秋用力至深至正丁酉既定集傳初稿又因禮記經解之語悟春秋之義在於比事屬辭因復推筆削之㫖定著此書其為例凡八一曰存䇿書之大體二曰假筆削以行權三曰變文以示義四曰辨名實之際五曰謹内外之辨六曰特筆以正名七曰因日月以明類八曰辭從主人其説以杜預釋例陳傅良後傳為本而亦多所補正汸東山集有與朱風林書曰謂春秋隨事筆削决無凡例前輩言此亦多至丹陽洪氏之説出則此段公案不容再舉矣其言曰春秋本無例學者因行事之迹以為例猶天本無度厯家即周天之數以為度此論甚當至黄先生則謂魯史有例聖經無例非無例也以義為例隱而不彰則又精矣今汸所纂述却是比事屬辭法其間異同詳畧觸事貫通自成義例與先儒所纂所釋者殊不同然後知以例説經固不足以知聖人為一切之説以自欺而漫無統紀者亦不足以言春秋也是故但以屬辭名書又有與趙伯友書曰承筆削行狀作黄先生傳特奉納師説一部屬辭一部尊兄既熟行狀又觀師説則於六經復古之學艱苦之由已得大槩然後細勘屬辭一過乃知區區抱此二十餘年非得己不已强自附於傳註家以徼名當世之謂也其書參互錯綜若未易觀然其大處祗是屬辭比事法無一義出於杜撰云云其論義例頗確其自命亦甚高今觀其書刪除繁瑣區以八門較諸家為有緒而目多者失之糾紛目少者失之强配其病亦畧相等至日月一例不出公榖之窠臼尤嫌繳繞故仍為卓爾康所譏語見爾康春秋辨義盖言之易而為之難也顧其書淹通貫串據傳求經多由考證得之終不似他家之臆説故附㑹穿鑿不能盡免而宏綱大旨則可取者為多前有宋濓序所論春秋五變均切中枵腹游談之病今併録之俾憑臆説經者知情狀不可揜焉乾隆四十六年十一月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀春秋屬辭原序春秋古史記也夏商周皆有焉至吾孔子則因魯國之史修之以為萬代不刋之經其名雖同其實則異也蓋在魯史則有史官一定之法在聖經則有孔子筆削之旨自魯史云亡學者不復得見以驗聖經之所書往往混為一塗莫能致辯所幸左氏傳尚存魯史遺法公羊榖梁二家多舉書不書以見義聖經筆削粗若可尋然其所蔽者左氏則以史法為經文之書法公榖雖詳於經義而亦不知有史例之當言是以兩失焉爾左氏之學既盛行杜預氏為之註其於史例推之頗詳杜氏之後唯陳傅良氏因公榖所舉之書法以考正左傳筆削大義最為有徴斯固讀春秋者之所當宗而可憾者二氏各滯夫一偏未免如前之蔽有能㑹而同之區以别之則春秋之義昭若日星矣奈何習者多忽焉而勿之察其有致力於此而發千古不傳之秘者則趙君子常其人乎子常蚤受春秋於九江黄先生楚望先生之志以六經明晦為己任其學以積思自悟必得聖人之心為本嘗語於子常曰有魯史之春秋則自伯禽至於頃公是己有孔子之春秋則起隱公元年至於哀公十四年是已必先考史法然後聖人之筆削可得而求矣子常受其說以歸晝夜以思忽有所得稽之左傳杜註備見魯史舊法粲然可舉亟往質諸先生而先生殁已久矣子常益竭精畢慮幾廢寢食如是者二十年一旦豁然有所悟入且謂春秋之法在乎屬辭比事而已於是離析部居分别義例立為八體以布列之集杜陳二氏之所長而棄其所短有未及者辯而補之何者為史策舊文何者是聖人之筆削悉有所附麗凡闇昧難通歴數百年而弗決者亦皆迎刃而解矣遂勒成一十五卷而名之曰春秋屬辭云嗚呼世之說春秋者至是亦可以定矣濓頗觀簡策所載說春秋者多至數十百家求其大槩凡五變焉其始變也三家競為専門各守師說故有墨守膏肓廢疾之論至其後也或覺其膠固已深而不能行逺乃倣周官調人之義而和解之是再變也又其後也有惡其是非淆亂而不本諸經擇其可者存之其不可者舍之是三變也又其後也解者衆多實有溢於三家之外有志之士㑹粹成編而集傳集義之書愈盛焉是四變也又其後也患恒說不足聳人視聽爭以立異相雄破碎書法牽合條類譁然自以為髙甚者分配易象逐事而實之是五變也五變之紛擾不定者蓋無他焉由不知經文史法之殊此其說愈滋而其㫖愈晦也歟子常生於五變之後獨能别白二者直探聖人之心於千載之上自非出類之才絶倫之識不足以與於斯嗚呼世之說春秋者至是亦可以定矣如濂不敏竊嘗從事是經辛勤鑚摩不為不久卒眩衆說不得其門而入近獲締交於子常子常不我鄙夷俾題其書之首簡濂何足以知春秋間與一二友生啟而誦之見其義精例密咸有據依多發前賢之所未發譬猶張樂廣厦五音繁會若不可以遽定細而聽之則清濁之倫重輕之度皆有條而不紊子常可謂深有功於聖經者矣濓何足以知春秋輙忘僭踰而序其作者之意如此若夫孔子經世大㫖所以垂憲將來者已見子常之所自著兹不敢勦說而瀆告之也子常姓趙氏名汸子常字也歙休寧人隱居東山雖疾病不忘著書四方學子尊之稱為東山先生子常别有春秋師說三卷春秋左氏傳補註十卷春秋集傳十五卷與屬辭並行於世前史官金華宋濓謹序六經同出於聖人易詩書禮樂之旨近代說者皆得其宗春秋獨未定於一何也學者知不足以知聖人而又不由春秋之教也昔者聖人既作六經以成教於天下而春秋教有其法獨與五經不同所謂屬辭比事是也蓋詩書禮樂者帝王盛徳成功已然之迹易觀隂陽消息以見吉凶聖人皆述而傳之而已春秋斷截魯史有筆有削以寓其撥亂之權與述而不作者事異自弟子髙第者如游夏尚不能賛一辭苟非聖人為法以教人使考其異同之故以求之則筆削之意何由可見乎此屬辭比事所以為春秋之教不得與五經同也然而聖人之志則有未易知者或屬焉而不精比焉而不詳則義類弗倫而春秋之旨亂故曰屬辭比事而不亂者深於春秋者也有志是經者其可舍此而他求乎左氏去七十子之徒未逺而不得聞此故雖博覽遺文略見本末而於筆削之旨無所發明此所謂知不足以知聖人而又不由春秋之教者也公羊穀梁以不書發義啖趙二氏纂例以釋經猶有屬辭遺意而陳君舉得之為多庶㡬知有春秋之教者然皆泥於褒貶不能推見始終則聖人之志豈易知乎若夫程張邵朱四君子者可謂知足以知聖人矣而於屬辭比事有未暇數數焉者此五經微旨所以闇而復明春秋獨鬱而不發也自是以來說者雖衆而君子一切謂之虚辭夫文義雖雋而不合於經則謂之虚辭可也而亦何疑於衆說之紛紛乎善乎莊周氏之言曰春秋經世先王之志聖人議而弗辯此制作之本意也微言既絶教義弗彰於是自議而為譏刺自譏刺而為褒貶自襃貶而為賞罰厭其深刻者又為實録之說以矯之而先王經世之志荒矣此君子所謂虚辭者也故曰春秋之義不明學者知不足以知聖人而又不由春秋之教也豈不然哉間嘗竊用其法以求之而得筆削之大凡有八蓋制作之原也春秋魯史也雖有筆有削而一國之紀綱本末未嘗不具蓋有有筆而無削者以為猶魯春秋也故其一曰存策書之大體聖人撥亂以經世而國書有定體非假筆削無以寄文故其二曰假筆削以行權然事有非常情有特異雖筆削有不足以盡其義者於是有變文有特筆而變文之别為類者曰辯名實曰謹中外故其三曰變文以示義其四曰辯名實之際其五曰謹中外之辯其六曰特筆以正名上下内外之殊分輕重淺深之弗齊雖六者不能自見則以日月之法區而别之然後六義皆成無微不顯故其七曰因日月以明類自非有所是正皆從史文然特筆亦不過數簡故其八曰辭從主人是皆所謂議而弗辯者也雖然使非是經有孔門遺教則亦何以得聖人之意於千載之上哉乃離經辯類析類為凡發其隱蔽辯而釋之為八篇曰春秋屬辭將使學者由春秋之教以求制作之原制作之原既得而後聖人經世之義可言矣安得屬辭比事而不亂者相與訂其說哉新安趙汸序春秋屬辭原序欽定四庫全書春秋屬辭目録卷一存策書之大體第一序存策書之大體第一之一一嗣君踰年即位書元年春王正月公即位不行即位禮不書即位告朔朝正書王正月二即位不在正月故不書正月三歲首必書王月無繫月之事不書王月四一時無事書首月五事之繫日者遇晦朔則書晦朔六喪以月斷者遇閏則書閏七凡天災物異無不書外災告則書慶祥唯年豐麟瑞則書卷二存策書之大體第一之二八卜郊不從牛災猶三望郊不時皆書九天災鼓用牲于社十大雩不時十一禘必因事而書義在用禘稱禘義不在用禘稱事十二嘗祀用夏時過則書十三飾廟踰制作主後時立已毁之宫皆書十四大室屋壞十五納賂鼎于大廟十六不告月十七考宫用舞初定羽數十八當祭大夫卒猶繹去樂十九内逆女夫人至無姑至稱夫人有姑稱婦二十覿夫人男女同贄二十一逆后魯主昬則書過我則書二十二魯主王女昬書歸同内女二十三世子生則書二十四大夫來逆妻公自主之則書内女來逆婦書二十五娣姪不與適俱行則書國亡反其宗祀所在則書二十六來媵踰制則書卷三存策書之大體第一之三二十七凡公薨書地弑則諱而不地未成君書卒不成喪不書葬二十八夫人薨不書地殺于外則諱之而書地不用夫人禮卒不稱夫人不成喪不書葬二十九公服母喪書卒三十妾母用夫人禮稱夫人書薨書葬三十一凡天王崩諸侯卒來赴往弔則書崩書卒不赴不弔不書會葬則書葬不會不書卷四存策書之大體第一之四三十二内女為諸侯夫人書卒書葬不弔不書卒不會不書葬許嫁書卒來歸以夫人禮成喪書卒三十三主王姬之昬為之服書卒三十四内大夫書卒不書葬君不與小斂不書日有加命兼書字卒于外書地不以卿禮終不書卒諱殺成喪書卒三十五天子大夫卒書同内大夫葬則舉諡稱公三十六公母弟卒書弟書字三十七外弑君從赴告三十八殺他國君三十九内殺大夫言刺四十外殺大夫稱國稱名討亂稱人不在位不稱大夫簒公子去屬衆殺稱人四十一夫人出書歸四十二公夫人出奔言孫四十三諸侯出奔四十四公子入國四十五外大夫以邑叛四十六以地來奔非卿亦書四十七出奔大夫入國賊其國稱復入四十八諸侯相執四十九盟主執諸侯五十中國執外裔之君五十一外裔會而執中國之君五十二外裔相執五十三大夫見執則書至非專使不稱行人從公還不書至五十四王臣見執自我而行則書還接我書至五十五外大夫見執非專使不稱行人非卿雖殺之不書五十六外放大夫五十七外裔滅中國而放其大夫卷五存策書之大體第一之五五十八公朝覲始行則書皆稱如既成禮則稱朝在道而還書其復五十九公外如非朝則直言其事六十夫人越竟始行則書皆言如以事往言其事六十一諸侯相如告則書六十二内大夫出聘始行則書皆言如六十三内大夫以其事出者言其事事不可書但言如非卿不書名氏六十四凡諸侯來朝皆成禮而後書故言來朝六十五諸侯以事來言其事事不可書但言來外裔言來六十六王使來聘皆稱使以事來者言其事在喪不稱使六十七外臣來聘皆稱使私相為好不稱使六十八外臣以事來者言其事事不可書但言來六十九外微者以事來但書人七十事無專使不言來公在外受之言歸我卷六存策書之大體第一之六七十一内特相盟内為志書及外為志書會七十二内參盟以上皆稱會伯者之盟稱會蒙及會言諸侯盟苟無主盟稱及七十三公如伯國受盟稱及七十四公與王臣外臣會盟稱會特相盟稱及七十五公會諸侯使大夫盟七十六公與外裔盟稱及特會而後與盟稱及七十七内大夫特與諸侯盟稱及稱會與君同七十八内大夫盟諸侯參以上稱會伯者之盟稱會與君同出疆遂盟稱及非卿不稱名氏七十九内大夫特與外臣盟稱及稱會非卿不稱名氏八十内大夫與外臣盟參以上稱會伯者之會别盟後至者稱及以及旣會而盟稱及盟于師稱及八十一内大夫與戎盟稱會八十二自外來魯盟稱來盟自魯往他國盟言涖盟八十三公特會諸侯自參以上必言故苟從可知不言故伯主之會不言故避不主會言及以會八十四公特會外裔八十五公會諸侯殊會外裔言會以會不殊會言會以及八十六公會把伯姬八十七公及夫人會齊侯八十八諸侯迎會公八十九公會外師九十公會外大夫九十一王臣會諸侯九十二内大夫會諸侯九十三内大夫會外大夫苟非天下之事則言故九十四内大夫特會外裔九十五内大夫會外大夫殊會外裔言會以會同受命直言會之九十六君大夫出會諸侯無成事亦書九十七公及諸侯相遇九十八公行無成事書次九十九公失國書次書如書至書居書唁書圍邑取邑卷七存策書之大體第一之七一百内師公將稱公大夫稱名氏微者不言將百一内勝外師言敗勝敗相當言戰大崩言敗績微者戰言及百二内圍國邑及外師圍國百三内入國邑公及諸侯入國百四公會伐會侵會圍㑹而及戰百五大夫會伐會侵會圍會而及戰百六微者會伐言及百七内救公㑹救公㑹臣及救臣會救百八公追百九師次會次百十内大夫會城百十一王師令必及魯而後書百十二外師加魯四境言某鄙直逼國都言伐我百十三外師來戰百十四内伐國取田邑言伐言取不用師但言取有來歸之者言入已滅之國言取不絶其祀不言滅百十五外取我田邑言取雖我歸之亦言取諱易田言假百十六外滅國必書不絶其祀言取迫之使服曰降移其民人社稷曰遷百十七凡土功無不書都邑備制曰城不備制曰築百十八浚川百十九墮毁百二十新作門觀新廏百二十一時田用夏時越禮則書百二十二火田百二十三觀魚百二十四大閱治兵異常百二十五軍制作舍百二十六加賦稅百二十七分器失得百二十八肆大眚百二十九書亂亡不由赴告百三十闕文百二十一日月差繆卷八假筆削以行權第二序假筆削以行權第二之一一公如大國恒書至則不書至以見義二公會諸侯恒不書至則書至以見義三公會伯主恒不書至則書至以見義四公會盟主恒書至則不書至以見義五公會外大夫不書至會師則書至六公會呉楚不書至有中國之君則書至盟戎書至七公特將不書至則書至以見義八公會伐恒書至為會言故不書至九公會伯國侵伐恒書至則不書至以見義十公會外大夫伐國不書至君將稱人則書至十一夫人違禮而行不書至必歸寧得禮而後書至十二公行不書所在書在楚在乾侯十三公不視朔不書有為則書十四送王姬不書必主仇昬而後書十五諸侯女歸京師不書必魯主昬而後書十六内女適諸侯恒書歸茍來歸則不書歸十七内女歸寧不書必有故而後書十八國君來逆女不書卿為君逆則書十九繼故不書立必賊討而後書立二十簒位不書立必不能討而後書立二十一天王蒙塵復辟不書茍自取之則書其出必亂未弭賊未討而後悉書之二十二天王出入有以之者不書未成尊則書二十三未成君出入不書必有辯於名實而後書二十四執君歸不書必伯主釋有罪而後書二十五弑君以納君不書必所弑稱君而後書二十六内大夫出奔非其罪不書必有罪而後書二十七王卿士奔復之不書必不反而後書二十八王子奔非其罪不書以叛奔卒討之不書必佚賊而後書二十九公子奔非其罪不書必有故而後悉書之三十外大夫出奔不書必有關於一國之故而後書三十一内大夫來歸非其罪不書以伯主之盟復之則書三十二奔大夫公子復之不書必挾外援以歸而後書苟以叛出書三十三諸侯逃不書必逃中國而後書三十四外大夫逃不書齊桓之初則書之三十五王討篡立者不書雖殺卿士不書必殺無罪而後書三十六諸侯討亂殺公子不書雖殺世子母弟不書必殺之非其罪而後書三十七兩下相殺不書雖殺太子不書必譏不在相殺而後書譏不在相殺雖無君書雖盜殺書三十八諸侯反國殺大夫公子以簒入者不書必治以君臣之禮而後書三十九簒弑者以奔為義雖卒討之不書四十叛臣以出奔為義雖討以諸侯之師不書四十一外納不書宜納雖伐不書苟不宜納則書伐書戰甚則書伐書入必不克納而後書納唯外裔間中國悉書之四十二内邑叛不書鄆潰則書之卷九假筆削以行權第二之二四十三外特相盟㑹不書雖參以上不書必有關於天下之故而後書四十四外胥命相遇書與特相盟會同四十五平不書有關於天下之故則書四十六王臣會盟有所諱則不書四十七王臣會伐非有關於天下之故不書四十八大夫會城干位尋盟不書四十九大夫會而不能分災譏不在魯不書魯大夫五十中國外裔特相盟會不書雖參以上不書必有關於天下之故而後書疑於盟主雖公會之盟不書城下之盟雖内不書五十一諸侯勤王不書必無功而後書五十二外次不書必有關於天下之故而後書五十三凡戍不書必有關於天下之故而後書五十四内乞師不書乞諸外裔則書五十五外乞師不書必伯主而後書五十六公及小國戰不言我師敗績納所宜納與大國戰言我師敗績五十七外言戰言敗績義不繫於伐者但書及戰必義繫於伐而後兼言之苟略之言伐不言戰敗績五十八王師敗績于中國不書敗于戎則書之五十九外相敗不書唯晉特書之六十中國敗外裔不書唯晉特書之六十一外裔敗中國不書唯荆特書之六十二外裔交相敗獲不書必敗其從中國者若中國之從外裔者而後書必其君以敗卒而後書六十三公追戎不言其來與弗及六十四外伐國取邑不書雖取諸我不書春秋之初則書之六十五外取師不書侵伐必伐與取異事而後悉書之六十六外入郛不書唯齊特書之六十七外伐國不書圍邑有關於天下之故則書之六十八諸侯滅畿内國不書為外裔所滅則書六十九諸侯被兵出奔者不書必國滅而後書七十遷國不書避難而遷則書七十一諸侯連兵伯主有事舉重不悉書七十二凡救不悉書伯者救中國必足以示名義而後書諸侯相救以叛伯無伯書楚救必不能而後書狄救中國以無伯書七十三兵事言遂不悉書必有關於天下之故而後書七十四春秋之初外裔侵諸國不書自有伯而後書以之伐與國不書苟有召之者亦不書卷十變文以示義第三序一文同禮失王不稱天二諱公與王卿士盟不書公同微者三諱公與外大夫盟不書公同微者以大夫盟公去其族四諱公為仇人役變公將稱師五諱公與仇人狩外稱人同微者六諱公與仇會伐外稱人同微者七妾母為昬主婦姜不稱氏八夫人不稱姜氏九凡執恒稱人必伯討而後稱君十國君反國不言自必自京師自楚而後言自苟殺其大夫公子而後歸則不言自京師苟能興滅繼絶則不言自楚十一奔君自外入邑伯國逆之則不名十二大夫奔非君出之不名十三公子反國非有罪不名十四大夫見殺非君臣不名茍殺當其罪則去族十五無君相殺稱國十六内師加小國言伐加大國言侵苟納所宜納雖大國言伐用楚師言伐諱公及小國戰但言及亟戰大國但言敗十七非寇不言敗亟戰不言及戰與伐異事更以伐者及之曲在外言來戰黨惡會戰不言地戰拒伯討不言地十八重取畿内邑言滅内滅國不言師卷十一辯名實之際第四序一天下無王則桓公春秋闕不書王二中國無伯則晉靈公之盟會諸侯不序三征伐在諸侯則君將稱君大夫稱人用衆稱師苟略其恒辭則雖君將稱人稱師一役而再有事稱人稱師以喪行稱人四征伐在大夫則大夫將書大夫微者稱人用衆稱師苟畧其恒稱則雖大夫將稱人稱師五征伐君大夫將稱人不足以盡意則但稱國六外盟會恒稱君大夫微者稱人内微者但稱會苟奪其恒稱則外君大夫俱稱人内稱會同微者一役再有事稱人卷十二謹内外之辯第五序一荆始伐中國以號舉二中國有伯楚君大夫將同稱人唯會得稱君三中國無伯則楚君將稱君略之而後稱人疑於討賊稱師四楚君將稱君而後大夫將稱大夫畧之則稱人五楚君大夫主盟會悉從其恒稱唯公及大夫盟則人之六荆始來聘稱人七楚臣來盟于師稱名氏不言使來獻捷言使不稱君必中國無伯而後來聘稱君使八楚君會而執中國諸侯不别言執之者九楚君殺中國之君書名其自相殺不名十諱外裔執王臣言伐獲國君言以歸中國外裔不言戰十一呉征伐恒舉號唯為中國討罪得稱君十二中國會而會呉恒舉號雖吾君大夫特會之舉號必以諸侯之禮接而後稱君十三越舉號從其恒稱十四徐見敗伐國皆以號舉國滅則書君奔而名之卷十三特筆以正名第六序一諱會天王以王狩書二嗣王在喪稱王配名卒稱子三嗣君出奔復歸稱世子四所納應立雖未在位稱子五以庶孽易適嗣未踰年見弑稱殺其君之子六妾母繼室卒稱君氏七王人救列國兼稱字八諸侯滅吾同宗之國稱名九宋昭公之大夫特書官十諸侯會圍邑繫國戍邑繫國圍其父所居邑雖外大夫主兵不繫國十一諸侯敵王命敗績稱人十二師及齊師戰書公圍成十三城成周晉人執宋大夫以歸書執于京師十四鄭伯之弟段出奔書鄭伯克段十五紀侯出奔書去國十六鄭髙克出奔師潰書鄭棄其師十七楚君殺弑君者别稱人十八戰稱楚人敗稱楚師書入郢卷十四因日月以明類第七序一著例二疑例三變例四例要五災祥類六郊廟類七㛰姻類八喪紀類九禍福類十朝聘類十一盟會類十二戰爭類十三師田類十四賦稅類十五興作類十六眚盜類卷十五辭從主人第八序一編年類二災異類三郊廟類四名號類五㛰姻類六喪紀類七禍福類八朝聘類九盟會類十戰爭類十一師田類十二興作類十三賦稅類十四内辭類十五從赴告類十六變例類十七無費辭類十八辭費以其故類右春秋屬辭目録凡八篇篇各有序序所以釋其名篇之義也始汸聞諸師曰春秋本魯史成書故必先考史法而後聖人之法可求嘗退而考諸左氏傳以盡夫為其學者之説則魯史遺法大畧可見而惜其不知經既又考之公羊榖梁二傳以及陳氏後傳諸書又知筆削之法端緒可求而惜其不知史因悟三傳而後諸家紛紜之失不越此二端蓋八篇之名由是而立而述作之體見矣至正戊子嵗初集諸説之有合於經者作春秋傳閲十載未克成竊思倫類區别為義至精參互錯綜易相矛盾茍不屬辭比事以通之豈無遺憾此八篇之書所為作也其前六篇篇目即是義例其終二篇義例自見篇中第一篇有筆無削與第二篇有筆有削者相對第三篇至第六篇皆變文與第八篇從史文者相對而與前二篇相為經緯其第七篇則又一經之權衡也大抵史法相承而一定故雖詳密而可盡經則隨事而取衷故法若簡妙而難窮其間義例雖多皆以經傳反覆相證而得其可見者如此學者茍能於此盡心焉則其不可見者當自得於言意之表矣顧恐其間可見者猶或不能無遺爾先儒著書雖老尚冀有進故或終身未嘗示人如汸者衰瘵日深昬塞多忘夫復何言姑出以授共學之士為集傳先容若夫因其所可見者以足其所未備達之於其不可見者以盡聖人之志則有望於君子云歙諸生趙汸子常私識於東山精舍春秋屬辭目録
