body:
  text: 春秋屬辭卷四元趙汸撰存策書之大體第一之四三十二内女為諸侯夫人書卒書葬不弔不書卒不㑹不書葬許嫁書卒來歸以夫人禮成喪書卒莊四年三月紀伯姬卒六月乙丑齊侯葬紀伯姬僖十六年夏四月丙申鄫季姬卒襄三十年五月甲午宋災宋伯姬卒秋七月叔弓如宋葬宋共姬以上魯女為諸侯夫人書卒者三書葬者二禮諸侯絶旁期姑姊妹女子子嫁於國君者尊與已同故為之服大功九月而弔喪㑹葬皆書于䇿宋共姬葬書月者從諸侯得常之例紀伯姬獨書日葬於仇人異其事也其不書葬者魯不㑹也把伯姬卒亦不書者魯不弔也把畏魯暴之敢不告其女之喪乎僖九年秋七月乙酉伯姬卒以上魯女未嫁書卒者一禮姊妹在室期出嫁大功未嫁其夫不為服則兄弟不為降諸侯絶旁期此許嫁諸侯故服其本服而書其卒不書葬者在室葬不以夫人禮也文十二年二月庚子子叔姬卒成八年冬十月癸夘把叔姬卒以上魯女出而書卒者二子叔姬既絶於把故不書國把叔姬歸老於魯非把絶之故書國魯君皆為之服而喪以夫人之禮故書卒子叔姬不書葬同於在室也把伯來逆叔姬之喪以歸亦不書葬魯不㑹也齊子叔姬非罪出而與郯伯姬皆不書卒者宣成之世恩有厚薄皆不得以夫人禮成喪也莊二十九年冬十二月紀叔姬卒三十年八月癸亥葬紀叔姬以上魯女為娣書卒書葬者一娣卒史不書此以國亡君沒無為主後故魯君為服姑姊妹之服而弔喪㑹葬皆用殊禮故史書于策以明叔姬婦節之髙見莊公恤典之厚是亦所謂存䇿書之大體者而儒者不察反有責叔姬待終于酅為非禮者葢坐以非常求之也葬日者國亡而葬於叔故異之也三十三主王姬之昬為之服書卒莊二年秋七月齊王姬卒以上王姬書卒者一禮記檀弓曰齊告王姬之喪魯莊公為之服大功此禮所未有魯人以我主其昬欲以說齊爾公為之服姑姊妹之服故書卒同内女亦䇿書之大體所當存也後齊桓王姬亦魯主之而卒不書可見主昬脩服之非禮而桓公不可以非禮說故弗為也三十四内大夫書卒不書葬君不與小斂不書日有加命兼書字卒于外書地不以卿禮終不書卒諱殺成喪書卒隠元年冬十二月公子益師卒蒙上事月五年冬十二月辛巳公子彄卒八年冬十二月無駭卒九年三月挾卒蒙上事月莊三十二年秋七月癸巳公子牙卒僖十六年三月壬申公子季友卒秋七月甲子公孫茲卒文十年春王三月辛卯臧孫辰卒十四年九月甲申公孫敖卒于齊宣五年秋九月叔孫得臣卒月閒上事八年夏六月辛巳有事于太廟仲遂卒于垂壬午猶繹萬入去籥成四年夏四月甲寅臧孫許卒十五年三月乙巳仲嬰齊卒十七年十一月壬申公孫嬰齊卒于貍脤襄五年十二月辛未季孫行父卒十九年八月丙辰仲孫蔑卒二十二年秋七月辛酉叔老卒二十三年八月己卯仲孫速卒三十一年秋九月己亥仲孫羯卒昭四年冬十二月乙卯叔孫豹卒七年冬十一月癸未季孫宿卒十五年二月癸酉有事于武宫籥入叔弓卒去樂卒事二十一年八月乙亥叔輒卒二十三年春王正月癸丑叔鞅卒二十四年春王二月丙戌仲孫貜卒二十五年冬十月戊辰叔孫婼卒二十九年夏四月庚子叔詣卒定五年六月丙申季孫意如卒秋七月壬子叔孫不敢卒哀三年秋七月丙子季孫斯卒以上魯大夫書卒者三十不書日者四卒于外書日書地者二當祭而卒者二皆卿也禮王於三公六卿諸侯大夫士皆有服君於卿大夫將葬弔於宫比葬不食肉比卒哭不舉樂以有服也故大夫卒史必書之然傳曰公不與小斂故不書日則不徒記臣子之喪而已兼欲志恤典厚薄以見君臣始終之義焉故當祭卒而猶繹去樂必書況公不與小斂則恤典必不備冝有以見之也杜氏曰禮卿佐之喪小斂大斂君皆親臨之始死情之所篤故以小斂為文至於但臨大斂及不臨喪亦同不書日襄五年冬十二月辛未季孫行父卒傳曰大夫入斂公在位是公與小斂則書日之事也然公孫敖卒于齊已絶卿位而書日卒者惠叔毁請於朝感子赦父雖公不與小斂恩實過厚故書日也公子牙卒時公有疾叔孫婼叔詣卒時公孫在外公孫嬰齊卒于貍脤皆書日卒禮不責人以所不得備為其有故非不欲臨故皆書日大夫卒于竟外則書地竟内不地傳稱季平子行東野卒于房是也今案春秋之初政不在大夫故恤典有厚薄而史亦得用其法成襄而後大夫權重君恩過厚雖有故不臨小斂與恩薄者不同故一切書日此史之變例也兼書字者二季友僖之叔父而有功於僖仲遂宣之叔父而有功於宣其喪葬皆有殊禮傳言季友受費以為上卿葢宣之仲遂恩視季友皆賜以三命而使之世為卿也厥後叔孫昭子三命踰父兄當時以為非禮則以其先未有三命如二氏者也或謂此葢生而賜族使世為卿然叔牙不書叔亦世為卿叔肸之子嬰齊仍稱公孫則叔非氏也案杜氏注公子彄孝公子也諡僖伯臧孫辰彄之孫哀伯達之子諡文仲臧孫許辰之子諡宣叔是為臧孫氏季友莊公母弟季孫行父友之孫諡文子季孫宿行父之子諡武子意如宿之子諡平子季孫斯意如之子諡桓子是為季孫氏公子牙莊公庶弟公孫茲牙之子叔孫得臣牙之孫諡莊叔叔孫豹得臣之子僑如之弟諡穆叔叔孫婼豹之子諡昭子不敢婼之子諡成子是為叔孫氏公孫敖慶父之子諡穆伯仲孫蔑慶父之孫文伯榖之子諡獻子仲孫速蔑之子諡莊子仲孫羯速之子諡孝伯仲孫貜謁之子諡僖子是為孟孫氏仲遂莊公子也字襄仲仲嬰齊遂之子歸父之弟公孫嬰齊宣公弟叔肸之子諡聲伯叔老肸之子字齊子叔弓叔老之子諡敬子輒弓之子字伯章叔鞅亦弓之子叔詣輒之子無駭展禽之先也葢師俠不知其世王制大國三卿皆命於天子次國三卿二卿命於天子一卿命於其君小國二卿皆命於其君皆下大夫五人上士二十七人周禮公侯伯之卿三命其大夫再命其士一命子男之卿再命其大夫一命其士不命大夫以下名氏不見于䇿凡事于䇿皆卿也故卿卒則書王制諸侯之大夫不世爵禄避賢也春秋時晉鄭皆六卿魯專於三桓見于䇿者四卿齊國髙宋華向皆父卒子立䇿書之體存而世卿之失見矣又豈待以書某氏卒為譏也哉卿不書卒者六公子翬公子慶父柔溺公子結叔彭生皆不以卿禮終也若公子牙實殺而以卿禮成喪亦書卒史縁一時君臣隠諱之情而録之春秋存䇿書之大體而已公羊謂善季子陸氏謂書其自卒以示無譏皆失經㫖公孫歸父叔孫僑如出奔不書卒仲孫何忌叔孫州仇卒在春秋後三十五天子大夫卒書同内大夫葬則舉諡稱公文三年夏五月王子虎卒定四年秋七月劉卷卒蒙公至月葬劉文公以上天子大夫書卒者二書葬者一來赴而往弔也凡王人皆以内辭書之故書卒同内大夫王子虎踐土翟泉嘗主諸侯劉文公合諸侯于召陵傳曰來赴弔如同盟禮也二子身佩周室安危諸侯之合散繫焉其來赴往弔皆有不容己者不可以常禮論也葬舉諡稱公者王卿士有封國得置臣屬如諸侯也不月者禮不備也三十六公母弟卒書弟書字宣十七年冬十一月壬午公弟叔肸卒以上公弟書卒者一肸宣公母弟也傳曰凡大子之弟公在曰公子不在曰弟凡稱弟皆母弟也此謂春秋所書之弟皆是時君同母之弟葢史文實録之法非以為加親也肸非見大夫卒不當書宣公以庶簒適喪其母弟恩視季友仲遂而使世為卿比桓莊之族故稱弟稱字而書卒同於見大夫䇿書實録而宣公之情不可掩矣若稱公子則嫌於見大夫且無以見宣公寵愛之私史非不知異母之不當踈外也陸氏諸儒辯之過矣三十七外弑君從赴告隠四年春王二月戊申衞州吁弑其君完莊八年冬十一月癸未齊無知弑其君諸兒宣二年秋九月乙丑晉趙盾弑其君夷皋四年夏六月乙酉鄭公子歸生弑其君夷十年五月癸巳陳夏徴舒弑其君平國襄二十五年夏五月乙亥齊崔杼弑其君光二十六年春王二月辛夘衞甯喜弑其君剽昭十三年夏四月楚公子比自晉歸于楚弑其君虔于乾谿以上弑君稱名氏者八凡大夫不書氏未賜族也公子公孫不書屬非見大夫也雖弑君者當國得告以名者國猶有臣子不皆逆賊之黨也非手弑而歸罪者以首惡書也趙盾歸生事三傳同而先儒疑之必欲定為手弑然後合於經此不以禮法㫁之也史記録晉人之言曰盾雖不知猶為賊首此先王所以明臣妾之禮杜弑逆之原其來已久非董史甫創其義也歸生為正卿而與謀其首惡無足異者春秋以禮法脩辭學者弗深考爾楚䖍弑君而比出比歸國而䖍縊事與趙盾歸生不同故書其屬而經不日以别之陳氏曰春秋之法苟有逆意於其君雖自殺也亦書弑竊謂周監二代放弑其君必有成憲國史書罪亦有定法非脩春秋時始造斯律也桓二年春王正月戊申宋督弑其君與夷及其大夫孔父莊十二年秋八月甲午宋萬弑其君捷及其大夫仇牧僖十年春晉里克弑其君卓及其大夫荀息哀六年秋齊陳乞弑其君荼以上弑君及其大夫三庶孽初立見弑二君弑而大夫死節必大臣之能與其君存亡者也故得與其君同稱弑而言及弑君者稱名氏例與上同晉獻公殺其世子逐羣公子而立奚齊里克弑之荀息立卓子里克又弑之克之弑君為重耳也齊景公逐羣公子而立荼陳乞召陽生立之而荼弑故陳乞為逆首二君皆以庶孽見弑與他君遇弑者不同故經不月以異之非弑君者有輕重也文十四年九月齊公子商人弑其君舍蒙上事月僖九年冬晉里克殺其君之子奚齊以上弑未踰年君一不稱君者一未踰年君見弑稱君所以正其名待猶君之義也經不日别成君也奚齊庶孽國人不君故經特筆稱其君之子而又不月以異之其說别見文十六年冬十一月宋人弑其君杵臼十八年夏五月戊戌齊人弑其君商人襄三十一年十一月莒人弑其君密州以上弑君稱人者三凡稱人皆微者史從赴書之宋人弑君賊由君祖母莒人弑君賊由公子展輿事與齊邴歜閻職不同故經不日以别之文元年冬十月丁未楚世子商臣弑其君頵襄三十年夏四月蔡世子般弑其君固昭十九年夏五月戊辰許世子止弑其君買以上世子弑君三蔡侯般淫而不父與他國子禍不同故不日以别之許止非故弑而與商臣同書日則弑逆者罪無輕重明矣又案許止事三傳皆見止非故弑而左氏記事尤詳先儒亦疑之必欲定為故弑而後合於經此亦不以禮法㫁之也張主一曰止之所以異於商臣蔡般者過與故爾然春秋一施之者以臣子於君父不可過也蘇子由曰今律和御藥不如法者死葢春秋遺意皆足以㫁斯獄矣文十八年冬十月莒弑其君庶其成十八年春王正月庚申晉弑其君州蒲昭二十七年夏四月吳弑其君僚定十三年冬薛弑其君此以上弑君稱國者四告不以名氏故但稱國以弑必弑君者當國國人皆逆賊之黨故無能以名氏告者若欒書中行偃是也莒僕以其寳玉來納諸公故魯史不著其罪然莒僕因國人以弑父而出奔公子光弑君而自立其事與晉欒書中行偃當國者異而亦皆稱國以弑故不日以别之唯薛弑不月與晉里克齊陳乞同傳無事實不可考襄二十九年夏五月閽弑吳子餘祭蒙公至月傳序其事亦在五月哀四年春王二月庚戌盜殺蔡侯申以上閽弑國君一盜殺國君一閽賤𨽻盜竊賊不可律以臣禮故不言其君閽猶在官故得言弑然殺蔡侯者實諸大夫之公孫翩也蔡人既殺翩而以盜赴經賤閽故略不書日蔡實非盜故詳其日以别之孟子曰世衰道微邪說暴行有作臣弑其君者有之子弑其父者有之孔子懼作春秋此春秋書弑君之義也是故凡言弑其君者不以君有道無道異辭所以正弑逆之罪其或文同而事異事同而文異者則以日月之法别之左氏不知經意見弑君者或稱名氏或稱國或稱人求其說而不得遂定為例曰凡弑君稱君君無道也稱臣臣之罪也葢溺於邪說而不見正於孔氏之徒者也傳記師曠對晉侯論衞人出君史墨對趙簡子論魯人出君皆釋臣而歸罪於君劉向說苑記齊人弑君魯襄公曰孰臣而敢殺其君乎師懼曰夫齊君治之不能任之不肖縱一人之欲以虐萬夫之性非所以立君也其身死自取之也與師曠史墨之言如出一口皆當時之邪說也晉靈之弑史狐以首惡書重葢王者之法而猶有託為夫子之言謂趙盾為良大夫者自大夫專政士民皆知有大夫而不知有君是以君多謗而臣多譽邪說之行有自來矣此夫子所為懼春秋所由作也且見弑之君無道者莫甚於齊襄莊晉靈楚䖍經皆書弑者名氏而議不及其君宋昭公非有四君之惡也獨以無道稱而弑者免於討是豈春秋撥亂之法乎為左氏學者既以陷於邪說而何休范甯又推以釋二傳其不可為訓抑有甚焉而唐啖趙宋陳氏諸儒亦皆因襲其說而未有悟其非者是亂臣賊子雖知懼於一時而卒見釋於千萬世也由赴告䇿書之法左氏考之不詳而又不知聖人有存䇿書大體之義故其失至此諸實弑而以卒告者說己見前卒葬類中三十八殺他國君宣十八年秋七月邾人戕鄫子于鄫昭十一年夏四月丁巳楚子虔誘蔡侯般殺之于申十六年春楚子誘戎蠻子殺之以上微者戕他國之君一蠻荆之君殺諸國之君一自相殺一邾人者邾大夫戕者殘也葢邾使大夫往殘賊之傳例曰自虐其君曰弑自外曰戕孔氏曰弑者伺候閒隙試犯其君戕者卒暴而來殘賊殺害弑戕皆是弑也所以别内外之名爾不日者異内弑也凡諸侯卒則名謹終事詳凶變也故見殺見弑皆名之既名蔡侯亦名楚子又特書日所以謹内外之辯蔡侯嘗弑君且明非討罪也其自相殺則不月畧之也詳見變文篇三十九内殺大夫言刺僖二十八年春公子買戍衞不卒戍刺之成十六年十二月乙酉刺公子偃以上内刺公子二義取周禮三刺之法公子買葢公子之為大夫者不言殺其大夫内事以君命為重故不以專殺為義所以明臣禮也晉文之興魯欲與楚故戍衞其殺公子買懼晉也曰不卒戍乃欺楚之辭史實其誣而罪見矣穆姜僑如之謀公子偃所不知雖加之罪而事不可書故但言刺而已穆姜指偃與鉏曰是皆君也葢欲激公使逐二家非真有廢立之意季孫歸而殺偃遷怒也不及鉏者鉏幼公不忌也杜氏謂鉏不與謀非事實矣啖氏謂直書刺者罪當殺不知書法詳略之由也四十外殺大夫稱國稱名討亂稱人不在位不稱大夫簒公子去屬衆殺稱人莊二十六年夏曹殺其大夫僖七年夏鄭殺其大夫申侯十一年春晉殺其大夫㔻鄭父二十五年夏宋殺其大夫二十八年夏楚殺其大夫得臣文十年夏楚殺其大夫宜申宣九年冬陳殺其大夫洩冶十三年冬晉殺其大夫先縠十四年春衞殺其大夫孔達成八年夏晉殺其大夫趙同趙括十五年秋宋殺其大夫山十六年夏楚殺其大夫公子側十七年冬晉殺其大夫郤錡郤犫郤至十八年春晉殺其大夫胥童為下弑月齊殺其大夫國佐襄二年冬楚殺其大夫公子申五年秋楚殺其大夫公子壬夫十九年秋齊殺其大夫髙厚鄭殺其大夫公子嘉二十年秋蔡殺其大夫公子變二十二年冬楚殺其大夫公子追舒二十三年夏陳殺其大夫慶虎及慶寅昭二年秋鄭殺其大夫公孫黒五年春楚殺其大夫屈申十二年夏楚殺其大夫成熊二十七年夏楚殺其大夫郤宛哀二年冬蔡殺其大夫公子駟四年夏蔡殺其大夫公孫姓公孫霍以上外殺大夫稱國者二十八孟子曰君之視臣如土芥則臣視君如宼讎此春秋書殺大夫之義也古者諸侯大夫皆天子所置凡卿大夫之獄大司宼以邦法㫁之諸侯不得專殺故君殺臣皆書殺其大夫以志專殺而有罪無罪悉名之以明臣禮示恭順公羊傳曰稱國以殺者君殺大夫之辭也何氏曰凡君殺大夫以專殺書其說皆是唯左氏以大夫不名為非其罪而凡書名者皆求其罪以實之若洩冶以直言見殺公子變以謀去楚歸晉見殺皆不得免焉孔氏引家語論洩冶以區區之身欲止一國之淫昬死而無益可謂狷矣而不得為仁劉侍讀亦曰洩冶安於淫亂之朝至廢男女之節然後言之則其從君於昬者多矣其論人臣進退大節則善矣然春秋豈於其直言見殺而議其罪與悖亂者同科乎若公子燮之事則内外相亂說者不辨久矣其或不名與去族皆筆削之㫖說見變文篇僖十年夏晉殺其大夫里克襄二十七年夏衞殺其大夫甯喜以上外殺大夫嘗弑君者二二君利其弑以除害又以忌克殺之非討罪故史無異文僖三十年秋衞殺其大夫元咺及公子瑕以上殺大夫專廢立者一及所立公子一瑕稱公子以元咺稟伯主之命立之異於他簒者故書元咺及之而不去其屬襄二十三年冬晉人殺欒盈三十年秋鄭人殺良霄以上殺大夫自外復入者二皆稱人以殺以其稱兵犯國非士師之所能治而必以國人討之也皆不書其大夫以去位而復入為亂非其大夫也文九年春晉人殺其大夫先都晉人殺其大夫士縠及箕鄭父昭八年秋陳人殺其大夫公子過以上外殺大夫稱人者三先都士縠箕鄭父作亂殺先克公子招公子過殺陳世子偃師公子招又歸罪於公子過而殺之皆以討亂告故亦稱人以殺在位故稱其大夫隠四年九月衞人殺州吁于濮桓六年秋蔡人殺陳佗莊九年春齊人殺無知以上殺簒立者三諸簒立者諸侯定其位則列於㑹而稱爵故未㑹諸侯者皆名之不成之為君也皆稱人以殺者以其弑君代立非有司法守之所能治而國人得而討之也傳言州吁求寵於諸侯以和其民又曰州吁未能和其民厚問定君於石子是州吁之簒國人皆不與也所以石碏得信討賊之義蔡人殺五父而立其所出雍廪殺無知以報其虐名雖公而事則私其稱蔡人亦與稱國人義異春秋君弑而能以義討賊者唯衞人為正故特書月以别之文七年夏宋人殺其大夫八年冬宋人殺其大夫司馬以上外殺大夫稱人者二此稱人者衆辭傳謂穆襄之族及戴氏之族是也詳見變文特筆二篇四十一夫人出書歸文十八年冬十月夫人姜氏歸于齊蒙上子卒月以上魯夫人歸于父母之國者一傳曰夫人出曰歸于某文夫人以襄仲殺其子而立宣公故歸其父母之國而老焉與罪出者不同然亦絶于魯故曰歸事與内女非罪出書來歸同當同書月四十二公夫人出奔言孫昭二十五年九月己亥公孫于齊莊元年三月夫人孫于齊閔二年九月夫人姜氏孫于邾以上公孫一夫人孫二啖氏曰公夫人不可斥言奔公羊傳曰内諱奔謂之孫今案夫人尊與君同故同稱孫然婦人非罪不奔與國君見出於其臣者不同故經不日以别之四十三諸侯出奔桓十五年五月鄭伯突出奔蔡十六年十一月衞侯朔出奔齊莊四年夏紀侯大去其國僖二十八年夏四月衞侯出奔楚蒙上事月文十二年春王正月郕伯來奔襄十四年夏四月己未衞侯出奔齊昭三年冬北燕伯款出奔齊二十一年冬蔡侯朱出奔楚二十三年秋莒子庚輿來奔為下日敗月哀十年春王二月邾子益來奔以上諸侯出奔六來奔三去其國一有所辨則名去國不反名皆從史文不言出奔言去其國乃特筆其說皆别見諸侯出奔月衞侯衎臣出君特書日紀侯大以下失國者皆不月桓十一年秋鄭忽出奔衞莊二十四年冬曹羈出奔陳昭元年秋莒展輿出奔吳以上未踰年諸侯出奔一失位喪國故不稱子踰年出奔一微弱不能自定國人以名赴弑君簒位出奔一未㑹諸侯故不稱爵皆不月異成君也凡國滅君奔别見大夫出奔有筆削見後篇四十四公子入國桓十五年夏許叔入于許莊九年夏齊小白入于齊昭元年秋莒去疾自齊入于莒哀十年秋齊陽生入于齊以上公子入國四榖梁傳曰以好曰歸以惡曰入今案許叔以繼絶入故稱字說在變文篇齊小白陽生莒去疾以簒入故不稱公子皆從史文四十五外大夫以邑叛襄二十六年春衞孫林父入于戚以叛昭二十一年夏宋華亥向寕華定自陳入于宋南里以叛定十一年春宋公之弟辰及仲佗石彄公子地自陳入于蕭以叛秋宋樂大心自曹入于蕭十三年秋晉趙鞅入于晉陽以叛冬晉荀寅士吉射入于朝歌以叛以上外大夫書入邑以叛者四入國以叛者一樂大心不言叛者蒙上文從可知也四十六以地來奔非卿亦書襄二十一年春邾庶其以漆閭丘來奔昭五年夏莒牟夷以牟婁及防兹來奔三十一年冬黒肱以濫來奔以上邾莒大夫以地來奔者三傳曰庶其非卿也以地來雖賤必書重地也又曰牟夷非卿而書尊地也黒肱賤而書名重地故也今案邾小國雖其卿名氏亦不登于䇿此皆以受其叛邑書若郕伯來奔則以稱君故不書其地義各有所重史不徒録實也四十七出奔大夫入國賊其國稱復入襄三十年秋鄭良霄出奔許自許入于鄭成十八年夏宋魚石復入于彭城襄二十三年夏晉欒盈復入于晉入于曲沃以上大夫自外入國者一復入邑者一復入國入邑者一鄭良霄志復私讎宋魚石晉欒盈挾仇敵害宗國故書之不同說見末篇四十八諸侯相執僖五年冬晉人執虞公十九年春王三月宋人執滕子嬰齊夏六月己酉邾人執鄫子用之哀四年春宋人執小邾子以上諸侯相執四用之一周官大司宼掌建邦之三典以佐王刑邦國詰四方凡諸侯之獄訟以邦典定之諸侯無相執之道故凡執恒稱人晉獻公襲執天子三公而滅其封國罪大於相執齊桓伯略不及西莫能正也宋襄圖伯而執滕子用鄫子以宣其虐故子魚謂其得死為幸小邾世服於宋於是見執而春秋將終世無盟主久矣以䇿書大體所當存示録小國而已四十九盟主執諸侯僖二十八年三月丙午晉侯入曹執曹伯畀宋人冬晉人執衞侯歸之于京師成九年秋晉人執鄭伯十五年春晉侯執曹伯歸于京師襄十六年春晉人執莒子邾子以歸十九年春晉人執邾子以上盟主執諸侯六盟主有討罪之義故雖稱人以執與諸侯相執同文而事異其道有得失故筆削之㫖或稱侯以執說見變文篇唯襄二十六年晉人為衞孫氏故㑹澶淵執甯喜衞侯如晉晉人執之而經不書者為臣執君不可以訓故削而不録在存䇿書大體中為變例之三五十諸國執外裔之君哀四年夏晉人執戎蠻子赤歸于楚以上諸國執外裔之君一歸于楚者楚人圍蠻氏蠻子赤奔晉楚人有辭且以師臨上雒故趙孟執蠻子歸之楚雖敗亡之餘羣臣能輯睦以事其君晉外失諸侯而彊家内訌自知非楚敵也五十一外裔㑹而執諸國之君僖二十一年秋宋公楚子陳侯蔡侯鄭伯許男曹伯㑹于盂執宋公以伐宋以上外裔㑹而執諸國之君一宋公一㑹而虐二國之君又不度徳量力而致楚子于盂於是見執而國受兵蓋不知有出爾反爾之戒者也於楚曷足議焉凡㑹執别稱人此蒙諸侯言之五十二外裔相執昭四年夏楚人執徐子以上外裔㑹而相執一此申之㑹也徐服楚乆矣既世事楚而又服于吳徐子又吳出也故楚人執之五十三大夫見執則書至非專使不稱行人從公還不書至昭二十三年春王正月晉人執我行人叔孫婼蒙日卒月二十四年春婼至自晉以上大夫出疆見執書至一傳曰行人言使人也婼如晉謝取邾師見執故稱行人凡大夫行不書至降於君也被執則書至謹事變重國卿也成十六年九月晉人執季孫行父舍之于苕丘昭十三年八月晉人執季孫意如以歸蒙上事月十四年春意如至自晉以上大夫從公見執者二不稱行人非專使也凡大夫從公不書伐鄭之役行父從公以僑如之譖見執而書平丘之㑹意如從公以邾莒之訴見執而書雖見執也苟從公歸則不書行父從公歸意如踰年乃得歸也凡大夫出入從公不書執則書與公將不言帥師敗則稱師義同皆國史成法行父執書月著例五十四王臣見執自我而行則書還接我書至文十四年冬單伯如齊齊人執單伯十五年夏單伯至自齊以上王臣書如書執書至者一單伯以王命為魯請子叔姬如齊見執還又過魯故書之一如吾大夫隠七年冬戎伐凡伯于楚丘以歸以上戎執王臣以歸一由魯聘還見執故書變執言伐乃修春秋之辭說見變文篇五十五外大夫見執非專使不稱行人非卿雖殺之不書桓十一年九月宋人執鄭祭仲莊十七年春齊人執鄭詹僖四年夏齊人執陳轅濤塗襄二十六年秋晉人執衞甯喜定元年春王三月晉人執宋仲幾于京師以上外執大夫五鄭祭仲宋人誘而執之鄭詹齊人以伯令召而執之陳轅濤塗執于師衞甯喜執于㑹宋仲幾執于京師故皆不稱行人宋執祭仲使立庶簒適城成周宋仲幾不受功晉人專執于京師皆書月以異之襄十一年秋楚人執鄭行人良霄十八年夏晉人執衞行人石買定六年秋晉人執宋行人樂祁犂七年秋齊人執衞行人北宫結以侵衞以上外執大夫四良霄如楚告將服于晉見執石買如晉以伐曹見執樂祁犂如晉以宋乆不來聘見執衞侯欲叛晉使北宫結如齊而私使執之以侵我皆以專使往故稱行人昭八年夏楚人執陳行人干徴師殺之以上楚執行人殺之一陳公子招公子過殺悼大子偃師而立公子留干徴師赴于楚且告有立君楚人執而殺之宣十四年鄭人殺楚使申無畏不書非卿也五十六外放大夫宣元年夏晉放其大夫胥甲父于衞哀三年秋蔡人放其大夫公孫獵于吳以上外放大夫二放謂棄置於此而不得他適舜放驩兜于崇山葢古有此法薛氏曰諸侯不得專放書放其大夫僭天子之事也吕氏曰稱國以放君與大夫咸與焉稱人以放國亂無政而衆人擅放之五十七外裔滅中國而放其大夫昭八年冬十月壬午楚師滅陳執陳公子招放之于越以上楚滅中國而放其大夫一招殺陳世子楚子志在取陳而已故不能正其罪書師者經變文說見謹華夷篇春秋屬辭卷四
