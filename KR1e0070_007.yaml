長景短日或失其常度則雖巧厯有不能盡其變者漢文帝三年十月晦十一月晦並日食是漢初三十年中頻食者再後此乃未有此固不可以常理推也孔氏於襄二十四年從劉炫之說以頻食為經文轉冩失真與隠三年正義自相違失杜注之旨二十五年八月己巳傳秋七月己巳同盟于垂丘長厯八月戊子朔無己巳大衍厯同今案六月有壬子則八月不得有己巳二十六年傳三月甲寅朔長厯閏十二月大衍厯閏八月二十七年冬十二月乙亥朔日有食之傳曰十一月乙亥朔日有食之辰在申司厯過也再失閏矣杜氏曰斗當建戌而在申故知再失閏也若是十二月則為三失閏故知經誤文十一年三月甲子至今年七十一嵗應有二十六閏今長厯推得二十四閏通計少再閏今案傳上書六月丁未朔至壬申七月戊寅至乙酉九月有庚辰辛巳則乙亥為十一月朔長厯十一月乙亥朔日食大衍厯同二十八年十二月乙未長厯十二月戊戌朔無乙未二十二日己未恐己誤作乙傳十二月乙亥朔誤大衍厯十二月己亥小二十一日己未今案是月有甲寅則不得有乙未故劉氏以為當是閏月二十九年長厯閏八月大衍厯閏五月昭元年六月丁巳大衍厯閏正月庚戌大五月戊申大丁巳在此月十一月己酉長厯十一月乙亥朔己酉十二月六日傳十二月甲辰朔是年閏十二月三年大衍厯閏九月四年長厯閏四月六年長厯閏七月大衍厯閏六月八年十月壬午大衍厯十月丙申小壬午在十一月長厯是年閏八月九年大衍厯閏三月十年七月戊子長厯七月庚寅朔無戊子十一年大衍厯閏十二月十二年三月壬申長厯是年閏正月三月無壬申十三年四月傳五月癸亥王縊于芋尹申亥氏杜氏曰癸亥五月二十六日經書四月誤十四年大衍厯閏七月十五年六月丁巳朔日有食之大衍厯五月丁巳大朔日食長厯是年閏九月十七年六月甲戌朔日有食之大衍厯五月丙午朔大日食黄道婁四度閏月丙子小六月乙巳大非食限甲戌九月朔十八年長厯閏正月二十年傳王二月日南至三統厯正月己丑朔旦冬至杜氏曰是嵗朔旦冬至之嵗也時史失閏閏更在二月後故傳於二月記南至日以正厯也大衍厯正月辛酉小己丑冬至閏二月庚申小長厯是年閏八月與傳合二十一年七月壬申朔日有食之大衍厯七月丙子小閏十月甲戌大十二月癸酉大朔日食黄道箕四度半彊二十二年冬十月傳十一月乙酉王子猛卒杜氏曰乙酉在十一月十二月癸酉朔日有食之長厯十一月小甲戌朔傳乙酉十二日己丑十六日十二月大癸卯朔傳庚戌八日閏月癸酉朔傳辛丑二十九日杜氏曰此月有庚戌又以長厯推校前後當為癸卯朔書癸酉誤孔氏曰庚戌上去癸酉三十七日若此月癸酉朔其月不得有庚戌又傳十二月下有閏月辛丑辛丑是壬寅之前日二十三年傳曰正月壬寅朔二師圍郊則辛丑是閏月之晦也又計明年正月之朔與今年十二月中有一閏相去當為五十九日此年十二月當為癸卯朔經書癸酉明是誤也大衍厯閏十月甲戌大二十四年八月丁酉大衍厯八月甲子小丁酉在九月今案五月朔乙未則八月不得有丁酉長厯丁酉九月五日二十五年九月己亥十月戊辰十一月己亥大衍厯六月己丑小八月戊子小九月丁巳大十月丁亥小十一月丙辰大己亥在八月戊辰在九月又己亥在十月長厯是年閏十二月二十八年四月丙戌大衍厯閏三月癸酉小丙戌在閏月長厯是年閏五月三十年六月庚辰大衍厯五月庚申大庚辰在此月閏十二月丁巳小長厯是年閏五月定元年大衍厯閏八月二年五月壬辰大衍厯四月丁卯大戊辰在此月長厯是年閏五月四年長厯閏七月大衍厯閏四月七年三統厯正月己巳朔冬至殷厯庚午朔大衍厯正月庚子大己巳冬至閏月庚午小八年長厯閏二月九年大衍厯閏十月十年長厯閏六月十二年十月癸亥十一月丙寅朔日有食之大衍厯閏七月戊戌小九月丁酉小癸亥在此月十月丙寅大日食長厯是年閏十一月十四年長厯閏十二月十五年二月辛丑大衍厯正月甲申小辛亥冬至辛丑在此月閏三月壬子大五月辛亥長厯五月辛亥朔大衍厯同九月辛巳長厯九月己酉朔無辛巳辛巳十月三日大衍厯同今案八月朔庚辰則九月不得有辛巳哀二年長厯閏十一月大衍厯闕五年九月癸酉大衍厯閏八月辛巳小癸酉在閏月長厯是年閏十月七年長厯閏十二月八年大衍厯閏五月十年長厯閏五月十一年大衍厯閏正月十二年十二月螽傳仲尼曰火猶西流司厯過也杜氏曰周十二月今十月是嵗應置閏而失不置雖書十二月實今之九月十三年大衍厯閏九月十二月螽杜氏曰實十一月十四年長厯閏二月以上長厯考春秋日月失三十六日朔三晦二其經傳上下所書日月有可證據者明是史文差繆日食不入限者四頻月食者二大衍厯失一百二十六日朔三日食不入限十七先一月者六先二月者二先三月者一先五月者一後一月者六閏月一頻月食者二杜氏據左氏傳屢譏周厯失閏是以長厯第前却閏月求與春秋日月相符故所失少大衍厯自以三十二月閏率追筭不計與經合否故所失多東周厯法無傳矣劉歆所緫六厯俱非古法也杜氏謂或用黄帝以來諸厯推經傳朔日皆不合所謂魯厯亦不與春秋相符疑來世好事者為之凡經傳有七百七十九日漢末宋仲子集七厯以考春秋魯厯得五百二十九失二百五十日是不與春秋相符也大衍厯合朔議曰春秋日食有甲乙者三十四殷厯魯厯先一日者十三後一日者三周厯先一日者二十二先二日者九其偽可知矣然大衍厯視長厯朔每差一月亦有差二月者其日月得失本非所以釋經也傳除釋經日外别記三百一十六日長厯推無月者二其不合者六日而已是固不容以閏率議之但長厯視大衍厯少六閏自隠二年至宣十年三失閏自成末年至春秋之終復三失閏果若是四時寒暑皆當反易不但以申為戌而已恐周厯雖差未必如是之繆案經傳有曠數年不書日者前後屢見之長厯於此既無所據豈能無失至言頓置兩閏以應天正則臆决尤甚故說者疑焉今姑取其所考日月以證史文之誤附于闕文後葢三傳異師而日月之誤不殊有非筆削後轉冩失眞者矣併及大衍厯者所以見周厯置閏無準致日月不與天合如傳所記日南至在二月則雖曰建子而實亥十一月火猶西流則雖曰建戌而實申也然孔子於十二月螽嘗譏司厯之過而春秋日食不書朔日乃獨致辨於交朔之不合者閏餘之失易見而交朔之繆難知易見者有不勝譏而難知者非驗諸日食則莫能得其正也春秋存䇿書之大體諸越禮亡法不待辨而明者皆有筆而無削譏之不可勝譏也述作有體要撥亂有先後周禮未亡文武之政布在方䇿春秋之義行君臣父子中國外裔一反於正禮樂征伐自天子出脩廢舉墜而已春秋屬辭卷七
