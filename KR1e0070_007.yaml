  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1e0070_WYG_007-1a, image: WYG0164/WYG0164-0576c.png}
body:
  text: 春秋屬辭卷七元趙汸撰存策書之大體第一之七一百内師公將稱公大夫稱名氏微者不言將隠七年秋公伐邾莊二十六年春公伐戎僖二十一年冬公伐邾二十二年春公伐邾三十三年夏公伐邾文七年春公伐邾宣四年春公伐莒十八年春公伐把哀七年秋公伐邾莊二年夏公子慶父帥師伐於餘丘僖三十三年秋公子遂帥師伐邾文十四年春叔彭生帥師伐邾宣十年秋公孫歸父帥師伐邾襄二十年秋仲孫速帥師伐邾昭十年秋七月季孫意如叔弓仲孫貜帥師伐莒哀元年冬仲孫何忌帥師伐邾二年春王二月季孫斯叔孫州仇仲孫何忌帥師伐邾六年冬仲孫何忌帥師伐邾桓八年秋伐邾以上公伐者九大夫伐者九微者伐一皆小國凡君將不言帥師古者君行師從言君將則師行可知大夫將言帥師師重與大夫等也微者不言將者大夫非卿名氏不登于䇿公羊傳曰將尊師少言將將尊師衆言某帥師君將不言帥師書其重者此䇿書之法通内外言之唯將卑師少稱人外與内異以本國之史不可復言某人故内微者不言將詳見辭從主人篇筆削之法外師雖君大夫將有變文稱人者唯内師悉從其恒稱葢外變文以示義則内從其恒稱以見實乃外可變而内不可變者凡内師兼他義者此不序三家既分公室其三卿並將俱出則特書月以見異常莊十年二月公侵宋定六年二月公侵鄭八年春王正月公侵齊二月公侵齊成六年秋仲孫蔑叔孫僑如帥師侵宋襄二十四年春仲孫羯帥師侵齊定八年秋季孫斯仲孫何忌帥師侵衞以上公侵者四大夫侵者三齊大魯小宋衞皆敵國雖有怨仇及盟主之命皆言侵與加兵小國異辭非史文矣趙伯循曰凡侵伐不書勝敗殺掠而還也陸氏曰主人不出戰也今案公親將以犯大國故書月以甚之莊九年夏公伐齊納子糾以上公伐齊者一凡潛師掠竟曰侵聲罪致討曰伐此䇿書之法通内外言之筆削之法外侵伐悉從其恒稱内師加小國皆言伐加大國皆言侵葢外從其恒稱以見實則内變文以示義乃内可變而外不可變者也當齊無君莊公興師以納子糾故直言伐詳見變文篇一百一内勝外師言敗勝敗相當言戰大崩言敗績微者戰言及隠十年六月壬戌公敗宋師于菅莊十年春王正月公敗齊師于長勺夏六月公敗宋師于乘丘蒙上事月十一年夏五月戊寅公敗宋師于鄑僖元年九月公敗邾師于偃冬十月壬午公子友帥師敗莒師于酈獲莒挐文十一年冬十月甲午叔孫得臣敗狄于鹹昭五年秋七月戊辰叔弓帥師敗莒師于蚡泉以上内敗外師者八凡敗皆不書侵伐以地之内外見之也敗諸外者我既侵伐彼國而又敗其師敗諸内者彼來侵伐我而為我所敗不待書侵伐而可見矣外相敗及戰亦同凡大夫敗外師日而公不日者國君不以善將為功殊之於大夫也其日者皆甚之既以臣㑹伐而公又敗宋師以自為功既得志於乘丘而又禦之於鄑以深其怨皆甚其事也莊九年夏公伐齊納子糾八月庚申及齊師戰于乾時我師敗績以上魯君伐齊納其公子及齊師戰敗績者一時齊桓已立但言及齊師戰者魯納子糾不正桓之為君也桓十七年夏五月丙午及齊師戰于奚以上微者及戰一傳曰齊人侵魯疆疆吏來告公曰疆埸之事姑盡所備事至而戰又何謁焉則及齊人戰者疆吏也此微者將不言其人之例僖二十二年秋八月丁未及邾人戰于升陘以上公及外微者戰一傳曰公及邾人戰于升陘我師敗績經不言公與敗績但書及戰同微者乃筆削之法此與乾時及戰皆蒙上文而此獨為筆削者彼是一事再見史有恒例此併兩事為一役非復史文矣說見變文篇一百二内圍國邑及外師圍國成三年秋叔孫僑如帥師圍棘昭十三年春叔弓帥師圍費定六年冬季孫斯仲孫忌帥師圍鄆杜氏曰何忌不言何闕文十年夏叔孫州仇仲孫何忌帥師圍郈秋叔孫州仇仲孫何忌帥師圍郈以上内圍其邑者五凡内邑必叛而後圍之不書内邑叛說見後篇昭二十六年夏公圍成定十二年十二月公圍成以上公自圍其邑者二昭公失國季孫以成拒師内叛也定公令不行於大夫孟氏不肯墮成亦與叛無異時三家分魯而有之魯君擁虚器之日久矣昭圍成不月異在國也詳見第六篇哀三年冬叔孫州仇仲孫何忌帥師圍邾以上内大夫圍國者一莊八年夏師及齊師圍郕郕降于齊師以上及外師圍國者一變公言師乃筆削之旨一百三内入國邑公及諸侯入國隠二年夏五月無駭帥師入極蒙外入國月桓二年九月入把僖二十七年秋八月乙巳公子遂帥師入把以上内大夫入國者二微者入國一皆恃衆凌寡以俘掠為暴也凡内臣入國不日僖公不念姑姊妹而入其甥國故書日襄十二年春王二月季孫宿帥師救台遂入鄆蒙伐我圍台月以上内大夫救内邑遂入外邑者一哀七年秋公伐邾八月己酉入邾以邾子益來以上公因伐而入國者一伐邾乃季孫肥之意時公制於三家非有君將之實也隠十一年秋七月壬午公及齊侯鄭伯入許以上公及諸侯入國者一入國書公及蒙上文㑹時來與桓十二年及伐蒙上文㑹盟武父同例凡入國者皆破其國都制其民人遷其重器但不有其地故不言滅鄭既有許地而不言滅者以許叔居許東偏奉許宗祀也一百四公㑹伐㑹侵㑹圍㑹而及戰桓十六年夏四月公㑹宋公衞侯陳侯蔡侯伐鄭莊五年冬公㑹齊人宋人陳人蔡人伐衞宣七年夏公㑹齊侯伐萊以上公㑹諸侯伐者三桓公黨亂莊公為仇人役宣公事齊也桓之㑹伐書月從其恒法與盟㑹同莊二十六年秋公㑹宋人齊人伐徐僖四年春王正月公㑹齊侯宋公陳侯衞侯鄭伯許男曹伯侵蔡蔡潰遂伐楚成三年春公㑹晉侯宋公衞侯曹伯伐鄭十年夏公㑹晉侯齊侯宋公衞侯曹伯伐鄭二㑹伐皆為下事月十三年夏五月公自京師遂㑹晉侯齊侯宋公衞侯鄭伯曹伯邾人滕人伐秦十六年秋公㑹尹子晉侯齊國佐邾人伐鄭十七年夏公㑹尹子單子晉侯齊侯宋公衞侯曹伯邾人伐鄭冬公㑹單子晉侯宋公衞侯曹伯齊人邾人伐鄭襄九年冬公㑹晉侯宋公衞侯曹伯莒子邾子滕子薛伯把伯小邾子齊世子光伐鄭十年秋公㑹晉侯宋公衞侯曹伯莒子邾子齊世子光滕子薛伯把伯小邾子伐鄭十一年夏公㑹晉侯宋公衞侯曹伯齊世子光莒子邾子滕子薛伯把伯小邾子伐鄭秋公㑹晉侯宋公衞侯曹伯齊世子光莒子邾子滕子薛伯把伯小邾子伐鄭以上公㑹伯國伐者十有二起齊桓伐徐終晉悼伐鄭凡公㑹伐不月㑹伯主伐外裔則月自京師遂㑹伐則月哀十年春公㑹呉伐齊十一年夏公㑹呉伐齊為日戰月以上公㑹呉伐者二魯挾呉以敵齊春秋將終也定四年三月公㑹劉子晉侯宋公蔡侯衞侯陳子鄭伯許男曹伯莒子邾子頓子胡子滕子薛伯把伯小邾子齊國夏于召陵侵楚以上公㑹侵一㑹侵蔡已見上此為王臣合諸侯伐外裔月僖六年夏公㑹齊侯宋公陳侯衞侯曹伯伐鄭圍新城以上公㑹伐國圍邑一桓公討鄭逃首止之盟襄十八年冬十月公㑹晉侯宋公衞侯鄭伯曹伯莒子邾子滕子薛伯把伯小邾子同圍齊以上公㑹圍一悼公末年齊已貳於晉伐我圍成悼公卒復伐魯不已言同盟諸侯所同疾非但盟主之意也從史文桓十二年冬十一月丙戌公㑹鄭伯盟于武父十二月及鄭師伐宋丁未戰于宋十三年春二月公㑹紀侯鄭伯己已及齊侯宋公衞侯燕人戰齊師宋師衞師燕師敗績以上公㑹而及伐且戰者一㑹而及戰者一皆魯鄭同惡相濟之事凡公出㑹例月戰敗例日劉炫云公㑹紀鄭始行即書其戰之日則戰罷乃告廟是也㑹紀鄭戰不言地說見變文篇一百五大夫㑹伐㑹侵㑹圍㑹而及戰隠四年秋翬帥師㑹宋公陳侯蔡人衞人伐鄭十年夏翬帥師㑹齊人鄭人伐宋莊三年春王正月溺㑹齊師伐衞文三年春王正月叔孫得臣㑹晉人宋人陳人衞人鄭人伐沈沈潰宣十一年夏公孫歸父㑹齊人伐莒成八年冬叔孫僑如㑹晉士爕齊人邾人伐郯襄十四年夏叔孫豹㑹晉荀偃齊人宋人衞北宫括鄭公孫蠆曹人莒人邾人滕人薛人把人小邾人伐秦為下日葬月十六年夏叔老㑹鄭伯晉荀偃衞甯殖宋人伐許以上大夫㑹伐者八其事别見後篇内大夫不書族說在辭從主人篇凡内臣㑹伐不月溺以㑹仇讎抗王命月得臣以沈潰月僖四年冬十二月公孫兹帥師㑹齊人宋人衞人鄭人許人曹人侵陳以上大夫㑹侵一以伯主侵與國月襄元年春仲孫蔑㑹晉欒黶宋華元衞甯殖曹人莒人邾人滕人薛人圍宋彭城以上大夫㑹圍一㑹有宋人復言圍宋彭城說見特筆篇成二年六月癸酉季孫行父臧孫許叔孫僑如公孫嬰齊帥師㑹晉卻克衞孫良夫曹公子首及齊侯戰于鞌齊師敗績以上大夫㑹而及戰一齊間晉而伐魯戰敗衞師魯四卿各以師㑹以一戰勝齊為功故曹無書大夫將者於是特書公子首觀傳言公㑹晉師于上鄍賜晉三卿五大夫命服而季文子以鞌之戰立武宫則當時之情可見矣一百六微者㑹伐言及桓十七年秋及宋人衞人伐邾僖四年秋及江人黄人伐陳以上内微者及外微者伐國二凡内師無不與謀而出㑹者故君大夫將皆言㑹必微者而後言及葢㑹以合謀君與國卿之事也及則受成命於國微者之事也義與内盟稱及稱㑹者不同經書及伐唯此二事桓十二年及鄭師伐宋蒙上文公㑹盟莊八年師及齊師圍郕諱公書師不入此例說在變文篇一百七内救公㑹救公㑹臣及救臣㑹救僖十八年夏師救齊襄十二年春季孫宿帥師救台二十三年秋叔孫豹帥師救晉為下卒月以上内救三書師救者將卑師衆也凡事實錯見後篇者不盡釋後倣此莊二十八年秋公㑹齊人宋人救鄭成七年秋公㑹晉侯齊侯宋公衞侯曹伯莒子邾子把伯救鄭襄五年冬公㑹晉侯宋公衞侯鄭伯曹伯齊世子光救陳以上公㑹救三僖十五年春公孫敖帥師及諸侯之大夫救徐以上公㑹臣及救一齊桓公盟諸侯于牡丘遂次于匡使諸侯之大夫救徐故内大夫言及蒙上文諸侯之㑹言之文九年春公子遂㑹晉人宋人衞人許人救鄭以上内大夫㑹救一一百八公追莊十八年夏公追戎于濟西僖二十六年春公追齊師至酅弗及以上公追二啖氏曰追者寇已去而躡之也書法詳略說見後篇一百九師次㑹次莊三十年夏次于成襄二十三年秋叔孫豹帥師救晉次于雍榆為下日卒月以上師次一大夫帥師次一杜氏曰次在事前次以待事也次在事後事成而次也今案凡次皆以無成事書書救晉者為次雍榆言故實不成救也成十六年傳我師次于督揚不書者公㑹尹子晉侯伐鄭以成事書也師行近者歴月逺或踰三時如悉書次將不勝書矣僖十五年三月公㑹齊侯宋公陳侯衞侯鄭伯許男曹伯盟于牡丘遂次于匡以上公㑹而遂次者一諸侯不親救徐故書次襄元年夏仲孫蔑㑹齊崔杼曹人邾人把人次于鄫以上内大夫㑹次一傳曰次于鄫以待晉師一百十内大夫㑹城襄二年冬仲孫蔑㑹晉荀罃齊崔杼宋華元衞孫林父曹人邾人滕人薛人小邾人于戚遂城虎牢二十九年夏仲孫羯㑹晉荀盈齊髙止宋華定衞世叔儀鄭公孫段曹人莒人滕人薛人小邾人城把昭三十二年冬仲孫何忌㑹晉韓不信齊髙張宋仲幾衞世叔申鄭國參曹人莒人薛人把人小邾人城成周以上内臣㑹而遂城者一㑹城者二曰遂城者㑹與城異地也城虎牢本孟獻子之請晉悼能用謀也城把晉平公為其母悼夫人故城成周奉天子之命以紓諸侯之戍百十一王師令必及魯而後書桓五年秋蔡人衞人陳人從王伐鄭莊六年春王正月王人子突救衞十四年春齊人陳人曹人伐宋夏單伯㑹伐宋以上諸侯從王伐國者一王人救者一王臣㑹伐者一據傳隠五年王使尹氏武氏伐翼王命虢公伐曲沃桓四年王師秦師圍魏之類皆不見於經者事在西方令不至於魯也陳氏以為筆削之旨誤矣隠九年鄭人以王命來告伐宋時鄭伯為王左卿士王臣不出王師不行故但書公㑹齊侯鄭伯翬帥師㑹齊鄭伐宋而已至三國從王伐鄭始見於經而不書天王以諸侯伐鄭者王命不至於魯三國以從王伐鄭來告也齊人合諸侯抗王命以納朔魯亦與焉於是救衞之令始及於魯齊桓伐宋圖伯請王命以示大順史乃得而書之王人書字說見特筆篇百十二外師加魯四境言某鄙直逼國都言伐我莊十九年冬齊人宋人陳人伐我西鄙僖二十六年夏齊人伐我北鄙文十四年春邾人伐我南鄙十七年夏齊侯伐我西鄙成二年春齊侯伐我北鄙襄八年夏莒人伐我東鄙十年秋莒人伐我東鄙十二年春莒人伐我東鄙圍台為下入鄆月十五年夏齊侯伐我北鄙圍成秋邾人伐我南鄙十六年春齊侯伐我北鄙秋齊侯伐我北鄙圍郕十七年秋齊侯伐我北鄙圍桃髙厚帥師伐我北鄙圍防冬邾人伐我南鄙十八年秋齊師伐我北鄙二十五年春齊崔杼帥師伐我北鄙定七年秋齊國夏帥師伐我西鄙八年夏齊國夏帥師伐我西鄙以上外師伐魯境者十九齊宋陳一齊十二邾三莒三凡外師伐魯史無不書者比其事而考之則曲直自見無與於書法故不復詳唯襄十年秋七月楚子囊鄭子耳伐我西鄙不書者葢伐宋之師聲言伐魯志在還兵取蕭魯不受兵故不書于䇿杜云其義未聞陳云不悉書皆昧於存䇿書大體之義僖二十六年春齊人侵我西鄙文七年夏狄侵我西鄙十五年秋齊人侵我西鄙冬齊侯侵我西鄙襄十四年夏莒人侵我東鄙以上外師侵魯境者五僖二十六年書公追齊師至酅弗及則凡言侵者皆潛師攻掠而去明矣哀八年春呉伐我十一年春齊國書帥師伐我以上外師伐我者二呉次于泗上行成景伯以城下之盟為恥齊師在清魯人欲背城而戰皆伐魯之國都故直言伐我百十三外師來戰桓十年冬十二月丙午齊侯衞侯鄭伯來戰于郎以上三國之君來戰于魯地者一凡諸侯相侵伐或攻掠或求成不必皆戰其戰則以主及客以中國及夷狄皆以應兵見之此不以魯及三國戰直言三國之君來戰乃筆削之旨說在變文篇百十四内伐國取田邑言伐言取不用師但言取有來歸之者言入已滅之國言取不絶其祀不言滅隠十年六月壬戌公敗宋師于菅辛未取郜辛巳取防以上公敗外師取二邑者一翬既㑹鄭伐宋公又親敗宋師故鄭人得入二邑以歸于我經所以但書魯取而一敗二取皆書日以異之僖二十六年冬公以楚師伐齊取榖三十三年夏公伐邾取訾婁以上公伐國取邑者二宣十年秋公孫歸父帥師伐邾取繹哀二年春王二月季孫斯叔孫州仇仲孫何忌帥師伐邾取漷東田及沂西田以上魯臣伐國取邑者一取田者一昭十年三卿伐莒而取郠不書杜氏曰公見討平丘魯諱之定六年公侵鄭而取匡不書杜氏曰匡歸之晉以非隣國不能有之故也昭元年三月取鄆以上取外邑不言伐者一言易也不用師徒故但書曰取也鄆莒魯之塞邑也傳曰莒魯争鄆為日久矣是也然則二十六年公在乾侯取闞其不言伐何也闞内邑也傳曰叔孫昭子如闞是也取内邑故亦不言伐也僖三十一年春取濟西田成二年秋取汶陽田襄十九年春取邾田自漷水以上取田者三濟西田受之伯主故不繫曹汶陽田本我地故不繫齊杜氏曰晉使齊還魯故書取不以好得故不言歸邾田在漷水北傳曰晉人執邾悼公以其伐我故取邾田自漷水歸之于我隠八年三月鄭伯使宛來歸祊庚寅我入祊以上外來歸邑書我入者一鄭來歸祊將以易許田也非師不言入此言入者公羊傳曰難也祊在泰山之下去鄭逺而近魯必鄭人不能有而後歸于魯魯恐其民不服故以兵入焉祊歸我而許田未易豈非以其難與僖二十二年春公伐邾取須句文七年春公伐邾三月甲戌取須句宣四年春公伐莒取向以上公伐國而取其所滅之小國者三須句風姓國邾人滅之須句子來奔因成風也僖公伐邾取須句而反其君其後邾又滅之故文公伐邾取須句寘文公子焉向姜姓國隠二年莒人入向其後為莒滅不見於經傳凡滅國有取而有之者則不書滅以存亡繼絶之義責歸於取之者也故須句不書邾滅向不書莒滅而皆以書取見義惡其為滅國者受惡而始滅之罪不待申言也在存䇿書大體中為變例之七須句始反其君為附庸則猶未絶其祀故從内取國例後寘文公子則遂縣之故書日以異其事昭四年九月取鄫以上取已滅之國一傳曰莒亂著丘公立而不撫鄫鄫叛而來故曰取然猶書莒滅鄫者譏在晉也以魯覿鄫世子于晉悼公列鄫人于㑹而莒卒滅鄫與向須句異矣鄭滅許呉滅徐楚人皆能繼而存之使列于諸侯可以中國而不如夷狄乎或用二傳之說謂昭以前鄫未亡非也宣九年秋取根牟成六年春取鄟襄十三年夏取邿以上取小國三傳曰邿亂分為四師救邿遂取之此所以不言伐趙伯循曰凡得國而不言滅者不絶其祀也案根牟鄟傳不言其故皆曰易也葢以鄫與邿推之僖十七年夏滅項以上滅小國者一夷而縣之故直曰滅先儒或謂内諱滅言取者誤矣滅不書月者間伯主有事與莒滅鄫同不言師說在變文篇百十五外取我田邑言取雖我歸之亦言取諱易田言假宣元年六月齊人取濟西田昭二十五年十二月齊侯取鄆哀八年夏齊人取讙及闡以上外取我田邑者三禮國亡大縣邑公卿大夫士皆厭冠哭於大廟三日君不舉此取田邑所以必書于䇿濟西鄆皆言取者一為魯諱賂一見季孫據國叛君下言公至自齊居于鄆則齊取鄆以居公可見矣故皆書月以别於讙闡其書伐書取自從外伐取例見後篇桓元年三月公㑹鄭伯于垂鄭伯以璧假許田以上外以璧假田者一桓公簒位而脩好于鄭卒易祊田許田多於祊故進璧以請史言璧假諱易許田也公羊傳曰諱取周田也許田本魯朝宿之邑在王畿之内故曰周田百十六外滅國必書不絶其祀言取迫之使服曰降移其民人社稷曰遷莊十年冬十月齊師滅譚譚子奔莒十三年夏六月齊人滅遂僖二十五年春王正月丙午衞侯燬滅邢襄六年秋莒人滅鄫十年春公㑹晉侯宋公衞侯曹伯莒子邾子滕子薛伯把伯小邾子齊世子光㑹呉于柤夏五月甲午遂滅偪陽定四年夏四月庚辰蔡公孫姓帥師滅沈以沈子嘉歸殺之六年春王正月癸亥鄭游速帥師滅許以許男斯歸以上諸侯滅小國者七入春秋楚滅漢陽諸姬在齊桓未伯前晉滅耿霍魏在桓伯後告命皆不及於魯故史不書而齊桓滅譚滅遂在經為滅國之始陳氏因謂不書晉楚滅國蔽罪於伯主其失與二傳均矣凡侵伐圍入有筆削者事有輕重也用兵之罪莫大於滅國者事不相蒙當各正其罪非筆削所加也凡滅國不日滅吾同宗之國則日㑹而遂滅日以其君歸日間伯主有事而滅小國日凡滅國不言君奔者死於位也言以歸者服之也㑹而遂滅不言以歸略之也諸異義皆非宣十五年六月癸卯晉師滅赤狄潞氏以潞子嬰兒歸十六年春王正月晉人滅赤狄甲氏及留吁襄六年十二月齊侯滅萊昭十七年八月晉荀呉帥師滅陸渾之戎以上中國滅外裔者四莱姜姓子爵定公十年傳稱莱人為俘蓋東方之國也雖君不日以其君歸則日案昭二十年晉滅肥以肥子綿臯歸二十一年滅鼓以鼓子䳒鞮歸皆不書者鮮虞肥鼓皆白狄也嘗服屬於晉既而肥鼓皆叛晉屬鮮虞非赤狄潞氏甲氏之比故告命䇿書皆主伐鮮虞而不及肥鼓之滅其族微也僖五年秋楚人滅弦弦子奔黄十年春狄滅温温子奔衞十二年夏楚人滅黄文四年秋楚人滅江五年秋楚人滅六宣十二年冬十二月戊寅楚子滅蕭昭四年秋七月楚子蔡侯陳侯許男頓子胡子沈子淮夷伐呉執齊慶封殺之遂滅賴八年冬十月壬午楚師滅陳十一年冬十一月丁酉楚師滅蔡執蔡世子有以歸用之二十四年冬呉滅巢三十年冬十二月呉滅徐徐子章羽奔楚定十四年二月辛巳楚公子結陳公孫佗人帥師滅頓以頓子牂歸十五年二月辛丑楚子滅胡以胡子豹歸以上外裔滅中國十三國畿内國一侯國二小國十呉楚本非外裔以其國於蠻荒僭王竊號逺而絶之故其初皆以號舉呉雖嘗稱爵然伐滅之事皆舉號徐本古之建國以其先嘗僭王故春秋外之然天子既討其罪不絶其封則亦不可槩以外裔論也故見滅從中國例文十二年楚人圍巢杜註謂巢呉楚間小國成七年傳言呉始伐楚伐巢伐徐則巢自見圍後從楚也杜氏於圍巢傳註以為羣舒之屬於滅巢註曰楚邑也皆誤劉氏曰巢伯爵國也本書序巢伯來朝故從中國例案定五年楚滅唐不書者唐微國久服於楚不得列於諸侯邲之役傳始見唐侯而經不書柏舉之役從蔡侯呉子伐楚以此見滅無為之告諸侯者故雖侯爵不得比蕭賴也興滅國繼絶世聖人葢常言之苟見于䇿無不録也凡外裔滅中國小國不月近偪大國則月必大國而後日雖大國之附庸日狄滅温書而晉滅虞虢不書為變例之八說見下篇僖二十六年秋楚人滅夔以夔子歸文十六年秋楚人秦人巴人滅庸宣八年夏楚人滅舒蓼成十七年冬楚人滅舒庸襄二十五年秋楚屈建帥師滅舒鳩昭十三年冬呉滅州來以上蠻荒相滅者六成七年呉入州來傳曰蠻之屬於楚者呉盡取之則州來楚屬也凡外裔相滅不月詳略之義著矣僖三年夏徐人取舒以上取國一義與内取國同莊八年夏郕降于齊師三十年秋七月齊人降鄣以上降國二以兵迫之使服故不言取不絶其祀故不言滅莊十年三月宋人遷宿閔二年春王正月齊人遷陽以上遷國二彊移其民人社稷於他處而取其地曰遷穀梁傳曰遷者猶未失其國家以往者也莊元年冬齊師遷紀郱鄑郚以上以師遷人三邑一徙其民取其地也百十七凡土功無不書都邑備制曰城不備制曰築隠七年夏城中丘九年夏城郎桓五年夏城祝丘十六年冬城向莊二十九年冬城諸及防三十二年春城小穀僖二年春王正月城楚丘文七年三月甲戌取須句遂城郚十二年冬季孫行父帥師城諸及鄆宣八年冬城平陽成四年冬城鄆九年冬城中城襄七年夏城費十三年冬城防十五年夏季孫宿叔孫豹帥師城成郛十九年冬城西郛城武城定六年冬城中城十四年冬城莒父及霄十五年冬城漆哀三年夏季孫斯叔孫州仇帥師城啓陽四年夏城西郛五年春城毗六年春城邾瑕莊二十八年冬築郿以上魯城邑二十一城中城二城西郛二城衞邑一築邑一中城杜氏以為魯邑宋儒本穀梁非外民之說以為魯國都城春秋二百四十餘年魯人無不脩築其國都城郭之理成城中城而後襄城西郛定城中城而後哀城西郛宋儒說是也小穀左氏以為管仲之邑宋儒以為魯邑本魯人孫明復之說以魯地有小穀而管仲所食乃齊之穀也據傳昭十一年申無宇曰齊桓公城穀而寘管仲則非魯人所城之小穀明矣城楚丘遷衞也凡伯主之令以内辭書故特月以别之春城者五夏城者七冬城者十五築者一城諸及防城諸及鄆在十二月繫事之下跨二時也傳曰凡土功龍見而畢務戒事也火見而致用水昬正而栽日至而畢謂建戌之月角亢晨見東方畢農務而戒事心星晨見而致築作之物建亥之月定星昬中而樹板榦日南至而畢功葢周家使民以時之制春秋之世魯人日不暇給不能及閒暇脩其保障遇有外憂然後城要害以備難或為懼齊或為懼晉或備莒邾或帥師而城或彊家專邑而城之或爭外邑而城之故雖非時而不得顧雖得時亦不足稱也然冬月興功為多而獨無書秋城者則猶不以盛暑農事方殷時勞民也左氏唯以書時書不時㫁之可謂不揣其本而齊其末矣凡城必有郛郭樓櫓之制郿下邑非要害制不備故曰築與築囿同凡㑹城皆别見莊三十一年春築臺于郎夏築臺于薛秋築臺于秦成十八年秋築鹿囿昭九年冬築郎囿定十三年夏築蛇淵囿以上築臺者三築囿者三莊公一嵗中三築臺成公盛暑築囿其縱欲勞民可知昭定擁虚器而築囿三家分魯而以此娯其君也䇿書實録而鑒戒明矣莊元年秋築王姬之館于外以上築館者一魯與齊為不共戴天之讎又喪未畢而主其昬王姬至魯久矣而齊侯有疑不敢親迎故為築館于外比事考之則當時之情可見百十八浚川莊九年冬浚洙以上浚洙者一洙水在魯城北下合泗乾時戰敗故深之以備齊百十九墮毁定十二年夏叔孫州仇帥師墮郈季孫斯仲孫何忌帥師墮費文十六年秋毁泉臺以上書墮邑者二毁臺者一觀上書圍郈圍費則墮二邑之故可見觀上書夫人薨則毁臺之故可見於毁泉臺見春秋用民力必書啖氏曰毁全除之也墮但損之令不周百二十新作門觀新廏僖二十年春新作南門定二年冬十月新作雉門及兩觀莊二十九年春新延廏以上門觀書新作者二廏書新者一言新見有舊言作見有加于前不言作者仍舊制也僖公改作南門不與諸門同雉門兩觀僭天子而不能革故皆書新作延廏壞而更之故言新不言作觀其所書之時則時不時可見傳曰凡啓塞從時杜氏謂門户道橋謂之啓城郭牆塹謂之塞皆官民之開閉不可一日而闕故特隨壞時而治之僖公新作南門非治壞故傳以土功之制譏之葢左氏但知土功之不時而不知改作之非制經於雉門兩觀特書月異之也凡脩舊不書楚宫宜書作而不書者史諱之也百二十一時田用夏時越禮則書桓四年春正月公狩于郎莊四年冬公及齊人狩于禚以上書公狩者二傳曰春蒐夏苗秋獮冬狩此周制四時田獵之名也周書曰周公正三統之義作周月至於敬授民時巡狩烝享猶自夏焉此田祭皆從夏時之證也杜氏曰傳曰鄭之有原圃猶秦之有具囿是諸國各有常狩之處魯狩地大野是也此田獵有常地之說也其禮既有常時其地又有常處故雖公狩不書郎非常狩之地禚在齊境以越禮故書公羊傳曰春曰苖秋曰蒐冬曰狩常事不書此何以書逺也其時田之名雖言之不詳所謂常事不書實史法也自僖文而後歴五公蒐狩違禮皆不書者大夫專國公不復知軍政時田得失無足議故雖違禮不書為變例之九昭八年秋蒐于紅十一年夏大蒐於比蒲二十二年春大蒐于昌間定十三年夏大蒐于比蒲十四年秋大蒐于比蒲以上書蒐一書大蒐四蒐者春田之名周之春夏寅卯辰之月興之為得禮秋興之非禮也昭十一年五月齊歸薨而大蒐叔向聞而譏之曰魯公室其卑乎君有大喪國不廢蒐國不忌君君不顧親能無卑乎殆其失國是時三家分魯假春蒐之禮以耀武示彊又與非時非地之蒐不同故悉書之定十四年比蒲之蒐經書邾子來㑹公則凡大蒐皆公在可見而不書公者師乘非復公有史不虚飾也百二十二火田桓七年春二月己亥焚咸丘以上火田一杜氏曰譏盡物故書百二十三觀魚隠五年春公矢魚于棠以上觀魚一穀梁傳曰魚卑者之事也魚漁通杜訓矢為陳本傳言陳魚而觀之言陳漁人之事而觀之也公穀經作觀魚文異事同葉氏朱子訓矢為射本淮南時則訓季冬命漁師始漁天子親往射魚傳曰君舉必書於此可見䇿書之體百二十四大閱治兵異常桓六年秋八月壬午大閱莊八年春王正月甲午治兵以上書大閱者一治兵者一周制天子因四時之田而教民以武事春曰振旅夏曰茇舎秋曰治兵冬曰大閱天子諸侯四時之田名既不異則教民以武事其禮亦同史所不書桓公以畏齊鄭之故大閱於建未之月莊公以事仇之故治兵於子丑之春與因田習武之義不同故特書之僖文以後凡閱治皆不書義與時田同百二十五軍制作舎成元年三月作丘甲以上書作丘甲者一周制四井為邑四邑為丘四丘為甸軍政起於井而成於甸故周官謂甸為乘其車人卒伍之數皆以甸為率也魯至成公以齊難故創制益兵遂毁甸賦而以丘賦與鄭子產作丘賦同故曰作丘甲不曰賦者其制以甲士為主也然損益之數不可考矣襄十一年春王正月作三軍昭五年春王正月舎中軍以上書作三軍者一舎中軍者一呉氏曰周制萬二千五百人為一軍大國三軍次國二軍小國一軍用衆之法無過家一人凡一成之地六十四井出賦公田外有五百一十二夫是為一旅之衆二十五成有二十五旅是為一軍之衆大國之地百成除二十五成為大夫采邑等用其七十五成之衆即三軍也魯地方百里其初封之時有三軍後舎其一軍止有二軍作三軍者復舊制也然其時三家專國非有意於復舊也但借改作之名而分公室之民為私家之民分民既定則復舎中軍矣百二十六加賦稅宣十五年秋初稅畝哀十二年春用田賦以上書初稅畝者一用田賦者一通一井言之曰田去公田言之曰畝稅畝者以畝為率也古者井田之法十取其一雖曰井九百畝八家同養公田為九一而助然八家廬舎各二畝半於公田中取之已去二十畝故穀梁謂公田為居井竈葱韭盡取焉家各私百畝公田十畝而已則其實亦十一也至宣公又履其私田之畝復十取其一故哀公曰二吾猶不足則十取二自宣公始也田賦者以田為賦也哀公時既以二為不足故用一井之田為率以斂財物韋氏杜氏皆謂賦其馬牛葢以古者賦與稅異也然韋氏本賈侍中云周制十六井賦戎馬一疋牛三頭一井之田而欲出十六井之賦陳氏亦謂使井出丘賦皆本左傳孔子云以丘亦足矣以丘對田為說杜氏謂上賦之法因其田財通出馬一疋牛三頭今欲别其田及家財各為一賦則是以田對財為說未知孰是但外傳又載孔子云先王制土籍田以力而砥其逺邇賦里以入而量其有無任力以大而議其老㓜其嵗收田一井出稯禾秉芻缶米不過是也此與左傳自不同則當時加賦之制不可考矣百二十七分器失得定八年冬盜竊寶玉大弓九年夏得寶玉大弓以上寶玉大弓書盜竊者一書得者一公羊傳曰國寶也喪之書得之書蘇子由曰寶玉大弓魯之分器也百二十八肆大眚莊二十二年春王正月肆大眚以上肆大眚一呉氏曰肆大眚則罪之不當赦者亦赦之也故書百二十九書亂亡不由赴告昭二十八年夏王室亂僖十九年冬梁亡以上王朝亂一國亡一不由赴告據昭二十二年傳叔鞅歸言王室亂說見辭從主人篇百三十闕文隠二年冬紀子帛莒子盟于密程子曰闕文也春秋未有外大夫在諸侯上者當曰紀侯某伯莒子盟于密陳氏曰子帛裂繻字葢杜氏意之學者遂以駁左氏誤矣桓四年闕秋冬七年闕秋冬以上併闕二時事十四年夏五闕月字併所繫事來盟著例不月知非止闕月字十七年葬蔡桓侯杜氏曰稱侯葢謬誤呉氏曰雖子男之君未有以諡配爵者或謂能請諡非也莊二十四年冬郭公昭十年闕冬字三十一年冬黒肱以濫來奔闕邾字定六年冬季孫斯仲孫忌帥師圍鄆何忌闕何字十四年闕冬字以上闕文凡九處三傳同子曰吾猶及史之闕文也葢夫子平日之言史有闕文尚矣公羊傳曰在側者曰子苟知之何以不革曰如爾所不知何以為脩春秋時語也春秋存䇿書之大體闕文不革示不唯無所損而亦不能益故雖筆削時史而無嫌及其一筆一削萬變不齊而所謂䇿書大體者自若故曰非聖人莫能脩之百三十一日月差繆隠元年王正月長厯正月辛巳朔大衍厯正月辛亥朔大庚申冬至程氏公說曰自三統至欽天正月朔或辛亥或庚戌壬子視大衍厯前後差一日以傳五月辛丑十月庚申考之則正月朔非辛亥故杜預遷就以辛巳為朔若從辛巳則冬至不在正月意者差閏只在今年而杜氏考之不詳爾孔氏曰古厯十九年為一章章有七閏入章三年閏九月六年閏六月九年閏三月十一年閏十一月十四年閏八月十七年閏四月十九年閏十二月此據元首初章若於後漸積餘分大率三十二月則置閏不必恒同初章閏月僖五年正月辛亥朔日南至治厯者皆以彼為章首之嵗杜為長厯置閏䟽數無復定凖凡為厯者閏前之月中氣在晦閏後之月中氣在朔僖五年正月朔旦冬至則四年當閏十二月也杜長厯僖元年閏十一月五年閏十二月與常厯不同者杜以襄二十七年再失閏傳云司厯過昭二十年二月己丑日南至哀十二年十二月螽云火猶西流司厯過則春秋之世厯法錯失所置閏月或先或後不與常同杜唯勘經傳上下日月以為長厯若日月同者則數年不置閏月若日月不同須置閏乃同者則未滿三十二月頻置閏所以異於常厯故釋例云春秋日有頻月而食者有曠年不食者理不得一一如筭以守恒數故厯無有不失也故當脩經傳日月以考晦朔以推時驗未必得天葢春秋當時之厯也今案長厯得失孔氏言之已詳據傳昭二十年二月日南至則冬至差一月在周厯不足為異長厯於當時之厯未必盡合然杜氏考經之志學者不可不知也二年八月庚辰長厯八月壬寅朔無庚辰庚辰七月九日閏十十二月大衍厯是年閏十一月三年王二月己巳日有食之三月庚戌四月辛卯八月庚辰十二月癸未大衍厯二月己亥大三月己巳小日食庚戌在四月辛卯在五月八月丙申大庚辰在九月十二月甲申大癸未在明年正月長厯己巳二月朔日食孔氏曰漢書律厯志載劉歆三統之術以為五月二十五分月之二十乃為一交以為交在望前朔則日食望則月食交在望後望則月食後月朔則日食交正在朔則日食既前後望不食交正在望則月食既前後朔不食日食者月掩之也日月之道互相出入或月在日表從外而入内或月在日裏從内而出外道有交錯故日食也朔則交㑹故食必在朔自隠元年盡哀二十七年積三千一百三十四月唯三十七食杜氏曰日月動物雖行度有丈量不能不小有盈縮故有雖交㑹而不食者或有頻交而食者今案二厯所考春秋日食多不入食限者由厯法有踈密入食限而日月復不合者置閏不同故也四年王二月戊申長厯戊甲三月十七日今案前年十二月有癸未則此年二月無戊申凡若此者明是史文差繆五年長厯閏十二月大衍厯閏八月六年五月辛酉大衍厯五月庚辰大辛酉在六月七年長厯閏十二月八年六月己亥辛亥七月庚午九月辛卯大衍厯閏四月五月己亥小己亥辛亥在此月六月戊辰大庚午在此月八月丁卯大辛卯在此月九年三月癸酉庚辰大衍厯三月甲午小癸酉庚辰在四月長厯是年閏十月十一年七月壬午十一月壬辰大衍厯閏正月七月庚戌大壬午在八月十一月戊申大壬辰在十二月桓元年四月丁未大衍厯四月丙子大丁未在五月長厯是年閏十二月二年王正月戊申四月戊申長厯戊申五月十日大衍厯四月庚午大戊申在五月是嵗閏九月今案正月有戊申則四月不得有戊申三年七月壬辰朔日有食之既大衍厯七月癸亥小八月壬辰大朔日食五年正月甲戌長厯正月甲申朔月内無甲戌己丑大衍厯正月乙卯小己卯冬至己丑在二月閏六月六年八月壬午九月丁卯大衍厯八月乙巳大壬午在九月九月乙亥小丁卯在十月七年二月己亥大衍厯二月壬寅大己亥在三月長厯是年閏十二月八年大衍厯閏三月九年五月丁丑大衍厯五月乙未小丁丑在六月十年王正月庚申大衍厯正月乙酉大乙巳冬至庚申在二月閏十一月十一年長厯閏正月十二年六月壬寅七月丁亥六衍厯六月辛未大壬寅在七月