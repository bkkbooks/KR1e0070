body:
  text: 春秋屬辭卷八元趙汸撰假筆削以行權第二古者汗竹為簡編簡為䇿故有筆削之事孔子作春秋以寓其撥亂之志而國史有恒體無辭可以寄文於是有書有不書以互顯其義其所書者則筆之不書者則削之史記世家論孔子為春秋筆則筆削則削子夏之徒不能贊一辭正謂此也蓋嘗考之筆削之例有三曰不書曰變文曰特筆而存䇿書大體與日月之法不與焉不書之義有五一曰略同以顯異公行不書至之類是也二曰略常以明變釋不朝正内女歸寜之類是也三曰略彼以見此以來歸為義則不書歸以出奔為義則殺之不書之類是也四曰略是以著非諸殺有罪不書勤王復辟不書之類是也五曰略輕以明重非有關於天下之大故不悉書是也凡書不書之大端不出於此而夫子於春秋獨有知我罪我之言者亦以其假筆削以寓撥亂之權事與删詩定書異也自左氏不明此義為其徒者遂不知聖人有不書之法公羊穀梁每設不書之問蓋其所承猶得學春秋之要而無所考據不能推見全經近代説者雖多惟子朱子嘗謂惜乎不修春秋不存不知孰為夫子所筆孰為夫子所削最得書法失傳之由其能㕘考經傳以其所書推見其所不書以其所不書推見其所書者永嘉陳氏一人而已但左氏書首所發不書之例皆史例也而陳氏誤以為筆削之法故凡傳之所録皆以為魯史舊文而無經之傳皆為夫子所削不知䇿書有體夫子所據以施筆削者左氏初未之見二家與左氏異師其難疑以不書發義亦非左氏例也陳氏合而求之失其本矣是以其說不能皆合故今特考有書有不書者自為一類以明筆削之權而變文特筆之法别為篇假筆削以行權第二之一一公如大國恒書至則不書至以見義莊二十二年冬公如齊納幣二十三年春公至自齊夏公如齊觀社公至自齊二十四年夏公如齊逆女秋公至自齊以上莊公以事如齊書至者三國君身繫宗社安危故反行必書至詳其事以尊君也左氏謂以告廟飲至而書者非也告廟飲至乃人君徃還常禮適與書至同時於史法何與乎二傳謂危之而後至者一切之論不可通於全經蓋史法於公還無不書至者筆削之㫖以書至為恒則不書至以見義以不書至為恒則書至以見義所謂略同以顯異是也莊公如齊納幣觀社皆非禮惟逆女合古制而夫人又不與君俱入故皆書至從其恒辭以君行為重而已僖三十三年冬十月公如齊公至自齊為薨月文三年冬公如晉十二月己巳公及晉侯盟四年春公至自晉十三年冬公如晉衛侯㑹公于沓十二月己丑公及晉侯盟公還自晉鄭伯㑹公于棐十四年春王正月公至自晉以上僖公如齊書至者一文公如晉書至者二晉文伯業甫定而卒故僖公未嘗朝晉而晩年一朝齊昭則亦非所以為安也晉襄立以不朝來討文公如晉晉人使陽處父盟公以恥之經不書公如晉三年晉人請改盟公如晉及晉侯盟襄公卒靈公幼扈之盟公後至晉人以為討於是公如晉及晉侯盟雖請成衛鄭於晉而晉終不競於楚故皆至從其恒辭宣四年秋公如齊公至自齊五年春公如齊夏公至自齊九年春王正月公如齊公至自齊十年春公如齊公至自齊夏四月己巳齊侯元卒公如齊五月公至自齊以上宣公如齊者五四朝一奔喪皆書至魯宣簒立齊惠為平州之㑹以定其位故終身謹於事齊惠公卒又親奔其喪既非事伯主亦與以小事大為國為民者不同故皆書至從其恒辭凡至皆不月至以四時首月則書其月宣至書五月以奔諸侯之喪異之也成三年夏公如晉公至自晉四年夏公如晉秋公至自晉十年秋七月公如晉十一年春王三月公至自晉十八年春公如晉夏公至自晉襄三年春公如晉夏四月壬戌公及晉侯盟于長樗公至自晉四年冬公如晉五年春公至自晉八年春王正月公如晉夏公至自晉十二年冬公如晉十三年春公至自晉二十一年春王正月公如晉夏公至自晉昭五年春公如晉秋七月公至自晉十五年冬公如晉十六年夏公至自晉以上成公如晉者四襄公如晉者五昭公如晉者二皆書至朝盟主也成公即位為齊難故與晉結盟於是有鞌之役三年如晉拜汶陽田四年特朝歸而欲結楚以叛晉季文子不可而止十年如晉弔喪晉厲新立疑公貳於楚止公送葬以驗實公請受盟而歸蓋晉德既衰諸侯類弗誠服又時有執止之辱故皆書至而見止之役特書月至以異之晉悼公待諸侯有禮而襄公如晉皆書至者悼公雖賢能盡力以得鄭而終不能服楚齊挾邾莒更伐魯以敗盟功烈非桓文比則亦未可恃以為安也二十一年公如晉拜圍齊之師及邾田以後晉衰日甚不足宗諸侯矣襄二十八年十一月公如楚二十九年春王正月公在楚夏五月公至自楚昭七年三月公如楚九月公至自楚以上襄公如楚者一昭公如楚者一皆書至晉既以諸侯與楚襄公逺朝荆蠻又被止與陳鄭許之君送葬西門之外楚靈章華之召昭公其敢不徃乎中國無伯降而從楚以書至為幸矣故其至皆月僖十年春王正月公如齊十五年春王正月公如齊以上僖公如齊不書至者二朝齊桓也春秋諸侯以小事大猶懼不得免焉故滕薛降爵以朝魯把以不恭見伐魯事晉楚亦時有見止之辱其朝覲皆迫於彊令不可言禮故魯君外如皆書至用史氏常法也齊桓創伯之初諸侯朝聘未有定制故莊公三如齊皆以事行召陵首止功業既盛荆楚帖服中夏小康王室奠安諸侯稟命乃定為三歳而聘五歳而朝之法故魯僖凡再朝桓公夫子皆削其書至之文明不與他時朝大國者同所謂信而安之者也蓋為伯主者必若桓公而後可當諸侯之朝為諸侯必若事齊桓而後得朝伯主之禮是故特不至以别之所謂以書至為恒則不書至以見義也或曰諸侯不朝天子而以朝伯主為禮可乎是蓋不知春秋經世之㫖者春秋固責諸侯之無王而亦不廢中國之有伯固罪諸侯之不朝京師而亦不絶諸侯之事伯主也當是時方藉伯者以安靖天下則朝聘固不可無節矣二公㑹諸侯恒不書至則書至以見義桓元年三月公㑹鄭伯于垂二年三月公㑹齊侯陳侯鄭伯于稷以成宋亂三年春正月公㑹齊侯于嬴六月公㑹把侯于郕九月公㑹齊侯于讙六年夏四月公㑹紀侯于成十一年九月公㑹宋公于夫鍾冬十二月公㑹宋公于闞十二年八月公㑹宋公于虚冬十一月公㑹宋公于龜十四年春正月公㑹鄭伯于曹十五年五月公㑹齊侯于艾蒙上事月十六年春正月公㑹宋公蔡侯衛侯于曹宣元年夏公㑹齊侯于平州以上桓公㑹諸侯不書至者十有三皆春秋之初伯者未興諸侯起亂之事明不足致也宣公㑹諸侯不書至者一宣公簒立請㑹于齊以定其位其至又足書乎隱公盟㑹不入例者三傳説者皆曰隠不書至謙不告廟也告廟書至本不相因隱以攝君行還不告廟史不書至不敢同於正君也定十年夏公㑹齊侯于夾谷公至自夾谷十四年夏公㑹齊侯衛侯于牽公至自㑹以上定公㑹諸侯書至者二齊景公結魯以叛晉㑹魯衛以襲晉中國無伯諸侯復散天下大故蓋有在於是故皆書至重叛盟主也桓元年夏四月丁未公及鄭伯盟于越十二年夏六月壬寅公㑹把侯莒子盟于曲池秋七月丁亥公㑹宋公燕人盟于穀丘冬十一月丙戌公㑹鄭伯盟于武父十七年春正月丙辰公㑹齊侯紀侯盟于黃二月丙午公㑹邾儀父盟于趡僖二十五年冬十二月癸亥公㑹衛子莒慶盟于洮二十六年春王正月己未公㑹莒子衛甯速盟于向以上桓公與諸侯盟不書至者六義與㑹同僖公與諸侯盟不書至者二亦中國無伯之事文十七年六月癸未公及齊侯盟于穀秋公至自穀定十二年冬十月癸亥公㑹齊侯盟于黃公至自黃以上文公與諸侯盟書至者一定公與諸侯盟書至者一晉伯中衰齊商人弑其君而代之執子叔姬執單伯亟加兵於我而要公以盟公以疾辭不可乃盟于穀雖商人以弑終而魯不復事晉矣晉伯既衰公㑹齊景于夾谷而後盟于黃卒叛晉故皆書至所謂以不書至為恒則書至以見義也三公㑹伯主恒不書至則書至以見義莊十三年冬公㑹齊侯盟于柯二十三年十二月甲寅公㑹齊侯盟于扈二十七年夏六月公㑹齊侯宋公陳侯鄭伯同盟于幽冬公㑹齊侯于城濮以上莊公與齊桓盟㑹不書至者四柯之盟魯無信故不月以異之蓋莊公于齊本有納糾之隙既盟于柯而單伯之㑹不徃鄄之再㑹不徃同盟于幽以微者行是以有公子結之盟有三國西鄙之伐其不書至明與桓也不書月以罪魯也於是盟高徯親納幣觀社遇于穀盟于扈親逆女而後同盟莊公内有所嫌故重於從齊齊桓委曲調順凡十有餘載而後致公於㑹其務在得魯如此既又㑹于城濮而後伐衛遇于魯濟而後伐山戎且躬來獻捷其身下諸侯又如此桓公不徒以力服人矣此春秋不致不日之義也扈之盟日離盟非伯者之事也穀梁傳曰致君者殆其徃而喜其反者也桓㑹不至安之也又曰桓公委端搢笏而朝諸侯諸侯皆諭乎桓公之志果若是雖安之可也公羊傳曰桓之盟不日其㑹不致信之也此皆經之逸義也但於柯盟發例則失其旨而致與不致惟以安危釋之蓋舉一隅而不能以三隅反者也僖元年八月公㑹齊侯宋公鄭伯曹伯邾人于檉五年夏公及齊侯宋公陳侯衛侯鄭伯許男曹伯㑹王世子于首止秋八月諸侯盟于首止鄭伯逃歸不盟七年秋七月公㑹齊侯宋公陳世子款鄭世子華盟于甯母八年春王正月公㑹王人齊侯宋公衛侯許男曹伯陳世子款盟于洮九年夏公㑹宰周公齊侯宋子衛侯鄭伯許男曹伯于葵丘九月戊辰諸侯盟于葵丘十一年夏公及夫人姜氏㑹齊侯于陽穀十三年夏公㑹齊侯宋公陳侯衛侯鄭伯許男曹伯于鹹以上僖公與齊桓大盟㑹者六與夫人同㑹一皆不書至凡㑹不月㑹于檉謀救鄭而弗果鄭比歳受兵故月亦以見桓公之重伐楚也召陵屈完來盟而中國之勢安首止殊㑹世子而天下之本定辭子華甯母而鄭伯請服㑹王人盟洮而襄王以寜桓公可謂有大功於當世者矣故其盟不日其㑹不致所以别於後之主夏盟者孟子稱五伯桓公為盛而舉葵丘之盟以實之穀梁傳曰桓之盟不日此何以日美之也其言束牲載書一明天子之禁與孟子略同胡文定公亦曰葵丘之盟美之大者也蓋桓公𢎞規逺略至此甫定又與前日之求諸侯服叛國而為㑹謀王室而為盟者不同故特書日以别之蓋不書日以為恒則書日以為變也㑹于鹹致戍于周而謀把也僖十五年三月公㑹齊侯宋公陳侯衛侯鄭伯許男曹伯盟于牡丘遂次于匡公孫敖帥師及諸侯之大夫救徐秋公至自㑹為下二事月十六年冬十二月公㑹齊侯宋公陳侯衛侯鄭伯許男邢侯曹伯于淮十七年九月公至自㑹以上公與齊桓大盟㑹書至者二范甯曰齊桓德衰故危而致之是時楚人伐徐桓公盟諸侯于牡丘不親救患而使諸侯之大夫專兵其志已怠明年㑹于淮謀鄫役人夜呼不果城而還其政益荒故皆書至蓋以不書至為恒則以書至為異也諸侯未歸而魯取項齊人以為討而止公聲姜㑹齊侯釋公故淮之㑹與至皆特書月僖二十八年五月癸丑公㑹晉侯齊侯宋公蔡侯鄭伯衛子莒子盟于踐土公朝于王所以上公與晉文大盟㑹不書至者一晉文城濮之功尊王定伯不俟再舉視齊桓有光故踐土之盟書日同之葵丘而其㑹亦不書至桓文並稱蓋以此春秋序二伯之績亦莫盛於此筆削之義甚明温以圍許至則齊桓致伐之例也四公㑹盟主恒書至則不書至以見義文十四年六月公㑹宋公陳侯衛侯鄭伯許男曹伯晉趙盾癸酉同盟于新城秋公至自㑹宣七年冬公㑹晉侯宋公衛侯鄭伯曹伯于黒壤八年春公至自㑹十七年六月己未公㑹晉侯衛侯曹伯邾子同盟于斷道秋公至自㑹成五年十二月己丑公㑹晉侯齊侯宋公衛侯鄭伯曹伯邾子把伯同盟于蟲牢六年春王正月公至自㑹一時首月七年秋公㑹晉侯齊侯宋公衛侯曹伯莒子邾子把伯救鄭八月戊辰同盟于馬陵公至自㑹九年春王正月公㑹晉侯齊侯宋公衛侯鄭伯曹伯莒子把伯同盟于蒲公至自㑹十五年三月癸丑公㑹晉侯衛侯鄭伯曹伯宋世子成齊國佐邾人同盟于戚公至自㑹十六年秋公㑹晉侯齊侯衛侯宋華元邾人于沙隨不見公公至自㑹十七年夏公㑹尹子單子晉侯齊侯宋公衛侯曹伯邾人伐鄭六月乙酉同盟于柯陵秋公至自㑹襄三年六月公㑹單子晉侯宋公衛侯鄭伯莒子邾子齊世子光己未同盟于雞澤陳侯使袁僑如㑹戊寅叔孫豹及諸侯之大夫及陳袁僑盟秋公至自㑹五年秋公㑹晉侯宋公陳侯衛侯鄭伯曹伯莒子邾子滕子薛伯齊世子光吳人鄫人于戚公至自㑹十年春公㑹晉侯宋公衛侯曹伯莒子邾子滕子薛伯把伯小邾子齊世子光㑹吳于柤夏五月甲午遂滅偪陽公至自㑹十一年秋公㑹晉侯宋公衛侯曹伯齊世子光莒子邾子滕子薛伯把伯小邾子伐鄭㑹于蕭魚公至自㑹十六年三月公㑹晉侯宋公衛侯鄭伯曹伯莒子邾子薛伯把伯小邾子于湨梁戊寅大夫盟夏公至自㑹二十年夏六月庚申公㑹晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯把伯小邾子盟于澶淵秋公至自㑹二十一年冬公㑹晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子于商任二十二年春王正月公至自㑹一時首月冬公㑹晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子薛伯把伯小邾子于沙隨公至自㑹二十四年秋公㑹晉侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯把伯小邾子于夷儀冬公至自㑹二十五年夏公㑹晉侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯把伯小邾子于夷儀秋八月巳已諸侯同盟于重丘公至自㑹昭十三年秋公㑹劉子晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯把伯小邾子于平丘八月甲戌同盟于平丘公不與盟晉人執季孫意如以歸公至自㑹定四年三月公㑹劉子晉侯宋公蔡侯衛侯陳子鄭伯許男曹伯莒子邾子頓子胡子滕子薛伯把伯小邾子齊國夏于召陵侵楚五月公及諸侯盟于臯鼬秋七月公至自㑹以上伯國大盟㑹書至者二十一文公㑹趙盾同盟一晉靈公之君臣盟㑹皆不序新城復序者陳氏所謂諸夏之志也蓋靈雖不君盾雖不臣而夏盟不可以終廢也宣公㑹晉成一㑹晉景同盟一成公㑹晉景同盟三宣事齊而不事晉黒壤見止不與盟故盟不書晩歳不說齊頃乃舍齊事晉同盟斷道成公四卿出㑹郤克大敗齊師于鞌晉由此復振而魯亦堅於事晉矣於是討邲之敗而伐鄭同盟蟲牢而鄭始服為馬陵之盟以救鄭同盟于蒲之後而鄭始叛然晉自靈成以至景公稍能自彊矣成公㑹晉厲一同盟者二戚之㑹討曹負芻也沙隨之㑹謀伐鄭也魯有内難後鄢陵戰期晉侯以讒不見公沙隨至後即㑹尹子伐鄭柯陵盟後復㑹單子伐鄭王臣三出皆無功而還則厲公之為盟主可知矣襄公㑹晉悼者三同盟者四鄬與戲不書至序見後悼公既得國即圍宋彭城再㑹于戚遂城虎牢皆大夫主之雞澤始合諸侯同盟而以大夫别盟陳袁僑為大夫專盟之始戚之㑹命戍陳而㑹呉人為諸侯盟呉之始㑹于鄬以救陳而陳侯逃歸盟于戲以服鄭而鄭有異志於是㑹呉子于柤伐鄭戍虎牢矣再駕而盟亳城北三駕而㑹蕭魚鄭始服從於是㑹呉伐秦復以大夫主之戚之㑹遂孫林父廢立之謀而衞人君臣之禍成於晉矣此悼公復伯之事其於文襄之業果何如乎襄公㑹晉平者四㑹而盟者二大夫盟者一溴梁諸侯㑹而大夫盟視雞澤益專同圍齊盟祝柯而齊靈卒乃得齊莊盟于澶淵商任沙隨動諸侯以錮叛臣而齊始伐盟主矣再㑹夷儀伐齊弗果重丘之盟適以成崔杼之亂而已蓋晉至平公益不競於楚於是趙武屈建盟于宋公子圍尋宋之盟于虢晉不復主夏盟而襄昭皆如楚矣昭公㑹晉昭者一叔向為平丘之盟公以邾莒之愬不得與晉之合諸侯亦由是而止召陵之㑹皋鼬之盟劉子為之也蓋襄公纘文之業未嘗親合諸侯惟士縠一盟諸侯于垂隴開大夫主盟之端自靈以來盟㑹之故大略如此豈足繼桓文之盛乎故其盟皆日其㑹皆致悉從其恒辭明不可與二伯同論也盟蒲不日者鄭復叛皋鼬不日者晉不復主盟蓋書日以為恒則不日以為變也文七年秋八月公㑹諸侯晉大夫盟于扈襄七年十二月公㑹晉侯宋公陳侯衞侯曹伯莒子邾子于鄬鄭伯髠頑如㑹未見諸侯丙戌卒于鄵陳侯逃歸九年冬公㑹晉侯宋公衞侯曹伯莒子邾子滕子薛伯把伯小邾子齊世子光伐鄭十二月己亥同盟于戲以上公與伯國盟㑹不書至者三晉襄卒靈公幼趙盾合諸侯而齊不從鄭屢叛晉失伯者再世故扈之二盟一㑹皆不序諸侯而其盟不日以明變也晉悼為鄬之㑹以救陳而陳侯畏楚逃歸遂不成救故書月與齊桓㑹檉㑹淮無成事同法既而伐鄭同盟于戲而鄭人勦盟晉復以諸侯伐之盟與伐皆非功此三㑹所以皆不書至蓋以書至為恒則以不書至為變也五公㑹外大夫不書至㑹師則書至襄二十六年夏公㑹晉人鄭良霄宋人曹人于澶淵以上公㑹外大夫不書至者一禮卿不㑹公侯故不書其至示不得與諸侯盟㑹比也定八年夏公㑹晉師于瓦公至自瓦以上公㑹外師書至者一此㑹晉士鞅趙鞅荀寅也公㑹外大夫不致此獨以㑹師致重師也六公㑹呉楚不書至有中國之君則書至盟戎書至僖二十一年秋宋公楚子陳侯蔡侯鄭伯許男曹伯㑹于盂執宋公以伐宋楚人使宜申來獻捷十二月癸丑公㑹諸侯盟于薄釋宋公二十七年冬楚人陳侯蔡侯鄭伯許男圍宋十二月甲戌公㑹諸侯盟于宋成二年十一月公㑹楚公子嬰齊于蜀丙申公及楚人秦人宋人陳人衞人鄭人齊人曹人邾人薛人鄫人盟于蜀哀七年夏公㑹呉于鄫十二年夏公㑹呉于槖皋以上公㑹呉楚不書至者五蠻夷僭王猾夏魯雖屈而從之皆不書至明不得與中國伯者同也哀十三年夏公㑹晉侯及呉子于黃池秋公至自㑹以上公㑹晉侯及呉子書至者一㑹呉不書至此先㑹晉侯而後及呉子乃以㑹晉侯至也桓二年九月公及戎盟于唐冬公至自唐以上公及戎盟書至者一魯與戎有疆場之交無呉楚主諸侯之嫌故從恒辭書至桓公盟㑹日月皆從其恒稱而盟戎獨不日說見日月篇其書至一筆一削十二公無異法均之為魯先君也七公特將不書至則書至以見義僖二十一年冬公伐邾二十二年春公伐邾取須句三十三年夏公伐邾取訾婁文七年春公伐邾宣四年春公伐莒取向十八年春公伐把哀七年秋公伐邾以上公伐小國不書至者七恃彊凌弱春秋諸侯恒態其事皆一國之私故不書至僖二十六年冬公以楚師伐齊取穀公至自伐齊以上公以楚師伐齊書至者一齊桓公合諸侯以攘楚桓公卒楚復猾夏而魯用楚師以伐齊此夷夏之大變故書至莊二十六年春公伐戎夏公至自伐戎以上公伐戎書至者一戎嘗侵我公追之濟西未能報也莊公從伯既定乃親伐之與陵暴小國不同故書至莊十年二月公侵宋以上公侵國不書至者一時宋與齊合魯有齊怨而掠宋境實一國之私而已故不書至定六年二月公侵鄭公至自侵鄭八年春王正月公侵齊公至自侵齊二月公侵齊公至自侵齊為下卒月以上公侵國書至者三齊景公結諸侯以叛晉鄭首從齊故公為晉侵鄭齊國夏伐我西鄙故公一再侵齊以其重於叛晉非一國之私故皆書至與㑹伐同昭二十六年夏公圍成以上公圍其邑不書至者一昭公孫于外居于鄆而後圍成成與鄆皆魯邑故不書至定十二年十二月公圍成公至自圍成以上公圍其邑書至者一定公墮三都孟氏不肯墮成公圍成不克故雖在境内而書至見彊臣據邑叛君如敵國也八公㑹伐恒書至為㑹言故不書至桓十六年夏四月公㑹宋公衞侯陳侯蔡侯伐鄭秋七月公至自伐鄭宣七年夏公㑹齊侯伐萊秋公至自伐萊哀十年春公㑹呉伐齊五月公至自伐齊桓十五年冬十一月公㑹宋公衞侯陳侯于袲伐鄭以上公㑹伐書至者三不書至者一周制元侯作師以承天子諸侯敎衞以贊元侯敵國無相征之法而況於合諸侯乎桓公㑹四國伐鄭諸侯無王也宣公㑹齊侯伐萊齊貳於晉也故皆從恒辭書至春秋之末中國無伯而哀公㑹蠻荆伐中國故又書月至以别之若桓言伐鄭於㑹袲之下釋所以為㑹之故而實不果伐故不書至從桓公篇㑹盟不書至例凡㑹伐而戰不書至例見辭從主人篇九公㑹伯國侵伐恒書至則不書至以見義僖四年春王正月公㑹齊侯宋公陳侯衞侯鄭伯許男曹伯侵蔡蔡潰遂伐楚次于陘夏楚屈完來盟于師盟于召陵秋公至自伐楚為下葬月六年夏公㑹齊侯宋公陳侯衛侯曹伯伐鄭圍新城秋諸侯遂救許冬公至自伐鄭二十八年冬公㑹晉侯齊侯宋公蔡侯鄭伯陳子莒子邾人秦人于温諸侯遂圍許二十九年春公至自圍許成三年春王正月公㑹晋侯宋公衛侯曹伯伐鄭公至自伐鄭為下事月十三年夏五月公自京師遂㑹晋侯齊侯宋公衛侯鄭伯曹伯邾人滕人伐秦秋七月公至自伐秦十六年秋公㑹尹子晉侯齊國佐邾人伐鄭冬公至自㑹十七年夏公㑹尹子單子晉侯齊侯宋公衛侯曹伯邾人伐鄭六月乙酉同盟于柯陵秋公至自㑹冬公㑹單子晉侯宋公衛侯曹伯齊人邾人伐鄭公至自伐鄭為下卒月襄五年冬公㑹晉侯宋公衛侯鄭伯曹伯齊世子光救陳公至自救陳為下日卒月十年秋公㑹晉侯宋公衛侯曹伯莒子邾子齊世子光滕子薛伯把伯小邾子伐鄭冬公至自伐鄭十一年夏公㑹晉侯宋公衛侯曹伯齊世子光莒子邾子滕子薛伯把伯小邾子伐鄭秋七月己未同盟于亳城北公至自伐鄭十八年冬十月公㑹晋侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯把伯小邾子同圍齊十九年春王正月諸侯盟于祝柯公至自伐齊以上公㑹伯主侵伐書至者十有二齊桓公之盟㑹皆不書至而侵伐書至者伯主合諸侯之師以攘夷討貳乃中國安危諸侯合散之機事與盟㑹異也晉自厲公以後雖功業不及桓文而能世繼其伯克合諸侯伐叛討罪以藩王室故皆書至與桓公二伐文公圍許同重其事也成十年夏公㑹晉侯齊侯宋公衞侯曹伯伐鄭以上公㑹伯國伐鄭不書至者一晉人執鄭伯而鄭不急君景公有疾晉人立太子州蒲為君而㑹諸侯伐鄭歸鄭伯以求成急於得諸侯而悖其父子之教故不書公至又不得與他君討貳同也十公㑹外大夫伐國不書至君將稱人則書至莊二十六年秋公㑹宋人齊人伐徐莊五年冬公㑹齊人宋人陳人蔡人伐衛六年秋公至自伐衞以上公㑹外稱人伐國不書至者一書至者一宋人齊人者二國之卿也自文以前大夫將皆略不書名氏以公㑹伐知非微者不書至義與公㑹外大夫同伐衞抗天子之命諱公㑹仇諸侯稱人非實大夫故書至從其恒辭說見變文篇十一夫人違禮而行不書至必歸寧得禮而後書至莊二年冬夫人姜氏㑹齊侯于禚為下卒月四年春王二月夫人姜氏享齊侯于祝丘五年夏夫人姜氏如齊師七年春夫人姜氏㑹齊侯于防冬夫人姜氏㑹齊侯于穀十五年夏夫人姜氏如齊二十年春王二月夫人姜氏如莒僖十七年秋夫人姜氏㑹齊侯于卞以上夫人出㑹外如不書至者七以國事㑹其父不書至者一文姜以姦出其反不足致齊姜為齊人止公故越禮㑹齊侯于卞齊侯與姜氏皆失正故亦不書至文九年春夫人姜氏如齊三月夫人姜氏至自齊以上夫人如父母國書至者一禮既嫁見兄弟不踰閾惟父母在乃得歸寧夫人齊昭公之女父母俱存故特書至明婦人無外事必歸寧得禮乃致之以别於非禮而出者雖得禮猶月異國君也十二公行不書所在書在楚在乾侯襄二十九年春王正月公在楚昭三十年春王正月公在乾侯三十一年春王正月公在乾侯三十二年春王正月公在乾侯以上公在楚者一在乾侯者三古者諸侯歳正月朔日以禮祭於宗廟謂之朝正其或公在外不得行禮而大臣攝行必以公在外告于廟而史書于䇿故襄二十九年春王正月公在楚傳曰釋不朝正于廟也此魯史之法也魯君屢以正月在晉而經不書者魯君朝伯主而在中國猶云可也襄公正月在楚以諸夏之君而朝蠻荆昭公正月在乾侯以國君而見出於彊臣皆人道之變故特書之此筆削之義所謂略常以明變也十三公不視朔不書有為則書文十六年夏五月公四不視朔以上書公四不視朔者一禮諸侯每月朝廟北面受朔政乃察一月之政頒於其國謂之視朔或君有疾不得行禮則大臣攝行而史書于䇿明其禮甚重不得輒有闕遺此魯史之法也計十二公不視朔者尚有而經不書者君子不責人以所不及以疾廢禮無以議為也晉靈之世齊貳於晉而侵魯故文公托疾以拒齊懿之要盟不視二月三月四月五月之朔政蓋自季孫㑹陽穀至六月公子遂及齊侯盟郪丘始視朔如初也經特書之以見晉伯中衰魯為齊弱如此言不視朔則不告朔朝廟可知十四送王姬不書必主仇昬而後書莊元年夏單伯送王姬以上書王臣送王姬者一凡送王姬者必有定制如左傳言諸侯送女之禮是也周制王姬下嫁於諸侯車服不繫其夫下王后一等其尊如此魯受王姬與王卿士接皆史所必書齊桓共姬亦魯主昬而經不書者此筆削之法略恒明變之例與外親迎合禮不書同魯莊與齊襄有不共戴天之讎方在衰麻中而天子命魯主齊昬魯人獨不可引義力辭乎故詳書其事見王室與魯兩失之也黃先生曰同一主昬也而前後經文不同則前之所以詳者深有意矣桓公乃僖之子以襄無道逃難於莒襄既以惡死桓之立在魯不可謂之讎故書之略者所以示為禮之常也十五諸侯女歸京師不書必魯主昬而後書桓九年春紀季姜歸于京師以上書諸侯女歸京師者一傳曰凡諸侯之女行唯王后書則當時之制諸侯之女歸于京師皆告于列國而史皆書于䇿后妃母儀天下禮亦宜然春秋詳内略外必魯主昬而後書故所録唯紀季姜一事與祭公來遂逆王后于紀相為本末所以尊王命志天子昬禮也其非魯主昬則不書若莊十八年陳媯為惠王后宣六年齊姜為定王后皆不見于經是也左氏雖不知經意而稍存史法陳氏槩以筆削之㫖格之故謂例與傳違然陳氏傳曰后歸不書詳紀事也亦非筆削本㫖齊滅王后之家䇿書大體存而其罪自見不待夫子特書以詳之由二傳以書葬紀伯姬叔姬為閔紀之亡故陳氏亦蒙其失皆似是而非之論正學者所當辯如經書納幣來媵致女二傳皆以為録伯姬甚至書葬宋共公亦以為崇伯姬又可據乎十六内女適諸侯恒書歸苟來歸則不書歸隱二年冬十月伯姬歸于紀莊二十五年夏六月伯姬歸于把蒙日食月成九年二月伯姬歸于宋以上内女為諸侯夫人書歸者三傳例曰婦人謂嫁曰歸内女為夫人則尊卑敵而公為之服故其歸其卒皆書之内以重先君之遺外以篤舅甥之好也僖十四年夏六月季姬及鄫子遇于防使鄫子來朝十五年九月季姬歸于鄫蒙至㑹月以上内女使其夫來朝又書歸者一傳曰鄫季姬來寜公以鄫子不朝怒止之遂遇于防而使來朝既踰年乃書歸于鄫蓋來寧反國之恒辭也僖公重得國君之朝而輕蔑男女之敎為君為父兩失其道故削其始嫁之文見止之歸之皆以私耳凡魯君㑹遇猶不月而季姬鄫子遇特月異其事也其來寧自以合禮不書二傳謂季姬遇鄫子使來請已與左氏見止之說初不相違何氏惑於下文書歸以為使之來請取已而誣以滛奔胡氏又文以擇配筆削之義不明故也季姬不繫鄫者自父母國言之也文十五年十二月齊人來歸子叔姬宣十六年秋郯伯姬來歸成五年春王正月把叔姬來歸以上内女書來歸者三傳例曰凡諸侯之女出曰來歸子叔姬書齊人來歸者見執而後來歸之之文也使非見執則書曰齊子叔姬來歸婦人從一而終既來歸則義絶於夫家均之為出也故不以有罪無罪皆以來歸為辭經削其始嫁之歸不書重其變故略其常也齊子叔姬把叔姬非罪出故書月以别之十七内女歸寧不書必有故而後書莊二十七年冬把伯姬來僖五年春把伯姬來朝其子二十八年秋把伯姬來三十一年冬把伯姬來求婦以上書内女來者二以事來者二凡内女歸寜曰來禮父母在歳一歸寧既没使卿寧魯女嫁為諸侯夫人者七不書來者六鄫季姬及鄫子遇于防使鄫子來朝明歸寧在魯而經不書來此歸寧合禮不書之例把侯始朝于魯魯人以為不敬而兵入其國德公既取于魯將來朝而先之以伯姬虞不敬也是年春公㑹伯姬于洮至是而來意不為歸寧明矣故雖父母在書之僖公立伯姬又來朝其子蓋德公欲朝嗣君而懼不見禮故使伯姬以子代朝也把桓公立來朝公以不共卑之使公子遂帥師入把明年伯姬又來意可知矣伯姬之來皆與歸寧得禮者不同故經書之以見魯人無義寡恩使婦人越禮徃來而莫之恤也十八國君來逆女不書卿為君逆則書隱二年九月紀裂繻來逆女以上書卿為君逆者一凡史之所書者皆君禮故君舉必書者史法也傳曰衞侯來㑹葬不見公不書此成禮則書之證也魯女嫁為諸侯夫人者七其不書來逆者六皆國君親迎合禮不書此經義也莊十一年冬經書王姬歸于齊傳言齊侯來逆共姬此合禮不書之證也杜氏曰不書齊侯逆不見公夫天子使同姓諸侯主昬者為國君體敵得以成禮今齊侯來逆女而公不見何以為昬主況莊公幼魯方受制於齊乎杜氏不知春秋筆削之法見傳言衞侯來㑹葬不見公不書遂推以為例固亦甚矣然於此可見國君親迎成禮史所必書至夫子作經以略常明變見義乃有合禮不書之法惟紀裂繻以卿為君逆非禮故特書以見昬禮之變然納幣稱使而逆女不稱使則古者必親迎無使人之義明矣如使親迎與卿逆並書於經則是聖人皆許之也十九繼故不書立必賊討而後書立隱四年九月衞人殺州吁於濮冬十二月衞人立晉以上書衞人討賊立君者一凡告終稱嗣不書立諸侯世國有定體也繼故書立謹廢置重繼絶也此在魯史必有成法今以衞晉推之則宋馮御説晉黒臀周宜無不書於䇿者春秋以筆削見義馮也黒臀也周也皆立於弑君者御說雖立於國人而賊未討故皆削不書當五國伐鄭以定州吁而天子不能正故特書立晉以信衞人討賊立君之義於天下結正五國輔簒之罪也陳氏曰必若衞人討賊而後可書立此說是也然必以君不葬取義以晉不書公子為爭國之辭則由不考書法源委而未免惑於二傳之說也周禮廢久矣不請命之非譏不在一國亦豈待去屬而後為貶乎如以不稱公子為惡則王子朝豈宜立者乎二十簒位不書立必不能討而後書立昭二十三年秋尹子立王子朝以上書王子簒立者一據莊十九年蘇子立子頽不書陳氏曰傳著鄭虢克復則子頽不書立惠王不書出見襄王書出子朝書立不復諱之矣詳又見後二十一天王蒙塵復辟不書苟自取之則書其出必亂未弭賊未討而後悉書之僖二十四年冬天王出居于鄭昭二十三年秋七月天王居于狄泉蒙上事月二十六年冬十月天王入于成周以上書天王出居鄭者一居狄泉一入成周一鄭列國也在王畿之外故言出莊二十年子頽之亂惠王處于鄭二十一年虢公鄭伯同伐王城王入于王城出入皆不書定六年周儋翩率王子朝之徒因鄭人以作亂天王處于姑蕕七年十一月戊午單子劉子逆王于慶氏晉籍秦送王己巳王入於王城出入皆不書何也惠王避子頽敬王避儋翩非王自取而虢鄭單劉成復辟之功事無可議者故出入皆不書襄王以狄伐鄭立狄女為后復王子帶以生亂其失位皆自取故書其出既而晉侯勤王右師圍温左師逆王王入于王城取大叔殺之故入不書敬王居于狄泉而尹氏立王子朝亂未弭也入于成周而召伯毛伯以王子朝奔楚賊未討也故居與入悉書之春秋撥亂反正之書也苟有能正之者則不復書敬王不言出詳見末篇二十二天王出入有以之者不書未成尊則書昭二十二年夏劉子單子以王猛居于皇秋劉子單子以王猛入于王城以上書大夫以王某出入者各一未成尊也莊二十年鄭伯以王處于櫟昭二十三年單子劉子以王如劉二十六年劉子以王出次于渠皆不書為尊者諱也二十三未成君出入不書必有辨於名實而後書桓十一年九月宋人執鄭祭仲突歸于鄭鄭忽出奔衛十五年五月鄭伯突出奔蔡鄭世子忽復歸于鄭莊二十四年冬戎侵曹曹羈出奔陳赤歸于曹襄三十一年十一月莒人弑其君密州昭元年秋莒去疾自齊入于莒莒展輿出奔呉以上書未成君出而復歸者一書出者二皆言其故惟昭十四年莒殺公子意恢而郊公與庚輿更出更入事與鄭忽突相似而書法不同者郊公雖見出於國人而罪狀未著庚輿以公弟歸立而非有庶孽亂適之嫌故但書殺其公子以見君卒國亂而一出一入皆不書及庚輿亦見出則郊公之歸固其所也故庚輿自以諸侯書來奔而郊公復歸不書苟無亂於名實則春秋無以議為也若宋人奉嬖孽以簒適諸侯又從而君之則鄭忽與突之出入不可無辯矣戎侵中國而制其廢立之權則曹羈與赤之出入不可不詳矣莒人弑君無主名則去疾與展輿之出入不可不志矣忽稱世子說見特筆篇二十四執君歸不書必伯主釋有罪而後書成九年秋晉人執鄭伯襄十六年春晉人執莒子邾子以歸十九年春晉人執邾子哀四年春宋人執小邾子以上伯國執諸侯不書其歸者三大國執小國之君不書歸者一非天子不得專執諸侯晉雖盟主苟所執之君罪不當廢宜無不得歸者鄭伯私㑹楚公子成于鄧既㑹即朝于晉明非實叛晉者而晉人因其來㑹執之莒邾屢加兵于魯晉人每因其來㑹而執之於既盟之後則亦非叛伯者故其見執之君歸國皆不復書以其罪不當廢無不得歸之道也若宋以大執小乃恃衆暴寡之為其歸不足志矣僖二十八年三月丙午晉侯入曹執曹伯畀宋人冬晉人執衞侯歸之于京師曹伯襄復歸于曹三十年秋衞侯鄭歸于衞成十五年春晉侯執曹伯歸于京師十六年秋曹伯歸自京師以上伯主執諸侯書復歸者一書歸者二晉文公纘齊桓之業以大義匡中國將解宋圍而曹衞固於從楚門于曹曹人不服故入曹執曹伯以畀宋人假道于衞衞人弗許既而楚師敗衞侯懼出奔楚使元咺奉叔武以受盟晉復衞侯以踐土之盟也衞侯入而前驅殺叔武是不賴斯盟矣故温之㑹執衞侯歸之于京師則二君挾荆楚叛中國其罪已著而衞侯廢伯主之命殺其弟之攝君受盟者抑又甚焉晉侯皆不能正以王法廢而黜之更立賢君以示敎戒於天下乃以巫史之言釋曹伯又取貨以歸衞侯其戰功雖雋而大義不明故二君者皆書歸以見其罪宜廢而伯主以私釋之春秋之世簒奪者無所顧忌雖齊晉盛時猶不能討曹負芻殺其大子而自立諸侯請討之晉厲公㑹諸侯于戚執曹伯歸于京師使厲公能請于天子討負芻簒立之罪誅之以謝諸侯而立子臧以君曹則大義信矣乃列于㑹而後執之又歸之京師而後釋之故書其歸見厲公以釋有罪累京師也凡諸侯相執無不書被執或稱名或書月必伯討而後稱君復國有書不書或言所自或不言所自有變例有變文春秋一類參見諸例如此者甚衆學者宜推類以通之二十五弑君以納君不書必所弑稱君而後書桓十五年秋九月鄭伯突入于櫟傳莊十四年鄭厲公自櫟侵鄭獲傅瑕曰苟舍我吾請納君與之盟而赦之六月甲子傅瑕殺鄭子及其二子而納厲公襄二十五年秋衞侯入于夷儀二十六年春王二月辛卯衞甯喜弑其君剽甲午衞侯衎復歸于衞以上奔君書入邑不書歸國者一書入邑又書歸國者一鄭厲公出奔人櫟使傅瑕弑子儀而後得反國衞獻公出奔入夷儀使甯喜弑剽而後得反國子儀君鄭十有四年剽君衞十有一年二事正相類而一則書弑書歸一則皆不書何也春秋之世簒立未㑹諸侯則史不稱君鄭突奪適宋魯輔之故魯人終始君突雖忽以世子復歸其見弑也史猶不書而況子儀乎子儀雖為國人所立未嘗一列於諸侯之㑹則其見弑魯史必不以君書明矣鄭忽復歸夫子既正其名則適庶之分已明而諸侯輔簒之罪已著魯人既終始君突而鄭歴三君皆不見於䇿於是子儀之弑不書則鄭伯之歸亦不足論矣蓋其復歸之罪不加於奪適而子儀非鄭忽母弟事不相沿苟無其本則不得録其末也衞侯衎無禮不君定姜知其必敗衞國故卒見出於貴戚大臣而剽之立也晉人又為戚之㑹以定之溴梁以來無役不從也既而晉侯又使人逆衎於齊使衞與之夷儀此剽之所以弑與故入夷儀獨不名夫剽列於諸侯之㑹七則其見弑史固以君書與子儀異矣故衞侯之歸特謹其日辛卯至甲午間二日而一弑一歸則書日之義豈不著乎以衞臣弑君納君之罪不可不討而晉為盟主不能正名討罪以定宜為君者惟始終置力於孫氏使君臣之敎不明其事不可不詳也蘇氏曰突之入以簒衎之出以惡儀剽雖國人所立而突衎在焉亦非所以為安也故四人者春秋莫適與也皆不没其實爾君子有取於其言而春秋書法詳略不同學者皆不能無惑故詳著其說以明學春秋者必先考史法而後筆削之意可求也二十六内大夫出奔非其罪不書必有罪而後書閔二年九月公子慶父出奔莒文八年冬十月公孫敖如京師不至而復丙戌奔莒宣十八年冬十月歸父還自晉至笙遂奔齊蒙公薨月成十六年冬十月乙亥叔孫僑如出奔齊襄二十三年冬十月乙亥臧孫紇出奔邾昭十二年冬公子憖出奔齊以上書内大夫出奔六慶父弑子般成季奔陳不書弑閔公成季以僖公適邾不書皆以國難退而圖之此大夫出奔非其罪不書之例也古者人臣有去國之義苟非以罪出春秋奚治焉凡内臣出奔必書日以國卿失守宗祧重其事也慶父弑二君以出故不日以異之歸父謀去三桓而已專國公子憖謀去季孫而更其位均之亂國與禍福在一家者不同故其出亦不日二十七王卿士奔復之不書必不反而後書成十二年春周公出奔晉以上王卿士書出奔者一莊十六年周公忌父出奔虢惠王立而復之不書宣十六年王孫蘇奔晉晉人復之不書其出奔不以有罪無罪復之不以有援無援皆不書者以王命為重也至尊制命為紀法之宗苟以王命復之則奔者之罪與復之之由皆不足辯矣周公楚惡恵襄之偪且與伯輿爭政不勝而出王使劉子復之三日復出奔晉蓋有懲於主子捷之事也以天子之命不能安其大臣於是始書之王朝三公與列國南面之君不同故筆削亦異尊歸于一則義繫於上也諸侯大夫一出一入各有筆削者大夫彊諸侯脅須兩著其罪也王臣言出說見末篇二十八王子奔非其罪不書以叛奔卒討之不書必佚賊而後書襄三十年夏五月王子瑕奔晉蒙上事月昭二十六年冬十月尹氏召伯毛伯以王子朝奔楚蒙上事月以上書王子奔者一王卿士以王子奔者一桓十八年周公欲弑莊王而立王子克王殺周公黒肩王子克奔燕主謀者黒肩也既以天子討有罪不書則子儀出奔不書以非其罪也儋括欲立王子佞夫佞夫弗知景王殺佞夫括瑕廖奔晉瑕廖蓋與括同謀者故殺佞夫既以非其罪書則瑕書奔者以佚賊也景王之討罪有愧於莊王矣僖十二年王以戎難故討王子帶王子帶奔齊其後又以狄師伐周襄王復辟卒討之則其奔齊不書者以能討也王子朝之亂王猛敬王相繼播越者五年敬王反正而不能討其罪則其奔楚亦以佚賊書也敬王之復辟異於襄王矣觀殺周公與王子克之奔不書則殺佞夫與王子瑕之奔所以書者可見矣觀王子帶之奔不書則王子朝之奔所以書者可見矣瑕與朝皆以謀簒逆叛在外故不書出從史文也說見末篇括廖賤史不書子帶子朝後雖殺之不書皆說在後二十九公子奔非其罪不書必有故而後悉書之襄二十年秋蔡公子履出奔楚陳侯之弟黃出奔楚二十七年夏衞侯之弟鱄出奔晉昭元年夏秦伯之弟鍼出奔晉冬楚公子比出奔晉八年夏陳公子畱出奔鄭定十年秋宋公子地出奔陳冬宋公之弟辰暨仲佗石彄出奔陳十四年秋衞世子蒯聵出奔宋宋公之弟辰自蕭來奔以上書公子出奔者十案傳隱三年宋公子馮奔鄭莊八年齊公子小白奔莒公子糾來奔二十年陳公子完奔齊僖五年晉公子重耳奔狄十七年齊公子昭奔宋襄十四年衞公子展奔齊之類皆不書雖來奔不書以非其罪也陳氏曰譏不在奔也昭二十年楚大子建奔宋陳氏曰奔非其罪雖大子不書是也然書奔者未必皆有罪蔡公子燮欲以蔡之晉蔡人殺之公子履其母弟也故出奔楚陳慶虎慶寅畏公子黃之偪愬諸楚曰與蔡司馬同謀楚人以為討公子黃奔楚皆非有罪而書者陳蔡之人安於事楚其臣有欲從中國者雖公子公弟不能保其身然不奔他國而皆奔楚者以其國終於事楚猶冀可藉以歸耳故悉書之以見二國之習於夷上無天子下無方伯莫能正也楚公子圍弑其君右尹子干奔晉亦非有罪而書者圍弑君而以瘧疾赴諸侯特書比奔以明變也衞鱄以下皆以罪書事見於傳惟衞討齊豹之亂公子朝奔晉有罪而不書者衞人以朝故殺宣姜諱不告也三十外大夫出奔不書必有關一國之故而後書僖二十八年夏衞元咺出奔晉文六年冬晉狐射姑出奔狄七年夏晉先蔑奔秦宣十年夏齊崔氏出奔衞成七年冬衞孫林父出奔晉十五年秋宋華元出奔晉宋魚石出奔楚十七年秋齊高無咎出奔莒襄六年夏宋華弱來奔十七年秋宋華臣出奔陳二十一年秋晉欒盈出奔楚二十三年夏邾畀我來奔二十四年冬陳鍼宜咎出奔楚二十八年夏衞石惡出奔晉冬齊慶封來奔二十九年秋齊高止出奔北燕三十年秋鄭良霄出奔許昭六年夏宋華合比出奔衞十年夏齊欒施來奔十五年夏蔡朝呉出奔鄭二十年夏曹公孫㑹自鄸出奔宋冬十月宋華亥向寧華定出奔陳二十七年冬邾快來奔定四年冬楚囊瓦出奔鄭十年秋宋樂大心出奔曹十四年春衞公叔戌來奔衞趙陽出奔宋夏衞北宫結來奔秋衞公孟彄出奔鄭哀四年春蔡公孫辰出奔呉六年夏齊國夏及高張來奔十一年夏陳轅頗出奔鄭冬衞世叔齊出奔宋以上外大夫書出奔者三十有三非以罪出則彊家之相傾者也宋魚石向為人鱗朱向帶魚府皆卿而四人不書者同族同罪又同出奔史書位高者一人而已華向作亂殺公子六人刼宋公取大子為質見討而出者故書月以異之比宋萬王子朝佚賊之例說見後文八年冬宋司城來奔十四年秋宋子哀來奔以上外大夫書奔不名者二宋人將弑昭公而殺其司馬故司城與高哀皆來奔非見出於君故一書其官一書其字而不名說見後篇凡大夫出奔有罪無罪悉書之於此可見蓋自元咺而後大夫益專其出入必有關乎一國之故與公子之未命者不同也唯鄭厲公反國討與於雍糾之亂者殺公子閼而公父定叔出奔衞不書春秋不與鄭突削其復歸之文故見殺與出奔者皆不復書鄭文公惡高克使宿師河上久而不召師潰而克奔陳春秋特書鄭棄其師譏文公不君而高克之奔不足書矣故自僖以前外大夫無以出奔書者政不在大夫也三十一内大夫來歸非其罪不書以伯主之盟復之則書閔元年秋季子來歸以上内臣書來歸者一慶父弑子般季友奔陳閔公立及齊侯盟于落姑以復之於是季子來歸而齊仲孫即來省難時閔公幼哀姜慶父豈欲季子之歸者其能以宗社大計謀於伯主未知何人為之既而閔公弑成季以僖公適邾而哀姜孫共仲奔若有所畏避然於是季子以僖公歸立之而齊高子即來盟然後知季子之出入皆有請於伯主而齊桓所以始復季子而終定僖公者皆季子在外之所為也故春秋不書季子與僖公之出入以别於有罪而出者而特書其始賴盟以歸以見季子深謀圖國之志而齊桓不去慶父以致再亂其失亦不可掩矣三十二奔大夫公子復之不書必挾外援以歸而後書苟以叛出書僖二十八年冬衞元咺自晉復歸于衞成十四年夏衞孫林父自晉歸于衞十五年秋宋華元自晉歸于宋哀十年夏衞公孟彄自齊歸于衞以上書大夫歸國者四恵王復周公忌父鄭復公父定叔宋復蕩意諸此大夫之復而不書者其事皆見於傳古者大夫去國有賜環之命禮以道去君而未絶者服齊衰三月未絶者猶待其復也大夫公子出奔而君命復之事無可議者故春秋皆不書其書者必挾外援以歸若專國者也衞元咺訟其君於伯主復歸而立君挾晉令也衞侯如晉晉侯彊見孫林父焉又使郤犫送之以歸此事實之尤著者華元以蕩澤弱公室殺公子肥奔晉魚石曰右師不反懼桓氏之無祀於宋也自止華元于河上畏其挾晉援也唯公孟彄無傳然輒方倚齊以拒父公孟彄蒯聵之黨也亦假齊命以歸國是四臣者之歸皆與以君命復者異矣元咺稱復歸說在辭從主人篇襄二十三年夏陳侯之弟黃自楚歸于陳以上書公子歸國者一昭元年秦后子復歸于秦此公子之歸而不書者義與大夫同陳慶虎慶寅患公子黃之偪譖諸楚黃奔楚愬二慶慶氏以陳叛屈建從陳侯圍陳陳人殺慶虎慶寅楚納公子黃春秋書殺二慶而黃自楚歸則陳之國命皆楚制之明矣蔡季雖以召歸而事不可没别見後篇鄭突曹赤楚公子比以簒歸不入例諸書出奔王卿士與國君異王子與卿士異内大夫與外大夫異外大夫與公子異由名位不同勢分殊等故筆削之法或詳或略各有其義而不可一律齊凡一經類例皆然在學者精之而已定十三年冬晉趙鞅歸于晉以上外大夫書歸者一傳言韓魏以趙氏為請是以君命復之也為以叛出故書其歸不得與奔大夫同法三十三諸侯逃不書必逃中國而後書僖五年夏公及齊侯宋公陳侯衞侯鄭伯許男曹伯㑹王世子于首止秋八月諸侯盟于首止鄭伯逃歸不盟襄七年十二月公㑹晉侯宋公陳侯衞侯曹伯莒子邾子于鄬陳侯逃歸以上書諸侯逃歸者二陳氏曰文十年厥貉之㑹麇子逃歸不書宣六年厲之役鄭伯逃歸不書蓋逃楚也必若鄭文公逃齊陳哀公逃晉而後書所以示内外之辯嚴矣案傳言厲之役鄭伯逃歸自是楚未得志焉不明言厲役是何年之事杜氏疑即是六年傳所記楚人伐鄭取成而還然此年伐鄭不書於經或者鄭伯竊與楚㑹非有文告魯史何由録其逃歸惟厥貉之後書楚子伐麇楚人必聲其罪以告諸侯陳氏斯義推此可見傳言陳侯鄭伯㑹楚子于息而經不書況麇之微國乎二事皆與中國大盟㑹不同不但以逃楚也三十四外大夫逃不書齊桓之初則書之莊十七年秋鄭詹自齊逃來以上外大夫書逃來者一宣十七年斷道之盟齊高固及歛盂逃歸未見諸侯史不録襄十六年溴梁之盟齊高厚已在㑹而逃亦不書者悼公末年齊侯伐我北鄙圍成則貳於晉可知平公新立速葬改服而為此㑹高厚之逃不足志也惟齊桓同盟於幽鄭伯在焉而改歳即書執鄭詹必鄭人於桓公伯令有未盡從者既又不能正名其罪而緩之使逸豈非創伯之初人情未協有難以深罪者乎故經書之見以力服人者有時而窮也不然桓公管仲為政而罪人得越境以逃乎當其時魯侯未至而戍人殱于遂則筆削之意可識矣陳氏謂書逃來譏與之接也恐未然三十五王討簒立者不書雖殺卿士不書必殺無罪而後書襄三十年夏天王殺其弟佞夫以上書天王殺其弟者一莊二十二年春殺王子頹僖二十五年夏殺王子帶皆不書二王子之亂傾王室簒大位動天下其殺之也必告諸侯史無不書之理而孔子削之者以天子討亂臣而罪人斯得其事無可議者不書可也桓十八年周公欲弑莊王而立王子克王殺周公黒肩昭二十九年殺召伯盈尹氏固雖殺大夫亦不書者天子無專殺之譏與諸侯異也唯靈王崩儋括欲立王子佞夫佞夫弗知景王立而殺佞夫失親親之義故特書之三十六諸侯討亂殺公子不書雖殺世子母弟不書必殺之非其罪而後書莊二十二年春陳人殺其公子御冦僖五年春晉侯殺其世子申生襄二十六年秋宋公殺其世子痤以上書人殺公子一君殺世子二據莊十二年宋殺子游文十四年楚殺子燮子儀成十年宋殺圍龜皆討亂不書僖十六年鄭殺世子華文十八年宋公殺母弟須亦不書故陳氏謂討亂不書雖殺世子母弟不書謂君父討子弟而當其罪雖專殺無以議為也陳御冦傳以為陳大子也然經稱公子而書人以殺與討亂殺大夫同文公子完御冦黨也而出奔不書則是以亂討而非其罪必見絀於君而國人得以非罪加之者也書法既明則傳雖不詳而經旨得矣晉侯以驪姬之譖而殺其世子宋公以伊戾之故而殺其世子所謂為人君父而蒙首惡之名者故皆稱君以殺從史文也若齊彭生雖魯史亦耻書之杜陳說皆誤三十七兩下相殺不書雖殺太子不書必譏不在相殺而後書譏不在相殺雖無君書雖盜殺書宣十五年夏王札子殺召伯毛伯昭八年春陳侯之弟招殺陳世子偃師十三年夏楚公子棄疾殺公子比以上書兩下相殺者三穀梁傳曰兩下相殺不志乎春秋既以證蔡人殺陳佗為君命至王札子陳招乃據以釋經蓋有所受也傳文八年先都士縠殺先克成十三年鄭公子班殺子卬國人皆討之蓋兩下相殺之獄有司法守之所得治也故衞孫林父宋華亥之亂皆殺公子四人以至昭十二年劉獻公殺甘悼公毛德殺毛伯過之類皆不書春秋治不及相殺也陳侯鮑卒佗殺太子而自立曹伯廬卒負芻殺大子而自立苟未嗣位猶兩下相殺也故雖殺大子不書討簒奪者以位為重也王孫蘇與召氏毛氏爭政使王子捷殺召戴公及毛伯衞王室復亂陳哀公屬其嬖子於司徒招公子過而招殺世子偃師國幾亡則譏不在相殺矣故陳氏曰皆斥君之辭也楚公子棄疾使公子比蒙首惡之名然後誅而殺之以簒其位則亦異乎相殺之獄矣文六年冬晉殺其大夫陽處父昭十四年冬莒殺其公子意恢以上無君相殺以國書者二時晉莒君卒大臣各尃廢立而殺其大夫公子實兩下相殺也則何以書之與國討同文凡兩下相殺所以書者譏君也時二國皆無君大臣方專廢立則兩下相殺何譏焉以其廢立之罪不見於春秋故書其殺大夫以見君卒國亂如此而二君之澤不足善其身後亦可見矣不書殺者名氏既不嫌君討且明治不在相殺也襄十年冬盜殺鄭公子騑公子發公孫輒昭二十年秋盜殺衞侯之兄縶哀十三年冬盜殺陳夏區夫以上書盜殺者三鄭盜尉止等皆士也衞盜失司冦之齊豹也亦兩下相殺而貴賤異矣則何以書鄭盜一日殺三卿而刼鄭伯以如北宫衞盜殺其君兄而衞侯出居死鳥遂滅齊氏及其君母治不在盜也范氏謂惡鄭伯斥衞侯陳氏謂譏失政是矣謂聽不止大夫則非春秋之旨陳盜無傳三十八諸侯反國殺大夫公子以簒入者不書必治以君臣之禮而後書僖十年夏晉殺其大夫里克三十年秋衞殺其大夫元咺及公子瑕襄二十七年夏衞殺其大夫甯喜以上諸侯書殺其大夫者三凡大夫不言大夫必見殺而後言其大夫君臣之辭也據莊六年衞侯入放黔牟于周殺左公子洩右公子職十六年鄭伯自櫟入治與於雍糾之亂者殺公子閼皆不書二公子立黔牟而出朔者八年蓋嘗請命于天子矣既而五國抗王師以納朔朔雖出入稱君與鄭突同耳於二公子非有君臣之分罪不止於專殺而又不得以相殺書書入于衞則叛王簒國之罪為重矣鄭伯事說見前其適孽之分既明而出奔之後鄭歴三君則所殺直不附已者而已經既削其反國之文則殺公子亦不得書罪莫重於奪適矣晉里克弑君以納君而君殺之衞甯喜弑君以納君而君殺之二君者既利其弑又以忌克殺之而非以賊討也故皆以君臣之辭書之元咺訟衞侯于晉而歸立公子瑕晉人為之也周官大司馬賊殺其親則正之叔武之死晉人聽其獄矣而不能正其罪咺雖自絶於君而衞侯未絶於國也廢立之罪將安逃乎故書殺其大夫公子一以君臣之禮治之譏在晉也三十九簒弑者以奔為義雖卒討之不書莊十二年冬十月宋萬出奔陳昭二十六年冬十月尹氏召伯毛伯以王子朝奔楚蒙上事月以上弑君賊書出奔陳者一王卿士以王子簒立者奔楚一宋卒請南宫萬于陳醢之定五年春王人殺子朝于楚皆不書者蔽罪於所奔之國也陽虎奔晉適趙氏仲尼曰趙氏其世有亂乎亂臣賊子無所逃於天地之間者也其誰可受之慶父之亂莒人受之至於興兵以責賂於是宋人亦以賂請萬于陳受弑君之賊而因以利之忘其君臣之大戒矣凡諸侯為逋逃淵藪者皆有所利焉而莫甚於黨惡逆故經於簒弑者出奔雖卒殺之不書蔽罪於受之之國也出奔不月此皆月者簒逆逋誅與見出者異也春秋内外異辭故慶父不入例四十叛臣以出奔為義雖討以諸侯之師不書昭二十二年春宋華亥向寧華定自宋南里出奔楚以上叛臣書出奔楚者一二十一年傳公子城以晉師至曹翰胡㑹晉荀呉齊苑何忌衞公子朝救宋大敗華氏圍諸南里華登如楚乞師楚薳越帥師逆華氏二十二年春諸侯之戌請出之以為楚功宋人從之經以四國之師救宋而懼楚不能一戰乃出叛者以說之其事不足書惟以三子奔楚為義責楚受中國叛臣為天下逋逃主也四十一一外納不書宜納雖伐不書苟不宜納則書伐書戰甚則書伐書入必不克納而後書納惟外裔間中國悉書之僖十八年春王正月宋公曹伯衞人邾人伐齊五月戊寅宋師及齊師戰于甗齊師敗績以上書伐書及戰者一奚齊卓子既弑而秦納夷吾恵公既卒而秦納文公其事無可議者故不復書此外納不書之例也然秦納文公晉有懷公宋納孝公齊有無虧二事頗相類其不書納亦同而秦師圍令狐入桑泉取臼衰不書伐晉宋公書伐齊又書及齊戰者齊桓六公子之禍方見於此時其事與晉異宋公以一言之故奉少伐長亦不得比秦納文公也晉獻公大戎狐姬生重耳小戎子生夷吾重耳母貴又為兄國人之所求秦伯之所先而重耳辭焉懼蒙里克之惡以其國家與人為利也夷吾不讓重耳重賂内外以求入非正故也於是夷吾卒而秦納重耳則圉何敢校焉故雖伐晉不書以為苟宜納則伐無足議也齊桓公長衞姬生武孟少衞姬生惠公鄭姬生孝公葛嬴生昭公密姬生懿公宋華子生公子雍則無虧最貴且長也桓公嘗屬孝公於宋襄公又許立武孟既而五公子皆求立桓公不能定桓公卒國人立無虧孝公奔宋於是宋公以諸侯伐齊而齊人為之殺無虧則伐齊不可不書矣無虧既死而齊人又不勝四公子之徒者既廢長立少則四公子皆君也故又書宋及齊戰則不順者非一人矣外伐不月於是特書月以異之然猶不書所納者桓公嘗屬之譏不在所納也是故孝公出入皆不書而無虧不得比齊舍歸惡於桓公也胡侍講曰桓公嘗屬孝公於襄公以為大子矣則何以不可立乎曰不能制命雖天王欲撫鄭伯以從楚春秋猶以大義裁之而不與也桓公乃欲以私愛亂長幼之節其可哉其說正矣而不本於書法故陳氏考筆削之旨以為宜納不書然陳氏知凡納有書有不書而不知所納有正有不正又不知春秋存䇿書之大體則外納不可與内納一例求也左氏與公子爭國者皆推其母之貴賤及其君父好惡之私晉人欲立長君論九等之班甚詳則諸侯立子之制卿大夫非不能言之也陳氏乃謂宋襄之誼僅異於魯莊趙盾蓋兩失之以宋及齊說在變文篇莊五年冬公㑹齊人宋人陳人蔡人伐衞六年夏六月衞侯朔入于衞成十八年夏楚子鄭伯伐宋宋魚石復入于彭城以上書伐書入者一書伐書復入者一五國伐衞納惠公也經書㑹伐而不書納者朔譖殺急壽而立國人不君出奔于齊者八年五國抗王命踰三時而卒納之故書㑹伐以責諸侯之不臣書朔入以見其簒各當其罪也楚子鄭伯伐宋楚子辛鄭皇辰同伐彭城納宋魚石向為人鱗朱向帶魚府經書伐宋而不書納者楚既得鄭而伐宋志在盡征諸侯魚石以私憾出奔而欲據邑叛君以害其宗國故楚子書伐宋而魚石書復入各書其重也文十四年秋晉人納捷菑于邾弗克納昭十二年春齊高偃帥師納北燕伯于陽哀二年夏晉趙鞅帥師納衞世子蒯聵于戚以上書弗克納者一納于邑者二邾文公元妃齊姜生定公二妃晉姬生捷菑則貜且正也趙盾納不正故邾人得而辭之齊景貪而無信以燕君與燕人市然後納諸燕邑衞輒禰其祖而自絶于父晉卿方内叛故趙鞅不能伐衞而納于衞邑納于邑者内弗受也與弗克納同故皆書之譏在納者而趙盾獨書人晉失為盟主之道也僖二十五年秋楚人圍陳納頓子于頓宣十一年冬十月楚人殺陳夏徵舒丁亥楚子入陳納公孫寧儀行父于陳以上書楚納者二楚圍陳納頓子于頓必頓子迫于陳而奔楚也蓋其事與襄四年陳圍頓同而不見于經傳楚子入陳納二卿討夏徵舒弑君也皆中國無伯之事故曰圍曰入曰納悉書之四十二内邑叛不書鄆潰則書之昭二十九年冬十月鄆潰以上書内邑潰一據獲麟後書成叛則内邑叛史所必書唯叛者微故名氏不登于䇿然昭十二年南蒯以費叛定十年侯犯以郈叛十三年公山不狃叔孫輒帥費人以襲魯論語亦言公山弗擾以費叛經皆不書者三家分魯而有之家臣因得據其邑以張公室為名乃叛其大夫而非叛君也昭公見出於季氏齊侯取鄆以居公四年于此矣公如晉次于乾侯而鄆潰者季氏誘鄆人脅使逃散則公不得復居魯地乃大夫據國叛君之事故特書之春秋屬辭卷八
