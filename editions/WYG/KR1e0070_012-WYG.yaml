body:
  text: 春秋屬辭巻十二元趙汸撰謹内外之辯第五三曰謹内外之辯中國之視外裔猶天地冠屨也而又何謹焉信大義于天下也昔先王肇九州分五服内外之限綦嚴矣周失其綱天下無伯于是荆人始横齊桓起而懲創之其威稍戢然自晉伯中衰楚君將皆稱君其大夫將皆稱大夫疑於中國矣入陳圍鄭平宋而晉人以為天方授楚不可與爭盟於蜀而東方諸侯莫敢不至盟於宋而南北之勢成諸侯交相見矣申之㑹十有一國宋世子與淮夷俱繼小國之君於是伐吳滅陳滅蔡皆假討賊之義以號於天下俄而復陳與蔡天下知有楚而已是故終春秋書楚事無一不致其嚴者所以信大義於天下也以此坊民後世猶有謂春秋與楚以伯者則先王經世之略不明久矣葢楚至東周始彊於四夷僭王其國志吞中夏故伯者之興得以攘却為功世雖無桓文而中國之大義不可一日而不信也凡春秋書楚事與中國異辭者悉著於篇而吳越與徐以類見焉二十五荆始伐中國以號舉莊十年秋九月荆敗蔡師於莘以蔡侯獻舞歸傳息侯使謂楚文王曰伐我吾求救於蔡而伐之楚子從之十四年秋七月荆入蔡傳蔡哀侯為莘故繩息媯以語楚子楚子如息以食入享遂滅息以息媯歸生堵敖及成王焉未言曰吾一婦人而事二夫其又奚言楚子以蔡侯滅息遂伐蔡十六年秋荆伐鄭傳鄭伯自櫟入緩告於楚秋楚伐鄭及櫟二十八年秋荆伐鄭傳楚令尹子元以車六百乗伐鄭陳氏曰子元不書人楚未有大夫也以上楚君大夫將同稱荆者四楚自武王熊通僭王竊號吞滅漢陽諸姬子文王熊資莊四年立滅鄧滅息魯史不書無告命也敗蔡入蔡再伐鄭皆以號舉君臣同辭與於越勾吳等不得比中國大夫將稱人此中國外裔之常分而策書之舊章也故程伯子曰春秋謹内外之辯二十六中國有伯楚君大夫將同稱人惟㑹得稱君僖元年秋楚人伐鄭傳鄭即齊故也二年冬楚人侵鄭三年冬楚人伐鄭五年秋楚人滅弦傳楚鬭榖於莬滅弦見榖於莬書人六年秋楚人圍許傳秋楚子圍許以救鄭見楚子書人十一年冬楚人伐黄十二年夏楚人滅黃十五年春楚人伐徐冬楚人敗徐於婁林二十年冬楚人伐隨傳鬭穀於莬伐隨二十二年冬十一月己巳朔宋公及楚人戰於泓宋師敗績傳十一月己巳朔宋公及楚人戰于泓宋師敗績公傷肢門官殱焉丙子晨鄭文夫人芉氏姜氏勞楚子於柯澤楚子使師縉示之俘馘丁丑楚子入享於鄭二十三年五月宋襄公卒傷於泓故也傳見楚子君將稱人宋公身敗稱師二十三年秋楚人伐陳傳楚成得臣帥師伐陳二十五年秋楚人圍陳納頓子於頓傳楚令尹子玉追秦師弗及遂圍陳納頓子於頓二十六年秋楚人滅䕫以䕫子歸傳楚成得臣鬭宜中帥師滅䕫冬楚人伐宋圍緡傳楚令尹子玉司馬子西帥師伐宋圍緡二十七年冬楚人陳侯蔡侯鄭伯許男圍宋傳冬楚子及諸侯圍宋二十八年三月晉侯入曺執曺伯畀宋人楚子入居于申使申叔去穀使子玉去宋傳言楚子親圍宋踰年而後入居於申以避晉侯見序諸侯上而稱人者楚子也陳蔡鄭許皆楚之屬而魯亦附楚故史序楚子諸兵列諸侯上至夫子修春秋乃去爵稱人左氏雖不能顯皆發此義而凡經書人而傳志可考其將為君為卿者謹錄之則未為無所見也杜氏乃謂楚子恥不得志以微者告則非惟不達經㫖亦非左氏之意矣自楚見經至伐麋以前未有稱君大夫將者豈皆以微者告邪經稱楚人於諸侯上而傳言楚子君將稱人之法甚明為左氏學者必謂君臣不可同貶稱人其失在以詳畧為襃貶故也二十八年春楚人救衛夏四月己巳晉侯齊師宋師秦師及楚人戰於城濮楚師敗績傳夏四月戊辰晉侯宋公齊國歸父崔天秦小子憖次于城濮己巳晉師陳於莘北胥臣以下軍之佐當陳蔡子玉以若敖之六卒將中軍子西將左子上將右陳蔡奔楚右師潰狐毛狐偃以上軍夾攻子西楚左師潰楚成得臣書人楚未有大夫將也文三年秋楚人圍江四年秋楚人滅江五年秋楚人滅六傳楚成大心仲歸帥師滅六九年春楚人伐鄭傳范山言於楚子曰晉君少不在諸侯北方可圖也楚子師於狼淵以伐鄭囚公子堅公子尨及樂耳鄭及楚平以上楚君大夫將同稱人者二十二楚自成王頵立始聘於魯稱荆人自僖元年伐鄭始稱楚人葢初號楚也魯既通其好命同其㑹盟故史避其僭號假子爵以紀事而圍許雖君將稱人者世方有伯主以討其猾夏之罪則天子并削其子爵明當一切正以王法革其偽號不得從史氏隠避假借之文比中國君將稱君也既而圍陳納頓子滅夔伐宋圍緡而魯亦以楚師伐齊取榖楚申公叔侯戌之楚子又合陳蔡鄭許之君以圍宋時曹衛皆已服於楚使非晉文之興則天下盡為楚矣故圍宋之役楚子雖主兵序諸侯上而去爵稱人者不使荆蠻主諸侯與中國伯者同也晉伯中衰楚圖北方其君親將以伐鄭而猶不得稱爵者諸夏之心猶不忘晉則不使楚人一日得與中國抗衡也葢楚既僭王則周之叛臣也吞滅諸夏則中國之賊也故春秋當中國有伯則楚君大夫將皆稱人明中國之大義以信桓文之志也僖十九年冬㑹陳人蔡人楚人鄭人盟於齊二十一年春宋人齊人楚人盟於鹿上秋宋公楚子陳侯蔡侯鄭伯許男曹伯㑹於盂執宋公以伐宋以上書楚人序陳蔡下盟者一序宋齊下盟者一書楚君序宋公下陳蔡上㑹者一四國皆大夫楚亦以微者㑹故序陳蔡之下其志則未可知也蔡服楚已久陳蔡匹也楚固以屬國視之宋公雖序楚上卒執宋公以伐宋則强楚之情見矣經於將兵稱人既變文以示義則盟㑹從其恒稱以見實也二十七中國無伯則楚君將稱君略之而後稱人疑於討賊稱師文十年冬楚子蔡侯次於厥貉傳陳侯鄭伯㑹楚子於息冬遂及蔡侯次於厥貉将以伐宋宋公逆楚子勞且道以田孟諸十一年春楚子伐麋陳氏曰楚初書君將也宣元年秋楚子鄭人侵陳遂侵宋三年春楚子伐陸渾之戎四年冬楚子伐鄭九年冬楚子伐鄭十年冬楚子伐鄭十一年冬十月楚人殺陳夏徵舒丁亥楚子入陳納公孫寧儀行父於陳十一年春楚子圍鄭夏六月乙卯晉荀林父帥師及楚子戰于邲晉師敗績冬十二月戊寅楚子滅蕭十二年夏楚子伐宋十四年秋楚子圍宋為下葬月成十五年夏楚子伐鄭十六年六月甲午晦晉侯及楚子鄭伯戰於鄢陵楚子鄭師敗績十八年夏楚子鄭伯伐宋宋魚石復入於彭城襄九年冬楚子伐鄭十一年秋楚子鄭伯伐宋二十四年夏楚子伐吳冬楚子蔡侯陳侯許男伐鄭二十六年冬楚子蔡侯陳侯伐鄭昭四年秋七月楚子蔡侯陳侯許男頓子胡子沈子淮夷伐吳執齊慶封殺之遂滅賴五年冬楚子蔡侯陳侯許男頓子沈子徐人越人伐吳十一年夏四月丁巳楚子䖍誘蔡侯般殺之於申十二年冬楚子伐徐十六年春楚子誘戎蠻子殺之定十五年二月辛丑楚子滅胡以胡子豹歸哀元年春楚子陳侯隨侯許男圍蔡以上楚君將稱君者二十八晉靈不君趙盾非伯者之佐晉不足以主夏盟故春秋於靈公之世盟㑹毎略諸侯不序以明中國無伯而楚君將稱君於是始故次厥貉伐麋以後無役不稱爵而伐鄭伐吳稱爵主兵無異中國之伯者矣葢中國有伯則春秋略之以正其名中國無伯則春秋詳之以著其實不正其名則不足以信攘却之義不著其實則不足以見蠻荆之彊然泓之戰宋公稱爵而楚子稱人不使蠻荆之君得抗中國諸侯也邲之戰楚子稱爵而荀林父稱氏名見蠻荆侵叛乃中國之所得討也泓之戰宋公身傷以卒而但書師敗績為中國諱也鄢陵之戰直書楚子敗績治其罪也然則雖書君將而與待中國諸侯伯主之法不可同年而語矣學者見左傳孟子戰國策皆有五伯之文而荀卿書以齊桓晉文楚莊吳闔廬越勾踐為五伯因欲退闔廬勾踐而進宋襄秦穆以當之據傳記齊國佐之言曰四王之王也樹徳而濟同欲焉五伯之伯也勤而撫之以役王命以五伯對四王言與孟子以五伯對三王言不異則杜氏謂夏伯昆吾商伯大彭豕韋周伯齊桓晉文者近之若夫楚莊吳闔廬越勾踐乃中國大義所當攘却而所謂勤而撫之以役王命者於宋襄秦穆亦何取焉傳又言秦穆公遂伯西戎孟子亦言其用百里奚而伯此葢循習流俗矜尚之辭如稱當時大國為萬乗之君相類皆因人所恒言而言之不可通於春秋至其論春秋之事惟曰齊桓晉文而已文十六年秋楚人秦人巴人滅庸傳庸人帥羣蠻以叛楚楚使廬戢黎侵庸七遇皆北楚子乗馹㑹師於臨品秦人巴人從楚師羣蠻從楚子盟遂滅庸宣五年冬楚人伐鄭傳楚子伐鄭六年冬楚人伐鄭取成而還不書以上楚君滅稱人者一自伐麋為楚書君將之始以後書君將皆詳其吞噬中國之罪故凡有事於蠻夷皆略稱人伐鄭書人者一去年冬楚子伐鄭不服至是又親伐故用一事再見例略之昭八年冬十月壬午楚師滅陳執陳公子招放之於越殺陳孔奐葬陳哀公傳楚公子棄疾帥師奉孫吳圍陳十一年傳楚王奉孫吳以討於陳曰將定而國陳人聴命而遂縣之八年傳又言用穿封戌為陳公侍飲酒於王十一年冬十一月丁酉楚師滅蔡執蔡世子有以歸用之傳楚子滅蔡用隠大子於岡山城陳蔡不羹使棄疾為蔡公以上楚君滅國書師者二據下言執言放言殺言𦵏言叔弓㑹楚子於陳則上書師為楚子而非棄疾明矣下言執言以歸用之則上書師為楚子而亦非棄疾矣傳記楚子在師事亦以明書師為非棄疾也葢此二事與入陳殺夏徴舒納公孫寧儀行父相類而楚䖍懐惡挾詐吞滅二國與厥祖討賊存陳不同故皆變文稱師以異之以其乗晉伯中衰而爭諸侯故得從恒稱以見實以其因中國無伯而滅陳蔡故又變文以示義也二十八楚君將稱君而後大夫將稱大夫略之則稱人文十二年夏楚人圍巢傳楚令尹子孔執舒子平及宗子遂圍巢宣三年夏楚人侵鄭八年夏楚人滅舒蓼傳楚為衆舒叛故伐舒蓼滅之楚子疆之及滑汭盟吳越而還冬楚師伐陳成二年冬楚師鄭師侵衛傳楚子重為陽橋之役以救齊曰君弱羣臣不如先大夫師衆而後可乃悉師王卒盡行彭名御戎蔡景公為左許靈公為右冬楚師侵衛遂侵我師於蜀侵及陽橋以上楚大夫將稱人者三稱師者二楚未書大夫將也成六年秋楚公子嬰齊帥師伐鄭七年秋楚公子嬰齊帥師伐鄭九年冬楚公子嬰齊帥師伐莒庚申莒潰楚人入鄆襄元年秋楚公子壬夫帥師侵宋三年春楚公子嬰齊師師伐吳五年冬楚公子貞帥師伐陳七年冬楚公子貞帥師圍陳八年冬楚公子貞帥師伐鄭十年夏楚公子貞鄭公孫輒帥師伐宋冬楚公子貞帥師救鄭十二年冬楚公子貞帥師侵宋十四年秋楚公子貞帥師伐吳十八年冬楚公子午帥師伐鄭二十五年秋楚屈建帥師滅舒鳩昭六年秋楚薳罷帥師伐吳十一年夏楚公子棄疾帥師圍蔡定十四年二月辛巳楚公子結陳公孫佗人帥師滅頓以頓子牂歸哀十年冬楚公子結帥師伐陳十三年夏楚公子申帥師伐陳以上楚大夫將書大夫者十九公子嬰齊莊王之弟字子重為令尹共王幼始悉師救齊侵衛及魯蔡許之君乗王車為左右故但書師於是㑹魯侯盟十一國於蜀四年中再伐鄭一伐莒入鄆而晉遣鍾儀求成於楚葢楚之征伐自大夫出由嬰齊始時子反為司馬傳言二卿相惡鄢陵之敗共王引過而子重責子反死之至伐吳覆師喪邑以心疾卒壬夫字子辛代子重為令尹傳言公子申為右司馬多受小國之賂以逼子重子辛見殺楚人討陳叛故曰由令尹子辛實侵欲焉乃殺之其柄臣專利相傾如此故楚不競公子貞莊王子也字子囊代子辛為令尹而晉人懼與晉爭鄭乞師於秦以伐宋伐晉而卒失鄭伐吳喪師還卒公子午莊王子也字子庚代公子貞為令尹三年不出師曰吾以利社稷也鄭子孔欲叛晉而起楚師以去諸大夫子庚弗許楚子欲伐鄭子庚請先嘗之屈建字子木代薳子馮為令尹與晉趙孟相知為宋之盟詐晉而駕焉以爭先故雖滅舒鳩書其帥師薳罷字子蕩公子圍簒立而吞滅諸夏以薳罷為令尹公子干為右尹公子棄疾共王第五子康王靈王之弟也使晉過鄭見鄭伯及諸大夫有禮皆知其將為王滅陳蔡為蔡公因陳蔡之人以入楚既為王復陳蔡公子結字子期公子申字子西皆昭王之兄也成十七年冬楚人滅舒庸傳楚公子櫜師襲舒庸滅之十八年冬楚人鄭人侵宋傳十一月楚子重救彭城伐宋晉侯師於台谷以救宋遇楚師於靡角之谷楚師還昭十七年冬楚人及吳戰於長岸傳楚令尹陽丐司馬子魚吳公子光定二年秋楚人伐吳傳楚囊瓦伐吳師於豫章四年秋楚人圍蔡冬十一月庚午蔡侯以吳子及楚人戰於柏舉楚師敗績傳蔡侯吳子唐侯伐楚三戰子常知不可欲奔十一月庚午二師陳於柏舉夫槩王以其屬五千先擊子常之卒子常之卒奔楚師亂吳師大敗之哀九年夏楚人伐陳以上楚大夫將稱人者七葢有微㫖子重帥師書於經者詳矣侵宋避晉侯而還故略之櫜師囊瓦陽丐未嘗為中國寇患故有事變文但書人圍蔡伐陳𫝊不言其人自昭而後惟楚君大夫將奪其恒稱所以外之也其嬰齊伐莒入鄆一事再見稱人乃史例二十九楚君大夫主盟㑹悉從其恒稱惟公及大夫盟則人之宣十一年夏楚子陳侯鄭伯盟於辰陵成二年十一月公㑹楚公子嬰齊於蜀丙申公及楚人秦人宋人陳人衛人鄭人齊人曹人邾人薛人鄫人盟於蜀襄二十七年夏叔孫豹㑹晉趙武楚屈建蔡公孫歸生衛石惡陳孔奐鄭良霄許人曹人於宋秋七月辛巳豹及諸侯之大夫盟於宋昭元年春叔孫豹㑹晉趙武楚公子圍齊國弱宋向戌衛齊惡陳公子招蔡公孫歸生鄭罕虎許人曹人於虢四年夏楚子蔡侯陳侯鄭伯許男徐子滕子頓子胡子沈子小邾子宋世子佐淮夷㑹於申以上書楚子陳侯鄭伯盟者一公㑹楚臣而及諸侯大夫盟者一内臣㑹晉楚南北之大夫盟者一會者一楚君專合南北諸侯者一新城之後晉楚交爭陳鄭晉加兵於陳者二於鄭者四楚加兵於陳者二於鄭者五陳侯鄭伯既與楚子為辰陵之盟而陳侯即如晉鄭亦徼事於晉故楚子入陳明年圍鄭春秋書之以見中國無伯之禍至於如此而陳鄭之暫屈於楚非其心也陳氏乃謂序楚子於陳侯鄭伯之上初與楚以伯也則可謂反乎春秋之義矣楚君在幼而嬰齊救齊侵衛以為蜀之盟楚師在境而公親㑹嬰齊以及諸侯大夫盟諸侯大夫畏晉而竊與楚盟故人外大夫而不沒公㑹書嬰齊而盟稱人參譏之也凡公與外大夫盟譏在内則不諱公也趙武弭兵之言成於向戌遂以晉楚之從交相見而楚人刼晉以先歃楚誠未離乎蠻荆也公子圍讀舊書加之牲上晉不復較葢於是中國無伯矣而春秋書必先晉不以楚之彊而易内外冠履之義也陳氏又謂此南北二伯也夫伯者以合諸侯安中夏尊王室為名義者也晉既以諸侯與楚而甘出其下則晉自知不能以伯矣楚無列於王室以并吞諸夏為雄何伯之云是又失伯者所以得名之實矣楚圍弑君竊國求諸侯於晉大國若齊秦次國如魯衛小國若曹邾皆不能致宋太子至而後則東諸侯終未肯以事晉者而事楚也雖其臣舉六王二公之事其君欲用齊桓而椒舉已知其不濟宋鄭大夫亦幸其不能為吾患矣則雖侈然一時亦何能為哉春秋於楚君書爵終始志外裔之彊而已後世學者乃以五伯之説亂春秋之㫖可乎三十荆始來聘稱人莊二十三年夏荆人來聘以上荆來聘書人者一荆之始聘未能成禮魯不廟受故不稱君不言使然不可但言荆來聘故書人與前稱荆皆従史文也欲見筆削本末故列於此三十一楚臣來盟於師稱名氏不言使來獻捷言使不稱君必中國無伯而後來聘稱君使僖四年夏楚屈完來盟於師盟於召陵以上楚臣來盟不稱使者一齊桓伯功莫先於服楚春秋以楚能服義來盟故其臣始得以名氏書然齊國佐如師稱使屈完不稱使何也使云者自敵以上之所命也蠻荆僭王竊號不可以敵命之故削其君臣常辭不得比中國兵交使在其間者也僖二十一年冬楚人使宜申來獻捷以上楚臣來獻捷稱人使者一楚子既執宋公以伐宋欲致魯侯來㑹故使人獻捷以威脅之於是公㑹盟於薄釋宋公此春秋之大變故存其來獻捷之文以見實而楚子去爵稱人不得比中國伯主來獻戎捷者同稱君也文九年冬楚子使椒來聘襄三十年春王正月楚子使薳罷來聘以上楚使來聘稱君使者二凡來聘不月故楚子使椒來聘亦不月薳罷來聘獨月者晉至悼公每以聘報朝襄公屬朝楚而還嫌於以聘報朝若中國盟主故特月以别之見中國無伯魯雖詘志朝楚而楚終不得以盟主之禮行乎諸侯也傳謂此來聘為通嗣君非也諸侯新君好命未通則有通嗣君之禮楚亦安能以此交諸侯觀楚人使公親襚而止公送葬則其所以待諸侯者可見矣魯君以前年十一月如楚聞康王卒猶徃朝其嗣君踰年四月送葬乃得歸又何通嗣君之有葢楚人習聞晉悼公之事而為之與椒之來聘亦異矣三十二楚君㑹而執中國諸侯不别言執之者僖二十一年秋宋公楚子陳侯蔡侯鄭伯許男曹伯㑹於盂執宋公以伐宋以上楚君會而執諸侯者一凡㑹執必别言執之者晉侯㑹諸侯同盟於戚晉侯執曹伯歸於京師此伯主討有罪之文也楚子諸侯淮夷㑹于申楚人執徐子此外裔相執之文也楚子詐宋公于㑹而執之以伐宋盟諸侯故削其楚人執之文蒙上文諸侯言之既非外裔相執之比亦不使與中國盟主執諸侯同文也伐吴執齊慶封亦同三十三楚君殺中國之君書名其自相殺不名昭十一年夏四月丁巳楚子䖍誘蔡侯般殺之於申十六年春楚子誘戎蠻子殺之以上楚君誘殺中國之君一既名蔡侯以謹其終又名楚子以正其罪以外裔殺中國之君故詳之也楚君誘殺戎君者一皆不名以外裔自相殺則略之也是故一日一不日三十四諱外裔執王臣變執言伐諱外裔獲中國之君變獲言以歸隠七年冬戎伐凡伯于楚丘以歸莊十年秋九月荆敗蔡師於莘以蔡侯獻舞歸以上戎執王臣言伐者一公羊傳曰執之也其言伐之不與外裔之執中國也據獲麟後有書執其君者則史書戎執王臣必無隠避於是夫子改書伐為中國諱也荆獲蔡侯言以歸者一公羊傳曰獲也不言其獲不與外裔之獲中國也是亦諱辭又案此戰也不言戰而言敗者榖梁傳曰外裔中國不言戰也二傳此類必有所受葢既變獲言以歸則不得復言戰也三十五吳征伐恒舉號惟為中國討罪得稱君成七年春吳伐郯秋吳入州來襄二十五年十二月吳子遏伐楚門于巢卒昭十三年冬吳滅州來十七年冬楚人及吳戰於長岸傳楚令尹陽丐吳公子光二十三年秋七月戊辰吳敗頓胡沈蔡陳許之師於雞父胡子髠沈子逞滅獲陳夏齧傳吳子以罪人三千先犯胡沈與陳中軍從王光帥右掩餘帥左二十四年冬吳滅巢三十年冬十二月吳滅徐徐子章羽奔楚傳吳子執鍾吾子遂伐徐三十二年夏吳伐越定四年冬十一月庚午蔡侯以吳子及楚人戰於柏舉楚師敗績庚辰吳入郢哀六年春吳伐陳八年春吳伐我傳吳伐我王舍于庚宗遂次于泗上十年春公㑹吳伐齊傳公㑹吳子冬吳救陳十一年五月公㑹吳伐齊傳公㑹吳子伐齊甲戌齊國書帥師及吳戰于艾陵齊師敗績獲齊國書以上吳伐四伐我一公㑹伐二戰三敗一入二滅三救一皆以號舉君臣同辭雖我君㑹伐亦舉號而已遏伐楚從卒例唯柏舉之戰為中國復讎討罪故得稱爵而書蔡侯以之其戰與入又皆書日以别於外裔自相戰與入者亦外裔而中國則中國之之義也楚為中國患有自來矣而始終受其荼毒者惟蔡為甚城濮之役欒貞子曰漢陽諸姬楚實盡之思小惠而忘大恥不如戰也吳人亦謂隨人曰周之子孫在漢川者楚實盡之天誘其衷致罰於楚而君又竄之周室何罪然自齊桓晉文之盛而不能加兵於其國都雖劉文公合十八國之師於召陵而不能一問其罪卒之攄中國神人之積憤者吳也是以聖人特詳焉戰言吳子而入舉號者一役再有事則從其恒稱也雖然此一役也滅國可興文武之境土可復惜乎吳無君臣不足以居其功而晉衰已甚劉巻既卒無能起而收之者春秋徒致意焉而已爾三十六中國㑹而㑹吳恒舉號雖吾君大夫特㑹之舉號必以諸侯之禮接而後稱君成十五年冬十一月叔孫僑如㑹晉士燮齊髙無咎宋華元衛孫林父鄭公子鰌邾人㑹吳於鍾離襄五年夏仲孫蔑衛孫林父㑹吳於善道秋公㑹晉侯宋公陳侯衛侯鄭伯曹伯莒子邾子滕子薛伯齊世子光吳人鄫人於戚十年春公㑹晉侯宋公衛侯曹伯莒子邾子滕子薛伯杞伯小邾子齊世子光㑹吳於柤十四年春王正月季孫宿叔老㑹晉士匄齊人宋人衛人鄭公孫蠆曹人莒人邾人滕人薛人杞人小邾人㑹吳於向哀六年夏叔還㑹吳於柤七年夏公㑹吳於鄫十二年夏公㑹吳於槖臯十三夏公㑹晉侯及吳子於黄池以上内大夫㑹諸侯大夫又㑹吳者二魯衛大夫㑹吳者一公㑹諸侯有吳人者一公㑹諸侯又㑹吳者一内臣特㑹者一公特㑹者二㑹晉侯及吳子者一凡稱吳皆其君外裔舉號之例也吳雖泰伯仲雍之後武王所封然文身僭號不可以中國諸侯之禮接故諸國自為㑹而後㑹之史文未得比楚君稱子與諸侯序也稱人者其大夫以外臣禮序齊世子下則不殊也柤之㑹傳曰㑹吳子夀夢也則㑹向為諸樊哀公之㑹皆夫差也鄫之㑹吳人曰魯牢晉大夫過十吳王百牢不亦可乎説苑載晏子使吳行人曰天子請見晏子僦然者三曰臣受命弊邑之君將使於吳王之所不佞而迷惑入于天子之朝敢問吳王惡乎存然後吳王曰夫差請見見以諸侯之禮其禮文不典皆此類也故凡大夫之㑹不月而鍾離與向特月以異之黄池兩主之㑹故得稱爵傳言秋七月辛丑盟吳晉爭先吳人曰於周室我為長晉人曰於姬姓我為伯乃先晉人吳人將以公見晉侯子服景伯對使者曰執事以伯召諸侯而以侯終之葢吳至是始竊侯伯之禮以㑹諸侯而魯史亦假子爵以記其事也外傳載夫差言周室卑約貢獻莫入晉負衆庶不式諸戎狄楚秦以力征一二兄弟之國晉令董褐對曰君掩王東海以淫名聞天子君有短垣而自踰之況蠻荆則何有於周室夫命圭有命固曰吳伯不曰吳王君若無卑天子而干其不祥而曰吳公孤敢不順從吳王許諾乃退就幕而㑹吳公先歃晉侯亞之其言先歃與左氏不同載書降稱吳公理或然也戚之㑹吳晉嘗盟矣不書黄池復盟亦不書者陳氏曰為晉諱也吳晉之盟春秋終諱之不以吳晉同主盟也葢自晉厲公始通吳於上國而悼公尤汲汲於㑹吳皆欲以吳撓楚魯昭違禮昬吳亦由晉衰欲倚以敵齊楚也而皆不稽其終是時魯賦於吳八百乗邾賦於吳六百乗徴百牢藩衛侯之舍囚子服景伯長此安窮是故春秋於吳晉之盟終諱之然吳入越不書而再書越入吳固知吳之將為沼矣三十七越舉號從其恒稱昭五年冬楚子蔡侯陳侯許男頓子沈子徐人越人伐吳定五年夏於越入吳十四年五月於越敗吳于檇李吳子光卒哀十三年夏於越入吳以上越人從楚伐一敗一入二於越勾吳皆南蠻之號也然春秋書吳者以武王嘗封之則吳其國名也越之先禹之苗裔始封於㑹稽曰於越者以其自號舉之不書越者非其封國也傳曰越大夫常夀過帥師㑹楚子於瑣則伐吳稱人者常夀過也凡四裔從中國序列則稱人以便文若邢人狄人伐衛戚之㑹稱吳人是也故便文則曰越人復其恒稱則曰於越陳氏謂常夀過得稱人若進之者誤矣定十四年傳言吳伐越越子勾踐禦之陳於檇李患吳之整是皆陳也而不書戰哀十三年傳記六月丙子越子伐吳乙酉戰丙戌復戰大敗吳師獲太子友王孫彌庸夀於姚丁亥入吳而經不書爵不書戰入又不書月與吳入郢特異者越與吳世相讎則以外裔自相攻之法治之而已自晉通吳以撓楚而楚卒覆於吳楚亦連越以伐吳而吳屢覆於越然外傳記范蠡之言曰吾先君固周室之不成子也濵於東海之陂黿鼉之與處而鼃黽之與渚余雖靦然而人面哉吾猶禽獸也則越之所以疆於蠻吳者可知矣三十八徐見敗伐國皆以號舉國滅則書君奔而名之僖三年夏徐人取舒十五年冬楚人敗徐於婁林文七年冬徐伐莒以上書徐人一敗徐一徐伐一敗不言師侵伐舉號皆外裔恒辭然經書徐取舒得稱人者自公㑹宋人齊人伐徐徐已事齊以其即諸夏而取國於蠻荒故得稱人齊桓卒徐復通楚以其從蠻荆而伐中國故復其恒稱葢舒乃楚之微屬而莒世從晉内外之義辯矣然當徐服齊時見敗於楚亦不得稱師者徐之服楚久矣未可以頓革也史記言徐出柏翳與秦同祖然三監流言時一叛伯禽撫封時再叛費誓稱徐戎則非中國諸侯比矣徐偃王事史記後漢書皆言在周穆王時既為天子所伐走死失國民戴其嗣君如初而駒王復彊然後漢書云楚文王滅之葢本楚辭荆文悟而徐亡事與春秋經傳皆不合葢其先彊僭不異吳楚東周後始微弱也檀弓記邾考公之喪徐君使容居來弔欲用諸侯相於禮親含有司拒之容居對曰昔我先君駒王西討濟於河無所不用斯言也徐滅於吳楚僅存之至是已再世而蠻荒僭竊之制猶未能盡革則齊桓之時雖來即諸夏未容一切以中國諸侯之禮治也昭三十年冬十二月呉滅徐徐子章羽奔楚以上國滅君奔稱名者一春秋國滅君奔未有書名者而徐子獨名以奔楚也徐暫事齊後世仍服於楚申之㑹徐子在列楚人以其吳出也執之乾谿之役又圍之以懼吳則徐葢兩事吳楚卒以違吳人執亡公子之命見滅於吳雖楚為出師救之無及也楚為中國患天將假手於吳以覆之而徐猶惓惓於楚以取滅亡則其世服蠻荆之效也故因其奔楚特書名以異之明不得與弦子温子國滅於外裔而君奔中國者比也徐雖以號舉然其先本古之建國嘗服事於周是以聖人猶詳之若晉滅陸渾陸渾子奔楚則不復書進不得齒於諸夏退不忍終棄諸蠻荒此春狄經世之權衡也春秋屬辭卷十二
