body:
  text: 春秋屬辭卷一元趙汸撰存策書之大體第一策書者國之正史也傳述祝佗之言謂魯公分物有備物典策而韓宣子見易象與魯春秋曰周禮盡在魯矣班固藝文志因謂魯周公之國禮文備物史官有法杜元凱亦以備物典策為春秋之制而孔穎達以為若今官程品式之類皆謂魯之舊史有周公遺法在焉自伯禽以來無大喪亂史官前後相蒙有非他國可及者然古者非大事不登於策小事則簡牘載之故曰國之正史也今以春秋所書準西周未亂之時其書於策者不過公即位逆夫人朝聘會同崩薨卒葬禍福告命雩社禘嘗蒐狩城築非禮不時與夫災異慶祥之感而一國紀綱本末略具善惡亦存其中蓋策書大體不越乎此而已東遷以來王室益微諸侯背叛伯業又衰外裔縱横大夫専政陪臣擅命於是伐國滅國圍入遷取之禍交作弑君殺大夫奔放納入之變相尋而策書常法始不足盡其善惡之情矣故孔子斷自隱公有筆有削以寓其撥亂之志其所謂策書之大體而一國本末具焉者皆有筆而無削使不失魯國正史之常所謂存策書之大體者也夫春秋當代之史也使仲尼筆削之際不復存其大體魯之君臣能無駭乎是故有筆有削以行其權有筆無削以存其實實存而權益達權達而實愈明相錯以暢其文相易以成其義者也然自左氏不知有筆削之旨為公羊學者遂以春秋為夫子博采衆國之書通脩一代之史者於是襃貶之說盛行又有以為有貶無襃者又有以一經所書皆為非常而常事不書者有謂黜周王魯者有謂用夏變周者其失在不知有存策書大體之義而已說經昧其源委一至是哉故今特取聖人所存有筆而無削者悉著於篇其舊說之甚失義類者亦或離析而辯正焉存策書之大體第一之一一嗣君踰年即位書元年春王正月公即位不行即位禮不書即位告朔朝正書王正月隱公元年春王正月桓公元年春王正月公即位莊公元年春王正月閔公元年春王正月僖公元年春王正月文公元年春王正月公即位宣公元年春王正月公即位成公元年春王正月公即位襄公元年春王正月公即位昭公元年春王正月公即位哀公元年春王正月公即位以上書元年春王正月不書即位者四書元年春王正月公即位者七古者天子建諸侯皆得世其爵踐其位臣妾其民人皆有史官以記一國之政令而奉天子之正朔故諸侯薨既殯嗣子定位於柩前踰年正月朔日乃先謁廟以明繼祖還就阼階之位見百官以正君臣國史因書元年春王正月公即位若春秋書桓文宣成襄昭哀是也或有故不行即位禮則不書即位猶朝廟告朔故書王正月若春秋書隱莊閔僖是也隱攝若位不行即位禮莊閔僖以繼弑君不行即位禮桓宣亦繼弑君而行即位禮者桓宣躬負簒逆欲自同於遭喪繼位者以欺天下後世也蓋即位乃已見羣臣故有所隱避則其禮可廢朝廟告朔乃新君見祖禰奉王教之始禮不可廢也此在周人必有故事魯史脩辭亦有成法故杜氏啖氏據周書與春秋經傳定著其說如此而近代說者往往不同有謂以夏時冠周月者夫四時始春終冬所以成歲三代雖正朔不同而正月之必為歲首歲首之為孟春其序皆一定而不可易也今既曰周月則春秋所書正月為建子之月矣謂建子之月為春何夏時之云又有見殷周古書書月則不書時以春秋書月又書時為夫子特筆者蓋古書乃簡牘記言之體得以從略春秋策書國之正史以事繫日以日繫月以月繫時以時繫年蓋三代正史遺法也借令不書時則事有不得書月者當何所繫乎又有以不書公即位為夫子所削者蓋由不信左氏之過左氏知魯史有不書之例而考之不詳於隱公不書即位曰攝也是矣於莊公不書即位曰文姜出故也閔公不書即位曰亂也僖公不書即位曰公出故也不舉其大而舉其細隨事為説而義不相通故說者得以排之唯榖梁謂繼故不稱即位正也先君不以其道終則子弟不忍即位此說必有所傳而學者不能折𠂻故即位一也書亦有罪不書亦有罪而義愈不通矣由學者皆不知有存策書大體之法故其失多類此凡即位必在朔日春秋日事志晦朔此皆不書者夫子所削也存策書之大體但謂不没其事爾若夫事有常變法有異同上下分殊内外勢異猶以日月别之公即位在正月為得常故略之以明變也凡日月法自為一篇見後以創通其義特隨事釋之使相發云二即位不在正月故不書正月定公元年夏六月戊辰公即位以上書六月即位者一凡公不行即位禮亦書正月以猶朝正也是年昭公喪未至嗣子未定魯國無君故自以王三月繫事史雖追書元年以繫前半年之月日實與他公元年不同定公受國於季氏待昭公喪至既殯而後即位故即位在六月亦與他公繼世者異此策書之大體不待筆削而義已明者也夫子以季氏出其君薨又絶其冢嗣喪不得以時反於是魯國無君者半年定公安於得國而不知為之變故凡公即位在正月者皆不日而定之即位獨日以異之蓋不日以為恒則日以為變也公羊氏乃以定無正月為春秋微辭凡二傳不知筆削本末而以意說經失皆類此三歲首必書王月無繫月之事不書王月隱三年王二月四年王二月七年王三月十年王二月桓二年王正月三年正月四年正月五年正月六年正月七年二月八年正月十年王正月十一年正月十二年正月十三年二月十四年正月十五年二月十六年正月十七年正月十八年王正月莊二年王二月三年王正月四年王二月五年王正月六年王正月八年王正月十年王正月十一年王正月十二年王三月十六年王正月十八年王三月十九年王正月二十年王二月二十一年王正月二十二年王正月二十四年王三月二十八年王三月三十年王正月閔二年王正月僖二年王正月三年王正月四年王正月六年王正月八年王正月九年王三月十年王正月十二年王三月十五年王正月十六年王正月十八年王正月十九年王三月二十四年王正月二十五年王正月二十六年王正月三十年王正月三十二年王正月三十三年王二月文二年王二月三年王正月五年王正月八年王正月十年王三月十二年王正月十三年王正月十四年王正月十八年王二月宣二年王二月三年王正月四年王正月九年王正月十一年王正月十六年王正月十七年王正月成三年王正月五年王正月六年王正月七年王正月九年王正月十一年王三月十四年王正月十五年王二月十六年王正月十八年王正月襄二年王正月四年王三月六年王三月八年王正月十一年王正月十二年王三月十四年王正月十六年王正月十七年王二月十九年王正月二十年王正月二十一年王正月二十二年王正月二十三年王二月二十六年王二月二十九年王正月三十年王正月三十一年王正月昭三年王正月四年王正月五年王正月六年王正月七年王正月十年王正月十一年王二月十五年王正月十八年王三月二十年王正月二十一年王三月二十三年王正月二十四年王二月二十六年王正月二十八年王三月三十年王正月三十一年王正月三十二年王正月定元年王三月二年王正月三年王正月四年王二月五年王三月六年王正月七年王正月八年王正月九年王正月十年王三月十五年王正月哀二年王二月四年王二月八年王正月九年王二月十年王二月以上書王正月九十一王二月二十四王三月十九歲首必書王月明奉王朔也事繫正月書王正月正月無事而事繫二月則書王二月正月二月俱無事而事繫三月則書王三月月為繫事書也孔氏曰二月殷之正也三月夏之正也故皆書王以别之呉先生曰此侯國之史故於月上加王若王朝之史則月上不必加王也二說皆得之其十一公元年所書王正月為朝正即位書非常年繫事之比兼他義故不入此例唯定公元年書王三月繫事與常年同即位在六月故也此皆魯史成法也近代或有以書王為夫子特筆者案殷人鍾銘有唯正月王春吉日之文可見時月稱王乃三代恒辭其加王於春又可為改時之證由時月皆王者所改故得上下言之以便文必正史然後王不先春本王者欽奉天時之義也隱公自元年而後無正月榖梁傳曰隱十年無正隱不自正也說者曰隱謙不朝正也案隱元年後書二月繫事三書三月繫事一其他如二年春會戎于濳五年春矢魚于棠九年春宋公衛侯遇垂之類或筆削之法不書月或史本不月榖梁知日月有義而不能辯也若桓公十八年中書正月不書王者十書二月不書王者三則夫子所削也而杜氏以為由王室不頒厯故劉炫規之曰昭公二十三年以後王室有子朝之亂諸侯不知所奉復有何人頒厯何故經皆書王蓋杜氏不知有筆削之義故也如歳首無繫月之事則但書春王為月書既不書月不嫌無王也凡史文皆有其義總說在辭從主人篇四一時無事書首月隱六年秋七月九年秋七月桓元年冬十月九年夏四月秋七月十二年春正月十三年秋七月冬十月十八年秋七月莊四年秋七月五年春王正月十一年春王正月十二年夏四月十三年秋七月十五年冬十月十六年春王正月十八年冬十月十九年春王正月夏四月二十年秋七月二十一年春王正月二十二年夏五月三十年春王正月僖六年春王正月十年秋七月十二年秋七月二十四年春王正月秋七月三十年春王正月三十一年秋七月三十二年春王正月文八年春王正月夏四月十三年春王正月宣六年夏四月冬十月十一年春王正月十二年秋七月十八年夏四月成元年冬十月十年冬十月十一年冬十月十二年冬十月襄二十二年夏四月三十一年春王正月昭十年春王正月十二年秋七月十四年夏四月二十年春王正月二十九年秋七月三十二年秋七月定二年春王正月三年夏四月七年春王正月夏四月冬十月九年春王正月十一年夏四月哀八年秋七月九年冬十月以上無事書四時首月六十歴一時無事則書首月具四時以成歲也公羊傳曰春秋編年四時具然後為年此蓋三代正史遺法春以正月為首夏以四月為首秋以七月為首冬以十月為首或謂春秋書時為夫子所加者謬可知矣唯莊公二十二年書夏五月非首月蓋夫子既削其事因留其時月以備一時見魯史於此本非有闕然不改五月為四月者明其文則史有筆削而無增益也五事之繫日者遇晦朔則書晦朔僖十五年九月己夘晦震夷伯之廟成十六年六月甲午晦晉侯及楚子鄭伯戰于鄢陵僖十六年春王正月戊申朔隕石于宋五二十二年十一月己巳朔宋公及楚人戰于泓以上書晦者二書朔者二其日食書朔别見趙氏曰古史之法應合書日而遇晦朔必書之以為厯數之證六喪以月斷者遇閏則書閏哀五年冬叔還如齊閏月葬齊景公以上書閏者一葬節以月斷合數閏故書閏月也襄二十八年十二月甲寅天王崩乙未楚子昭卒甲寅距乙未四十二日此閏月明矣不書閏者喪事以年斷則不數閏也七凡天災物異無不書外災告則書慶祥唯年豐麟瑞則書隱三年春王二月己巳日有食之桓三年秋七月壬辰朔日有食之既十七年冬十月朔日有食之莊十八年春王三月日有食之二十五年六月辛未朔日有食之二十六年冬十二月癸亥朔日有食之三十年九月庚午朔日有食之僖五年九月戊申朔日有食之十二年春王三月庚午日有食之十五年夏五月日有食之文元年二月癸亥日有食之十五年六月辛丑朔日有食之宣八年秋七月甲子日有食之既十年夏四月丙辰日有食之十七年六月癸卯日有食之成十六年六月丙寅朔日有食之十七年十二月丁巳朔日有食之襄十四年二月乙未朔日有食之十五年秋八月丁巳日有食之二十年冬十月丙辰朔日有食之二十一年九月庚戌朔日有食之冬十月庚辰朔日有食之二十三年春王二月癸酉朔日有食之二十四年秋七月甲子朔日有食之既八月癸巳朔日有食之二十七年冬十二月乙亥朔日有食之昭七年夏四月甲辰朔日有食之十五年六月丁巳朔日有食之十七年夏六月甲戌朔日有食之二十一年秋七月壬午朔日有食之二十二年十二月癸酉朔日有食之二十四年夏五月乙未朔日有食之三十一年十二月辛亥朔日有食之定五年春王三月辛亥朔日有食之十二年十一月丙寅朔日有食之十五年八月庚辰朔日有食之以上日食三十六書日書朔者二十六書日不書朔者七書朔不書日者一不書日不書朔者二左氏傳曰不書日官失之也天子有日官諸侯有日御則其意謂王朝日官失之非指魯人明矣公羊傳曰某月某日朔日有食之者食正朔也其或日或不日或失之前或失之後失之前者朔在前也失之後者朔在後也蓋以為司厯失之致日食不在正朔故春秋削其朔日之謬者杜氏釋例以長厯推校經傳明隱三年二月己巳是二月朔不書朔史失之又與左氏日官失之者相違然長厯所推春秋日食亦不盡得不可據以釋經漢書律厯志叙西漢日食多在晦亦有先晦一日者公羊此義必有所受蓋聖人以日食不在正朔苟書於經非治厯明時之意故或去朔或去日以示義詳見日月篇今考自文以後無不書日者自襄以後無不書朔日者周厯交朔之法東遷以後失之至是月大小乃得其度爾又何疑乎又案春秋二百四十二年日食三十六公羊傳曰記異也何氏又悉舉其後事變以當之今考前漢二百一十二年日食五十三後漢百九十六年日食七十二魏晉一百五十年日食七十九唐二百八十九年日食九十三宋止嘉定十六年日食一百二十大抵世愈降而日食愈數此大運盛衰之候也自漢惠帝而後日有一歲再食晉世至三食亦春秋所未有與其他災異不同必欲指某事為應恐非經㫖莊七年夏四月辛夘夜恒星不見夜中星隕如雨文十四年秋七月有星孛入于北斗昭十七年冬有星孛于大辰哀十三年冬十一月有星孛于東方以上星變四凡日食星變皆為天下記異非一國之志梁山沙鹿崩亦非一國之志以待告而書故别見案左氏傳曰星隕如雨與雨偕也公羊傳曰如雨者非雨也不脩春秋曰雨星不及地尺而復君子脩之曰星霣如雨所謂不脩春秋謂魯史舊文公羊僅於此一處及之亦口𫝊之語但左氏讀如作而義遂相逺未知何據又案漢志永始中星隕如雨長二丈繹繹未至地滅不及地尺而復即未至地滅也古今星變固有如此者其所隕者星之光魄故雖多而不見在地之形說者謂積氣消散所致比他異尤重蓋王運至此而終矣又案昭十七年申須曰彗所以除舊布新也公羊杜預郭璞俱以孛彗為一星今知不然者漢書注文頴曰彗孛長三星其占略同而形少異孛星光芒短其光四出蓬蓬孛孛然彗星光芒長參參如掃帚長星光芒有一直或竟天或十丈或三十丈史記彗出東井齊景公以為憂晏子曰君髙臺深池賦歛如弗得刑罰恐弗勝孛星將出彗何懼乎然則孛甚彗也經書星變唯此四事以其時考之皆大異也桓莊之際諸侯無王伯者出而天下大權歸於齊晉人情絶望於周此王室一大變也文宣之間晉失伯而楚興中國敝於征伐自是王室愈卑又一大變也夫子於莊十二年十七年莊王僖王崩葬不書文公十四年頃王崩葬不書說見辯名實篇平丘而後晉不復能主夏盟春秋治在夷狄子朝之亂諸侯無勤王者五年而後反正此又一大變也經書王室亂則自入春秋以來史文所未有也哀公之時東方諸侯更制於呉越天下將變為六國春秋絶筆於獲麟矣天象人事脗合如此而筆削之法亦相為終始春秋不徒記異也左氏傳載叔服梓慎論星孛唯以大國災咎當之當時流俗之論上不知有王室下不知有天下大勢其所知者唯二三大國而已天文書言北斗為帝車大辰者天子之正位亦非二子所知也桓十四年秋八月壬申御廩災僖二十年五月乙巳西宫災成三年二月甲子新宫災三日哭定二年夏五月壬辰雉門及兩觀災哀三年五月辛卯桓宫僖宫災四年六月辛丑亳社災以上火災六御廩者公親耕以奉粢盛之倉西宫者别寢也何氏曰禮夫人居中宫少在前右媵居西宫左媵居東宫少在後新宫者宣公之宫主新入廟也雉門兩觀說見後桓宫僖宫親盡而不毁亳社者殷社諸侯有之以戒亡國有屋故災桓元年秋大水十三年夏大水莊七年秋大水二十四年秋大水二十五年秋大水宣十年秋大水成五年秋大水襄二十四年秋大水以上大水八凡災異在一國者以經所書本國人事考之則儆告之意可見董仲舒曰水者隂氣也春秋緯曰隂盛臣逆民悲情發則水出蓋桓公弑立而好亂三家之所自出莊公國母淫恣不能制宣公簒適成公幼弱而三家之勢成至襄公之末季氏益專此皆隂盛臣逆之應也程子曰春秋所書災異皆天人響應但人淺見以為無應其實皆應也由漢儒言災異皆牽合不足信儒者因盡廢之隱九年三月癸酉大雨震電庚辰大雨雪桓八年冬十月雨雪僖十年冬大雨雪十五年九月己夘晦震夷伯之廟二十九年秋大雨雹昭三年冬大雨雹四年春王正月大雨雹以上大雨震電震廟各一雨雪雨雹各三胡侍講曰雷未可出電未可見而大震電此陽失節也雷電則雪不當復降而大雨雪此隂氣縱也隂陽運動有常凡失其度人為感之也雹者戾氣也隂侵陽臣侵君之象何氏曰大雪者隂盛之氣也桓十四年春無冰成元年春無冰襄二十八年春無冰以上無冰三何氏曰周之正月夏十一月周之二月夏十二月法當堅冰無冰者温也尚書曰豫恒燠若無冰時襄二十八年著例成十六年春王正月雨木冰以上雨木冰一髙氏曰雨著木而成冰上温而下寒也劉向謂木者少陽貴臣卿大夫之象後世雨木冰多應在大臣僖三十三年十二月隕霜不殺草李梅實定元年冬十月隕霜殺菽以上霜變二月令季秋之月霜始降草木黃落謂夏九月也周十二月夏之十月霜當重而不能殺草李梅再花而實周十月夏之八月霜不當重而殺菽皆非常之災李堯俞曰菽之為物易長而難殺者榖梁傳曰未可以殺而殺舉重可殺而不殺舉輕其曰菽舉重也范氏曰舉殺豆則殺草可知又案韓非子書載哀公問於仲尼曰春秋隕霜不殺草何為記之也仲尼對曰此言可殺而不殺也夫宜殺而不殺則李梅冬實天失其道草木猶干犯之而況君乎此非夫子之言也當僖公薨文公在喪宜殺不殺之義何所取乎借如哀公又問隕霜殺菽何為記之也則將對曰此言不可殺而殺也於定公繼故之後復何取乎昭公以討季氏不克而出夫子豈使哀公履其覆轍乎觀夫子責宰我使民戰栗之對譏季康子殺無道以就有道之問則非之妄明矣此乃非欲託聖人之言以飾其刑名之術不可通於春秋莊三十一年冬不雨僖二年冬十月不雨三年春王正月不雨夏四月不雨六月雨文二年自十二月不雨至于秋七月十年自正月不雨至于秋七月十三年自正月不雨至于秋七月以上不雨書時者一書四時首月者三書歴時者三書雨者一一時不雨書時踰時不雨書首月僖公比書首月不雨乃書六月雨可見以告廟書踰三時不雨總書之雖得雨不書其不告廟亦可見矣榖梁傳曰不雨者勤雨也一時而言不雨者閔雨也厯時而言不雨文不憂雨也得時史之情矣僖二十一年夏大旱宣七年秋大旱以上大旱二言旱不言饑歲猶有入也宣十年冬饑十五年冬饑襄二十四年冬大饑以上饑二大饑一凡饑皆書於冬者當西成之時五榖皆無民已乏絶國貧不能賑恤也莊七年秋無麥苗二十八年冬大無麥禾以上無麥苗一杜氏曰秋大水漂殺熟麥及五稼之苗也大無麥禾一胡氏曰書於冬者有司計歲入之多寡然後知倉廩之竭也劉氏曰經無水旱之變忽無麥禾由魯不務蓄積日損月削以至麥禾皆盡而後覺之非今歳之事也髙氏曰劉向春秋說以為土氣不養稼穡不成也沈約宋志謂呉孫皓時嘗有之苗稼豐美而實不成闔境皆然百姓以饑所謂大無麥禾者也汸案周之冬正五榖皆入之時使歲事稍稔雖蓄積無素何至麥禾皆盡其為歲祲明矣劉侍讀之說必兼髙氏其義乃備桓五年秋螽僖十五年八月螽文八年冬十月螽宣六年秋八月螽十三年秋螽十五年秋螽襄七年八月螽哀十二年冬十二月螽十三年九月螽十二月螽以上螽十公羊傳曰記災也范氏曰蚣蝑之屬禮月令曰仲冬行春令則蝗蟲為敗今案爾雅草螽負蠜蜤螽蜙蝑也阜螽即蝗也一生八十一子或云一生九十九子錢氏曰詩螽斯斯乃助語如鸒斯鹿斯之類非蜤螽也毛鄭誤以蜤螽解螽斯先儒因指為蜙蝑非也蜙或作蚣字書云省文也宣十五年冬蝝生以上蝝生一杜氏曰蝝螽子以冬生遇寒而死故不成螽今案杜氏知不成螽者蓋成螽則自書螽也螽穿地遺卵如蛹兩端有細蟲導之上下中若魚子始化類蠶所謂蝝也遇大雪則入地深或大雨水皆不成螽石虎時河朔大蝗初穿地而生二旬則化狀若蠶七八日而卧四日蛻而飛蓋飛乃名螽蝗初生皆然李巡云蝝蝗子也郭璞云蝗子未有翅者其説皆是凡蝝生未為災本不書此為一歲再生紀異也使成螽則亦不書蝝生而又書螽如哀十三年十二月螽之例矣後漢安帝永初六年三月去蝗處復蝗子生即蝝生也凡秋螽不月者皆七月也螽始出則為災災不止此一月也蝝生不月者災不在此月也隱五年九月螟八年九月螟莊六年秋螟以上螟三公羊傳曰記災也爾雅食苗心螟食葉食節賊食根蟊羅鄂州爾雅翼曰五行傳以螟為蠃蟲之孽漢孔臧蓼蟲賦曰爰有蠕蟲厥狀似螟是螟無足蟲也今食苗心者乃無足小青蟲江東謂之橫音若横逆之橫髙氏曰春秋書螟者三隱二莊一書螽者十有一桓一餘皆僖公之後蓋螟食苗心螽無所不食其為災也螟輕而螽重春秋之初災之輕者亦書之及其久也輕者不勝書書其重者爾不然豈隱莊之後二百年間皆無螟耶莊十七年冬多麋以上多麋一何氏曰言多者以多為異也五行志曰劉向以為麋蓋牝獸之淫者時莊公將取齊之淫女其象先見爾雅翼曰麋與鹿相反鹿陽獸夏至得隂氣而解角從陽退之象麋隂獸冬至得陽氣而解角從隂退之象今海陵至多千百為羣多牝少牡汸案杜氏謂麋多害稼然為災輕當以記異為重有􅈮有蜚亦然莊十八年秋有􅈮二十九年秋有蜚以上有􅈮一有蜚一皆魯地所無今忽有之故曰有公羊傳曰記異也榖梁傳曰􅈮射人者也陸璣云一名射景或謂含沙射人孔氏曰五行傳云􅈮如鼈三足南越婦人多淫故其地多􅈮蜚青色近眚也非中國所有南越淫風所生為蟲臭惡時公取齊淫女為夫人汸案髙氏以􅈮為即食苗葉者爾雅翼以蜚為蟲食稻花者其失相同蓋食稻之蟲所在有之經不當言有故孔氏據郭璞云蜚即負盤臭蟲諸作負蠜者草蟲歲時常有由相涉誤為盤爾劉侍讀據山海經謂蜚狀若牛一目虬尾見則大疫恐非春秋之蜚若文姜哀姜以小君相繼縱淫氣類感召如五行傳之說宜也昭二十五年夏有鸜鵒來巢以上鸜鵒來巢一榖梁傳曰來者來中國也鸜鵒穴者而曰巢公羊傳曰記異也五行志曰劉向以為有蜚有􅈮不言來者氣所生所謂眚也鸜鵒言來者氣所致所謂祥也顔師古曰今之鸜鵒中國皆有之亦巢居不皆穴處汸案劉子政又以不穴而巢為昭公出奔之祥蓋兼用左氏之謬若顏注之疑乃春秋所書以為異者考工記曰鸜鵒不踰濟今在處有之實自春秋所書始乃地氣推遷使然中國治亂之候也宋治平間邵子居洛陽聞杜鵑聲曰洛陽舊無杜鵑今始至矣或問曰何也曰天下將治地氣自北而南將亂自南而北今南方地氣至矣禽鳥氣類得氣之先者也春秋書六鷁退飛鸜鵒來巢氣使之也蓋先王所以觀天下之妖祥者非一端周禮在魯故時史於鸜鵒始至猶能謹而書之說者多弗察也若邵子可謂得春秋經世之旨矣宣十六年夏成周宣榭火莊二十年夏齊大災襄九年春宋災三十年五月甲午宋災宋伯姬卒昭九年夏四月陳災十八年夏五月壬午宋衛陳鄭災莊十一年秋宋大水以上外災七成周火一齊災一宋災二大水一陳災一宋衛陳鄭同日災一凡外災告則書昭十八年傳曰宋衛陳鄭皆來告火是也莊十一年傳宋大水公使弔焉曰天作淫雨害於粢盛若之何不弔蓋既來告則有弔禮所以書也唯昭九年書陳災在陳亡後時叔弓會楚子于陳或叔弓歸言陳有災而書或楚人告宋伯姬以災卒四國同日災故皆書日以異其事僖十六年春王正月戊申朔隕石于宋五是月六鷁退飛過宋都以上外異二傳曰隕石于宋五星也六鷁退飛過宋都風也亦以來告而書書是月嫌與上事同日且著月例周官保章氏掌天星以志日月星辰之變動以觀天下之遷辯其吉凶以星土辯九州之地所封封域皆有分星以觀妖祥以十有二風察天地之和命乖别之祥以詔救政訪序事此星隕石風退鷁所以害隣國而史皆書之也文三年秋雨螽于宋以上外異一公羊傳曰死而隊也記異也今案後代史志蝗有遇風而墮者有因大雨而墮者有墮而死者有復為災者文九年九月癸酉地震襄十六年五月甲子地震昭十九年夏五月己夘地震二十三年八月乙未地震哀三年夏四月甲午地震以上地震五外傳曰陽伏而不能出隂遁而不能烝於是有地震王氏曰春秋五書地震唯於文襄昭哀見之皆陽微隂盛君弱臣彊之所致也文公怠惰政在大夫襄公外役於楚内脅於其臣若昭哀則遂失國矣僖十四年秋八月辛夘沙鹿崩成五年夏梁山崩以上外崩二沙鹿晉地名公羊以為河上之邑陷入于地中漢書元后傳云元城郭東有五鹿之虚即沙鹿地蓋地陷也視山崩為變尤重故詳其月日以别之梁山亦在晉皆以告而書古者名山大川不以封山崩川竭非一國之故故不繫國公羊傳曰為天下記異也何氏曰土地者民之主沙鹿崩象齊桓將卒伯道毁外兵動宋襄承其業為楚所敗也山者陽精象徳澤所由生君之象山崩象王道絶諸侯失勢大夫擅恣為諸國害桓三年冬有年宣十六年冬大有年哀十四年春西狩獲麟以上年豐二麟瑞一天道有災異則有慶祥天災歲豐繫生民之休戚物異祥瑞關世道之否泰故史皆書之於策然天災物異無不書而慶祥必年豐麟瑞然後書其淺深詳畧之間教義明矣天災歲豐各為其國書之物異則有為一國志者有為天下志者日食星變為天下記異也隕石鷁飛有􅈮有蜚為一國記異也麟為王者嘉瑞自文武受命至於夫子而後見之則又不止為天下書矣是又非可一㮣論者後世人君喜功好名有見一草木一羽毛之異而君臣相誇以為瑞者識者非之故為春秋志災不志祥之說以矯其失而釋經者遂以有年獲麟均為記異則亦過矣蓋學者知春秋有常事不書之法而失其本旨凡一經所書皆謂之非常於是有以桓宣行惡而得有年為異者有以他公不書有年而二公獨書為異者夫天道有變則有復水旱饑饉其變也有年大有年其復也雖非有年而亦不至於饑饉者其常也有年大有年史欲屢書而不可得乃生民休戚所繫非天所以賞罰人君說者乃因一人行惡而遂欲災及萬民於是天道有反常之譏而春秋為遷怒之筆矣自公羊以麟非中國之獸為異而或者亦以麟出於亂世為獵人所獲為異夫麟為聖人出也世雖亂而有聖人在焉則麟出固不為異矣因其出而見獲遂欲使之與蜚􅈮鸜鵒同科是欲循反常之論而不知其詭激之過也春秋性命之書也詭激非性命之正故不可以言春秋唯趙伯循以有年大有年獲麟均為慶瑞為得春秋之㫖然其說曰符祥者天地所以答人君也是以志之又曰凡豐年告於廟故書之記是以著非知他年不告廟爾是又遂以史法為聖法而不告廟之說亦未當由不知有存策書大體之義故也子丑月皆夏之冬冬狩得其時大野又魯之狩地虞人舉常禮史本不書此以獲麟書故言西狩而不言其地也春秋屬辭卷一
