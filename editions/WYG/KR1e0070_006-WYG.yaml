body:
  text: 春秋屬辭卷六元趙汸撰存策書之大體第一之六七十一内特相盟内為志書及外為志書㑹隠元年三月公及邾儀父盟于蔑桓元年夏四月丁未公及鄭伯盟于越文十七年六月癸未公及齊侯盟于榖以上公及諸侯盟者三周官大司寇凡邦之大盟約涖其盟書而登之于天府大史内史司會及六官皆受其貳而藏之司盟掌盟載之法凡邦國有疑會同則掌其盟約之載及其禮儀汸謂周監二代立法常闗盛衰故盟約之禮掌於秋官而不廢春秋之有離盟則大司寇之所涖其伯者之盟則假會同之禮而為之皆私相要結而不請於王朝亂世之事也隠攝位而欲求好於邾故盟桓弑隠而自結于鄭故盟文公以齊侯見伐使襄仲請受盟皆魯志也榖梁傳曰及者内為志焉爾於内特相盟得之凡盟書日者從其恒辭也魯與邾有疆埸之交以大求小脩好息民乃事之冝故蔑盟不日以别於榖盟之詘志與他盟之非義者凡公及伯主盟于其國及外臣盟及戎盟文同義異皆别見隠六年夏五月辛酉公會齊侯盟于艾桓十二年冬十一月丙戌公會鄭伯盟于武父十七年二月丙午公會邾儀父盟于趡莊十三年冬公會齊侯盟于柯二十三年十二月甲寅公會齊侯盟于扈定十二年冬十月癸亥公會齊侯盟于黄以上公會諸侯盟者六齊僖方合諸侯以樹黨故隠公㑹之盟明年又使其弟年來聘以結之則艾盟齊志也宋辭平而公會鄭伯盟以伐宋則武父之盟亦鄭志也邾既來朝又尋蔑盟而公會之盟則趡盟邾志也齊桓結諸侯以圖伯師次于郎而魯不服既㑹于北杏公始㑹之盟則柯之盟齊志也公既如齊納幣及齊侯遇榖而又㑹之盟于扈則扈之盟亦齊志也齊景結魯以叛晉既㑹于夾谷而公又㑹之盟則黄盟亦齊志也故皆稱㑹榖梁傳曰㑹者外為志焉爾於内特相盟得之凡盟以日不日見義唯魯桓之盟日月皆從其恒辭說見公㑹下柯盟魯無信特不月以異之扈盟從齊之志始定然離盟非伯主之事故書日七十二内參盟以上皆稱㑹伯者之盟稱㑹蒙及㑹言諸侯盟苟無主盟稱及桓十二年夏六月壬寅公㑹杞侯莒子盟于曲池秋七月丁亥公㑹宋公燕人盟于榖丘十七年春正月丙辰公㑹齊侯紀侯盟于黄僖二十五年冬十二月癸亥公㑹衞子莒慶盟于洮二十六年春王正月己未公㑹莒子衞寗速盟于向昭二十六年秋公㑹齊侯莒子邾子杞伯盟于鄟陵僖二十一年十二月癸丑公㑹諸侯盟于薄二十七年十二月甲戌公㑹諸侯盟于宋以上公㑹二國盟者五四國盟者一㑹諸侯盟不序者二凡盟自參以上皆稱㑹彼為盟而我㑹之也故齊侯為鄟陵之盟雖為公故亦稱㑹而已謀納公而不克故不月與及齊大夫盟蔇同異其事也莊二十七年夏六月公㑹齊侯宋公陳侯鄭伯同盟于幽僖七年秋七月公㑹齊侯宋公陳世子欵鄭世子華盟于寗母八年春王正月公㑹王人齊侯宋公衞侯許男曹伯陳世子欵盟于洮九年夏公㑹宰周公齊侯宋子衞侯鄭伯許男曹伯于葵丘九月戊辰諸侯盟于葵丘十五年三月公㑹齊侯宋公陳侯衞侯鄭伯許男曹伯盟于牡丘二十八年五月癸丑公㑹晉侯齊侯宋公蔡侯鄭伯衞子莒子盟于踐土文七年秋八月公㑹諸侯晉大夫盟于扈十四年六月公㑹宋公陳侯衞侯鄭伯許男曹伯晉趙盾癸酉同盟于新城宣十七年六月己未公㑹晉侯衞侯曹伯邾子同盟于㫁道成五年十二月己丑公㑹晉侯齊侯宋公衞侯鄭伯曹伯邾子杞伯同盟于蟲牢七年秋公㑹晉侯齊侯宋公衞侯曹伯莒子邾子把伯救鄭八月戊辰同盟于馬陵九年春王正月公㑹晉侯齊侯宋公衞侯鄭伯曹伯莒子杞伯同盟于蒲十五年三月癸丑公㑹晉侯衞侯鄭伯曹伯宋世子成齊國佐邾人同盟于戚十七年夏公㑹尹子單子晉侯齊侯宋公衞侯曹伯邾人伐鄭六月乙酉同盟于柯陵襄三年六月公㑹單子晉侯宋公衞侯鄭伯莒子邾子齊世子光己未同盟于雞澤九年冬公㑹晉侯宋公衞侯曹伯莒子邾子滕子薛伯杞伯小邾子齊世子光伐鄭十二月己亥同盟于戲十一年夏公㑹晉侯宋公衞侯曹伯齊世子光莒子邾子滕子薛伯杞伯小邾子伐鄭秋七月己未同盟于亳城北十八年冬十月公㑹晉侯宋公衞侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子同圍齊十九年春王正月諸侯盟于祝柯二十年夏六月庚申公㑹晉侯齊侯宋公衞侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子盟于澶淵二十五年夏公㑹晉侯宋公衞侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子于夷儀秋八月已已諸侯同盟于重丘昭十三年秋公㑹劉子晉侯齊侯宋公衞侯鄭伯曹伯莒子邾子滕子薛伯把伯小邾子于平丘八月甲戌同盟于平丘公不與盟以上公㑹伯者合諸侯之盟二十一㑹而不與盟者一凡伯者之盟亦稱㑹伯者為盟而公㑹之也故悉從外為志例其事略序見後篇凡桓文之盟不日葵丘踐土皆功業最盛之時故曰晉主夏盟恒日其不日者皆有故也僖五年秋八月諸侯盟于首止以上諸侯盟不言公及者一承上文及㑹從可知也王世子不與盟故言諸侯齊桓不主㑹而主盟故不言公及諸侯㑹王世子序見後定四年三月公㑹劉子晉侯宋公蔡侯衞侯陳子鄭伯許男曹伯莒子邾子頓子胡子滕子薛伯把伯小邾子齊國夏于召陵侵楚五月公及諸侯盟于皋鼬以上公㑹王臣合諸侯侵楚及諸侯盟者一是㑹劉子之志晉不復主盟而劉子復不與盟故稱公及諸侯盟與葵丘但言諸侯盟平丘但言同盟者異文其不日亦以别於有伯之盟也七十三公如伯國受盟稱及閔元年秋八月公及齊侯盟于落姑文三年冬公如晉十二月己已公及晉侯盟十三年冬公如晉十二月己丑公及晉侯盟襄三年春公如晉夏四月壬戌公及晉侯盟于長樗以上公及伯主盟者四莊公薨魯亂閔公幼季子在外齊桓以伯令召閔公至齊地盟以復季子其稱及者從受盟例也晉襄以魯不朝使陽處父盟公既而請改盟故公如晉及晉侯盟十三年公如晉朝靈公且尋盟皆盟於其國都故不書地襄公即位晉悼即使人來聘故明年公朝而請盟晉侯去其國都以禮於公皆受盟於伯主故稱及季子身繫魯國社稷安危盟以復之事之冝也故落姑之盟不日以别於他君之受盟者七十四公與王臣外臣㑹盟稱㑹特相盟稱及僖二十九年夏六月㑹王人晉人宋人齊人陳人蔡人秦人盟于翟泉以上公㑹王臣外大夫盟一王子虎尋踐土之盟故稱㑹内没公而王臣與外大夫皆稱人諱公與王子盟也不日别於踐土也凡内諱公外稱人與後處父去族皆說見變文篇文十年秋七月及蘇子盟于女栗以上公及王臣盟一晉伯中衰頃王新立使大夫下盟列國凡公與大夫盟雖没公猶書日譏其伉也王臣非伉故不日文二年三月乙巳及晉處父盟以上公如伯國及其臣盟者一傳曰晉人以不朝來討公如晉晉人使陽處父盟公以恥之處父去族說在變文篇凡大夫伉盟書日者譏若兩君然為諱不書公見實也成三年冬十一月晉侯使荀庚來聘衞侯使孫良夫來聘丙午及荀庚盟丁未及孫良夫盟十一年春王三月晉侯使郤犫來聘己丑及郤犫盟襄七年冬十月衞侯使孫林父來聘壬戌及孫林父盟十五年春宋公使向戌來聘二月己亥及向戌盟于劉以上外臣聘魯而尋盟者四晉景使荀庚來聘且尋盟衛定使孫良夫來聘且尋盟晉厲疑公貳於楚故使郤犫來聘且涖盟衞獻使孫林父來聘且尋盟公皆與之盟于國都故不言地若去其國都而盟諸侯乃晉悼公所以謙接吾君者也宋共使向戌來聘且尋盟公去其國都與向戌盟于劉三家專魯君弱戌自以為君矣比事考之則所尋之盟可見莊二十二年秋七月丙申及齊髙傒盟于防以上公及外臣盟者一齊桓以魯莊請昬而先以髙傒盟公于防譏在外故没公杜氏不知筆削之旨謂稱及為内微者當齊桓伯業已隆其貴卿何事與魯微者盟于魯地乎當從二傳為是隠八年九月辛卯公及莒人盟于浮來莊九年春公及齊大夫盟于蔇以上公及外臣盟稱及者二隠公特盟小國之臣譏在内故書公均為伉故書日當齊無君大夫盟納子糾事非所諱故書公既而桓公入子糾殺故不月以異之七十五公㑹諸侯使大夫盟襄十六年三月公會晉侯宋公衞侯鄭伯曹伯莒子邾子薛伯杞伯小邾子于溴梁戊寅大夫盟以上公㑹諸侯而大夫盟者一榖梁傳曰諸侯㑹而大夫盟正在大夫也公羊傳曰信在大夫也大夫專盟㑹久矣而未有諸侯㑹而大夫盟者案左傳則大夫者晉荀偃宋向戌魯叔孫豹衞寗殖鄭公孫蠆也是皆彊家專國者故雖君㑹而大夫自盟以其君不能為有無也二傳之言蓋得春秋言外之旨不言諸侯之大夫者閒無異事七十六公與外裔盟稱及特㑹而後與盟稱及隠二年秋八月庚辰公及戎盟于唐桓二年九月公及戎盟于唐以上公及戎盟者二凡外裔舉號君臣同辭雖戎請盟亦稱及者不屈中國從外裔故以公及之隠盟則日桓盟不日者桓弑隠嫌繼隠好故不日以别之成二年十一月丙申公及楚人秦人宋人陳人衞人鄭人齊人曹人邾人薛人鄫人盟于蜀以上公及楚人諸侯大夫盟者一蒙公㑹于蜀文言及傳曰初宣公使求好于楚莊王卒宣公薨不克作好公即位受盟于晉㑹晉伐齊衞人不行使于楚而亦受盟于晉從於伐齊故楚令尹子重為陽橋之役以救齊冬楚師侵衞遂侵我師于蜀孟孫請往賂之以請盟楚人許之十一月公及楚公子嬰齊蔡侯許男秦右大夫說宋華元陳公孫寧衞孫良夫鄭公子去疾及齊大夫盟于蜀說見變文篇七十七内大夫特與諸侯盟稱及稱㑹與君同文十六年六月戊辰公子遂及齊侯盟于郪丘成元年夏臧孫許及晉侯盟于赤棘定三年冬仲孫何忌及邾子盟于拔哀二年春王二月癸巳叔孫州仇仲孫何忌及邾子盟于句繹以上内大夫特與諸侯盟稱及者四公子遂盟齊懿以緩伐魯之師臧孫許為齊難故盟晉景結好求援二盟皆魯欲之定公即位邾子益新立何忌盟以求好三家既同帥師伐邾取其田二子又盟邾子以要之故四盟皆稱及凡内大夫盟諸侯皆不月郪丘軋於齊句繹三家轢邾已甚故皆日以異之昭十一年夏仲孫貜㑹邾子盟于祲祥以上内大夫特與諸侯盟稱㑹者一邾悼既釋怨來朝而魯㑹之葬於是貜㑹邾子盟則是盟邾志也故稱㑹七十八内大夫盟諸侯參以上稱㑹伯者之盟稱㑹與君同出疆遂盟稱及非卿不稱名氏桓十一年九月柔㑹宋公陳侯蔡叔盟于折蒙上事月以上内大夫與三國之君盟稱㑹者一魯始黨齊鄭既皆來戰于郎鄭莊卒宋陳蔡盟于折而柔㑹之文二年夏六月公孫敖㑹宋公陳侯鄭伯晉士縠盟于垂隴成十八年十二月仲孫蔑㑹晉侯宋公衞侯邾子齊崔杼同盟于虚朾以上内大夫與伯者之盟稱㑹二晉人既以處父盟公魯人恥之故垂隴之盟宋陳鄭之君皆在而魯獨以大夫往晉悼公初立楚納宋魚石于彭城又侵宋悼公㑹諸侯于虚朾以謀救宋時成公薨未葬故魯獨以大夫往莊十九年秋公子結媵陳人之婦于鄄遂及齊侯宋公盟以上内大夫出疆遂盟諸侯稱及者一公子結以送女至鄄遇齊宋將伐魯遂與二君盟以緩師故稱及大夫遂盟諸侯故不月莊十六年冬十二月㑹齊侯宋公陳侯衞侯鄭伯許男滑伯滕子同盟于幽以上内微者與伯主之盟稱㑹一公既盟齊侯于柯而二鄄之㑹不至此同盟于幽諸侯皆在而魯猶以微者行是以有公子結之盟三國西鄙之伐公羊作公㑹陳氏又謂諱不言公以經傳事理推之皆非是七十九内大夫特與外臣盟稱及稱㑹非卿不稱名氏成十六年十二月乙丑季孫行父及晉郤犫盟于扈以上内大夫特與外大夫盟稱及者一晉以僑如之譖執季孫行父舍于苕丘於是赦之而季孫及郤犫盟于扈故稱及隠元年九月及宋人盟于宿以上内微者及外微者盟稱及者一魯求成於宋故稱及榖梁傳曰及内卑者也宋人外卑者也文八年冬十月壬午公子遂㑹晉趙盾盟于衡雍襄二十年春王正月辛亥仲孫速㑹莒人盟于向以上内大夫㑹外大夫盟稱㑹者二扈之盟公後至晉人來討襄仲㑹趙孟盟于衡雍報扈之盟則是晉志也莒與邾更伐魯溴梁之㑹晉以魯故執莒邾之君同圍齊之後又執邾子於是齊靈卒齊莊與晉成莒失其恃而為向之盟故皆稱㑹八十内大夫與外臣盟參以上稱㑹伯者之㑹别盟後至者稱及以及既㑹而盟稱及盟于師稱及僖十九年冬㑹陳人蔡人楚人鄭人盟于齊以上内大夫與四國之臣盟稱㑹者一陳穆公請修好於諸侯以無忘齊桓之德故為是盟而魯㑹之襄三年六月戊寅叔孫豹及諸侯之大夫及陳袁僑盟二十七年秋七月辛巳豹及諸侯之大夫盟于宋以上内大夫因諸侯㑹盟别盟大夫後至者稱及以及者一既㑹諸侯之大夫而後與盟稱及者一皆蒙上文其事别見成二年秋七月齊侯使國佐如師己酉及國佐盟于袁婁以上内大夫㑹戰盟于師稱及者一不言及以及閒無異事鞌之戰序見後八十一内大夫與戎盟稱㑹文八年冬十月乙酉公子遂㑹雒戎盟于暴以上魯臣會戎盟者一臣降於君故雖盟戎稱㑹八十二自外來魯盟稱來盟自魯往他國盟言涖盟襄二十九年夏把子來盟以上把君來盟者一把伯既因晉悼夫人治魯歸田懼魯之見惡於是親來盟魯人賤之故降其爵桓十四年夏五鄭伯使其弟語來盟宣七年春衞侯使孫良夫來盟以上來盟稱使者二鄭厲與公㑹于曹而未盟故使其弟來盟衞成欲謀㑹晉故使良夫來盟夏五說見後闕文類來盟著例不月閔二年冬齊髙子來盟文十五年三月宋司馬華孫來盟以上來盟不稱使者二閔公弑齊桓使髙子來盟立僖公時魯無君季友接之以二臣相見故不言齊侯使無所致命也公羊傳曰不稱使我無君也宋人將弑昭公而立公子鮑華孫為公子鮑來盟非其君使來故不言宋公使無所受命也凡來盟不月華孫結魯輔簒故特書月以異之僖三年冬公子友如齊涖盟文七年冬公孫敖如莒涖盟昭七年春叔孫婼如齊涖盟定十一年冬叔還如鄭涖盟以上魯臣往他國涖盟者四凡涖盟皆盟其君來盟亦然齊桓公為公不㑹陽榖來尋盟故公子友如齊盟莒人來請盟故公孫敖如莒盟昭公將如楚故使叔孫婼如齊盟魯及鄭平故叔還如鄭盟凡來盟五涖盟四皆無交涖者唯哀八年臧賔如齊涖盟齊閭丘明來涖盟二人皆非卿雖交涖史不書凡涖盟不月與來盟同八十三公特㑹諸侯自參以上必言故苟從可知不言故伯主之㑹不言故避不主㑹言及以㑹隠九年冬公㑹齊侯于防十一年夏公㑹鄭伯于時來桓元年三月公㑹鄭伯于垂三年春正月公㑹齊侯于嬴六月公㑹把侯于郕九月公㑹齊侯于讙六年夏四月公㑹紀侯于成十一年九月公㑹宋公于夫鍾冬十二月公㑹宋公于闞十二年八月公㑹宋公于虚冬十一月公㑹宋公于龜十四年春正月公㑹鄭伯于曹十五年五月公㑹齊侯于艾蒙上事月十八年春王正月公㑹齊侯于濼以上公特㑹諸侯者十四皆春秋之初伯者未興諸侯起亂之事防為伐宋時來為伐許垂假許田郕把受兵而求成成紀來諮謀齊難夫鍾闞虚龜皆為平宋鄭曹與鄭突脩好艾謀定許皆非為國為民嬴成昬于齊讙受姜氏濼與夫人如齊皆公妃匹失禮之事凡内離㑹不月唯魯桓之㑹皆月桓内弑其君兄而外構亂身戕隣國其盟㑹之失皆不足復議故從其恒法以别異之宣元年夏公㑹齊侯于平州定十年夏公㑹齊侯于夾谷以上公特㑹諸侯者二宣公奪適以賂請㑹于齊以定其位而不事晉夾谷齊結魯叛晉隠十年春王二月公㑹齊侯鄭伯于中丘桓二年三月公㑹齊侯陳侯鄭伯于稷以成宋亂十五年冬十一月公㑹宋公衞侯陳侯于袲伐鄭十六年春正月公㑹宋公蔡侯衞侯于曹以上公㑹諸侯參以上四稷曰成宋亂袲曰伐鄭皆為㑹言故中丘曹下即有㑹伐之事從可知也凡内參㑹皆月有大夫則不月定十四年五月公㑹齊侯衞侯于牽蒙上事月哀十二年秋公㑹衞侯宋皇瑗于鄖以上公參㑹諸侯者二時諸侯皆叛晉牽謀救范中行氏鄖辭呉而竊盟事可知也莊二十七年冬公㑹齊侯于城濮僖元年八月公㑹齊侯宋公鄭伯曹伯邾人于檉十三年夏公㑹齊侯宋公陳侯衞侯鄭伯許男曹伯于鹹十六年冬十二月公㑹齊侯宋公陳侯衞侯鄭伯許男邢侯曹伯于淮二十八年冬公㑹晉侯齊侯宋公蔡侯鄭伯陳子莒子邾人秦人于温宣七年冬公㑹晉侯宋公衞侯鄭伯曹伯于黒壤成十二年夏公㑹晉侯衞侯于瑣澤襄五年秋公㑹晉侯宋公陳侯衞侯鄭伯曹伯莒子邾子滕子薛伯齊世子光呉人鄫人于戚七年十二月公㑹晉侯宋公陳侯衞侯曹伯莒子邾子于鄬十一年秋公㑹晉侯宋公衞侯曹伯齊世子光莒子邾子滕子薛伯把伯小邾子伐鄭㑹于蕭魚十六年春公㑹晉侯宋公衞侯鄭伯曹伯莒子邾子薛伯把伯小邾子于溴梁二十一年冬公㑹晉侯齊侯宋公衞侯鄭伯曹伯莒子邾子于商任二十二年冬公㑹晉侯齊侯宋公衞侯鄭伯曹伯莒子邾子薛伯把伯小邾子于沙隨二十四年八月公㑹晉侯宋公衞侯鄭伯曹伯莒子邾子滕子薛伯把伯小邾子于夷儀蒙上事月二十五年夏五月公㑹晉侯宋公衞侯鄭伯曹伯莒子邾子滕子薛伯把伯小邾子于夷儀蒙上事月以上公與伯者之㑹十有五凡伯者之㑹不言故從可知也其事皆别見凡公與盟主之㑹不月必無成事而後月詳見下篇及日月篇僖五年夏公及齊侯宋公陳侯衞侯鄭伯許男曹伯㑹王世子于首止以上公及諸侯㑹王世子者一王世子以儲君之尊出臨諸侯故齊桓避不敢主㑹而率諸侯以㑹于世子故書及以㑹皆實録也八十四公特㑹外裔哀七年夏公㑹呉于鄫十二年夏公㑹呉于橐皐以上公特㑹呉者二是時魯有職貢於呉而猶以號舉者不以諸侯之禮相接也隠二年春公㑹戎于潛以上公㑹戎者一成二年冬公㑹楚公子嬰齊于蜀為下盟月以上公㑹楚大夫者一事見變文篇八十五公㑹諸侯殊㑹外裔言㑹以㑹不殊㑹言㑹以及襄十年春公㑹晉侯宋公衞侯曹伯莒子邾子滕子薛伯把伯小邾子齊世子光㑹呉于柤以上公㑹諸侯殊㑹外裔一凡言㑹呉者皆其君從舉號例以其稱號不典未能以中國諸侯之禮相接故諸侯自相與為㑹然後㑹之所謂㑹又㑹也自晉厲公以大夫㑹呉至悼公遂以諸侯㑹之皆欲通呉以撓楚哀十三年夏公㑹晉侯及呉子于黄池以上公㑹晉侯呉子不殊㑹者一以諸侯之禮相接故得稱呉子兩主之故言及傳言呉晉爭先則不可言呉主㑹言魯職貢於呉有豐於晉將半邾以事呉而如邾以事晉則魯葢兩事呉晉凡㑹呉詳見謹内外篇八十六公㑹把伯姬莊二十七年春公㑹把伯姬于洮以上公㑹其女為把夫人者一伯姬以前二年歸把至此㑹公于洮冬乃歸寧皆為把伯來朝先為之地也說者但譏莊公不當出㑹其女而不知大不字小之失以至於此八十七公及夫人㑹齊侯僖十一年夏公及夫人姜氏㑹齊侯于陽榖以上公及夫人㑹齊侯者一夫人雖齊女然兩君相見而婦人參其間非禮也八十八諸侯迎㑹公文十三年冬公如晉衞侯㑹公于沓公還自晉鄭伯㑹公于棐以上諸侯迎㑹公者二皆欲因公請成于晉定十四年大蒐于比蒲邾子來㑹公以上諸侯來㑹公者一魯既結齊叛晉邾主齊故來㑹公以脩好杜氏曰來而不用朝禮故曰㑹八十九公㑹外師定八年夏公㑹晉師于瓦以上公㑹外師者一齊師伐我晉士鞅趙鞅荀寅救我齊師已去公遂㑹三卿于瓦卿非期㑹故以師為重成二年傳言公㑹晉師于上鄍不書者四卿出師㑹晉衞以報齊怨幸而一戰勝齊遂使禽鄭逆公勞師以臣召君不可為訓故削之以全國體在存䇿書中為變例之五九十公㑹外大夫襄二十六年夏公㑹晉人鄭良霄宋人曹人于澶淵以上公㑹外大夫者一凡公與外大夫盟則諱不言公此㑹則不諱者盟則君臣同歃故諱公以逺恥㑹則君臣各在其位故直書以見其失而已外大夫書人皆說見變文辯名實篇九十一王臣㑹諸侯莊十四年冬單伯㑹齊侯宋公衞侯鄭伯于鄄以上王卿士㑹諸侯一齊桓公始合諸侯假王命以示大順凡王臣有諸侯之事皆以内辭書杜氏謂赴以單伯㑹諸侯為文非也九十二内大夫㑹諸侯文元年秋公孫敖㑹晉侯于戚宣十四年冬公孫歸父㑹齊侯于榖十五年春公孫歸父㑹楚子于宋昭九年春叔弓㑹楚子于陳以上内大夫特㑹諸侯者四皆以事往晉侯疆戚田故公孫敖往㑹之楚子在宋歸父先㑹齊侯而後㑹楚子于宋者宣公方事齊故先謀於齊而後㑹楚也楚師滅陳故叔弓㑹楚子于陳襄八年夏季孫宿㑹晉侯鄭伯齊人宋人衞人邾人于邢丘以上内大夫㑹伯主者一悼公復伯使諸侯大夫聴朝聘之數九十三内大夫㑹外大夫苟非天下之事則言故文十一年夏叔仲彭生㑹晉郤缺于承筐宣十五年秋仲孫蔑㑹齊髙固于無婁成五年夏叔孫僑如㑹晉荀首于榖昭三十一年春季孫意如㑹晉荀躒于適歴以上内大夫特㑹外大夫者四彭生㑹郤缺謀諸侯之從楚者蔑㑹髙固則齊魯既皆通楚而晉將徴㑹于諸侯也荀首如齊逆女僑如餫諸榖意如出君晉人不能討使荀躒召意如至適歴欲其奉公以歸襄二年秋仲孫蔑㑹晉荀罃宋華元衞孫林父曹人邾人于戚為下葬月冬仲孫蔑㑹晉荀罃齊崔杼宋華元衞孫林父曹人邾人滕人薛人小邾人于戚十四年冬季孫宿㑹晉士匄宋華閱衞孫林父鄭公孫蠆莒人邾人于戚十九年冬叔孫豹㑹晉士匄于柯二十七年夏叔孫豹㑹晉趙武楚屈建蔡公孫歸生衞石惡陳孔奐鄭良霄許人曹人于宋三十年冬晉人齊人宋人衞人鄭人曹人莒人邾人滕人薛人把人小邾人㑹于澶淵宋災故昭元年春叔孫豹㑹晉趙武楚公子圍齊國弱宋向戌衞齊惡陳公子招蔡公孫歸生鄭罕虎許人曹人于虢十一年秋季孫意如㑹晉韓起齊國弱宋華亥衞北宫佗鄭罕虎曹人把人于厥憖二十五年夏叔詣㑹晉趙鞅宋樂大心衞北宫喜鄭游吉曹人邾人滕人薛人小邾人于黄父以上内大夫㑹外大夫者九一言故澶淵之㑹叔孫豹不書而外大夫稱人乃筆削之旨九十四内大夫特㑹外裔哀六年夏叔還㑹呉于柤以上内大夫特㑹外裔者一九十五内大夫㑹外大夫殊㑹外裔言㑹以㑹同受命直言㑹之成十五年冬十一月叔孫僑如㑹晉士燮齊髙無咎宋華元衞孫林父鄭公子鰌邾人㑹呉于鍾離襄十四年春王正月季孫宿叔老㑹晉士匄齊人宋人衞人鄭公孫蠆曹人莒人邾人滕人薛人把人小邾人㑹呉于向以上内大夫㑹外大夫殊㑹外裔者二義與公㑹諸侯殊㑹外裔同凡内大夫㑹外大夫不月必㑹而又㑹外裔然後月襄五年夏仲孫蔑衞孫林父㑹呉于善道以上内大夫外大夫㑹外裔者一不曰㑹以㑹者二國之卿同受命于晉不自期㑹也九十六君大夫出㑹諸侯無成事亦書桓十年秋公㑹衞侯于桃丘弗遇成十六年秋公㑹晉侯齊侯衞侯宋華元邾人于沙隨不見公昭十三年秋公㑹劉子晉侯齊侯宋公衞侯鄭伯曹伯莒子邾子滕子薛伯把伯小邾子于平丘八月甲戌同盟于平丘公不與盟文十六年春季孫行父㑹齊侯于陽榖齊侯弗及盟以上公㑹諸侯弗遇者一不見公者一不與盟者一大夫㑹諸侯不見與盟者一雖無成事史猶謹書之所以尊君重國也劉氏曰春秋於魯事有可恥者必為之諱君臣之禮也若我無失道而横逆所加則不諱故直書以罪諸侯宣四年春王正月公及齊侯平莒及郯莒人不肯以上公及諸侯平國不成者一無成事而書義與上同且為公伐莒取向言故九十七公及諸侯相遇隠四年夏公及宋公遇于清莊二十三年夏公及齊侯遇于榖三十年冬公及齊侯遇于魯濟以上公及諸侯遇者三簡禮相見曰遇何氏曰古者有遇禮為朝天子若朝罷歸卒相遇于塗近者為主逺者為賔稱先君以相接所以崇禮讓絶慢易也當春秋時出入無度卒然相要非常遇也今案隠與宋公聞衞亂而相遇齊桓圖伯亦兩與公遇者桓公欲身下諸侯以成伯業故以簡便濟其勤勞九十八公行無成事書次莊三年冬公次于滑八年春師次于郎以俟陳人蔡人為下事月以上公次者一諱公稱師者一次者師止舎之名君行師從故君所止舎亦言次其事至淺必無成事而後書傳言閔公次于郎待季友不書者既書公及齊侯盟于落姑為有成事則信宿之次史不復録十二公行反往往曠月踰時使所次悉書亦不勝書矣杜陳例皆不取九十九公失國書次書如書至書居書唁書圍邑取邑昭二十五年九月己亥公孫于齊次于陽州齊侯唁公于野井二十六年三月公至自齊居于鄆夏公圍成秋公㑹齊侯莒子邾子把伯盟于鄟陵公至自㑹居于鄆二十七年春公如齊公至自齊居于鄆冬公如齊公至自齊居于鄆二十八年春公如晉次于乾侯二十九年春公至自乾侯居于鄆齊侯使髙張來唁公公如晉次于乾侯冬十月鄆潰三十年春王正月公在乾侯三十一年春王正月公在乾侯夏晉侯使荀躒唁公于乾侯三十二年春王正月公在乾侯取闞以上昭公孫于齊後書次者三書如者四書至書居者五書在者三書公㑹者一書唁公者三書圍邑者一取邑者一公已失國而詳録其出處如此者臣無絶君之道公身繫國安危季孫雖叛公社稷宗廟臣民非公無所繫也當是時公令不及於魯魯史安能以時得公出處嵗月如是之詳君臣交戰季孫豈以得於諜報者而詳命史氏於阻兵之日哉季孫背昭子之言不納公又脅鄆使潰而每嵗賈馬歸從者之衣屨于乾侯葢欲信士鞅黨逆之言以欺晉君爾扈之㑹鞅曰季氏事君如在國杜氏註曰書公行告公至是也三十年公在乾侯服虔曰季氏閔而釋之所謂事君如在國是也若是則季孫士鞅之姦謀非唯足以欺時君而尚足以欺後世也春秋之作亂臣賊子猶能知而懼之而學者反以空言汨之也傳言季孫欲溝公墓為惡諡皆以榮成伯之言而止魯之臣子猶有人焉當定哀之間意如卒後史臣豈無職思其憂者詳著昭公出處以補䇿書之闕乎公羊傳記孔子舉野井唁禮而曰其禮與其辭足觀矣當時士大夫從公如子家子所謂貌而出者猶衆有足徴也又案史記昭公奔齊魯亂孔子亦適齊當時之事見聞所及使魯史不追補之孔子脩春秋時亦特筆書之以誅季氏不臣之罪矣服杜之失不足深辯也春秋屬辭卷六
