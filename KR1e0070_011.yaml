body:
  text: 春秋屬辭巻十一元趙汸撰辯名實之際第四二曰辯名實之際正必書王諸侯稱爵大夫稱名氏四夷大者稱子此春秋之名也諸侯不王而伯者興中國無伯而夷狄横大夫專兵而諸侯散此春秋之實也夫春秋之名實如此將以示後世曰實錄可乎曰實錄且猶不可而況於聖人撥亂以經世之事哉此辯名實所以為春秋之要義也葢其説有二一曰去名以全實征伐在諸侯則大夫將不稱名氏中國有伯則楚君侵伐不稱君是也一曰去名以責實諸侯無王則正不書王中國無伯則諸侯不序君大夫將略其恒辭則稱人是也此二者實王伯升沉之㑹國家喪亂之由夷夏盛衰之變天下大勢之所趨而一經之樞要也是以聖人深致意焉十九天下無王則桓公春秋闕不書王桓三年春正月四年春正月五年春正月六年春正月七年春二月八年春正月十一年春正月十二年春正月十三年春二月十四年春正月十五年春二月十六年春正月十七年春正月以上桓公春秋正不書王者十有三見天下之無王也春秋始於隱公所書皆諸侯首惡之事至桓弑隠督弑宋公陳佗殺其大子而立鄭突簒其君兄宋鄭之亂諸侯不能討又從而利之熊通因以僭號於荆則天下之亂已極矣鄭莊不臣繻葛之戰彞倫攸斁諸侯不為之變而遂至於無王矣夫天下無王乃伯者之所由興也春秋辯名實之際當天下無王之日而且書王正如他時則是經為虛文而名實亂矣故於桓公之䇿略不書王以深絶不臣之諸侯於莊僖之編序齊桓伯功而與之以尊王之義其與伯者亦所以罪諸侯也然桓文之興雖假尊王以示名義而朝覲獄訟不至貢賦不歸諸侯之所以事天子者亦惟弔喪送葬而已於是人情絶望於周而王風不作自東遷以來天下之勢始一大變矣故莊僖崩葬特削而不書與無王之簡隐顯互明此辯名實之先務也杜氏不達此義謂由王室不班厯故劉炫規之謂昭公二十三年至二十六年王室有子朝之亂天王居於狄泉豈能班厯而正必書王已足以破其惑穀梁謂桓公弑君為無王則是特一國一人之事爾皆不足以知筆削之權其元年十八年書王者元年一君之始十八年一君之終嫌以無王之罪蔽於一國也二年書王者當宋公之弑嫌以無王之罪蔽於一人也十年書王者當曹伯終生之卒嫌使是君不得正其終也然陳侯鮑卒亦無王者史從其冄赴以二日繋月如長厯與大衍厯所推二日皆不得在一月春秋疑以傳疑甲戌已丑未必皆正月之日則陳侯實卒月不得質言故不與正也穀梁傳曰桓無王其曰王何也謹始也二年有王曰正與夷之弑也十年有王曰正終生之卒也此説必有所從受又曰元年有王所以治桓也則與謹始之義不同矣葢口傳之學易至失真其桓弟弑兄臣弑君以下云者乃以已見尋繹師説而妄為之辭二十中國無伯則晉靈公之盟㑹諸侯不序文七年秋八月公㑹諸侯晉大夫盟於扈傳曰齊侯宋公衛侯鄭伯許男曹伯㑹晉趙盾盟於扈晉侯立故也十五年冬十一月諸侯盟於扈傳曰晉侯宋公衛侯陳侯鄭伯許男曹伯盟于扈尋新城之盟且謀伐齊也齊人賂晉侯故不克而還於是有齊難是以公不㑹十七年夏諸侯㑹於扈傳曰晉侯蒐於黃父遂復合諸侯於扈平宋也公不與㑹齊難故也以上伯國盟㑹不序諸侯者三見中國之無伯也晉襄公卒靈公幼楚人已知北方可圖矣趙盾以大夫㑹盟諸侯而合四國以救鄭不及楚師以三國伐宋取賂而還新城之盟諸侯若不能忘晉者而扈之冄盟以賂不克伐齊又冄㑹以定宋文之簒諸侯以為晉不足與也鄭既受盟於楚而齊魯俱貳則中國遂至於無伯矣夫中國無伯乃楚之所由興也春秋辯名實之際當中國無伯之日而且序晉伯人楚君如他時不幾於名實相亂乎故於靈公之盟㑹略諸侯不序以明晉伯中衰而楚自厥貉而後君將皆稱君以著其亂華之罪其爵楚君者亦所以志無伯也是故王臣自出以盟諸侯齊商人弑其君執天子之使諸侯恬不為動於是天下之人皆忘其上而詩盡亡自有伯以來中國之勢又一大變而王室又以無伯而愈卑矣故頃王崩葬亦削而不書與不序諸侯之簡隠顯互明此辯名實之先務也左氏不達此義於趙盾之盟曰公後至故不書所㑹避不敏也凡史有後至不書所㑹之例者葢為公後㑹期不得與其成事故不書所㑹明不冐其功今書公㑹諸侯盟而乃以不序諸侯為避不敏理必不然其曰無能為無功者義亦未盡唯陳氏謂盟㑹恒序諸侯於是雖伯主在焉而亦不序見晉失伯而楚興獨得春秋微㫖非諸家所及也二十一征伐在諸侯則君將稱君大夫稱人用衆稱師苟略其恒辭則雖君將稱人稱師一役而冄有事稱人稱師以喪行稱人隠四年夏宋公陳侯蔡人衛人伐鄭秋翬帥師㑹宋公陳侯蔡人衛人伐鄭十一年秋七月壬午公及齊侯鄭伯入許桓十年冬十二月丙午齊侯衛侯鄭伯來戰於郎十三年春二月公㑹紀侯鄭伯己巳及齊侯宋公衛侯燕人戰齊師宋師衛師燕師敗績十五年冬十一月公㑹宋公衛侯陳侯于袲伐鄭十六年夏四月公㑹宋公衛侯陳侯蔡侯伐鄭以上君將稱君者七春秋之初諸侯無王合黨為亂也然征伐自諸侯出實由此而始故悉從其恒稱以見實與後中國無伯之事同僖四年春王正月公㑹齊侯宋公陳侯衛侯鄭伯許男曹伯侵蔡蔡潰遂伐楚次於陘六年夏公㑹齊侯宋公陳侯衛侯曹伯伐鄭圍新城十年夏齊侯許男伐北戎十五年十一月壬戌晉侯及秦伯戰於韓獲晉侯十八年春王正月宋公曹伯衛人邾人代齊二十二年夏宋公衛侯許男滕子伐鄭二十三年春齊侯伐宋圍緡二十八年春晉侯侵曹晉侯伐衛三月丙午晉侯入曹夏四月己巳晉侯齊師宋師秦師及楚人戰於城濮楚師敗績文元年夏晉侯伐衛二年春王二月甲子晉侯及秦師戰于彭衙秦師敗績四年秋晉侯伐秦以上君將稱君者十有四凡伯主將而稱君者與之以專征討罪中國無伯諸侯將而稱君者詳其自將以見實二者勢分不同故皆從其恒稱而善惡自見所謂不嫌同辭也僖之初年齊君將稱君者三皆桓公攘夷伐叛之事僖之中年晉及秦戰皆稱君惠公背徳秦穆責報齊桓不能西略也宋襄既納齊孝圖合諸侯稱君將二齊孝以怨報徳稱君將一皆無伯之事自僖末年至文之初晉稱君將七文公尊王定伯功成一歲中有光齊桓襄公戰伐皆稱君與之以繼伯也靈公不親將而盟㑹皆不序成公一自將伐鄭不書政在大夫也由是觀之則伯主將稱君視諸侯將従其恒稱者文同而義異矣文十五年冬齊侯侵我西鄙遂伐曹入其郛十七年夏齊侯伐我西鄙宣元年秋宋公陳侯衛侯曹伯㑹晉師於棐林伐鄭七年夏公㑹齊侯伐萊九年夏齊侯伐萊十四年夏晉侯伐鄭十八年春晉侯衛世子臧伐齊成二年春齊侯伐我北鄙三年春公㑹晉侯宋公衛侯曹伯伐鄭為下日葬月四年冬鄭伯伐許十年夏公㑹晉侯齊侯宋公衛侯曹伯伐鄭為下卒月十三年夏五月公自京師遂㑹晉侯齊侯宋公衛侯鄭伯曹伯邾人滕人伐秦十六年六月甲午晦晉侯及楚子鄭伯戰於鄢陵楚子鄭師敗績秋公㑹尹子晉侯齊國佐邾人伐鄭十七年夏公㑹尹子單子晉侯齊侯宋公衛侯曹伯邾人伐鄭冬公㑹單子晉侯宋公衛侯曹伯齊人邾人伐鄭襄五年冬公㑹晉侯宋公衛侯鄭伯曹伯齊世子光救陳六年十二月齊侯滅萊九年冬公㑹晉侯宋公衛侯曹伯莒子邾子滕子薛伯杞伯小邾子齊世子光伐鄭十二月己亥同盟于戲十年秋公㑹晉侯宋公衛侯曹伯莒子邾子齊世子光滕子薛伯杞伯小邾子伐鄭十一年夏公㑹晉侯宋公衛侯曹伯齊世子光莒子邾子滕子薛伯杞伯小邾子伐鄭秋七月己未同盟於亳城北公㑹晉侯宋公衛侯曹伯齊世子光莒子邾子滕子薛伯杞伯小邾子伐鄭㑹於蕭魚十五年夏齊侯伐我北鄙圍成十六年春齊侯伐我北鄙夏叔老㑹鄭伯晉荀偃衛甯殖宋人伐許秋齊侯伐我北鄙圍郕十七年秋齊侯伐我北鄙圍桃十八年冬十月公㑹晉侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子同圍齊二十三年秋齊侯伐衛遂伐晉冬齊侯襲莒昭六年冬齊侯伐北燕十六年春齊侯伐徐十九年春宋公伐邾二十二年春齊侯伐莒定四年三月公㑹劉子晉侯宋公蔡侯衛侯陳子鄭伯許男曹伯莒子邾子頓子胡子滕子薛伯杞伯小邾子齊國夏於召陵侵楚冬十有一月庚午蔡侯以吳子及楚人戰於柏舉楚師敗績九年秋齊侯衛侯次於五氏十三年春齊侯衛侯次於埀葭十五年夏齊侯衛侯次於渠蒢哀元年秋齊侯衛侯伐晉五年夏齊侯伐宋八年春王正月宋公入曹以曹伯陽歸九年秋宋公伐鄭以上君將稱君者四十三晉君將十六起宣末年止襄之初十四皆景厲復伯悼公中興之事自悼而後唯平一圍齊乃諸侯同欲定之侵楚則劉子之為舍是晉無書君將者矣時征伐自大夫出已久然當晉君自將則諸侯皆親以師㑹過不專在大夫也宣元年宋陳衛曹之君㑹晉師者一明年而趙盾弑君襄十六年叔老㑹鄭伯晉荀偃者一其年平新即位葢征伐自大夫出晉實為之而以大夫用諸侯則趙盾之無君也舍是諸侯無自將㑹大夫者矣齊君將二十三伐魯者七懿二頃一靈四惠伐萊者二皆閒晉之衰欲挾魯以自為而不事盟主也靈滅萊而不親晉悼之盟㑹莊伐衛遂伐晉為伐盟主之始還遂襲莒景伐燕伐徐伐莒而不㑹劉子於召陵三次而後書伐晉且伐宋舍齊諸侯無抗晉者矣成四年一書鄭伯伐許志其反覆乎晉楚之閒也昭十九年宋公伐邾討其入鄅也入曹伐鄭而春秋終焉志中國無伯諸侯自相吞滅也舍宋鄭諸侯無書專伐者矣孔子曰征伐自諸侯出十世希不失矣此春秋君將書君之義也隠二年冬鄭人伐衛五年秋邾人鄭人伐宋冬宋人伐鄭圍長葛十年秋宋人衛人入鄭宋人蔡人衛人伐戴鄭伯伐取之冬十月壬午齊人鄭人入郕桓五年秋蔡人衛人陳人從王伐鄭十四年冬宋人以齊人蔡人衛人陳人伐鄭十七年秋及宋人衛人伐邾莊十三年夏六月齊人滅遂十四年春齊人陳人曹人伐宋十五年秋宋人齊人邾人伐郳鄭人侵宋十六年夏宋人齊人衛人伐鄭十九年冬齊人宋人陳人伐我西鄙二十年冬齊人伐戎二十六年秋公㑹宋人齊人伐徐二十八年秋公㑹齊人宋人救鄭二十九年夏鄭人侵許三十年冬齊人伐山戎僖四年冬十二月公孫兹帥師㑹齊人宋人衛人鄭人許人曹人侵陳七年春齊人伐鄭十五年冬宋人伐曹十七年春齊人徐人伐英氏十九年秋宋人圍曹傳記子魚之諫在國言之陳氏云宋公圍非衛人伐邢二十年夏鄭人入滑傳曰鄭公子士洩堵冦帥師入滑陳氏曰傳見入書人非也未書大夫將不得有異㫖二十六年春齊人侵我西鄙夏衛人伐齊三十二年夏衛人侵狄三十三年春王二月秦人入滑陳氏曰孟明視書人秦未有大夫説誤秦征伐不出大夫冬晉人陳人鄭人伐許文元年夏衛人伐晉傳衛孔達帥師伐晉二年冬晉人宋人陳人鄭人伐秦傳曰晉先且居宋公子成陳轅選鄭公子歸生伐秦陳氏曰晉鄉不書以秦伯在師葢衛左氏之失經未書大夫將不得有異㫖三年春王正月叔孫得臣㑹晉人宋人陳人衛人鄭人伐沈沈潰隠五年秋衛師入郕桓十七年夏五月丙午及齊師戰於奚莊元年冬齊師遷紀郱鄑郚三年春王正月溺㑹齊師伐衛八年夏師及齊師圍郕郕降於齊師九年八月庚申及齊師戰於乾時我師敗績十年夏齊師宋師次於郎為下事月冬十月齊師滅譚僖元年春齊師宋師曹師次於聶北救邢為朝廟告朔月夏齊師宋師曹師城邢二年夏虞師晉師滅下陽傳晉里克荀息帥師㑹虞師伐虢滅下陽陳氏曰傳見滅貶稱師今案未書大夫將不得有二義十五年秋七月齊師曹師伐厲十八年五月戊寅宋師及齊師戰於甗齊師敗績二十八年夏四月己巳晉侯齊師宋師秦師及楚人戰於城濮傳夏四月戊辰晉侯宋公齊國歸父崔夭秦小子憗次於城濮杜氏曰宋公以下皆以師屬晉不與戰陳氏曰三國之君大夫但書師始伯之辭今案圍宋之役楚子雖貶稱人猶不易其班今宋序齊下則非宋公明矣但謂齊秦皆以師屬晉則不可時征伐不出大夫齊卿秦公子不書將則亦當舉師為重杜葢不知此義陳氏又循左氏尊晉侯之失而違其本㫖文二年春王二月甲子晉侯及秦師戰於彭衙傳秦孟明視帥師伐晉此書師例以上征伐稱人者三十五稱師者十四皆文以前征伐不自大夫出之事莒邾而下不入例凡敗例言師小國不入例公羊傳曰將尊師衆稱某帥師將尊師少稱將將卑師衆稱師將卑師少稱人君將不言帥師書其重者此史例也將尊謂大夫而為卿者將卑謂非卿者傳或謂之微者筆削之㫖文以前征伐自諸侯出則雖卿將稱人與將卑師少者同雖卿帥重師但稱師與將卑師衆者同葢征伐之權尚在諸侯則大夫皆奉君命以行得失在其君而大夫之尊卑不足辯也左氏考史牘征伐卿大夫有名氏而經但書人者悉錄其名氏不為無所見而未達筆削微㫖至永嘉陳氏始𤼵不傳之秘而侵伐圍滅異説以磔裂其義則又失之僖以前經無書名者故傳不復詳亦或有不得名氏者然魯以卿㑹者則外應是卿葢事有輕重而大夫之㑹必以其班非有故不得以㣲者徃其以㣲者㑹則大國大夫下於次國之卿若温之盟齊人序鄭人下是也次國大夫下於小國之卿邾人鄭人伐宋是也陳氏謂㣲者皆不書有所重則書於是有得書人之義愈失之矣凡先儒謂小國主兵序大國之上者非莒邾而下大夫微不復序莊二十八年春王三月甲寅齊人伐衛衛人及齊人戰衛人敗績傳齊侯伐衛戰敗衛師數之以王命取賂而還陳氏曰傳見齊侯將書人僖三十年秋晉人秦人圍鄭傳九月甲午晉侯秦伯圍鄭以其無禮於晉且貳於楚也以上伯主將稱人者二秦君將稱人者一齊晉之伯其君將稱君者皆與之也是故苟失伯討之義則奪其恒稱衛人立子頹有輔簒之罪齊桓以王命伐衛取賂而還晉文與秦穆同圍鄭於既服之後秦伯復叛晉而戌鄭二事皆非伯討故雖桓文自將亦稱人皆奪其恒稱以見義也秦伯稱人雖若兩譏之自與後秦君稱人一例義與伯主不同文三年夏秦人伐晉傳秦伯伐晉濟河焚舟取王官及郊晉人不出七年夏四月戊子晉人及秦人戰於令狐傳秦康公送公子雍於晉宣子與諸大夫皆患穆嬴且畏偪乃背先蔑而立靈公以禦秦師戊子敗秦師於令狐陳氏曰傳見秦康公趙盾皆書人十有二年十有二月戊午晉人秦人戰於河曲傳秦為令狐之役故冬秦伯伐晉取羈馬晉人禦之秦軍掩晉上軍乃皆出戰交綏秦師夜遁復侵晉入瑕宣十五年夏秦人伐晉傳秋七月秦桓公伐晉次於輔氏案是年夏無秦伐晉傳而七月傳不見不書之由疑是一事而時月有誤以上秦君將稱人者四秦穆公既倍晉而戍鄭又將因戌人以襲鄭其心事如此使秦得志於諸國其禍豈減於楚哉喪師於殽雖嘗悔過自誓而終不能自克既歸鬭克使求成於楚又以忿兵敗績於彭衙令狐之役曲雖在晉然夫人大子猶在而外求君康公無先見之明以敗其衆而報怨不已葢自穆至景連兵於晉者四世而楚世昬於秦矣故秦晉連兵晉君將恒稱爵而秦君自將五四稱人一但稱國以其始於倍盟以賊中國中亟於報怨而卒自附於蠻荆以為中國之罪人春秋既以繼伯討罪之義與晉襄則秦君不得稱君以敵伯主明王者之政當出於一所以渙羣疑而尊王室也其稱人之義與楚君同而又非中國諸侯之比矣胡氏乃謂聖人以常情待晉襄以王事責秦穆豈經世之義乎春秋之末多流俗之論左氏不能辯其弊至今猶在所謂尊穆公者亦其一也僖二十六年夏齊人伐我北鄙傳齊孝公伐我北鄙公使展喜犒師齊侯未入竟展喜從之乃還襄十八年秋齊師伐我北鄙傳齊侯伐我北鄙以上齊君將稱人者一稱師者一齊孝公伐魯以魯人犒師故未入竟而去公子遂已如楚乞師伐齊取榖魯為已甚矣故雖君將但稱人為用楚師言故而已齊靈間晉悼之卒倍盟伐魯者四皆稱爵以見實至是又伐魯卒致十二國同圍齊之禍故雖君將但稱師為書同圍言故而已一以用楚師報伐見義一以十二國同圍見義則其自將之罪不足詳矣隠十年春王二月公㑹齊侯鄭伯於中丘夏翬帥師㑹齊人鄭人伐宋傳五月羽父先㑹齊侯鄭伯伐宋桓十二年冬十一月丙戌公㑹鄭伯盟於武父十二月及鄭師伐宋丁未戰於宋傳與鄭伯盟於武父遂帥師而伐宋僖十八年春王正月宋公曹伯衛人邾人伐齊五月戊寅宋師及齊師戰於甗以上一役冄有事君將稱人者一稱師者二欲明一事為一役故先詳後略因上文以見之而義愈明與内事蒙上文不書公同法陳氏乃以冄見稱人為貶借令不冄見則遂無貶乎諸貶例皆牴牾不通本非春秋之㫖故也其以内諱而稱人者已見前篇僖三十三年夏四月辛巳晉人及姜戎敗秦師於殽傳曰秦孟明視西乞術白乙丙襲鄭及滑知鄭有備滅滑而還晉先軫曰秦不哀吾喪而伐吾同姓發命遽興姜戎子墨衰絰四月辛巳敗秦師于殽秋晉人敗狄於箕傳曰狄伐晉八月戊子晉侯敗狄於箕以上未踰年君將稱人者二嗣君未踰年稱子出從盟㑹亦稱子以師行者稱爵從史文以見其罪也若夫方伯連率禦宼討亂則魯公伯禽嘗行之矣君子以其不以私憂廢王事無以議為也故晉襄公衰絰行師聖人以其與得已不已者不同略而稱人義不在稱君也陳氏知二傳釋殯之譏為非而又以構秦怨為貶則雖習於變禮之由而於當時事體有不察者自城濮而後楚人帖息中國少寧而秦穆首為亂階縱而弗討同盟之國何所賴乎陸氏曰晉為盟主諸侯服之久矣秦不哀其喪而襲其同姓若不能救則先公之業墜矣故聖人為之諱許其以權變禮異乎匹夫之孝也其論伯者繼述之義諸家所不及然以稱人為諱則襄公之事初不必諱但不使與得已不已者同稱所以别嫌明㣲唯以書敗見義而已敗狄稱人雖葬未三年義與上同而陳氏又以為貶有如不能敗之則將何以為稱乎二十二征伐在大夫則大夫將書大夫微者稱人用衆稱師苟略其恒稱則雖大夫將稱人稱師文三年冬晉陽處父帥師伐楚以救江十五年夏晉郤缺帥師伐蔡戊申入蔡宣元年秋晉趙盾帥師救陳冬晉趙穿帥師侵崇六年春晉趙盾衛孫免侵陳九年秋晉荀林父帥師伐陳冬晉郤缺帥師救鄭十二年夏六月乙卯晉荀林父帥師及楚子戰於邲成二年六月癸酉季孫行父臧孫許叔孫僑如公孫嬰齊帥師㑹晉郤克衛孫良夫曹公子首及齊侯戰於鞌三年秋晉郤克衛孫良夫伐廧咎如六年冬晉欒書帥師救鄭八年春晉欒書帥師侵蔡冬叔孫僑如㑹晉士燮齊人邾人伐郯九年秋晉欒書帥師伐鄭襄元年春仲孫蔑㑹晉欒黶宋華元衛甯殖曹人莒人邾人滕人薛人圍宋彭城夏晉韓厥帥師伐鄭三年冬晉荀罃帥師伐許十六年夏叔老㑹鄭伯晉荀偃衛甯殖宋人伐許十九年秋晉士匄帥師侵齊至穀聞齊侯卒乃還昭元年夏晉荀吳帥師敗狄於大鹵十五年秋晉荀吳帥師伐鮮虞十七年八月晉荀吳帥師滅陸渾之戎定四年秋晉士鞅衛孔圉帥師伐鮮虞五年冬晉士鞅帥師圍鮮虞八年秋晉士鞅帥師侵鄭遂侵衛十年夏晉趙鞅帥師圍衛哀二年夏晉趙鞅帥師納衛世子蒯聵於戚秋八月甲戌晉趙鞅帥師及鄭罕達帥師戰於鐡五年夏晉趙鞅帥師伐衛六年春晉趙鞅帥師伐鮮虞七年春晉魏曼多帥師侵衛十年夏晉趙鞅帥師侵齊十三年秋晉魏曼多帥師侵衛以上晉大夫將書大夫者三十三皆文以後征伐自大夫出之事晉至襄公之末大夫已專陽處父為大傅盟魯侯以王叔桓公伐楚改蒐於董易中軍其汰已甚卒取殺身之禍故經沒桓公而書大夫帥師於是始趙盾衰之子也立靈公冄專合諸侯屢主兵征伐卒將趙穿以陷於簒弑之罪又立成公而相之晉不競者冄世而六卿之禍遂成郤缺芮之子也𫝊克而益專至錡至犫而敗荀林父孫偃庚之子也與欒書同弑厲公傳吳至寅而敗荀罃首之子也傳盈與躒至瑤而敗荀首者林父弟林父之後世襲中行故稱中行氏首分族稱知氏欒書盾之子也傳黶至盈而敗士燮㑹之子也傳匄與鞅至吉射而敗韓厥之子起起孫不信魏曼多舒之孫也趙氏再起至鞅而復彊三家相結以傾范中行氏卒滅知氏三分晉地而自列為諸侯凡皆世卿之效也孔子曰禮樂征伐自大夫出五世希不失矣此春秋大夫將書大夫之義也然襄以前大夫將有書人以見義者自昭而後大夫將皆從其恒稱何也稱人見義者以大夫征伐猶有闗天下之故也春秋為天下作非有闗於天下之故奚議焉自昭而後晉人志不在諸侯而盡力於羣狄伐鮮虞滅陸渾利其俘獲爾齊衛鄭鮮虞助范中行以抗趙韓魏氏故趙鞅納蒯聵戰鄭罕達侵齊伐衛伐鮮虞魏曼多侵衛皆從其恒稱志彊家之亂而已襄元年夏仲孫蔑㑹齊崔杼曹人邾人杞人次於鄫十七年秋高厚帥師伐我北鄙圍防二十四年秋齊崔杼帥師伐莒二十五年春齊崔杼帥師伐我北鄙昭十二年春齊髙偃帥師納北燕伯於陽十九年秋齊髙發帥師伐莒定七年秋齊國夏帥師伐我西鄙八年夏齊國夏帥師伐我西鄙哀三年春齊國夏衛石曼姑帥師圍戚十一年春齊國書帥師伐我以上齊大夫將書大夫者十其事獨在襄公中歲以後齊自國髙以天子命卿為桓公内主子孫世執其政然自孝而下多彊君威福自己出至靈公間晉伐魯而髙厚始書帥師又廢太子光而使厚傅牙以為太子及崔杼立莊公厚以從君於昬見殺杼既專國弑君而卒以家禍覆其宗出慶封放髙止公族猶有人焉其後陳氏以厚施得民景公君臣知其必有齊國而莫如之何國髙之後猶以世卿帥師而齊人冄世弑君不能討至國夏髙張乃見逐書以後為陳氏役而已宣二年春王二月壬子宋華元帥師及鄭公子歸生帥師戰於大棘宋師敗績獲宋華元哀三年夏宋樂髠帥師伐曹六年冬宋向巢帥師伐曹七年春宋皇瑗帥師侵鄭九年春宋皇瑗帥師取鄭師於雍丘十二年秋宋向巢帥師伐鄭以上宋大夫將書大夫者六宋卿皆公族也昭公之弑華氏與焉華元為右師以相文公出魚氏殺楚使者幾亡國然國於晉楚之閒衛鄭交侵而不私圖報復以聴於伯主既又以善於晉楚大夫克合南北之成以向戌為左師而向戌亦以善於晉楚大夫挾弭兵之説成宋之盟故宋大夫書帥師自華元始而歴四世無書大夫將者葢晉人欲以偪陽封向戌戌能讓歸其君既而以弭兵請賞公與之邑司城子罕削而投之向氏欲攻司城左師曰我將亡夫子生我則三子者之從政亦有異於專兵以徼利弱公室而自封者焉至樂髠向巢皇瑗始滅曹與鄭連兵無虚嵗然巢既以弟魋叛奔魯而瑗亦以子䴢故殺身則大夫書將之義可謂明矣成二年夏四月丙戌衛孫良夫帥師及齊師戰於新築六年春衛孫良夫帥師侵宋傳三月晉伯宗夏陽説衛孫良夫甯相鄭人伊雒之戎陸渾蠻氏侵宋十年春衛侯之弟黒背帥師侵鄭十七年春衛北宫括帥師侵鄭襄二年夏晉師宋師衛甯殖侵鄭十七年夏衛石買帥師伐曹十九年夏衛孫林父帥師伐齊定四年秋晉士鞅衛孔圉帥師伐鮮虞十二年夏衛公孟彄帥師伐曹十三年夏衛公孟彄帥師伐曹哀三年春齊國夏衛石曼姑帥師圍戚以上衛大夫將書大夫者十一其以㑹伐冄見者已具晉大夫類中當晉襄之伯孔達以國故干晉以見討晉人良而免之既又背盟救陳見殺孫免㑹趙盾所帥師少故不言帥師良夫世為卿子林父與甯殖出其君而立剽剽黒背之子也殖子喜又弑其所事之君而納故君卒以見殺林父入於戚以叛北宫結以公叔戌之黨逐公孟彄以蒯聵之黨逐孔圉取蒯聵之姊生悝蒯聵因孔姬以刼悝而復國悝亦卒逐石買背盟伐魯見執伯主曼姑為輒拒父皆無足道者觀延陵季子與孔子之言則衛之末世猶有人焉故雖靈公無道而禍不出於世卿云定四年夏四月庚辰蔡公孫姓帥師滅沈以沈子嘉歸殺之十四年二月辛巳楚公子結陳公孫佗人帥師滅頓以頓子牂歸以上陳蔡大夫將書大夫者各一陳蔡國小而役於楚無大國世卿之禍政在公族故二公孫以帥師書然二國之為惡者非公子則公孫也宣二年春王二月壬子宋華元帥師及鄭公子歸生帥師戰於大棘成三年夏鄭公子去疾帥師伐許十四年秋鄭公子喜帥師伐許十六年夏鄭公子喜帥師侵宋襄十一年夏鄭公孫舍之帥師侵宋二十五年六月壬子鄭公孫舍之帥師入陳冬鄭公孫夏帥師伐陳定六年春王正月癸亥鄭游速帥師滅許以許男斯歸十五年夏鄭罕達帥師伐宋哀二年秋八月甲戌晉趙鞅帥師及鄭罕達帥師戰於鐡七年冬鄭駟𢎞帥師救曹十三年春鄭罕達帥師取宋師於嵒以上鄭大夫將書大夫者十有二鄭在春秋為次國自侯宣多後無復異姓之卿公子歸生受命於楚以伐宋敗宋師獲華元而卒以首惡書其後鄭人討幽公之亂斲子家之棺逐其族而穆氏大興於鄭傳記穆公之子十一人其為卿者九人去疾字子良能不受國而讓歸其兄其伐許也楚人以為討而鄭伯背楚歸晉遂世與許仇以至滅許至孫良霄而敗是為良氏喜字子罕子豐欲愬其君於晉喜能止之子舍之孫罕虎皆賢是為罕氏騑字子駟當晉楚爭鄭始則受楚田而叛晉以伐宋遂與宋仇終則反覆兩間以使晉人盡力於鄭楚不敢爭而後固與晉然上弑其君而下侵欲於人卒殺其身以及二卿子夏孫偃是為駟氏發字子國與於子駟之難子僑孫參是為國氏偃字子游子蠆孫吉是為游氏嘉字子孔知子駟之難而不告又將叛晉而起楚師以去諸大夫子展子西殺之而分其室子豐之後為印氏是時子産之賢聞於諸侯子展當國即能立以為卿而子皮卒授之政當晉六卿擅國魯三家不臣齊崔慶顛覆楚人肆暴陳蔡危亡之餘鄭獨隠然其間以禮自持内無世卿之禍外免大國之侮則子産之功也然則子展子皮賢於臧文仲逺矣至罕達復修宋怨而駟𢎞救曹無功則鄭亦衰焉此外唯曹公子首以鞌之戰書小國無彊家不復序文五年夏秦人入鄀十五年夏齊人侵我西鄙宣元年冬晉人宋人伐鄭九年冬宋人圍滕十二年冬衛人救陳成九年冬秦人白狄伐晉鄭人圍許十二年秋晉人敗狄於交剛襄四年冬陳人圍頓十一年冬秦人伐晉宣二年春秦師伐晉三年秋宋師圍曹八年夏晉師白狄伐秦十年夏宋師伐滕為下葬月十二年冬宋師伐陳十三年春齊師伐莒襄二年春鄭師伐宋夏晉師宋師衛甯殖侵鄭以上征伐稱人者十稱師者八皆文以後征伐自大夫出時事左氏不記名氏以其皆㣲者不復詳亦或有不得其名氏者春秋之初征伐在諸侯帥師不必皆卿故書人書師多微者自大夫專兵之後微者帥師亦少觀魯自三家專兵而後無微者將與此所序則可知矣晉悼公卒而後大夫將皆從其恒稱故以後微者之師不復辯文七年夏四月戊子晉人及秦人戰於令狐傳趙盾將中軍先克佐之荀林父佐上軍先蔑將下軍先都佐之戊子敗秦師於令狐九年春公子遂㑹晉人宋人衛人許人救鄭傳公子遂㑹晉趙盾宋華耦衛孔達許大夫救鄭不及楚師十四年秋晉人納捷菑於邾弗克納傳趙盾以諸侯之師入百乗納捷菑於邾十七年春晉人衛人陳人鄭人伐宋傳晉荀林父衛孔達陳公孫寧鄭石楚伐宋討曰何故弑君猶立文公而還宣二年夏晉人宋人衛人陳人侵鄭傳趙盾救焦遂自陰地及諸侯之師侵鄭十年夏晉人宋人衛人曹人伐鄭傳諸侯之師伐鄭取成而還案是時鄭已及楚平晉必不使微者將而伐鄭春秋亦無四國皆微者㑹兵之事鄭亦必不與微者成傳雖不得名氏明四國皆卿也十五年六月癸卯晉師滅赤狄潞氏以潞子嬰兒歸傳晉荀林父敗赤狄于曲梁辛亥滅潞十六年春王正月晉人滅赤狄甲氏及留吁傳晉士㑹帥師滅赤狄甲氏及留吁鐸辰襄十年夏晉師伐秦傳荀罃伐秦報其侵也以上晉大夫將書人者三稱師者二晉大夫與諸侯之大夫將稱人者四凡大夫將稱大夫者征伐自大夫出也苟動不以正與不堪其事則又奪其恒稱趙盾專國立君不審為令狐之役以冄起秦怨興兵以納不正見辭於邾人荀林父士㑹當宋告急畏楚不能救而甘心於羣狄晉楚方爭鄭不能釋秦以畢事於楚荀罃伐秦徒曰報其侵而已此皆所謂動不以正也則奪其恒稱固宜然趙盾孫免侵陳書名氏而救鄭伐宋侵鄭伐鄭凡四大舉皆書人者陳侯既同新城之盟楚子侵陳趙盾救之而陳又叛晉從楚則侵之得討貳之宜也趙盾將五國之衆救鄭而不及楚師宋人弑君林父與諸侯之大夫伐宋猶立文公而還鄭伯曰晉不足與也遂受盟於楚於是趙盾又以諸侯之師侵鄭遇楚輒還鄭伯既㑹晉侯於黒壤於扈楚子伐鄭而晉郤缺救鄭鄭伯亦敗楚師於栁棼鄭之従晉非不堅也晉雖得鄭而終不能服楚則鄭豈能當楚之驟伐哉故栁棼既敗楚師而子良憂之明年鄭及楚平懼晉之不足恃也於是晉又以諸侯伐鄭取成而還明年楚子陳侯鄭伯盟於辰陵又明年楚子入陳又明年楚子圍鄭而荀林父喪師於邲故是四役皆稱人惡其以大夫而專伯討既不能以信義屬諸侯又不能以武力震楚而徒為是紛爭也襄八年夏鄭人侵蔡獲蔡公子燮傳鄭子國子耳侵蔡獲蔡司馬公子燮五月㑹於邢丘十四年夏叔孫豹㑹晉荀偃齊人宋人衛北宫括鄭公孫蠆曹人莒人邾人滕人薛人杞人小邾人伐秦為下事月侯傳諸侯之大夫從晉侯伐秦以報櫟之役也晉待于竟使六卿帥諸侯之師以進及涇不濟叔向見叔孫穆子穆子賦匏有苦葉叔向退而具舟魯人莒人先濟鄭子蟜衛北宫懿子見諸侯師而勸之濟濟涇而次子蟜帥鄭師以進師皆從之至棫林不獲成焉荀偃令曰雞鳴而駕塞井夷竈惟余馬首是瞻欒黶曰晉國之命未是有也余馬首欲東乃歸下軍從之乃命大還晉人謂之遷延之役欒鍼曰此役也報櫟之敗也役又無功晉之恥也吾有二位於戎路敢不恥乎與士鞅馳秦師死焉於是齊崔杼宋華閲仲江㑹伐秦不書惰也向之㑹亦如之衛北宫括不書於向書於伐秦攝也十九年四月丁未鄭公孫蠆卒晉侯以其善於伐秦也請於王追賜之大路使以行以上鄭大夫將稱人者一諸侯之大夫㑹伐而齊宋大夫特稱人者一鄭大夫將於他役或從晉或從楚皆從其恒稱而侵蔡獨稱人者鄭反覆於晉楚之閒久矣事之善惡不待變文而見故大夫將皆從其恒稱於是僖公如㑹公子騑道弑君而立簡公生五年矣公子發又為之侵蔡而奉其幼君以獻捷於㑹將以説晉而免鄭於討也悼公果寘其罪不問是歲楚人伐鄭子駟子國又定畫從楚葢諸國之勢苟未得鄭則未可以圖蔡鄭人内懐反覆而侵蔡以欺盟主故晉卒歸公子燮於蔡而春秋於鄭大夫獨奪其恒稱伐秦之役晉衛鄭大夫皆從其恒稱而齊宋大夫稱人者傳以為齊宋大夫不進師也是年春㑹吳於向齊宋衛大夫皆稱人一役之中而有與奪以悼公之惰也抑諸國之不競諸侯亦有罪焉自令狐以來晉與秦交兵大夫將皆稱人而荀偃獨從其恒稱者悼公以諸侯之師伐秦庶幾能張諸國之勢討秦人黨楚之罪而齊宋大夫不進師則悼公之令外不行於列國矣荀偃欲進而欒黶先歸則悼公之令内不行於臣子矣故荀偃得從其恒稱譏不在荀偃也諸侯大夫知有伯之無益於已而不知無伯之禍又有甚焉故惰慢不攝如此譏不徒在晉也自伐秦而後大夫將無異辭苟無諸國之志則不足議也晉襄公卒而楚君將稱君伯業之偏安也悼公卒而大夫將皆從其恒稱則春秋之世變極矣昭二十三年春晉人圍郊以上晉大夫將稱人者一大夫將從其恒稱久矣此籍談荀躒也其復書人何也晉悼公卒而大夫將皆從其恒稱者苟非伯者之事則其名實不足辯也若夫諸侯寘力王室乃臣子之分所當為不惟責在伯者以晉大夫怠於勤王而從其恒稱是君臣大義以無伯而廢天理民彞以無伯而泯也故特變而稱人明晉雖失伯而王室在難乃諸侯所當勤有不可一日緩者又一義也齊陳恒弑其君孔子沐浴而朝告於哀公請討之曰以吾從大夫之後不敢不告時夫子方脩春秋而不忘討賊如此則其制作之意豈徒曰辯伯者之功過以示後世而已哉晉人怠於勤王事已見第二篇二十三征伐君大夫將稱人不足以盡意則但稱國文十年夏秦伐晉成三年冬鄭伐許昭十二年冬晉伐鮮虞以上君大夫將稱國以伐者三凡外裔舉號君臣同辭如戎狄於越淮夷是也若荆吳與徐則本非外裔荆吳既僣王肆亂而徐之先亦嘗僣王故春秋於此三國者皆以號舉榖梁傳釋荆曰外之則徐吳從可知也然此猶史例也若傳於晉伐鮮虞亦曰外之而何氏范氏陳氏因推以釋秦伐晉鄭伐許則非復史例矣葢君大夫將稱人者變文以示義也其或稱人不足以盡意則但稱國以異之辭愈略者義愈深也然既同於舉號則亦豈諸侯諸國之恒稱哉秦嘗冄納晉君城濮翟泉小子憖皆在焉不為無功於諸國而穆公叛晉以襲鄭敗殽敗彭衙而秦不自反連兵報復者冄世終春秋秦為楚役卒使楚人得志於中國故春秋晉侯伐秦稱爵而秦伯伐晉皆稱人令狐而後秦晉交兵不悉書而秦伯伐晉但書秦杜而絶之同於外裔而已自晉楚爭鄭鄭受兵無虚嵗辰陵竊盟於楚而又徼事於晉既從楚以拒晉又一嵗中冄伐許以怒楚其反覆乎晉楚之間誠外道也故冄伐許稱國言非復諸國諸侯也晉雖不競猶稱盟主楚合諸侯於申伐吳滅陳誘蔡侯般殺之滅蔡而晉人方以詐滅肥伐鮮虞甘心於羣狄故伐鮮虞稱國責其棄中國於楚聴其吞滅非復諸侯之盟主也是皆筆削之㫖也葢狄秦則諸侯之從楚者絶意於中國矣外鄭則諸侯之反覆乎晉楚之閒者不足頼矣至於外晉則天下諸侯皆楚之從而晉之為盟主也末矣二十四外盟㑹恒稱君大夫微者稱人内微者但稱㑹苟奪其恒稱則外君大夫俱稱人内稱㑹同微者一役冄有事稱人僖二年秋九月齊侯宋公江人黄人盟於貫莊十五年春齊侯宋公陳侯衛侯鄭伯㑹於鄄僖三年秋齊侯宋公江人黄人㑹於陽榖宣九年秋晉侯宋公衛侯鄭伯曹伯㑹於扈為下卒月僖二十一年秋宋公楚子陳侯蔡侯鄭伯許男曹伯㑹於盂以上伯主之盟一㑹三宋楚之㑹一皆從其恒稱凡盟㑹吾君大夫在焉者皆序見第一篇外離盟參盟序見第二篇楚主盟㑹序見下篇君稱爵大夫稱名氏微者稱人内微者但稱㑹皆從主人之辭此不重序僖十九年冬㑹陳人蔡人楚人鄭人盟於齊公作公㑹趙氏以為諱不書公據左氏此㑹為陳穆公請脩好於諸侯以無忘齊桓之徳而不言公㑹盟于齊雖齊桓盛時亦無諸侯㑹盟于齊之事況魯有救四公子之嫌終孝公世僖公未嘗如齊其後卒為仇敵則此盟非公親徃可知楚僣大號未嘗與中國㑹盟觀蜀之盟楚嬰齊秦説序宋陳衞卿上則其卑諸侯可見其貴卿必不肯序陳蔡大夫下此葢陳蔡皆卿而楚以微者徃㑹故楚序陳蔡之下鄭又序楚下如蜀之盟齊大夫序鄭下皆非卿也此内稱㑹為微者無疑二十一年春宋人齊人楚人盟於鹿上宋齊皆卿楚微者成二年十一月丙申公及楚人秦人宋人陳人衛人鄭人齊人曹人邾人薛人鄫人盟於蜀傳公及楚公子嬰齊蔡侯許男秦右大夫説宋華元陳公孫寧衛孫良夫鄭公子去疾及齊國之大夫盟於蜀於是乎畏晉而竊與楚盟蔡侯許男不書乗楚車也謂之失位以上列國大夫與楚人盟書人者三自齊桓公卒宋襄暴虐陳穆公請脩好於諸侯以無忘齊桓之德初以諸侯大夫㑹盟而楚人得與中國盟㑹於是始宋襄又不度徳量力求諸侯於楚而為鹿上之盟至有盂之執辱泓之敗績於是魯挾楚以抗齊為東諸侯事楚之始陽橋之役納賂請平公㑹楚公子嬰齊及十一國之大夫盟於蜀則中外之分蕩然矣故三盟列國大夫皆奪其恒稱責其墮中國之大義也内不諱公者陽橋之役由魯致之公親㑹嬰齊而即魯地為盟事不可諱而亦與内惡私恥不同故不沒公以見實也至晉楚為宋之盟以南北諸侯交相見乃從其恒稱者聖人不以空言作經其有辯於名實之際葢將以正名而責實也齊與鹿上召陵之威烈未冺蜀之盟雖曰東方諸侯皆在而猶有晉也故皆奪其恒稱以示義晉悼公卒齊始叛晉晉知不競於楚而遂以諸侯與之則春秋將何所辯乎故晉楚之盟㑹大夫亦從其恒稱以見實而已僖二十九年夏六月㑹王人晉人宋人齊人陳人蔡人秦人盟于翟泉傳公㑹王子虎晉狐偃宋公孫固齊國歸父陳轅濤塗秦小子憖盟于翟泉莊十三年春齊侯宋人陳人蔡人邾人㑹於北杏襄八年夏季孫宿㑹晉侯鄭伯齊人宋人衛人邾人於邢丘傳五月甲辰㑹于邢丘以命朝聘之數使諸侯之大夫聴命季孫宿與齊髙厚宋向戌衛甯殖邾大夫㑹之鄭伯獻捷於㑹故親聴命以上列國大夫盟王子稱人者一㑹伯主稱人者二禮卿不㑹公侯豈有列國大夫上盟王子之理翟泉之盟下陵上替之始也故王子與大夫皆變文稱人以尊王室而沒公不書凡大夫㑹諸侯經皆直書而失自見北杏邢丘㑹列國大夫以聴政乃伯主之所得行故大夫稱人以尊伯主經所以奬成伯功也傳曰大夫不書尊晉侯也北杏傳不得大夫名氏故於邢丘發例陳氏解㑹盟於幽為齊初主盟不言公與奪不一以經傳事理考之非是宣十二年冬晉人宋人衛人曹人同盟於清丘傳晉原縠宋華椒衛孔達曹人同盟於清丘曰恤病討貳於是卿不書不實其言也宋為盟故伐陳衛人救之襄十四年春王正月季孫宿叔老㑹晉士匄齊人宋人衛人鄭公孫蠆曹人莒人邾人滕人薛人杞人小邾人㑹吳於向傳㑹于向為吳謀楚故也於是齊崔杼宋華閲仲江㑹不書惰也衛北宫括不書於向書於伐秦攝也二十六年夏公㑹晉人鄭良霄宋人曹人於澶淵傳衛人侵戚東鄙孫氏愬於晉晉為孫氏故召諸侯六月公會晉趙武宋向戌鄭良霄曹人于澶淵以討衛疆戚田三十年冬晉人齊人宋人衛人鄭人曹人莒人邾人滕人薛人杞人小邾人㑹於澶淵宋災故傳曰為宋災故諸侯之大夫㑹以謀歸宋財冬十月叔孫豹㑹晉趙武齊公孫蠆宋向戌衛北宫佗鄭罕虎及小邾之大夫㑹于澶淵既而無歸于宋以上大夫同盟稱人者一㑹而有稱大夫有稱人者二㑹而稱人者一清丘同盟晉以原縠主之而衛人背盟救陳大夫不足主諸侯明矣澶淵之㑹謀歸宋財既而無歸合諸侯以行私惠而又不踐其言非盟主之道也故皆奪其恒辭稱人叔孫豹㑹不書陳氏曰譏不在魯也向之㑹齊宋衛大夫以惰慢不攝稱人澶淵之㑹以鄭不助叛臣故良霄獨從其恒稱與奪之義著矣自昭公而後大夫之㑹皆從其恒稱不足議也楚圍尋宋之盟於虢合十有一國於申伐呉執齊慶封遂滅賴滅陳執陳公子招殺陳孔奐誘蔡侯般殺之圍蔡滅蔡而晉合八國於厥憖不能救蔡合十國於黄父不能勤王合六國於扈不能納魯昭公春秋治在夷狄而晉之君卿不足議則從其恒稱可也桓十年冬十二月丙午齊侯衛侯鄭伯來戰於郎十一年春正月齊人衛人鄭人盟於惡曹以上一役冄有事前稱君後稱人者一戰稱君盟稱人者前書來戰則其罪已著矣欲明二事為一役故蒙上文略稱人以見之也陳氏曰此戰郎諸侯也凡一役而冄見者但人之略之也春秋屬辭巻十一
