body:
  text: 春秋屬辭巻十四元趙汸撰因日月以明類第七春秋記事之例有三事以日決者繫日以月決者繫月踰月則繫時此史氏之恒法自魯公以至定哀之閒官守相因不得有改者也東周王室衰微四裔僭號五等邦君以彊弱易周班而伯者之興幾於改物其災祥禍福之變禮樂政刑之亂必皆有非常之故焉史氏以其三例者一以施之而是非得失混淆雖有彼善於此者亦無從見矣左氏傳釋大夫卒有不日之例則天子諸侯喪紀厚薄尤所當詳傳於魯史遺法有不能盡知而況於筆削之義乎葢孔子之修春秋也凡策書之大體既以實録而存其王伯之㑹中外之交父子君臣之間皆有筆有削以彰其義至於上下内外之無别天道人事之反常史之所書或文同而事異或事同而文異者則皆假日月以明其變決其疑大抵以日為詳者則以不日為畧以月為詳者則以不月為畧其以日為恒者以不日為變以不日為恒者以日為變甚則以不月為異其以月為恒者以不月為變以不月為恒者以月為變甚則以日為異將使學者屬其辭比其事以求之則事之存乎筆削者既各以類明而日月之法又相為經緯以顯其文成其義凡灾祥禍福禮樂政刑盟誓戰爭天下之故一國之事一人之辭無微不顯而上為天子内為吾君外為諸侯為伯主又其外為外裔有天子之大夫有吾大夫有外大夫又皆有弟兄姑姊妹之屬大夫又有未命者外裔亦有君臣其等衰勢分甚嚴善惡淺深竒變極亂皆以日月見之如示諸掌使文武周公之大經大法煥然復明非天下之至聖其孰能與於此左氏雖不知日月有義而所記之事與聖人之法若合符契公羊榖梁顯發斯例必有所受而隨事穿鑿不可推尋說春秋者遂諱言日月矣近世唯西疇崔氏經解本日月起義然屬比不精而類例多舛則其鮮合固宜其他皆主杜氏史有詳畧經有闕遺之説嘗竊疑之日月為例史有定法文初不繁不當以人而變今經有一嵗之間而詳畧特異者不可復言其人不同名號國地事物之文闕者至少何甲子之文闕者獨多是皆不通之論也乃離經稽類因類為凡凡疑於例者以著例決之然後筆削之㫖備矣其間亦有因用舊法者既為聖筆所書即成經義不當復别而言之然而學者苟不深究筆削源流則失傳之㫖無由可見故必新舊相發隠顯互明而後其義自彰葢一經之體皆然不盡釋也以其法貫乎全經與諸篇者不同故自為一篇而次於此一著例凡日事其法二曰有日有不日曰有日有不日有不月謂事以日決史本書日者凡月事其法一曰有月有不月謂事以月決史本書月者凡上有繫日之事而下有不日之事嫌於同日則書是月以明月例僖十六春王正月戊申隕石是月鷁退飛下有同日之事嫌於不日則再書其日以明日例桓十二十一月丙戌公㑹鄭伯盟丙戌衞侯卒以下皆史法特序于此見春秋日月法其嚴如此明先儒史有詳畧之說不然苟二役為一事則蒙上事日僖二十八盟于踐土與朝王所同日因㑹盟而有朝故别書朝而蒙上日凡一月有二事俱合日而前事赴在後者則以往日附來日僖九九月戊辰諸侯盟甲子晉侯卒甲子在戊辰前四日杜氏曰書在盟後從赴赴在後月者則以其日繫後月成九七月丙子齊侯卒杜氏曰丙子七月一日書七月從赴定四王二月癸巳陳侯卒杜氏曰癸巳正月七日書二月從赴二疑例凡同月事有兩事皆合月者則以下事蒙上事月事不合月而上有合月之事則不得去上事之月事不合月而下有合月之事則為下事月苟二後為一事則不為下事月僖二十八冬㑹于温天王狩于河陽壬申公朝于王所壬申十月十日也有日無月見非㑹諸侯則無朝故蒙上不月事皆以著例見之此以下皆筆削之㫖三變例凡一役再有事嫌以日事敵上事則取下事之日加上事莊二十八春王三月甲寅齊人伐衛衛人及齊人戰史法日戰而月伐經改正之不使衛人得敵王命嫌以日事同下事則取下事加日事之上宣十一冬十月楚人殺陳夏徴舒丁亥楚子入陳傳記楚子入陳後殺夏徴舒經改正之不以入陳累其討賊譏在上事則取下事之四例要凡日為詳則不日為略天子崩日嗣王卒不日天子𦵏以日為恒諸侯葬以月為恒詳尊略卑内夫人𦵏日外夫人不日内女卒日王姬卒不日詳内略外桓文之盟盛時則日餘皆不日詳重略輕外裔滅國以君歸日自相滅不日詳内略外月為詳則不月為略公侵月大夫侵不月詳尊略卑執内大夫月外大夫不月外次伐我月凡次不月詳内略外王人救衛月凡救不月詳重略輕凡日為詳不日為略則不月為彌略内刺公子日外殺我所納之子不日外殺大夫不月外裔為中國討罪日入中國不日自相入不月之類凡不月為略月為詳則日為加詳七月雩不月八月九月雩月一月再雩皆日外災不月亡國灾月外灾夫人卒則日之類凡日為恒則不日為變天王葬日不及禮不日諸侯夫人卒日國亡不日不日為恒則日為變公即位不日不在正月則日諸侯大夫葬不日國亡則日之類凡日為恒不日為變則以不月為異烝嘗有事皆日用致夫人不日從祀先公則不月公及外大夫盟日及王卿士不日及外大夫無君則不月諸侯卒日弔不以禮不日赴不以時則不日之類凡月為恒則不月為變公狩月諱與讐狩不月來盟月國君來盟不月之類不月為恒則月為變盟主之㑹不月無成事則月之類凡月為恒不月為變則以日為異諸侯葬月不及禮不月僣禮則日内取所争邑月凡取邑不月一舉取二邑則日之類凡日為重則不日為輕新宫灾日屋壊不日星變日鷁退飛月之類不月為輕則月為重凡執國君不月遂失國則月大夫出奔不月必佚賊而後月之類凡月為輕不月為重則以日為異諸侯出奔月失國不月以臣出君則日諸侯入歸月非出奔不月弑君以納君則日之類凡日為重不日為輕則以不月為異外參盟日有微者不日外裔之盟不月之類準此推之五灾祥類凡日食在正朔者書日書朔桓三莊二十五二十六三十僖五文十五及成以後唯襄十五年不書朔餘皆書日書朔葢周厯交朔之法於是始正公羊傳曰曰某月某日朔者食正朔也雖在正朔而食於夜者書朔不書日桓十七周人以夜半為朔故得言朔日未出故不言日史記推合朔在夜明旦日食而出出而解是為夜食案縠梁傳以不言日不言朔為夜食言日不言朔為晦食於理未當唯取夜食之説以足公羊傳闕文食在朔後者書日不書朔隠三僖十二文元宣八宣十宣十七襄十五公羊傳失之前者朔在前何氏謂二日食今案雖非正朔猶是此月所統之日故書日食在朔前者日朔皆不書莊十八僖十五公羊傳曰失之後者朔在後也何氏曰謂晦日食今案日與月違故曰朔皆不書凡星變日莊七隕石日僖十六星孛月文十四哀十三久則不月昭十七凡無氷時三雨木氷月成十六霜異月僖三十三定元雨雪月桓八大雨雪不月僖十大雨雹不月三在時首書其月不與例違大雨震電繼以大雨雪俱日震廟日各一凡火灾日内灾六大室屋壊不日非天灾凡外灾不月莊二十襄九雖成周不月宣十六唯已滅之國月昭九外灾夫人卒然後日襄三十四國同日灾日昭十八凡地震日自文至哀五山崩不月成五梁山唯沙鹿崩日僖十四公羊傳曰沙鹿者河上之邑也崩襲邑也何氏曰襲者陷入于地中今案左氏不言沙鹿是山但記卜偃曰期年將有大咎幾亡國則沙鹿崩比山崩尤重可知葢地䧟也凡一時不雨書時莊三十一踰時不雨書首月僖二僖三再書皆以告廟故不雨而雨書月僖三亦以告廟故且見至是月方雨踰三時不雨書自某月不雨至于某月文二文十十三凡無麥苗無麥禾旱二饑三有年大有年皆時史本無月法大水時八凡有蜚有􅈮多麋鸜鵒來巢皆時各一見史本無月法獲麟時時田本不月鶂退飛月凡螽螟月螽七螟二唯秋初不月螽三螟一據經無書七月螽者凡秋螽不月皆七月也螽始出則為灾灾不止此一月故不月蝝生不月宣十五蝝成螽乃為灾灾不在此月故不月穀梁傳曰甚則月不甚則時其義未盡六郊廟類凡郊日成十七定十五哀元不郊猶三望不日僖三十一宣三成七凡卜郊不從月僖三十一成十襄七十一牛傷月宣三成七定十五哀元凡雩過祀節未逺者不月七據經不書七月雩定七年秋書三事繫時方書大雩又書一事乃書九月大雩知凡雩繫時者皆七月傳曰龍見而雩謂建巳之月為嘉穀祈廿雨周七月過雩月未逺故不月以别過時之甚者逺者月八月四九月七一月再雩皆日昭二十五據書七月雩止此一處葢譏在又雩過甚者則又不月昭七年冬大雩凡日食大水用牲于社各隨本事不入例凡烝嘗日桓八再烝桓十四嘗大事有事吉禘皆日文二因大事而躋僖公宣八昭十五有事閔二吉禘猶繹日宣八用致夫人不日僖八禘于大廟夫人已絶而祔考宫非適不日隠五仲子從祀由陪臣則又不月定八陽虎所為凡作主日文二立武宫日成六立煬宫由叛臣則不日定元季孫出君嘗有禱于煬宫凡丹楹刻桷皆不月刻桷為下葬月取郜大鼎納于大廟日桓二宋督之賂七㛰姻類凡逆女不月卿為君逆三微者逆一雖公親迎不月莊二十四必國君送公㑹之而後月桓三凡夫人至不日三必書入然後日莊二十四大夫宗婦覿用幣日莊二十四凡子生日桓六凡逆后不月襄十五雖我主之不月桓六凡來逆女月隠二内女來逆婦求婦皆不月各一杞伯姬著例凡女歸月四來寧而歸一娣不與適俱行月雖國亡歸其邑月紀叔姬來媵不月三凡外女歸京師桓九送王姬荘元王姬歸莊元十一雖我主之皆不月略於王史異内女凡大夫來逆妻不月荘二十七莒慶宣五齊髙固為下事月八喪紀類凡天王崩日凡至尊當謹崩日弔禮不備以求賻求金見義嗣王未踰年卒弔不備禮不日王子猛卒亂未弭諸侯弔不以禮可知王姬卒雖魯主昬不日外夫人禮殺於内女凡公薨日十一嗣子未踰年卒日待猶君詳内事雖諱弑猶日子般必子弑母出而後不日子惡特異其事凡夫人薨日五不稱夫人亦日孟子定姒尊同妾母稱夫人日五不稱夫人亦日君氏親同凡外諸侯卒日弔不備禮不日苟赴不以時則又不月禮雜記凡諸侯弔者有介有含者有禭者上介賵執圭將命上客臨自稱一介老某必大夫也亦有既葬而弔者檀弓言滕成公之喪魯使子服敬叔弔進書則君有弔書其禮如此而當時小大之國貧富懸絶交際不同宜多不備今考之經齊君書卒者九皆日晉君書卒者十書日者九不月者一楚君書卒者六皆日可見魯事盟主及大國弔贈之禮無敢不備其不月者晉侯夷吾踰年而後告喪史即告時書之自不容有月然文公既非喪主則弔禮必不用常制矣宋公書卒者九不日者二衛侯書卒者九皆日陳侯書卒者十不日者一蔡侯書卒者六不日者一不月者一鄭伯書卒者十皆日可見魯於齊等之國往來有常則弔贈無不備禮者其不日者皆有故也其不月者蔡服於楚齊桓自侵蔡蔡潰之後問不及蔡故赴不以時而魯亦不弔也苟非其國有他變則魯亦安敢無故殺禮以犯不韙乎其於小國事體又異曺君書卒者十一書日者二必吾君嘗親受其朝者其來朝而不月者卒于師也檀弓記曺宣公卒于㑹諸侯請含使之襲則凡卒于㑹者不復以禮赴諸侯諸侯亦不得備禮以弔可知故卒于師卒于㑹皆不月滕君書卒者七不日者二其先皆不名則往來者素薄又降而稱子則玉帛之將者微雖來朝不得與曺比自來奔喪後乃遣卿㑹其葬而卒無不日葬無不㑹則亦視施為報也杞書卒者七不日者二成與文魯人皆以私怒降其爵其薄於弔贈無足疑者不月者一悼卒于㑹薛書卒者四無朝魯者而書日一則意如出君後致恭於宋之屬國也邾書卒者七不書日者三邾雖後封而彊次曺莒世有魯怨五世不㑹其𦵏則不日者其常也秦君書卒者六不日者二往來之禮薄也不月者三赴不以時也許書卒者五不月者三穆卒于師元國滅復封赴不以時也莒與吳皆從夷俗禮有不得行宿君書日卒一魯宋嘗盟于其國也詳見第一篇凡内女為諸侯夫人卒日二來歸卒日子叔姬杞叔姬許嫁卒日伯姬唯國亡不日紀侯將去國伯姬喪不成叔姬弔葬如夫人禮魯人以義起凡夫人卒日二十六公不與小斂則不日四隠元年傳曰衆父卒公不與小歛故不書日杜氏曰禮卿佐之喪小斂大斂君皆親臨之崇恩厚也始死情之所篤禮之所崇故以小斂為文至於但臨大斂及不臨喪亦同不書日今案大夫卒不日者四公子益師無駭挟叔孫得臣也公實不臨喪而書日者六公子牙實殺書卒公孫敖仲遂公孫嬰齊卒于外叔孫婼叔倪卒時公在外皆勢不得臨非君恩薄故書日如常法左氏所發春秋日月例唯此一事然先儒鮮従其説者今以全經筆削之㫖考之知此法實魯史舊章但左氏考之不詳至聖人修春秋凡所書之事皆以日月為例而權其輕重則又非史法之所能及矣其崩薨卒𦵏例與此同出魯史無可疑者葢弔𦵏失禮乃史氏所當謹也唯事有異常史法不足以盡其變則非聖人莫能修孔子葢曰其義則某竊取之矣凡王卿士卒不日弔贈禮薄王臣不外交唯二子以義起凡葬我君日九小君日五不成喪亦日夫人一妾母稱小君日四詳内事凡葬天王日襄王不及禮不日四禮天子七月而𦵏五重八翣正棺引窆執綍各千人明器衣服邉車牢具凡役稱是故天王葬得禮則日不及禮不日從周之義也今考經唯襄王合葬節亦唯襄王書日桓王七年而𦵏匡王四月簡王五月景王三月其不能葬至七年則𦵏速者禮薄可知襄王當晉文襄之世王室稍振獨能備禮也凡葬諸侯月苟不及禮則不月必厚葬踰禮而後日禮諸侯五月而𦵏三重六翣上公四重執綍五百人遣車七乘明器凡役稱是不可更過矣左氏内外傳皆載晉文公請隧事宋葬文公用蜃峽益車馬重器備椁有四阿棺有翰檜雖華元樂舉有不臣之譏然檀弓記宋襄公葬其夫人醯醢百甕則厚葬之弊有自來矣然或大國多故而小國削弱則亦有不及禮者如有若言晏子遣車一乗及墓而反譏其不留賔客有事則諸侯之儉者亦此類也今考經齊葬九君書日者四皆孝公以前侈盛之時不月者一則公子光之不子也晉葬六君唯文公書日宋𦵏六君書日三其一為與夷葬穆公其二皆華元為之衛葬入君書日者二穆變禮襄錫命皆臣子之意其一不月則繼絶之文公也蔡葬七君書日者一蔡季歸國而厚於先君舍是十一君葬無書日者矣陳葬八君皆不日不月者三鄭葬七君皆不日不月者三秦葬三君皆不日不月者一陳國貧秦鄭爵卑故皆無僣禮其不月者則有故也自餘小國多不月則不月者為禮不備明矣春秋於其踰禮則存其日比諸天子以明其僣其不及禮者則不月以見其薄唯得常者則月之葢天子以日為常則諸侯以月為常等哀之義也崔氏曰凡大國次國之葬例月其越禮而葬者僣也故加日以見之其不及禮而葬者偪也故去月以見之傳稱宋華元樂舉厚葬文公今宋文之葬實日衛文侯之儉也今衛文之𦵏實不月以類考之可知矣古人以送死可當大事故春秋以葬禮為重於其有過不及者皆明著以見譏焉是以大國之僣禮者多而次國之僣禮者少次國不及禮者多而大國之不及禮者少葢唯天子無僣而小國無偪爾案崔氏日月例唯此與魯桓盟㑹得之故特詳考經傳以申其説凡𦵏畿内諸侯不月劉文公王卿士也當時天子且不備禮則王臣之葬禮薄可知凡内女為諸侯夫人葬不日宋共姬唯國亡則日紀伯姬紀叔姬外𦵏以月為常則以日見異姑姊妹之喪公為之服故卒従内辭實外夫人故葬従諸侯之例九禍福類凡公即位不日七即位不在正月則日定公日食必在月朔史猶書日公即位大事也雖必在正月朔日史法亦當書日以謹始今皆不日者葢筆削之㫖略常以明變昭定之間踰年無君國家之大變也凡天王居與入皆月昭二十三秋七月天王居狄泉上下有同月事又書八月地震以下冬十月入成周例之知二事皆月未成尊則不月崔氏不知此義遂疑王猛非正謬甚苟出居則不月襄王蒙塵與敬王復辟異凡公孫日一同以臣出君例夫人孫不日二婦人非罪不出奔凡公孫反行書至書居月一自所居邑行書至書居不月四皆昭公天王居與出居皆以内辭書與此同凡内女為夫人來不月杞伯姬三一朝其子求婦别見雖來歸不月郯伯姬苟非以罪出則月杞叔姬不安於杞杞伯來朝而告絶既卒又逆其喪以歸非罪出故特月明與郯伯姬異可決學者千載之疑凡諸侯出奔不日出奔三來奔二同僖二十八衛侯蒙上事月必以臣出君而後日襄十四衛侯苟遂失國則又不月紀侯大北燕伯欵蔡侯朱莒庚輿未成君不月鄭忽曺羈莒展輿凡諸侯入不日入國一衛侯朔入邑二鄭伯突衛侯衛侯蒙上事月復歸不日衛侯鄭必弑君以納君而後日襄二十六衛侯衎苟非出奔則又不月復歸一僖二十八曺伯襄歸二僖三十衛侯鄭成十六曺伯皆以見執得歸未成君不月桓十五鄭世子忽傳六月乙亥昭公入歸而繼絶不月昭十三蔡侯廬陳侯吳凡公子以簒歸不月二曺赤著例入不月二齊小白著例案獲麟後衛世子蒯瞶自戚入于衛書日入而繼絶不月許叔凡内大夫出奔日三苟有闗於一國之大故則不日三慶父之亂閔弑僖出歸父諜去三桓公薨不遂三家之勢所以成公子憖寡謀妄動昭公之所以終扵出也與禍福在一已者不同故異之凡外大夫公子出奔不月三十三著例十九來奔不月十一著例八雖王卿士不月成十二周公必佚賊而後月王子瑕尹氏毛召子朝宋萬作亂而出則月昭二十宋華亥向寧華定義同佚賊案獲麟後宋向魋以叛出衛子還成以伐公不果出皆書月陳轅買衛公孟彄出不書月此成舊法叛而出又不月昭二十二華亥向寜華定内因二司馬入國以叛外有吳楚之助諸侯救宋者畏楚而出之治不止佚賊凡内大夫來歸季子外大夫歸五三著例復歸元咺著例入良霄樂大心復入魚石欒盈著例皆不月雖入以叛不月入國一入邑四必歸弑君而後月楚公子比凡執國君不月入著例三歸亦不月雖三公不月虞公遂失國則月僖十九宋人執滕子嬰齊以失國名執外裔之君雖失國不月昭四楚人執徐子凡執大夫不月八著例六雖王卿士不月可決單伯非内大夫唯執吾大夫則月三季孫行父著例執大夫于京師則月宋仲幾執大夫使廢立則月鄭祭月凡臣弑君日九以簒首惡不日楚公子比弑未踰年君不日齊舍别成君苟庶孽見弑則不月晉卓齊荼不稱君不月晉奚齊凡稱國以弑日非當國者稱國不日晉欒書中行偃皆正卿莒僕吳光事與之異薛弑其君不月無可考凡稱人以弑日非微者稱人不日齊邴􅧬閻職實微者宋莒實非微者凡世子弑君日所由來者異不日蔡侯淫而不父與楚子頵許悼公不同凡閽弑不日賤刑人非盜而稱盜則日蔡公孫翩以盜赴凡外戕他國君不日宣十八鄫子誘而殺之日蔡侯般穀梁傳曰外裔之君誘中國之君而殺之稱時稱月稱日謹之也案日必有所繫時月不必合時月取義執而用之日僖十九鄫子凡内刺公子日公子偃苟以説大國則又不月公子買凡外殺大夫公子不月三十五雖殺嘗弑君者不月里克甯喜相殺不月宣十五年王札子昭八陳招昭十三楚棄疾文六晉殺陽處父昭十四莒殺意恢盜殺不月襄十鄭昭二十衛哀十三陳雖殺世子不月晉申生宋痤殺其弟雖天王不月佞父必殺我所納應立之子而後月子糾放大夫不月二凡外殺簒立者不月齊無知陳佗不以罪討殺叛者不月鄭良霄晉欒盈必討賊若衛人而後月州吁凡外裔相誘殺不月楚子殺戎蠻子殺他國大夫不月三皆為上事月必討賊若殺陳夏徴舒而後月特書討賊繫月於入陳之上比衛人殺州吁以與之十朝聘類凡公朝王日二諸侯來朝不月三十六著例二十二以小事大以弱服强非邦交舊典故去月以為恒畧言之也其為下事月者不與例違外裔來不月介葛廬白狄觀魯公外如諸侯來朝與外裔來矣同不月之法則經意可見内女使其夫來朝則月鄫子畿内諸侯來則月祭伯州公王臣無外交皆異其事凡公如不月十九雖以事往稱其事不月三皆畧之必如京師而後月異於列國必如楚而後月二異於中國苟如以四時首月則書其月八非王事不敢廢王正與時首兼存史法見本書月宣九襄八定三著例凡公如而至不月十八必嘗見止而後月成十一下㑹至著例必奔諸侯喪而後月宣十成十一必自楚而後月宣二十七昭七皆異常苟至以四時首月則書其月文十四昭五其餘皆為下事月凡㑹而至不月二十六㑹師盟戎同必嘗見止而後月僖十七以師行至不月伐十三侵三圍二救一成十六十七二至㑹同必㑹外裔伐中國而後月哀十苟至以四時首月則書其月至㑹三至伐二伐而至㑹一凡夫人如不月四其合禮而至則月文九夫人如不月與公同而至則月與公異踓歸寕得禮亦謹其至男女之别也苟如以王月則書其月荘二十不敢廢王月略於君婦人無外事凡大夫如不月如京師四如陳二如宋五如衛一如邾一如齊十七如晉二十五如楚一如莒一如牟一雖以事往稱其事不月其執而至亦不月降於君據大夫如多特繫時又文六年秋襄七年秋二如皆下書八月九年夏下書五月知本不書月其昭二十三王正月叔孫婼如晉為下日卒月餘皆為下事月凡諸侯相如不月齊侯鄭伯如紀州公如曺雖以事來稱其事不月奔喪㑹葬為葬月苟來獻㨗則月失伯主之道故齊人歸俘不月楚使獻捷不月可決此為齊侯親來來逆出妻之喪則月成九杞伯凡列國來聘不月陳一齊五晉十一宋四衛四鄭一秦一荆楚二吳一雖以事來稱其事不月二及妻來一稱人來六不言其事不月齊仲孫必來歸其助祭之邑而後月歸祊必來歸所執吾女而後月齊子叔姬必楚以聘報朝而後月襄三十嫌與伯國同凡王使來聘歸脤會葬不月周官舊典錫命三一著例歸賵歸含㑹葬妾母來求求車皆月私恩失禮來求非王命則又不月二諒闇譏不在天子王臣私交不月祭叔十一盟㑹類凡内離盟日隠六艾文十七穀定十二黄雖與伯國盟日荘二十三扈文三十三襄三皆及晉侯唯宜盟則不日隠元于蔑閔元落姑苟無成事雖㑹伯主盟不月荘十三于柯魯背盟凡内參盟雖有大夫日僖二十五汛二十六向苟無成事則又不月昭二十六鄟陵謀納公不克凡外離盟有闗於諸侯之合散不月隠三石門為下事月定七于鹹于沙定八曲濮唯隠二于宻闕文凡外參盟日隠八瓦屋有微者不日僖十九曺南君稱同微者不日桓十一惡曺凡桓文之盟不日桓幽貫雖公㑹不日桓幽首止寗母洮牡丘内諱公而外稱人不日文翟泉唯其盛時則日桓葵丘文踐土凡晉主夏盟恒日㑹諸侯十一大夫主諸侯一諸侯㑹而大夫盟三唯畧不序諸侯不日二扈盟不足以服貳不日成九蒲盟而後執諸侯不日襄十九祝柯晉不主盟不日定四皋鼬大夫㑹之不日文二垂隴成十八虚朾苟大夫㑹大夫稱人則又不月宣十二清丘諸侯不序不日則大夫稱人宜降凡公及外微者盟日隠八浮來及大夫雖諱公猶日齊髙傒晉處父荀庚郤犫衛孫良夫宋向戌唯及王卿士不日文十蘇子苟不諱公而無成事則又不月荘九于蔇凡大夫與外大夫盟日二雖㑹微者盟日襄二十向苟内外皆微者則不日隠元宿凡内大夫特盟諸侯不月三自參以上不日桓十一折必見伐以賄盟然後日文十六齊侯必伐其國要之盟然後日哀二邾子苟以遂事盟則又不月荘十九公子結凡内涖盟不月四外來盟不月三雖國君不月襄二十九把子以輔簒來盟則月文十五宋司馬華孫宋人将弑昭公華孫公子鮑之黨也其來盟實結魯為援非君命故不稱使嫌與齊髙子同故書月以異之苟來盟于師則日齊國佐敗績後請服凡外裔之盟不月僖二十狄三十二狄宣十一辰陵雖來盟不月屈完與盟不月于齊鹿上必吾君大夫特與之盟而後日隠二文八皆戎以兵加中國公㑹之盟日僖二十一于薄二十七于宋成二于蜀兩主之雖吾大夫及盟日襄二十七于宋凡魯桓之盟皆日六唯盟戎不日桓二説見桓㑹下凡内離㑹不月四外㑹公不月文十三衛侯鄭伯必參㑹而後月隠十定十四凡離㑹離盟皆兩國之志自諸侯合而為亂始有参盟參㑹中丘為魯合齊鄭之始牽為魯合齊衛叛晉之始故月以異之參㑹有大夫則不月哀十二鄖遇不月三凡公㑹内女荘二十七㑹師定八夫人㑹齊侯荘二禚荘七防穀倍十七卞如師莊五皆不月夫人享齊侯以王月則書其月荘四凡外離㑹不月定十四雖參㑹不月定十唯始懼楚而㑹則月桓二凡諸侯來朝不月則七月為㑹鄧書遇不月三胥命不月一凡盟主之㑹不月四雖公㑹之不月十二雖王卿士㑹之不月單伯必無成事而後月僖元年于檉謀救鄭而不成救十六年于淮城鄫不果而還襄七年于鄬救陳陳侯逃歸二十四年二十五年二夷儀伐齊一大水不克蒙日食月一受賂不討賊蒙弑君月皆以前例見之凡大夫與大夫㑹不月襄三十澶洲昭二十七扈内大夫㑹之不月十二諸侯與大夫㑹不月定十安甫伯主之㑹亦不月荘十三北杏僖三陽穀雖吾君㑹之不月襄二十六澶淵内大夫㑹諸侯亦不月四凡外裔與諸侯㑹不月僖二十一盂昭四申雖吾君特㑹之不月隠二潜哀七鄫十二槖臯吾君㑹諸侯及之亦不月哀十三黄池㑹又㑹亦不月襄十柤必㑹而及盟而後月成二蜀吾大夫㑹之不月宣十五宋襄五善道昭九陳哀六柤必㑹又㑹而後月成十五鍾離襄十四向凡魯桓之㑹皆月唯不遇不月十年今案日月有例所以權事之輕重而别其同異桓内弑其君而結鄭以定其位取鼎以成宋亂又與鄭突同惡相濟雖昬于齊而不能為紀求齊身又卒死于齊其六盟十五㑹不出乎此乃為國君者之極惡竒變在十二公中無與為比非有輕重之可權同異之可别故從舊史恒法一以施之所以重社稷尊宗廟文不易而義愈深矣盟戎獨不日者桓之盟㑹既别治之與諸公異故盟戎亦别之不得與隠公同也凡疆塲之交所以繼好息民隠二年公㑹戎于潜傳曰脩惠公之好也桓弑隠非繼隠好亦不得同隠盟書日削其盟戎之日而二義皆成書法神妙葢如此不遇不月者異成事從史文也凡平皆月宣四平莒及郯十五宋人及楚人平昭七暨齊平定十及齊平有闗魯與諸侯之合散則不月隠六鄭人來渝平定十一及鄭平陳氏曰書鄭渝平以志諸侯之合書及鄭平以志諸侯之散可謂深得經㫖不知經不書月已特别而異之然諸侯合散經於離盟不月見義陳氏已發不書之秘此二平不月則魯與諸侯之合散在焉亦不可無辯十二戰争類凡内侵不月三必公将而後月四内犯大國書侵故公将則月以甚之凡外侵不月二十二雖侵我不月四必内㑹伯主之師若王臣合諸侯而後月僖四公㑹齊侯侵蔡公孫茲㑹齊侵陳定四公㑹劉子侵楚凡内伐不月八雖公將不月十必三卿並將而後月昭十伐莒哀二伐邾征伐執詞故君大夫同不月三家既分公室有時並將俱出則月以見異常凡外伐不月七十八雖伐我不月二十唯伯者不能救與國而伐小國則月僖十五齊師伐厲傳曰以救徐也唯納所屬公子殺已立之君則月僖十八宋伐齊納孝公齊人殺無虧必伯主以王命討罪而後日莊二十八齊人伐衛説見第三篇又見前凡公㑹侵伐不月十二唯㑹伯主若王臣伐諸侯則月僖四侵蔡伐楚定四侵楚自京師遂㑹則月成十三伐秦㑹太子稱君將伐國則月成十伐鄭傳六月丙午晉侯卒凡大夫㑹侵伐不月八雖王臣㑹之不月莊十四單伯唯㑹仇讎以逆王命則月莊三伐衛㑹伯國侵與國則月僖四侵陳凡外裔侵伐不月七十一雖侵伐我不月文七狄哀八吳雖公㑹伐不月哀十十一一以月至見義一為戰月凡魯桓㑹伐皆月二義與盟㑹同凡公敗外師不日三略之國君不以善將為功甚之則日隠十敗宋于菅臣㑹伐而又獨進敗之莊十一敗宋于鄑宋方輔齊圖伯魯再敗之大夫敗之則日僖元公子友昭五叔弓皆敗莒却敵禦寇皆臣子分所當為故從其恒法凡外相敗日僖三十三晉及姜戎敗秦中國敗外裔不月晉敗狄三唯内大夫敗狄則日文十一叔孫得臣義與敗外師同凡外裔相敗不日定十四於越敗吳苟敗其從中國者則又不月楚人敗徐異相敗雖敗中國不日莊十荆敗蔡昭二十三吳敗頓胡沈蔡陳許為胡子沈子滅日苟王師敗績則又不月成元王師天下莫得較故異其事凡戰皆日内外戰十九拒王命而戰則不日莊二十八衛及齊戰説見第三篇外裔自相戰則不月昭十七楚及吳戰于長岸略之與中國異苟為中國討罪則日定四蔡侯以吳子及楚人戰于柏舉凡圍不月内外圍國邑二十五皆同雖公㑹圍不月僖六年伐鄭圍新城唯書同圍齊月襄十八凡公圍内邑月定圍成公在外則又不月昭圍成凡外裔圍中國不月十二雖中國圍外裔不月定五凡内入國不日隠二入極桓二入把必公將而後日隠十一入許哀七入邾苟入其甥國雖大夫將日僖二十七入杞責來朝不敬時伯姬尚存廢祀易田雖入邑日隠八入祊凡外入國不日隠二莒入向僖三十三秦入滑昭十八邾入鄅雖君將不日哀八宋入曹必伯主將而後日僖二十八晉侯入曹討違王命若叛中國雖大夫將日隠十齊鄭入郕討不㑹王命文十五晉郤缺入蔡討不會新城襄二十五鄭公孫舍之入陳報其從楚見伐苟有以來之則不月隠五衛入郕報其侵十年宋衛入鄭報其伐僖二十鄭入滑文五秦入鄀皆討其貳周禮大司馬比小事大以和邦國孟子以小事大為畏天凡外裔入中國不日三苟為中國討罪則日宣十一楚子入陳討弑君者定四吳入郢為蔡討楚其自相入則又不月成七吳入州來定五哀十三於越入吳凡入國以其君歸不日哀八宋入曹内入國以其君歸則日哀七入邾凡潰不日僖四蔡潰文三沈潰昭二十九鄆潰外裔潰中國則日成九莒潰凡滅國不日莊十齊滅譚十三滅遂襄六滅萊唯滅吾同宗之國日僖二十五衛侯燬滅邢因諸侯之㑹遂滅小國日襄十諸侯會吳于柤遂滅偪陽苟閒伯主有事而滅小國則又不月僖十七齊桓為淮之㑹魯滅項襄六晉悼列鄫人于戚之㑹莒人滅鄫譏在齊晉凡外裔滅中國小國不月楚滅弦黄滅江六狄滅温吳滅巢㑹而遂滅則月昭四楚㑹伐吳遂滅頼必滅大國而後日昭八楚滅陳十一滅蔡雖大國之附庸日宣十二楚滅蕭危及宋凡外裔自相滅不日莒人滅鄫越滅吳外裔滅畿内國不日狄滅温僖十六年傳狄滅温蘓子無信也蘓子叛王即狄又不能於狄狄人伐之王不救蘓子奔衛疏云不日闕文率意言之冝少合也凡滅國以其君歸日定四蔡公孫姓滅沈六年鄭遊速滅許雖外裔滅中國以君歸日昭十一楚師滅蔡定十四楚公子結滅頓十五楚子滅胡中國滅外裔以君歸日宣十五晉師滅赤狄潞氏唯外裔相滅以君歸不月僖二十六楚滅夔凡外取師不月隠十哀九十三殱不月莊十七凡内取田邑皆不月八哀二取漷東田沂西田為三卿並出月宣四伐莒取向為平莒月背盟取邑則月昭元取鄆叔孫豹㑹虢而取鄆故月必一舉取二邑而後日隠十取郜取防鄭取二邑勞公與取地邑異穀梁傳曰不正其乘敗人而深為利取二邑歸諸已故謹而日之也凡内取國不月僖二十二須句宣九根牟成六鄟襄十三邿著例三遂滅其祀則月昭四取鄫魯屬鄫而莒滅之至是鄫又叛莒而来依我不能推亡固存反乗急而兼之故凡内取不月此其月異之也凡外取邑不月隠六長葛著例隠四年婁為下弑月雖取内邑不月哀八齊人取讙及闡必取以居公然後月昭二十五齊侯取鄆取内所賂田月宣元齊人取濟西田凡外取國不月僖三徐取舒襲國不月襄二十三凡降國不月莊八郕必伯主而後月莊三十鄣凡救不月八閔僖二救邢上為元年不書即位月夷狄救四雖内救不月三僖十八師救齊著例襄二十三救晉為下日卒月㑹救不月四及救一遂救不月僖六必王人救列國而後月莊六子突凡次内外皆不月内次二外次四㑹次二楚次一聶北為僖元年月僖十五匡為盟牡丘月襄二十三雍榆為日卒月雖公次不月莊三著例昭二十五為日孫月外次必伐我而後月莊十戌不月僖二十八襄五襄十凡公追不月莊十八僖二十六凡遷邑不月莊元郱鄑郚必遷國而後月莊十宋遷宿閔二齊遷陽凡自遷其國以避外裔月僖元邢遷夷儀三十一衛遷帝丘叛中國而請遷於外裔則不月成十五許遷于葉昭九于夷十八于白羽定四于容城請遷于吳以避仇楚則月哀二蔡遷州來蔡既以吳入郢其依吳避楚非得已故得與邢衛同書月十三師田類凡狩不月哀十四西狩時事唯火田則日桓七焚咸丘譏盡物凡公狩月桓四郎諱與讎狩則不月莊四禚觀魚不月隠五非務蒐不書公不月昭八紅雖大蒐亦不月四三家分公室据定十四年比蒲邾子來㑹公見大蒐皆公在昭八年蒐于紅傳自根牟至于商衛革車千乘則非時田可知必大閲治兵而後日桓六莊八十四賦税類凡軍制作舍皆月成元襄十一昭五賦稅不月宣十五哀十二十五興作類凡城築不月成二十三築八雖㑹城不月襄二十九城把傳言六月雖城成周不月昭二十二傳十一月必伯者存亡國而後月僖元城邢二年楚丘苟無成功則又不月僖十四縁陵凡新不月莊二十九延廐新作不月僖二十南門必有僭制而後月定一雉門兩觀凡墮邑毁臺皆不月定十二墮郈費文十六毁臺凡浚川時莊九十六眚盜類凡肆眚月荘二十二盜竊寶器得寶器皆不月定八定九春秋屬辭卷十四
