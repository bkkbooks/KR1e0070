body:
  text: 春秋屬辭卷三元趙汸撰存策書之大體第一之三二十七凡公薨書地弒則諱而不地未成君書卒不成喪不書葬隱十一年冬十一月壬辰公薨桓十八年夏四月丙子公薨于齊丁酉公之喪至自齊冬十二月己丑葬我君桓公莊三十二年八月癸亥公薨于路寢冬十月己未子般卒閔元年夏六月辛酉葬我君莊公閔二年秋八月辛丑公薨僖三十三年十二月乙巳公薨于小寢文元年夏四月丁巳葬我君僖公文十八年春王二月丁丑公薨于臺下六月癸酉葬我君文公冬十月子卒宣十八年冬十月壬戌公薨于路寢成元年二月辛酉葬我君宣公成十八年八月己丑公薨于路寢十二月丁未葬我君成公襄三十一年夏六月辛巳公薨于楚宫秋九月癸巳子野卒冬十月癸酉葬我君襄公昭三十二年十二月己未公薨于乾侯定元年夏六月癸亥公之喪至自乾侯秋七月癸巳葬我君昭公定十五年夏五月壬申公薨于髙寢九月丁巳葬我君定公雨不克葬戊午日下􅉴乃克葬以上公薨十一薨而書地書葬者九實弒書薨不地且不葬者二未踰年不成君書卒不地且不葬者三凡公薨必書其地者詳內事重凶變也薨于路寢正也别宫皆非正也隱閔實弒書薨者史有諱國惡之義臣子不忍斥言不書地者既諱其弒則並沒其所弒之地也然書薨不言地則雖諱而實亦不可掩矣不書葬者隱以攝主遇弒閔幼而遇弒皆不以君禮成其喪故其葬不書也桓戕于齊既諱且書其地者為薨在外不可沒也僖文而下薨葬皆以君禮昭公客死于外而以喪至然定公必殯而後即位季孫雖不臣猶不敢不成其君喪也嗣君未踰年書卒不地且不得以君禮葬降成君也子般子赤實弒而諱同成君也未葬則用父前子名之義子般子野是也既葬不名無所屈也子赤是也此皆魯史遺法有不待筆削而義已明者所謂策書之大體也公羊榖梁不達斯義見春秋弒君不書葬者之多而不得其説乃為之辭曰君弒賊不討不書葬以為無臣子也然內於桓公書葬而辭窮則又遁其辭曰讎在外也外於許悼書葬而辭窮則又遁其辭曰是君子之赦止也至於蔡景書葬則無以為辭矣於是又有為之説者曰遍刺天下之諸侯也學者習聞其辭義之雋而未有能辨其失者陳氏有取於左氏不成喪之説而又誤以為修春秋者不成之為君則併左氏所以為言之意失之由不知有存策書大體之義故也今考之經傳以求魯史策書之法則內之葬以成喪而後書不成其喪則不告於諸侯諸侯亦不來會故不書也傳曰改葬惠公公弗臨故不書衛侯來會葬不見公亦不書蓋公辟不為喪主則禮不成皆不成禮不書之類也外之葬以我往會而後書或彼不成喪而不來告或來告而此不會皆不書也左氏於齊晉鄭君弒不成喪者每記其實苟無得於聖人之旨則詳述其迹使學者自求之古人用意深厚如此禮諸侯五月而葬速則不懷緩則怠考諸時月可見夫人薨不書地殺于外則諱之而書地不用夫人禮卒不稱夫人不成喪不書葬莊二十一年秋七月戊戌夫人薑氏薨二十二年春王正月癸丑葬我小君文薑僖元年秋七月戊辰夫人薑氏薨于夷齊人以歸十二月丁巳夫人氏之喪至自齊二年夏五月辛巳葬我小君哀薑文十六年秋八月辛未夫人薑氏薨十七年夏四月癸亥葬我小君聲薑襄二年夏五月庚寅夫人薑氏薨秋七月己丑葬我小君齊薑九年五月辛酉夫人薑氏薨秋八月癸未葬我小君穆薑定十五年秋七月壬申姒氏卒九月辛巳葬定姒哀十二年夏五月甲辰孟子卒以上書夫人薨葬者五書夫人卒者二卒不稱夫人二不書葬者一文薑者桓公夫人哀薑者莊公夫人聲薑者僖公夫人穆薑者宣公夫人齊薑者成公夫人孟子者昭公夫人姒氏者定公夫人杜氏曰夫人喪禮有三薨則赴於同盟之國一也既葬日中自墓反虞於正寢所謂反哭于寢二也卒哭而祔於祖姑三也若此則書夫人某氏薨葬我小君某氏其或不赴不祔則為不成喪故死不稱夫人薨不言葬我小君某氏反哭則書葬不反哭則不書葬子氏赴而不反哭故稱夫人而不書葬定姒則反哭而不赴故書葬而不稱夫人薨不稱夫人故葬不言小君今案杜氏所述夫人喪禮本隱三年傳例然哀薑殺於外不可言赴八年然後致不可言祔其薨葬無異文何也蓋喪有服葬有制事有異常史有變法左氏亦言其大概爾定姒從夫諡哀公親適母也必無不祔之理傳言不祔妄矣春秋之時周禮久廢故有妾母用夫人禮者有適夫人而不用夫人禮者用夫人禮則雖妾母而書夫人不用夫人禮則雖適夫人不書夫人䇿書實録而已矣夫人薨不地者啖氏曰婦人無外事薨有常處也趙氏曰公夫人在外薨不以有故無故皆當書地二十九公服母喪書卒隱三年夏四月辛卯君氏卒以上妾母書卒者一娣姪之喪本不登于策此以吾君服其母喪不可不書曰君氏者夫子特筆説見第六篇三十妾母用夫人禮稱夫人書薨書葬隱二年十二月乙卯夫人子氏薨文四年冬十一月壬寅夫人風氏薨五年三月辛亥葬我小君成風宣八年夏六月戊子夫人嬴氏薨冬十月己丑葬我小君敬嬴雨不克葬庚寅日中而克葬襄四年秋七月戊子夫人姒氏薨八月辛亥葬我小君定姒昭十一年五月甲申夫人歸氏薨九月己亥葬我小君齊歸以上妾母書夫人薨者五書葬者四儀禮喪服傳大夫以上為庶母無服服問君之母非夫人則羣臣無服蓋庶子為君為其母無服者所以重宗廟也魯昭公欲喪其慈母有司曰古之禮慈母無服今君為之服是逆古禮而亂國法也若終行之則有司將書之以遺後世無乃不可乎况國君以夫人禮喪其妾母固史氏所當詳也子氏者惠公再取之夫人諸侯不再取再取亦妾也隱為桓故成其母喪以赴諸侯然葬不備夫人之禮故不書葬既不可祔廟又不可祔妾祖姑故别為之宫隱以攝君喪大子之母猶有節也自文公追崇成風王室又為歸含賵會葬以成之其後妾母皆僭夫人禮薨葬備書與適無異而不别為之宫則並祔於廟矣夫子以喪紀國之大典非筆削所加將令學者屬辭比事以觀之既書夫人薑氏薨于夷又書夫人風氏薨既書夫人薑氏歸于齊又書夫人嬴氏薨既書夫人薑氏薨又書夫人姒氏薨則適妾之分已明黷亂之私亦著矣自公羊不明經義創為母以子貴之説漢哀帝因得託以尊其藩邸所生父母及其祖母卒加大號以干正統而貽後禍説經失義其弊一至是哉三十一凡天王崩諸侯卒來赴往弔則書崩書卒不赴不弔不書會葬則書葬不會不書隱三年三月庚戌天王崩平王桓十五年三月乙未天王崩莊三年五月葬桓王莊十二年莊王崩莊十七年僖王崩僖八年冬十二月丁未天王崩惠王文八年秋八月戊申天王崩冬公孫敖如京師不至而復九年二月叔孫得臣如京師辛丑葬襄王文十四年頃王崩宣二年冬十月乙亥天王崩三年春王正月葬匡王成五年冬十一月己酉天王崩定王襄元年九月辛酉天王崩二年春王正月葬簡王二十八年十二月甲寅天王崩靈王昭二十二年夏四月乙丑天王崩六月叔鞅如京師葬景王冬十月王子猛卒以上天王書崩者九書葬者五不書葬者四卿弔喪者一會葬者二不書崩葬者三書子卒者一傳例曰凡崩薨不赴不書此天子崩諸侯卒來赴則書之例也故襄二十八年傳曰十一月癸巳天王崩未來赴亦未書十二月王人來告喪問崩日以甲寅告故書之以徴過也此又崩日從赴之例會葬則書葬不書者魯不往也公羊傳曰我有往則書蓋知有葬不會不書之例平王惠王定王靈王書崩不書葬是也弔葬不書其人微者非卿也傳曰靈王崩鄭簡公在楚上卿守國使印段如周弔伯有曰弱不可子産曰與其莫往弱不猶愈乎此微者弔喪之證也文八年秋襄王崩公孫敖如京師傳曰穆伯如周弔喪九年叔孫得臣如京師葬襄王此弔葬使卿則書之例也凡弔喪者必歸含襚賵且臨皆同日畢事雜記言諸侯之禮甚詳鄭康成記禮天子於二王後含為先襚次之賵次之賻次之於諸侯含之賵之諸侯相於如天子於二王後以此推之則諸侯於天子可知故隱三年武氏子來求賻公孫敖奔莒傳言其以幣奔是也古者天子崩諸侯皆親奔喪顧命所記詳矣春秋之世遣微者弔喪如列國而又有不往者其能親送天子之葬乎劉侍讀曰公親會則不書葬既昧書法亦非事實矣文公以襄王嘗使大夫會僖公葬又成其妾母之喪魯既使卿共晉襄葬事由是使卿如周弔喪不至乃使卿會葬昭公之世亦以兩使卿會晉侯葬而後使叔鞅葬景王則魯人之情見矣王猛未踰年書子卒與諸侯未成君之禮同吳先生曰天子諸侯嗣位而未踰年者稱子子上加王者表其為天王未踰年之子以别於諸侯未踰年之子也此與王子虎王子朝以屬書不同敬王崩在春秋後傳曰天子七月而葬同軌至考崩葬之嵗月則淹速之罪自見觀志崩而不志葬則諸侯之不臣可知至尊當謹志崩日唯葬不及禮則不日必備禮而後日王室貧於列國故唯襄王書日此在國史必有定法左氏唯知大夫卒有不日之例而於天子諸侯喪紀則失其傳故學者不復考詳見日月篇趙伯循曰王后世子卒葬之不書何也王室不告諸侯不弔也策書之大體存而得失著矣若夫莊王僖王頃王崩葬皆不書乃筆削之旨在存策書大體中自為變例而左氏學者往往妄為之辭今考莊十一年魯主王姬之昏冬王姬歸於齊明年莊王崩王室無不告諸侯之理十四年單伯會伐宋冬會于鄄十六年王使虢公命曲沃伯以一軍為晉侯明年僖王崩王室亦無不告諸侯之理惠王即位傳言春虢公晉侯朝王王饗醴命之宥皆賜玉五玨馬三匹虢公晉侯鄭伯使原莊公逆王后于陳經傳所録莊僖惠三王之際其事如此而杜氏乃以為王室微弱不能自通于諸侯可謂誣矣且是時齊桓方假王命以示大順魯人其有不弔葬天子者乎文十年公及蘇子盟于女栗傳曰頃王立故也十四年春頃王崩王室無不告魯之理是年傳曰襄仲使告于王請以王寵求昭姬于齊冬單伯如齊使魯不弔葬天子其敢有請於王室乎然則曰周公閲與王孫蘇爭政故不赴者其妄明矣傳記天王崩有祕不發喪定位而後來赴者惠王也有緩告者靈王也有王室亂雖不成尊亦赴者王子猛也豈有二臣爭政遂不告王喪之理乎時王朝猶有尹氏芮伯毛伯蘇子之屬皆世臣也以大喪詔諸侯乃大行人之職不當以二臣爭政而廢傳又言周公將與王孫蘇訟于晉王使尹氏聃季訟周公于晉趙宣子平王室而復之使王室不告喪於諸侯而唯使晉人平二臣之訟可乎亦豈有赴于晉而不赴于魯者乎左氏知史有不赴不書之例而妄意其事以釋書法顧弗思爾竊嘗有考於辨名實之説而後知三王崩葬不書為夫子所削無可疑者春秋之初諸侯不王夷狄外叛故伯者之興得以尊王室攘夷狄為功然其業有崇卑事有得失則其功罪不可無辨此春秋所由作也故曰其事則齊桓晉文蓋自平王東遷以來朝覲獄訟不至貢賦不歸諸侯所以事天子者唯弔喪送葬同列國而已伯者雖知假尊王以示名義而不能身率諸侯享覲于王庭史書崩葬無異文也方伯之所以置力王室如斯而已乎春秋當有伯之初諸侯弔葬天子僅存於策者書之不為少變則是以尊王為虛文而名實亂矣是故莊僖崩葬特削而不書晉伯中衰王臣自出以盟諸侯齊商人弒其君執天子之使諸侯恬不為動則楚君以其僭號加中國盟諸侯而惑民聽豈有能正之者自有伯以來天下之勢又一大變而王室亦以無伯而愈卑矣雖區區弔葬之禮僅存君子以為猶不弔葬也春秋當無伯之日而天王崩葬書之以為常則是以有伯為虛文而名實亂矣是故頃王崩葬特削而不書皆所以辨名實之際而定伯者之功罪也其法與正月不書王會盟不序諸侯相表裏蓋屬辭比事之教如此詳見辨名實篇然此不以入筆削類者以其在存策書中特有所刪為變例之二與一筆一削略彼明此者不同也隱三年八月庚辰宋公和卒冬十二月癸未葬宋穆公桓二年春王正月戊申宋督弒其君與夷殤公莊二年冬十二月乙酉宋公馮卒三年夏四月葬宋莊公十二年秋八月甲午宋萬弒其君捷閔公僖九年春王三月丁丑宋公御説卒桓公二十三年夏五月庚寅宋公兹父卒襄公文七年夏四月宋公王臣卒成公十六年冬十一月宋人弒其君杵臼昭公成二年八月壬午宋公鮑卒三年二月乙亥葬宋文公十五年夏六月宋公固卒秋八月庚辰葬宋共公昭十年十二月甲子宋公成卒十一年春王二月叔弓如宋葬宋平公二十五年十一月己亥宋公佐卒于曲棘二十六年春王正月葬宋元公以上宋公書卒者九書葬者六不書葬者三弒而不書葬者三凡諸侯卒彼來赴而此往弔則書不弔雖來赴不書卒於把德公伯姬之事見之蓋史書卒葬所以志邦交厚薄喪紀敬慢不徒録外事也但齊等以上大國魯多不敢慢苟非見弒無不書卒者考宋齊晉三國可見殤公與夷公子馮所讎閔公捷弒後國亂昭公杵臼國人不君皆遇弒而不以禮葬如齊之懿莊晉之厲公則諸侯不會無可疑者唯桓公御説卒不書葬蓋迫於葵丘之會不及以禮致諸侯之送葬者也襄公師敗身傷而卒成公卒後國亂皆不備禮周末文繁禮備或有闕則不敢以葬期告諸侯禮坊記曰子云死民之卒事也吾從周以此坊民諸侯猶有薨而不葬者謂不成喪也是故諸侯不書葬非皆由魯不會苟其國葬不以禮而不以葬期來告亦無由往會之爾凡諸侯卒日弔不以禮則不日苟赴不以時則又不月宋成卒後國亂宋共亦必有為故皆不日宋齊等之國王者之後魯不敢慢其不以禮必有故矣凡諸侯葬得禮則月不及禮不月必厚葬擬天子而後日著其僭也穆公葬日與夷德其傳國於已而厚葬以報之文共俱日則皆華元不臣之所為也景公頭曼卒在春秋後桓十四年冬十二月丁巳齊侯祿父卒十五年夏四月己巳葬齊僖公莊八年冬十一月癸未齊無知弒其君諸兒莊九年秋七月丁酉葬齊襄公僖十七年冬十二月乙亥齊侯小白卒十八年秋八月丁亥葬齊桓公二十七年夏六月庚寅齊侯昭卒秋八月乙未葬齊孝公文十四年夏五月乙亥齊侯潘卒昭公九月齊公子商人弒其君舍十八年夏五月戊戌齊人弒其君商人懿公宣十年夏四月己巳齊侯元卒六月公孫歸父如齊葬齊惠公成九年秋七月丙子齊侯無野卒冬十一月葬齊頃公襄十九年秋七月辛卯齊侯環卒冬葬齊靈公二十五年夏五月乙亥齊崔杼弒其君光莊公哀五年秋九月癸酉齊侯杵臼卒冬叔還如齊閏月葬齊景公六年秋齊陳乞弒其君荼十年三月戊戌齊侯陽生卒五月葬齊悼公以上齊君書卒者九書葬者八不書葬者一弒而書葬者一不書葬者四桓公入立而葬襄公魯方伐齊納糾猶不忘會其葬古人重喪紀如此齊孝公卒傳曰有齊怨不廢喪紀禮也又可為弔贈書卒之證齊昭以五月卒七月公子商人弒舍告以九月則昭公必不成喪傳記閻職邴歜弒懿公納諸竹中崔氏側莊公於北郭葬諸士孫之里四翣不蹕下車七乘不以兵甲齊滅崔氏乃遷莊公殯于大寢又明年葬于北郭不入兆域此二君見弒不以君禮成喪之實也陽生亦弒而書葬者國人諱弒既以卒赴自宜以禮成喪也外弒君書卒者三陽生與鄭伯髠頑楚子麇也魯史承赴而書辟不敏也夫子因而不革存策書之大體也後之作傳者於齊鄭二君之卒則曰不使夷狄之民加乎中國之君於楚子書卒而不通則曰申之會十三國諸侯在焉恐貽後世之譏故不革其偽赴者為之諱也説經若是聖人之志荒矣由不知有存䇿書大體之義故也齊君書卒皆日姻鄰大國往來素厚也葬書日者四皆孝公以前鼎盛僭侈之時齊靈黜大子光而使髙厚夙沙衛傅牙為大子莊公立執牙殺髙厚於是有夙沙衛之亂十一月齊侯圍髙唐則靈公葬不書月由不及禮明矣舍與荼皆未成君而弒凡未成君皆不成喪簡公壬春秋後卒僖九年九月甲子晉侯佹諸卒獻公冬晉里克殺其君之子奚齊十年春晉里克弒其君卓二十四年冬晉侯夷吾卒惠公三十二年冬十二月己卯晉侯重耳卒三十三年夏四月癸巳葬晉文公文六年八月乙亥晉侯歡卒冬十月公子遂如晉葬晉襄公宣二年秋九月乙丑晉趙盾弒其君夷臯靈公宣九年九月辛酉晉侯黑臀卒于扈成公成十年五月丙午晉侯獳卒景公十八年春王正月庚申晉弒其君州蒲厲公襄十五年冬十一月癸亥晉侯周卒十六年春王正月葬晉悼公昭十年秋七月戊子晉侯彪卒九月叔孫婼如晉葬晉平公十六年秋八月己亥晉侯夷卒九月季孫意如如晉冬十月葬晉昭公三十年夏六月庚辰晉侯去疾卒秋八月葬晉頃公以上晉君書卒者十書葬者六不書葬者四弒而不書葬者四獻公卒而國亂惠公以前年九月卒文公以正月入國戊申殺懷公于髙梁不告是年冬乃書晉侯夷吾卒而不月杜氏謂文公定位而後來告則二公皆不得以禮會葬可知宣公事齊而不事晉黑壤之會晉人止公故晉成之葬魯人不會晉人謂魯二於楚止魯君送葬諸侯莫在魯人辱之故晉景之葬成公親送而不書靈公之弒趙盾使穿逆公子黑臀于周而立之壬申朝于武宫必不復成喪厲公之弒晉人葬之翼東門外以車一乘不待踰月此不成喪之實也卿共伯主之葬自襄公始傳記鄭子大叔之言曰先王之制諸侯之喪士弔大夫送葬昭三十年傳文又曰文襄之伯君薨大夫弔卿共葬事昭三年傳文然考當時事迹往往不合豈伯業有盛衰列國情有戚疏事有緩急不得皆同乎悼公之喪鄭子西弔子蟜送葬此大夫弔卿共葬之制也而魯葬悼公不使卿非定制明矣少薑之喪魯君親弔不納季孫往襚鄭印段弔遊吉送葬蓋晉既以少薑之喪告諸侯則不得不往是又以時君之意而為禮者頃公卒鄭遊吉弔且送葬一卿兼二事晉人雖詰之而不復討者禮過於古既有所加則時有所損終不可為定制也晉至獻公已為同姓大國文公以後世為盟主故卒無不日自襄公以後皆三月而葬昭以踰月葬既不及節必無踰制唯文公五月而書日伯業既成且嘗請隧其厚葬有由矣惠公實前年九月卒史即告時書之自不容書月定公午春秋後卒隱四年春王二月戊申衛州吁弒其君完五年夏四月葬衛桓公桓十二年冬十一月丙戌衛侯晉卒十三年三月葬衛宣公莊二十五年夏五月癸丑衛侯朔卒惠公閔二年狄人入衛傳遂言滅衛衛侯赤不言死所懿公僖二十五年夏四月癸酉衛侯燬卒秋葬衛文公宣九年冬十月癸酉衛侯鄭卒成公成二年八月庚寅衛侯速卒三年春王正月辛亥葬衛穆公十四年冬十月庚寅衛侯臧卒十五年春王二月葬衛定公襄二十六年春王二月辛卯衛寧喜弒其君剽殤公襄二十九年夏五月庚午衛侯衎卒秋九月葬衛獻公昭七年秋八月戊辰衛侯惡卒十二月癸亥葬衛襄公哀二年夏四月丙子衛侯元卒冬十月葬衛靈公以上衛君書辛者九書葬者七不書葬者二弒而書葬者一不書葬者一衛人既討州吁又能以禮葬其君會諸侯之送者故雖君弒而書葬寧喜弒剽而復衛侯衎衎豈成剽之為君者故葬不以禮則不會而不書葬然魯嘗會諸侯納惠公三與成公同盟而皆不會其葬何也齊桓方假王命以霸諸侯而衛人伐周以立子頺故魯不敢復親衛觀齊桓將伐衛而先會公于城濮意可見矣衛成通魯以會晉而晉人止公于黑壤宣公豈無憾於衛乎喪紀之薄則有由矣然魯衛兄弟之國禮尚往來故卒無不日文公大布之衣大帛之冠以立國於破亡之餘其葬不及禮宜也穆公葬獨日者當鞍戰勝齊晉三子自往弔焉哭於大門之外衛人迎之婦人哭於門內送亦如之遂常以葬蓋衛人欲因勝敵變禮以旌先君之伐其儀物必有踰制者而不知其非也襄公卒衛人告喪于周請命其葬必特從厚以彰示諸侯懿公赤國滅死不赴出公輒卒在春秋後隱八年夏六月己亥蔡侯考父卒八月葬蔡宣公桓十七年六月丁丑蔡侯封人卒秋八月癸巳葬蔡桓侯莊十九年蔡侯獻舞卒于楚哀侯僖十四年冬蔡侯肸卒穆公文十五年蔡侯甲午卒莊公宣十七年春王正月丁未蔡侯申卒夏葬蔡文公襄三十年夏四月蔡世子般弒其君固襄三十年冬十月葬蔡景公昭十一年夏四月丁巳楚子虔誘蔡侯般殺之于申昭十三年冬十月葬蔡靈公昭二十年十一月辛卯蔡侯廬卒二十一年春王三月葬蔡平公二十三年夏六月蔡侯東國卒于楚悼公哀四年春王二月庚戌盜殺蔡侯申哀四年冬十二月葬蔡昭公以上蔡君書卒者六書葬者四不書葬者二弒殺而書葬者三不書葬者二蔡侯見執于楚而蔡人會于北杏故荆入蔡蔡自是折而事楚不與齊桓會盟故蔡侯卒于楚不書穆公書卒而不月不葬城濮楚敗蔡始從晉厥貉之次蔡復從楚新城之盟陳鄭服而蔡不來文十五年晉郤缺帥師入蔡冬十一月扈之盟傳言蔡侯在焉而甲午之卒不書是嵗魯亦有齊難故莊公卒葬皆不暇恤宣公末年外欲徼好于楚而內制于晉及會于宋始兩事晉楚故自蔡文而後若景弒於子靈戕於楚昭殺於盜彼能以禮葬其君則魯皆會其葬而不敢忽畏楚故重其與國也春秋弒君賊以禮葬其所弒君者唯蔡般蓋以子弒父而代之位非他當國者比也東國卒于楚不日不葬喪歸自逺禮不偹也春秋之初蔡序衛上蔡季歸而葬桓公必有過厚者其後見役于楚死葬宜不備物然不書月者唯文公蓋古人以送死為大事苟可勉焉不敢不盡也成公朔卒在春秋後桓五年春正月甲戌己丑陳侯鮑卒夏葬陳桓公十二年八月壬辰陳侯躍卒厲公莊元年冬十月乙亥陳侯林卒二年春王二月葬陳莊公僖十二年冬十二月丁丑陳侯杵臼卒十三年夏四月葬陳宣公二十八年六月陳侯欵卒穆公文十三年夏五月壬午陳侯朔卒共公宣十年五月癸巳陳夏徴舒弒其君平國十二年春葬陳靈公襄四年春王三月己酉陳侯午卒秋七月葬陳成公蒙上事月昭八年夏四月辛丑陳侯溺卒冬葬陳哀公定四年春王二月癸巳陳侯吳卒六月葬陳惠公八年秋七月戊辰陳侯栁卒九月葬陳懷公以上陳君書卒者十書葬者七不書葬者三弒而書葬者一陳君卒多日以其往來者厚也桓公卒而國亂故再赴而再書日其葬必不得備禮自厲公卒至明年春魯以宋鄭之故盟會征戰無虛月遂不會其葬陳既與楚踐土之盟穆公獨後會期歸踰月而卒不書日薄於弔贈無足疑者共公背殯出會諸侯于溫遂圍許明年春還又即會翟泉則穆公之葬不會賓主皆有所不暇也共公卒陳與蔡鄭方從楚是嵗冬公如晉宜不得往會矣靈公葬於楚人討賊踰年之後宜不得以備禮書月哀公卒後國亡葬於輿嬖殺馬毁玉加經於顙而逃豈有會葬之事蓋楚既滅陳以放陳公子招殺陳孔奐葬陳哀公來告而書與書齊侯葬紀伯姬同閔公越卒在春秋後桓十一年夏五月癸未鄭伯寤生卒秋七月葬鄭莊公莊二十一年夏五月辛酉鄭伯突卒冬十二月葬鄭厲公僖三十二年夏四月己丑鄭伯捷卒文公宣三年冬十月丙戌鄭伯蘭卒葬鄭穆公四年夏六月乙酉鄭公子歸生弒其君夷靈公成四年三月壬申鄭伯堅卒夏葬鄭襄公六年夏六月壬申鄭伯費卒悼公襄二年六月庚辰鄭伯睔卒成公七年十二月鄭伯髠頑如會未見諸侯丙戌卒于鄵八年夏葬鄭僖公昭十二年三月壬申鄭伯嘉卒五月葬鄭簡公定九年夏四月戊申鄭伯蠆卒六月葬鄭獻公以上鄭君書卒者十書葬者七不書葬者三弒而不書葬者一始鄭二於楚晉人秦人圍鄭秦伯背晉使大夫戍鄭而去之鄭既不事晉又受秦戍故文公之葬不得以禮會諸侯宣十年傳言鄭人討幽公之亂斫子家之棺逐其族改葬幽公諡曰靈此歸生弒君不以禮葬之實也悼公卒之年楚伐鄭冬晉救鄭成公卒之年晉楚爭鄭晉乘鄭喪而伐之諸侯之大夫會于戚以謀討鄭則二公皆以難故不備禮也鄭介晉楚之間而強於陳蔡其往來者又厚故鄭君卒無不日者穆公卒時晉楚爭鄭無嵗不受兵襄公自楚子入鄭後終身不敢從晉子費既葬父即稱君以伐許僖公見弒故三君皆葬不及禮觀陳鄭之葬無日者而曹把以下小國多不月則日月之例可謂明矣聲公勝卒在春秋後桓十年春王正月庚申曹伯終生卒夏五月葬曹桓公莊二十三年冬十一月曹伯射姑卒二十四年春王三月葬曹莊公蒙上事月三十二年曹伯赤卒僖公僖七年秋七月曹伯班卒蒙上盟月冬葬曹昭公文九年秋八月曹伯襄卒冬葬曹共公宣十四年夏五月壬申曹伯夀卒秋九月葬曹文公蒙上事月成十三年夏曹伯廬卒于師冬葬曹宣公襄十八年冬曹伯負芻卒于師十九年春王正月葬曹成公蒙上事月昭十四年三月曹伯滕卒秋葬曹武公十八年春王正月曹伯須卒秋葬曹平公二十七年冬十月曹伯午卒二十八年春王三月葬曹悼公三十二年曹伯野卒聲公定四年曹伯通卒隱公定八年三月曹伯露卒秋葬曹靖公以上曹君書卒書葬者十一不書卒葬者三僖公赤以莊三十二年卒是嵗公薨國亂宜不克弔葬聲公野以昭三十二年卒是嵗曹人會城成周公薨于乾侯隱公通以定四年卒是嵗曹伯會召陵侵楚二君卒葬亦不書小國無可考曹伯陽哀八年國亡案曹桓嘗使子來朝曹文來朝者再二君之卒皆日射姑於莊公之世不朝武公於昭公之世不朝則皆不日其他皆不朝于魯是魯人於曹君唯來朝者備禮以弔不朝者不備其禮也宣公雖嘗來朝然與負芻皆卒于師凡卒于師卒于會則赴弔必不得如禮故不月許男新臣其著例也僖二十三年冬十一月把子卒成公襄六年春王三月壬午把伯姑容卒秋葬把桓公二十三年三月己巳把伯丐卒夏葬把孝公昭六年春王正月把伯益姑卒夏葬把文公二十四年秋八月丁酉把伯郁釐卒冬葬把平公定四年夏把伯成卒于會秋葬把悼公哀八年冬十二月癸亥把伯過卒九年春王二月葬把僖公以上把君書卒者七書葬者六不書葬者一把夏之裔也桓公之世朝會皆稱侯至莊公時德公始取于魯乃降而稱伯以朝而德公伯姬之卒皆不書直由魯素卑把來朝不敬輒加以兵是時又必有惡於魯故雖告而不弔爾不然把小魯大乃敢匿其女與壻之喪而不告乎成公即伯姬所朝之子也畏魯人少恩終身不復敢朝故其卒降而稱子且不會葬把文有歸田之隙魯人於其來盟亦降而稱子二君之卒皆不日由不以禮弔贈明矣悼公卒于會不可以上事月為疑然把自桓公結昏于晉以來其卒多日而葬無不會則魯人所以為禮者視勢之崇卑而已把魯之交詳見把君來朝下閔公維卒在春秋後莊三十一年夏四月薛伯卒昭三十一年夏四月丁巳薛伯榖卒秋葬薛獻公定十二年春薛伯定卒夏葬薛襄公十三年冬薛弒其君比哀十年夏薛伯夷卒秋葬薛惠公以上薛君書卒者四書葬者三不書葬者一弒而不書葬者一傳言周公武公取于薛則薛魯舅甥之國也隱公之世薛侯一來朝後不復與魯通不知何時降而稱伯莊之末年薛伯書卒而不會其葬由再世不朝于魯故魯人慢之襄三年傳晉知武子曰滕薛小邾之不至皆齊故也則薛蓋事齊定元年傳宋仲幾曰滕薛郳吾役也則薛又事宋小國既不來朝則弔贈必薄故卒不日又或赴不以時故不月昭公在外而薛伯榖卒以同盟之故始赴以名於是卒獨日且初會其葬則意如之私也同盟赴以名説在辭從主人篇比不書葬小國君弒葬不告爾文十八年春王二月秦伯罃卒蒙上薨月康公宣四年春王正月秦伯稻卒蒙上事月共公成十四年冬秦伯卒桓公昭五年秋秦伯卒六年春王正月葬秦景公蒙上卒月定九年秋秦伯卒冬葬秦哀公哀三年冬十月癸卯秦伯卒四年春王二月葬秦惠公蒙上事月以上秦君書卒者六書葬者三不書葬者三秦入春秋自文公歷五世至穆公任好結昏于晉納晉惠公僖十五年晉侯及秦伯戰于韓獲晉侯始見于經既納晉文公城濮之戰溫翟泉之盟秦人皆在明年晉侯秦伯圍鄭而秦伯中背晉侯戍鄭而去之此秦晉起禍之端也文六年穆公卒春秋不書喪紀之交未及於魯也康公繼修晉怨既來歸僖公成風之襚又使術來聘且言伐晉於是告喪弔贈之使始行至景公始會其葬則以南北之從交相見也其卒皆不日者有襚而無含賵如其所施也惠公卒獨書日其從厚之由不可考其不月則以逺於魯而或有故則告不以時也但卒葬言蒙上月多疑例其中雖有不月者亦不可考矣隱七年春王三月滕侯卒蒙上事月滕子卒滕子卒宣公宣九年八月滕子卒成十六年夏四月卒未滕子卒文公昭三年春王正月丁未滕子原卒夏叔弓如滕五月葬滕成公二十八年秋七月癸巳滕子寧卒冬葬滕悼公哀四年秋八月甲寅滕子結卒冬十二月葬滕頃公蒙上葬月十一年秋七月辛酉滕子虞母卒冬十一月葬滕隱公以上滕君書卒者七書葬者四不書葬者三不書卒葬者二滕近魯小國而侯爵文王之後隱七年稱侯書卒不日者不知何君稱侯以朝隱而稱子以朝桓者卒不書僖十九年為宋人所執者名嬰齊諡宣公卒不書宣九年卒者嘗來朝文公而卒不日玉帛之將不如曹則魯人弔贈之禮亦薄也成十六年卒者未嘗朝魯而卒日以其施於我者或厚則不得不視施為報也以上皆不會其葬亦不知其名諡自滕成來朝襄公與襄公同晉悼之盟會且又來奔喪於是魯亦遣大夫會其葬而終春秋皆會其葬矣後滕頃嘗來會定公葬莊十六年冬十二月邾子克卒蒙上會月二十八年夏四月丁未邾子瑣卒文十三年夏五月邾子蘧蒢卒蒙上卒月文公成十七年十二月邾子貜且卒蒙上事月定公襄十七年春王二月庚午邾子牼卒宣公昭元年六月丁巳邾子華卒秋葬邾悼公定三年二月辛卯邾子穿卒秋葬邾莊公以上邾君書卒者七書葬者二不書葬者五邾本魯之附庸也入春秋已強大王命列於諸侯魯屢渝盟伐之故儀父閲魯三世弗一來朝其弔贈之禮宜薄也瑣亦不朝于莊而卒獨日則以莊公謹事齊桓而稍厚其所與也邾後世昏于齊每恃齊以抗魯僖公伐邾者三文公伐邾者一傳曰邾文公之卒也公使弔焉不敬邾人來討伐我南鄙其薄於禮可知而魯常卑邾邾不畏魯皆此類也定公以魯宣事齊之故朝魯者再世而卒不日宣公朝魯者亦再世而以滅鄫興戎其卒初書日則孟獻子之恭也狐駘見敗而聘邾以修平意可見矣其葬皆不會亦視施為報爾齊景公立齊魯之好復通邾子亦來朝故始會其葬至隱公益來朝來奔喪事魯愈謹而三家侵奪之不已後至入邾以邾子來則以齊景無能為以死而邾日以弱故也魯既歸邾子吳人執之而立大子革邾子復來奔又奔齊卒在春秋後汲冢竹書言魯隱公及邾莊公盟于姑蔑則邾子穿不應襲其始受命之君之號不可考也文十八年冬莒弒其君庶其紀公成十四年春王正月莒子朱卒渠丘公襄三十一年十一月莒人弒其君密州犂比公昭十四年八月莒子去疾卒著丘公以上莒君書卒者二弒者二皆不書葬莒少昊之後武王所封雄於東夷入春秋即為諸侯患隱桓僖三公皆嘗與之同盟文七年徐伐莒莒來請盟公孫敖如莒涖盟而庶其之弒始來告而書之宣公事齊嘗及齊侯平莒及郯伐莒取向莒恃晉不事齊又會齊伐莒成公與莒子馬陵蒲皆同盟始書莒子朱卒襄公之世魯事晉莒與齊更伐魯而密州之弒去疾之卒皆書則以同伯主之盟會故也先儒謂莒從夷俗無諡以號為稱故不書葬然莒與魯積不相下會葬與否無所考其卒之不日從可知矣著丘公卒國人出其子郊公而立其弟庚輿即共公也國人出庚輿齊人納郊公事在昭二十三年而郊公卒不知在何嵗獲麟後有莒子狂卒僖四年夏許男新臣卒秋八月葬許穆公月間上事會伐楚月至無其義文五年冬十一月甲申許男業卒六年春葬許僖公宣十七年春王正月庚子許男錫我卒夏葬許昭公襄二十六年八月壬午許男寧卒于楚冬葬許靈公昭十九年夏五月戊辰許世子止弒其君買冬葬許悼公定六年春王正月癸亥鄭遊速帥師滅許以許男斯歸哀十三年夏許男成卒秋葬許元公以上許君書卒書葬者五弒而書葬者一許大嶽之後國小而近鄭隱公嘗與齊鄭入許許莊公奔衛鄭分許西偏使許叔居之國幾亡後因忽突之亂許叔入于許桓公又會齊侯謀定許或曰許叔即穆公也穆公始從齊桓盟會晉之世伯許服于楚至吳入郢鄭人因楚敗而滅許以許男斯歸哀元年許男從楚子圍蔡蓋楚復封之自許叔入許之後無惡於魯又以楚故喪紀之往來者不怠故卒多書日新臣卒于師成繼絶於滅亡之後其不月者也傳曰許穆公卒于師葬之以侯故得書月葬悼公弒而書葬者止出奔斯繼故以禮成喪也隱八年夏六月辛亥宿男卒以上宿君書卒者一宿微國而服于宋故隱元年魯宋盟於其國其卒日以嘗受地主之供而備禮以弔也國微魯不會葬莊十年宋人遷宿之後不復列於諸侯矣文元年冬十月丁未楚世子商臣弒其君頵成王十三年楚子商臣卒穆王宣十八年秋七月甲戌楚子旅卒莊王襄十三年秋九月庚辰楚子審卒共王二十八年十二月乙未楚子昭卒康王昭元年冬十一月己酉楚子麇卒郟敖十三年夏四月楚公子比自晉歸于楚弒其君虔于乾溪靈王二十六年九月庚申楚子居卒平王哀六年秋七月庚寅楚子軫卒昭王以上楚君書卒者六弒者二不書卒者一皆不書葬楚熊通十九年入春秋桓公之世始僭稱王事見史記六年傳始記其侵伐小國莊四年卒子文王熊資立十年荆敗蔡師以蔡侯歸始見于經十三年入蔡十六年伐鄭傳記其十九年伐黃而卒子成王頵立二十三年荆人來聘始通于魯故文元年世子商臣弒君來赴而書晉靈公少不在諸侯楚於是滅江滅六伐鄭以圖北方使椒來聘殺宜申來告次厥貉伐麇始皆書楚子而十三年卒不書則以魯方謹於事晉雖或赴而不弔也莊王以後晉楚狎主夏盟始皆書日卒而不書葬蓋葬當順臣子之辭策書不可從其僭號言葬楚某王也坊記曰春秋不書楚越之王喪恐民之惑也榖梁傳亦曰吳楚之君不書葬辟其僭號也蓋以為筆削之旨今知不然者當時諸侯雖屈於楚亦以小事大而已魯號秉周禮國史何至書其僭號襄公在楚楚人使其親襚魯人以桃茢先袚殯此豈心悅誠服者况魯史書事有法乎昭二年韓宣子來聘觀書於大史氏見易象與魯春秋曰周禮盡在魯矣使書吳楚僭號謂之周禮可乎此實策書大體然既為夫子所取即是聖人之法孔子蓋曰其文則史其義則丘竊取之矣但求筆削之旨則不可不知其本原爾惠王章卒在春秋後襄十二年秋九月吳子乘卒夀夢二十五年十二月吳子遏伐楚門于巢卒諸樊二十九年夏閽弒吳子餘祭一名戴昭十五年春王正月吳子夷末卒一曰餘昧二十七年夏四月吳弒其君僚定十四年五月吳子光卒闔閭以上吳君書卒者四弒者二皆不書葬吳至壽夢始僭稱王成公之世晉始通吳于中國晉厲晉悼皆與吳會晉平遂嫁女于吳雖同姓而不顧皆欲結之以撓楚也故壽夢以後弔喪之禮遂交於魯至昭公亦取于吳其後魯賦於吳八百乘職貢同於事晉則以晉伯既衰欲倚吳以敵齊楚也吳用夷禮弔贈必不如制故不日不書葬義與楚同夫差卒在春秋後春秋屬辭卷三
