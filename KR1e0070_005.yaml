body:
  text: 春秋屬辭卷五元趙汸撰存策書之大體第一之五五十八公朝覲始行則書皆稱如既成禮則稱朝在道而還書其復成十三年三月公如京師以上成公如京師者一朝天王也周禮大宗伯以賔禮親邦國春見曰朝夏見曰宗秋見曰覲冬見曰遇時見曰㑹殷見曰同大行人侯服嵗一見甸服二嵗一見男服三嵗一見采服四嵗一見衞服五嵗一見要服六嵗一見凡諸侯之邦交世相朝而已東遷諸侯不臣小國朝大國大國朝盟主而不復朝天王魯君再書朝王所一書如京師皆以晉故而非特朝也成公將㑹諸侯假道京師伐秦不可過天子而不朝故始行則書如京師凡内出朝聘但書如始行則書之未成禮之辭也據魯君如晉至河而復者六魯臣如京師如齊不至而復者各一始行不果彼國必成其禮也此杜氏說得之或謂魯之朝聘非誠非禮故但書如由不知䇿書之體也春秋存䇿書之大體以屬辭比事見得失而不以褒貶脩辭此下書公自京師遂㑹諸侯伐秦則非特朝可見通十二公唯成公一如京師則魯君乆闕朝覲之禮亦可見不待變文而後為譏也如京師特書月明朝王為正與他如不同僖二十八年五月癸丑公朝于王所蒙上盟日冬壬申公朝于王所以上僖公朝王所者二晉文踐土温二㑹皆以天子在焉而諸侯就朝既成禮而後書故言朝凡朝王例日壬申其著例也踐土不日者與盟同日也温㑹不月故朝王有日而無月也春秋有為下事月者此不為朝王月以見因㑹而朝非㑹則不朝也僖十年春王正月公如齊十五年春王正月公如齊三十三年冬十月公如齊以上僖公如齊者三二朝伯主一繼齊好也東遷諸侯大行人殷聘世朝之禮乆廢唯以小朝大而已故隠桓莊之世小國之君往往來朝於魯而魯未嘗往朝大國以當時大國皆齊等故也桓公創霸之初未遑定制故莊公三如齊皆以事行至僖七年公子友如齊十年公如齊十三年公子友如齊十五年公如齊合傳三嵗而聘五嵗而朝之法葢齊桓伯業既成之後㑹于甯母始定其制以為諸侯朝伯主之禮與尚書周官六年五服一朝相類不自知其僭也僖十七年桓公卒故僅再朝而已晉文公伯業甫定而卒故僖公未嘗朝晉晩年一朝齊昭復修齊好也凡公外如不月以四時首月行則書之不書至乃筆削之法說在後篇文三年冬公如晉十三年冬公如晉以上文公如晉者二朝伯主也傳言晉文公季年諸侯朝晉衞成不朝故文公元年晉襄伐衞二年亦以不朝來討公如晉晉人使陽處父盟公魯人恥之經没公如晉不書而處父去族以晉文伯業之盛踐土之盟温之㑹僖公皆在焉又嘗受其曹田嘗使大夫一聘一拜田而弗身朝之晉文卒乃朝齊文公即位亦聘齊以圖昬而不通晉好於是見討而朝以取辱則亦比而不周之過也此在存䇿書大體中為變例之四說見變文篇三年晉人悔其無禮於公請改盟公如晉五年公孫敖如晉六年行父如晉八月襄公卒其後公一如晉朝靈公十五年行父以齊難故如晉者再而晉侯受賂不克伐齊公遂舍晉而屈於齊矣此魯君於文襄世伯朝聘之實也而昭三年傳子大叔曰文襄之霸令諸侯三嵗而聘五嵗而朝豈文襄嘗舉齊桓之典而主盟日淺故諸侯有不盡從其令者乎文十五年曹伯來朝傳曰禮也諸侯五年再相朝以脩王命古之制也所謂古制既與周禮不合春秋之世小國朝魯魯朝大國近或一二年逺或十餘年或閒世不朝遲速皆無常準左氏唯見十一年曹伯來朝至此又來適合子大叔五嵗之數遂以其說為傳而不知其制實始於齊桓爾又昭十三年叔向曰明王之制使諸侯嵗聘以致業閒朝以講禮再朝而㑹以示威再會而盟以顯昭明杜氏謂三年一朝六年一會十二年一盟凡八聘四朝再㑹王一巡守盟于方岳之下其朝聘之節大數故先儒以周禮大行人所職為得中葢成周之禮非唯左氏不能詳當時名大夫如叔向亦不得其真也宣四年秋公如齊五年春公如齊九年春王正月公如齊十年春公如齊夏公如齊以上宣公如齊者五四朝一奔喪齊惠非盟主比值晉伯中衰宣公簒立以濟西田賂齊為平州之㑹以定其位故終身謹於事齊不朝聘于晉黒壤之㑹晉人止公以賂免不得與盟既葬敬嬴則比嵗朝齊齊歸其所賂田又親奔喪晩嵗不恱齊頃乃背齊好晉反覆皆以私也成三年夏公如晉四年夏公如晉十年秋七月公如晉十八年春公如晉襄三年春公如晉四年冬公如晉八年春王正月公如晉十二年冬公如晉二十一年春王正月公如晉二十八年十一月公如楚以上成公襄公如晉者九朝盟主也襄公如楚者一晉楚之從交相見也成公即位為齊故臧孫許及晉景盟于赤棘二年齊侯伐我值郤克有齊怨魯四卿同出㑹晉師大敗齊師于鞌盟于袁婁晉由此復振諸侯叛者皆服而魯自是専事晉矣成公朝景者三三年拜汶陽之田四年特朝晉侯見公不敬歸而欲結楚以叛晉季文子不可而止葢以齊侯既朝晉晉厚齊則薄魯也八年晉侯果使韓穿來言汶陽之田歸之于齊十年弔喪晉厲新立疑公貳於楚止公送葬俟使楚者還驗實公請受盟而歸晉悼立公聞其賢遽往朝之甫歸而士匄來拜朝襄公即位晉又先來聘故公朝悼者四三年始朝四年朝而聴政八年聴朝聘之數晉侯亦使士匄來拜公之辱蕭魚之後晉來拜師公復往朝悼公待諸侯有禮故公謹於事晉也晉平為魯故合諸侯同圍齊執邾子削其田以歸魯故二十一年公如晉拜師及取邾田末年晉楚合成趙武屈建㑹諸侯之大夫盟于宋請二國之從諸侯交相見公遂朝楚而及陳鄭許之君送楚康之葬于西門之外晉伯日衰而華夷相亂矣故如楚特書月以異之昭二年冬公如晉至河乃復五年春公如晉七年三月公如楚十二年夏公如晉至河乃復十三年冬公如晉至河乃復十五年冬公如晉二十一年冬公如晉至河乃復二十三年冬公如晉至河有疾乃復定三年春王正月公如晉至河乃復以上昭公如晉者二昭公定公如晉至河乃復者六昭公如楚者一皆朝也昭公之世晉衰以甚然不敢不朝者晉承世伯之餘威其彊猶足以軋諸侯也楚靈章華之召亦不敢不往者晉既以諸侯予楚魯不能拒也然公當晉平末年再如晉一不納者辭弔少姜也三朝晉昭再不見納再朝晉頃復不見納則以晉政多門而魯之土地人民皆三家有之晉人謂公不能為有無也據昭十二年榖梁傳曰季孫氏不使遂乎晉也左氏謂南蒯公子憖謀季氏憖告公而遂從公如晉晉人以取郠故辭公南蒯懼不克以費叛如齊子仲還及郊奔齊使晉人但以莒故二子何懼之甚唯季孫覺二子之謀恐公愬已于晉故私屬晉人使不納公此二子者所以叛且奔也榖梁此說必有所傳可補左氏之闕後公孫于齊一再如晉次于晉地之乾侯而晉人終不肯助公反國則由晉大夫知有季孫而不知有公故也定公受國季孫其見卑於晉也冝自是終春秋魯君無外朝矣五十九公外如非朝則直言其事桓十八年春公與夫人姜氏遂如齊莊二十二年冬公如齊納幣二十三年夏公如齊觀社以上桓公與夫人如齊者一莊公託事如齊者二古者諸侯非朝覲會同不踰竟春秋之初齊魯同等之國不相朝齊桓始伯亦不能得諸侯之朝桓公牽於淫妻莊公急取齊女故皆如齊傳曰君舉必書書而不法後嗣何觀䇿書實録而善惡見矣此外唯莊公親迎以合禮入内逆女類昭公失國在外如齊者再如晉者再非朝别見六十夫人越竟始行則書皆言如以事往言其事文九年春夫人姜氏如齊以上夫人歸寜者一禮父母在嵗一歸寜文公夫人出姜齊昭之女當父母在而歸得禮之正然内女來寜得禮經皆不書夫人尊與君同故出入必書所謂存䇿書之大體也雜記言諸侯夫人奔喪之禮甚詳春秋夫人無以奔喪書者而每以他事書如内女亦多以他事書來葢周衰禮廢乆矣莊五年夏夫人姜氏如齊師十五年夏夫人姜氏如齊十九年秋夫人姜氏如莒二十年春王二月夫人姜氏如莒以上夫人如齊師一如齊一如莒二文姜桓公夫人莊公之母也禮婦人無外事傳曰書姦也凡夫人行不月苟以王月行則書之莊二年冬夫人姜氏會齊侯于禚為下事月四年春王二月夫人姜氏享齊侯于祝丘七年春夫人姜氏㑹齊侯于防冬夫人姜氏㑹齊侯于榖以上夫人以事行者四時莊公幼不知有不共戴天之讎夫人因得託國事㑹齊侯内以愚其子外以遂其姦魯之臣子軋於彊齊之勢而不敢議此敝笱載驅之詩所由作也金氏曰慶父叔牙季友皆桓公子而季友之祥慶父之材皆不在人下也故齊襄殺桓而以立莊為徳文姜又挾舅氏援立以固莊莊公而讎齊制母焉則三公子皆君也是以莊公俛首帖耳唯徇其母之欲葢制於其母以立已為齊之徳而不讎也僖十七年秋夫人姜氏㑹齊侯于卞以上夫人以事行者一淮之㑹魯取項齊人止公聲姜㑹桓公于卞雖以國事行非文姜比而㑹諸侯非婦人之事故皆不以入盟㑹類六十一諸侯相如告則書桓五年夏齊侯鄭伯如紀冬州公如曹以上諸侯相如者二外相如不告兩君之好非有禍福勝敗之事也苟皆告而書之則亦不勝書矣齊侯鄭伯如紀欲以襲之紀魯㛰姻國欲求援於魯故具其事以告州公如曹國危不復為將來魯故亦先以告焉皆與相朝以為好者事異而州公失國與紀侯去國則同史皆承赴書之所以見二國危亡之故而不在於相朝也說又見末篇六十二内大夫出聘始行則書皆言如僖三十年冬公子遂如京師遂如晉文元年夏叔孫得臣如京師宣九年夏仲孫蔑如京師襄二十四年冬叔孫豹如京師以上内大夫如京師者四三聘一拜錫命也周制諸侯於天子有見有貢而無聘問見謂大宗伯朝覲以下六禮貢謂小行人春入貢也聘問者上之所以交乎下也東遷小國於大國有朝則無聘諸侯不朝貢天子而以聘禮上問如邦交諸侯之伉也觀傳記晉韓宣子聘于周辭曰晉士起將歸時事于宰旅王曰辭不失舊則諸侯於天子言聘非舊制可知由周室既衰雖聘問之禮亦不能常故左氏不復辨然不失為實録也鄭氏因以釋周官時聘殷覜誤矣隠桓之世王室來聘者五來賵者一來求者二錫桓公命一而魯君臣三世不享覲於王庭至僖公二十八年因晉文盟㑹始兩朝王所又明年天王使宰周公來聘而魯始聘京師遂聘晉是魯之朝聘天子皆以晉故也文公元年王使來㑹葬僖公又來錫公命故得臣如京師拜而王使又來含賵成風來㑹葬矣八年公孫敖如京師弔喪不至以幣奔莒而毛伯來求金於是得臣如京師葬襄王宣公之世王使來徴聘故蔑如京師明年王季子已為報聘來矣外傳載成公將朝王使叔孫僑如先聘且告而史不書者大夫從公例不書此為公行告朝非實聘傳言其享覲之禮薄是也觀春秋所書則王室懐諸侯有過於成周而魯之事周不能比齊晉葢下陵上替之日乆矣自成至哀五君唯襄公末年叔孫豹一如京師昭公末年叔鞅葬景王而止中國無伯則諸侯復散不復知有王室而王室亦絶意於諸侯也然說春秋者唯知朝聘不行為有罪而不知聘問亦非諸侯事天子之禮則豈聖人制作之意哉凡魯臣為弔喪㑹葬如京師者三别見莊二十五年冬公子友如陳以上内大夫如陳者一初交聘也周禮諸侯之邦交嵗相問也殷相聘也東遷禮廢隠桓之世無交相聘者凡為結盟致夫人通嗣君而聘者左氏猶有所考然皆不報非交聘其禮不備故不荅也齊桓始伯魯與陳皆同盟于幽而陳相原仲與季友有舊故二十五年春陳女叔來聘而冬季友即如陳報聘傳曰始結陳好也春秋之初唯二國之聘得邦交遺意文十一年秋公子遂如宋成五年春仲孫蔑如宋襄二年秋叔孫豹如宋二十年冬季孫宿如宋以上内大夫如宋者四皆聘也一為言蕩意諸而往故宋不荅成五年報宋聘襄二年通嗣君二十年報宋聘凡通嗣君不荅聘故宋元公立亦來聘以通嗣君也襄七年秋季孫宿如衞以上内大夫如衞者一報元年之聘也文成之世衞皆嘗一來聘此年冬又來聘魯皆不報以其有故而非專聘也詳見衞使來聘襄六年冬叔孫豹如邾以上内大夫如邾者一傳曰聘而脩平也邾自宣成以來世朝于魯襄四年魯屬鄫而邾人莒人伐鄫臧紇救鄫侵邾敗于狐駘六年莒卒滅鄫魯知外患未已故釋怨以脩好于邾時襄公幼孟獻子叔孫穆叔為政庶能克己者矣僖七年秋公子友如齊十三年冬公子友如齊二十八年秋公子遂如齊文元年冬公孫敖如齊十七年冬公子遂如齊成十一年秋叔孫僑如如齊襄二十年秋叔老如齊昭九年秋仲孫貜如齊定十年冬叔孫州仇如齊以上内大夫如齊者九僖公初年二如齊聘伯主也末年及文元年二如齊雖事晉猶不忘齊好且求昬也文末年一如齊晉伯中衰齊懿要公為榖之盟故遂往拜盟也宣公之臣如齊者别見成公自鞌戰後齊頃屢同盟㑹故僑如請脩前好齊復叛晉見伐魯亦㑹晉圍齊齊怨深矣而齊莊新立同盟澶淵故叔老聘齊釋怨脩好也襄公之末年齊景新立即使慶封來聘以通嗣君自是禮意乆曠故昭公初年孟僖子如齊傳曰殷聘禮也至夾谷之㑹齊來歸田侯犯之叛齊又致郈故州仇如齊其後叔還葬景公葢景公末年更結魯以叛晉也凡魯臣以弔喪㑹葬出者别見齊大國近魯而世為姻魯雖事晉不忘齊好事之冝也恃晉而慢齊以來侵伐非禮非義危國喪師之道也至於叛晉則非一國之故矣莊三十二年冬公子慶父如齊文十八年秋公子遂叔孫得臣如齊冬季孫行父如齊宣元年夏季孫行父如齊公子遂如齊八年夏為下卒月公子遂如齊至黄乃復十年秋季孫行父如齊冬公孫歸父如齊以上内大夫如齊者八莊公薨慶父弑子般如齊為自託之計文公薨遂與得臣如齊為殺適立庶之謀宣公立行父如齊納賂以請㑹既㑹于平州而公位以定遂又如齊拜成此四臣六如齊皆非為聘問出也為其事不合書故但言如時魯卿唯挾齊以固寵柄國而不脩晉好故黒壤之㑹晉人止公公還事齊愈篤既身奔喪又使貴卿㑹其葬行父既聘新君歸父又如齊謝伐邾而謀莒汲汲然自結於齊以有惡於晉故也此魯臣之如齊與他公事盟主厚姻隣者不同故别見于此僖三十年冬公子遂如京師遂如晉三十一年春公子遂如晉文五年夏公孫敖如晉六年秋季孫行父如晉十五年春季孫行父如晉秋季孫行父如晉宣十八年秋公孫歸父如晉成六年夏公孫嬰齊如晉冬季孫行父如晉十一年夏季孫行父如晉襄四年夏叔孫豹如晉五年夏叔孫豹鄫世子巫如晉六年冬季孫宿如晉九年夏季孫宿如晉十六年冬叔孫豹如晉十九年春季孫宿如晉二十四年春叔孫豹如晉二十八年秋仲孫羯如晉二十九年冬仲孫羯如晉昭二年夏叔弓如晉冬季孫宿如晉六年夏季孫宿如晉八年夏叔弓如晉二十三年春叔孫婼如晉為下日卒月定六年夏季孫斯仲孫何忌如晉以上内大夫如晉二十五僖之末年一如晉聘晉文也一如晉拜曹田也文五年六年二如晉既改盟亟聘晉襄也十五年一再如晉為齊難故告于晉而晉靈受齊賂不克伐齊魯遂屈於齊矣宣公為齊所立不復聘晉其薨之年歸父一如晉欲以晉去三桓也成公立遂背齊盟晉既敗齊于鞌於是君臣堅於事晉六年一如晉命伐宋也一如晉賀遷也十一年晉厲新立一如晉報卻犫之聘且涖盟也晉悼公立既使士匄來聘拜成公之朝襄公即位晉又先來聘故襄公事晉尤謹其臣凡九如晉四年報元年荀罃之聘五年覿鄫世子於晉而鄫卒為莒滅六年如晉聴命也九年報士匄拜朝之聘十六年㑹平公溴梁之後聘晉且言齊故也十九年同圍齊之後拜師也二十四年賀克欒氏也二十八年告將為宋之盟故如楚也二十九年報士鞅之聘也昭公之世三家益專公不得為政其臣五如晉二年報韓起之聘也致少姜之襚也六年拜莒田也八年賀虒祁也二十三年為取邾師晉人來討而往聴命也定公之世家臣柄國二卿如晉一獻鄭俘一報夫人之聘陽虎為之也凡拜田告難聴命雖伯國皆言如為其事不合書也以皆從伯之事故不别見昭六年冬叔弓如楚以上内大夫如楚者一莊文襄之世楚皆一來聘而魯不報說見後昭公之世晉益不競楚圍驕侈求諸侯於晉以㑹于申而魯不至於是使叔弓聘焉明年薳啓疆來召公矣如楚乞師别見六十三内大夫以其事出者言其事事不可書但言如非卿不書名氏莊二十七年秋公子友如陳葬原仲二十八年冬臧孫辰告糴于齊文二年冬公子遂如齊納幣成九年夏季孫行父如宋致女以上内大夫以事外如者四大夫越竟葬外大夫納幣致女使卿行皆非禮國無儲積而至於告糴其失政可知然事皆可書故直書以見其失納幣史不書使卿則書之杜氏曰成公逆夫人最為得禮而無納幣者文闕絶也葢不知此義說見後宋使來納幣下僖五年夏公孫玆如牟文六年夏季孫行父如陳成八年春公孫嬰齊如莒昭二十五年春叔孫婼如宋以上内大夫外如非聘而不言事者四傳曰公孫玆如牟娶焉臧文仲以陳衞之睦也欲求好於陳夏季文子聘于陳且娶焉聲伯如莒逆也季公若之姊為小邾夫人生宋元夫人生子以妻季平子昭子如宋聘且逆之今考陳自季友女叔交聘之後未嘗繼好使魯人果以脩好而聘陳無不報之禮襄公之世聘宋者二一通嗣君一報其聘昭十二年宋元公立來聘以通嗣君而已昭公之世三家分魯聘晉聘楚之外無脩好姻隣之禮何能專聘于宋如季孫如陳叔孫如宋或因逆而私覿或因逆而聘則有之葢季孫所娶者宋公之女則假君命以聘而逆焉亦因逆而聘也左氏謂二子皆因聘而逆非事實矣古無大夫冠禮而有其昬禮則大夫昬禮與士不同其書己亡不知得親迎與否禮重大昏而國卿非一人以君命行冝不為過禮大夫非君命不越竟請於公而行故書于䇿見國卿出入之重也然不可直書逆女者嫌為君逆也季孫人臣而使卿逆彊僭甚矣以其事不可㑹故但言如也杜氏於兹與嬰齊亦皆言因聘而逆乃非左氏之失魯於齊等之國非報聘結盟通嗣君未嘗專聘牟莒小國何聘之有内臣書如不必皆聘明矣定五年夏歸粟于蔡以上歸粟者一不稱名氏者諸大夫非卿名氏不登于䇿則直書所為之事而已蔡侯與諸侯同盟于皋鼬而能以呉子敗楚師入郢時呉尚在楚魯以同盟故歸粟于蔡六十四凡諸侯來朝皆成禮而後書故言來朝隠十一年春滕侯薛侯來朝桓二年春滕子來朝文十二年秋滕子來朝襄六年秋滕子來朝哀二年夏滕子來朝以上滕君朝魯者五自隠至襄滕之書卒者三君隠七年卒者未嘗來朝來朝隠桓者不見書卒以國小禮薄故自降而稱子宣九年卒即來朝文公者成十六年卒者不朝于魯其後朝襄公而與襄公同三駕之㑹且來奔喪者滕成公也於是魯亦使卿㑹其葬滕悼公在位二十五年而不朝于魯昭公失政故也定公卒滕頃又來㑹葬朝哀公者滕隠也終三君魯皆㑹其葬周制諸侯朝覲玉帛以命數為節滕侯爵國微不能備禮而又近於魯不可不朝其大國之當朝者尚多故自貶其爵以來朝則當時小國所以事大者可知矣是時若把薛皆自貶其爵既貶其爵以事大國又能量力以供伯主之政令每盟㑹則滕薛把以次序莒邾下而滕最後亡唯薛自一朝隠之後終春秋不復朝魯桓二年秋把侯來朝為下㑹月莊二十七年冬把伯來朝僖五年春把伯姬來朝其子二十七年春把子來朝文十二年春把伯來朝成四年春把伯來朝十八年秋把伯來朝以上把君朝魯者六母來朝子者一把侯來朝魯人以為不敬而入杞明年把求成公㑹把侯于郕又㑹杞侯莒子盟于曲池莊二十五年伯姬歸把為徳公夫人二十七年徳公將來朝而先之以伯姬虞不敬也於是始降而稱伯僖公五年伯姬來朝其子葢徳公欲朝嗣君而懼不見禮故姬與子來欲託其子於魯是年徳公卒魯不弔伯姬所朝之子是為成公終身不敢朝魯卒又降而稱子矣二十七年其弟桓公來朝傳曰惡無禮故曰子公卑把把不共也秋公子遂帥師入把責無禮也據晉女叔侯曰杞夏餘而處僻陋杞人以爵尊國貧不能成禮事或有之然魯人所謂不共無禮者直以其玉帛之將不備爾明年伯姬又來釋怨求平也把雖先代之後葢微於滕薛每從盟㑹皆序滕薛下入春秋即為莒人伐取其邑其後非齊桓城縁陵以遷之國幾亡於淮夷豈有財貨可以為禮者其來朝魯將以庇社稷也而魯反以兵入其國魯豈能庇杞者乎伯姬拳拳相其夫託其子於魯庶幾魯能篤舅甥之好也當其身國且見破況後世乎僖公號賢君且不念姑姊妹況他君乎而僖之末年伯姬又來求婦當時小國之自結于大國者類如此亦可哀矣於是僖公女叔姬歸杞為桓公夫人而伯姬之卒亦不弔文十二年桓公為絶叔姬來朝再娶魯女亦稱叔姬後宣公以杞不朝伐之成四年為叔姬欲歸魯來朝叔姬來歸而卒又來逆叔姬之喪以歸成公末年自晉還把桓復來朝問晉故公以晉君語之杞伯於是驟朝于晉而請為昬後晉以悼夫人故合諸侯城把又使魯歸把侵田於是把文公來盟傳曰書曰子賤之也葢始終稱伯者把君自貶抑之意稱於他國皆然其間或稱子者魯人之所卑也然把自桓公而後稍能自彊既昬于晉世從盟主征伐雖不朝魯而終春秋六君魯皆㑹其葬不敢侵暴之矣桓六年冬紀侯來朝以上紀君朝魯者一紀國近齊而紀侯娶於魯時齊鄭合謀襲紀六年夏紀侯㑹公于成以謀齊難公不能救於是乎來朝請王命以求成于齊公又告不能無何紀季姜歸為天王后而魯主其昬葢魯為紀謀意謂齊人必不敢滅王后之家爾齊僖雖彊横猶知有天子終身不復圖紀其子兇惡無極故紀卒亡於齊魯亦無如之何也桓九年冬曹伯使其世子射姑來朝文十一年秋曹伯來朝十五年夏曹伯來朝成七年夏曹伯來朝為下事月襄二十一年冬曹伯來朝以上曹君來朝者四使其世子來朝一射姑來朝之明年曹伯卒魯㑹其葬自是終春秋書卒書葬者十一君射姑即莊公也赤簒羈莊三十二年卒不書凡三世不朝于魯以方從齊桓之盟㑹也一再朝文公曹文也朝成公者曹宣也又一世為負芻不來朝朝襄公者曹武也自後至國亡凡六世皆不朝魯而昭定之世不卒不葬者二君曹國於晉宋衞鄭之間自從齊桓盟㑹即班莒上鄭下其朝事於魯如此則於諸大國可知矣而文十五年齊侯侵我遂伐曹入其郛討其來朝於我也其後卒滅於宋則當時小國之不亡者亦幸而已桓七年夏榖伯綏來朝鄧侯吾離來朝以上榖鄧之君朝魯各一榖鄧皆近楚小國二年蔡鄭懼楚嘗㑹于鄧以謀之逺慕上國同時來朝書名說見末篇鄧後為楚所滅榖不知所終僖十四年夏六月季姬及鄫子遇于防使鄫子來朝以上鄫君見使來朝者一鄫子雖娶于魯而不敢來朝者微陋不能成禮也於是僖公因季姬來寜責以鄫子不朝止季姬而絶之故季姬遇鄫子使之來朝明年季姬再歸于鄫又明年卒鄫雖與魯為昬而卒葬不見於經鄫君再世戕于邾人葢小國之最微者然魯後嘗屬鄫而鄫卒為莒滅魯亦不能存之也魯之力不足以存姻隣小國而唯責其不朝來朝者又責以不敬䇿書實録而僖公不仁可見矣凡諸侯來朝恒不書月其有月者皆為下事書唯此特月以異之又說見第二篇僖二十年夏郜子來朝以上郜君朝魯者一傳言郜文王之子聃季之弟後不知所終襄七年春郯子來朝昭十七年秋郯子來朝以上郯君朝魯者二郯少皥氏之後也宣四年及齊侯平莒及郯莒人不肯則郯近莒小國十六年郯伯姬來歸則亦嘗結昬于魯故宣公為之伐莒取向也成七年呉伐郯郯成八年晉以郯事呉㑹諸侯伐之晉悼公既以諸侯㑹呉人于戚於是郯子始來朝也宣元年秋邾子來朝成六年夏邾子來朝為下日卒月十八年秋邾于來朝為下日薨月襄元年秋邾子來朝二十八年夏邾子來朝定十五年春邾子來朝為下事月以上邾君朝魯者六邾本魯附庸而國日以彊隠公初立及儀父為蔑之盟既而為宋伐邾桓八年伐邾十五年邾與牟葛同朝于魯十七年公及儀父盟于趡既而及宋伐邾故僖文之世邾不來朝僖伐邾者三文伐邾者一而後邾亦伐我南鄙宣公之世小國諸侯朝魯者皆不至而邾子獨釋怨來朝者時諸侯皆事晉而宣公為齊所立不事晉而事齊邾子貜且齊出也故獨來朝焉後又朝成以繼好邾宣既立即來朝明年又來朝嗣君葢自宣以來於是再世無間於魯也四年臧紇救鄫侵邾敗於狐駘六年叔孫豹如邾聘且脩平邾人閒我有齊莒之難伐我南鄙晉為溴梁之㑹為我故執邾子莒子邾子歸而卒邾悼立邾人復與齊更伐我晉既合諸侯圍齊乃再執邾子取邾田以歸魯而邾自是不敢窺魯矣二十二年邾畀我來奔二十七年齊景公使慶封來聘明年邾子亦來朝昭元年悼公卒魯㑹其葬昭之末年邾快來奔黒肱以濫來奔邾莊公立三十四年不朝于魯定三年卒魯㑹其葬大蒐于比蒲也邾子來㑹公明年隠公來朝夏來奔喪隠桓之世其曲在魯以衆暴寡也襄之初年其曲在邾恃齊也邾既削而其臣多叛齊亦日衰定哀之閒邾雖自卑以事魯而三家伐邾不已入邾以邾子益來春秋之世苟彊足以兼弱則無所不至也非齊與呉伐魯以救邾則邾滅於此時矣莊五年秋郳黎來來朝僖七年夏小邾子來朝襄七年夏小邾子來朝昭三年秋小邾子來朝十七年春小邾子來朝以上小邾之君朝魯者五小邾者邾之别封未命已來朝既受命又來朝間兩世乃來朝襄公而伯主盟㑹征伐無役不同矣昭三年傳曰小邾穆公來朝季武子欲卑之穆叔不可曰滕曹二邾實不忘我好敬以逆之猶懼其貳又卑一睦焉逆羣好也其如舊而加敬焉季孫従之觀此則當時大國之接小國一崇一庳在其好惡而已小邾微陋名謚無所考唯傳此年見之後又一來朝而止如知武子宋仲幾之言則小邾葢服於齊宋桓十五年夏邾人牟人葛人來朝以上邾牟葛世子同時來朝稱人者一杜氏曰三人皆附庸之世子也其君應稱名故其子降稱人牟國今泰山牟縣葛國在梁國寜陵縣東北今案郳黎來來朝稱名蕭叔朝公稱字知此稱人必非其君凡朝必以禮接於廟非諸侯不言朝曹伯使其世子來朝杞伯姬來朝其子皆是子代父來行禮知此稱人者亦是其世子凡來朝同時俱至必以先後行禮若滕侯薛侯是也陳氏項氏皆謂此與滕薛皆譏旅見自㕘以上貶人之非也傳言滕薛爭長明非旅見隠以攝君不以禮即位不爵命大夫衞侯來㑹葬不敢見而謂隠僭天子之禮非人情也桓雖非賢然次齊餼則用周班賔曹大子則以上卿當時號魯秉周禮謂桓僭天子之禮亦非人情也如楚雖僭王肆暴其㑹諸侯亦曰用齊桓而已楚猶不敢僭天子之禮以臨諸侯而況魯乎魯君朝而稽首於伯主晉人曰天子在而君辱稽首寡君懼矣齊侯稽首於魯君魯君拜齊人怒魯人曰非天子寡君無所稽首稽首猶且不敢而況旅朝乎學者不知春秋有存䇿書大體之義泥於一字褒貶而失其情實去春秋逺矣莊二十三年夏公及齊侯遇于榖蕭叔朝公以上蕭君朝公者一蕭宋附庸叔者其君之字未王命稱字若邾儀父是也蕭於魯本無朝事之禮時齊桓公與公在榖而蕭去榖近蕭君來就榖朝伯主因併朝公公在外故不言來國史主記君禮苟與吾君接雖在外必書或謂交譏之過矣六十五諸侯以事來言其事事不可書但言來外裔言來莊三十一年六月齊侯來獻戎捷以上齊君來獻捷者一齊桓欲身下諸侯以成伯業故假獻捷至與國以成兩君之好說者謂齊侯實使人來非也若使人來當書齊人若其卿來當書名氏春秋以禮法脩辭苟非齊侯身來成禮安敢直書齊侯來乎史亂名實應不至此經特書月亦所以異之也襄三十一年冬滕子來㑹葬為下葬月定十五年夏邾子來奔喪秋滕子來㑹葬為下葬月以上諸侯來奔喪者一來㑹葬者二喪禮諸侯相於遣人弔喪㑹葬而已奔喪臣子所施於君父助葬必執紼故非天子諸侯不親奔喪㑹葬東遷諸侯以事天子之禮事大國故魯宣公奔齊惠之喪晉楚皆嘗止魯君送葬子大叔對士景伯曰晉之喪事敝邑之間先君有所助執紼矣則鄭伯嘗送晉侯之葬魯鄭既以此事齊晉則小國如邾滕亦以此事魯無足怪者然滕子來㑹葬而魯亦遣卿㑹其葬邾子來奔喪而魯反侵暴之已甚魯長滕卑邾有自來矣成九年春王正月把伯來逆叔姬之喪以歸以上把君來逆妻喪者一叔姬無罪而自絶于把失婦人從一之義杞伯以事魯故違禮逆出妻之喪以歸皆書月者異其事也隠元年冬十二月祭伯來以上畿内諸侯來者一祭與魯同出周公故非王命而來其宗國魯以王臣之禮接之故不言朝王臣無外交來不言朝與來聘不言使同皆禮之所不得言也凡畿内諸侯來皆書月以别於列國之君及他言來者桓五年冬州公如曹六年春正月寔來以上畿内諸侯自外來者一以王臣接故不言朝復於曹故不言來奔承上文故不言州公古史簡奥若此傳言如曹遂不復則寓於曹也杜氏云留魯不去非僖二十九年春介葛盧來冬介葛盧來襄十八年春白狄來以上近魯小國來者二白狄來者一外裔不能以朝禮見魯不廟受故不言朝書來與祭伯同而義異春秋不嫌同辭介葛盧不見公亦書說在辭從主人篇六十六王使來聘皆稱使以事來者言其事在喪不稱使隠七年冬天王使凡伯來聘九年春天王使南季來聘桓四年夏天王使宰渠伯糾來聘五年夏天王使仍叔之子來聘八年春天王使家父來聘僖三十年冬天王使宰周公來聘宣十年秋天王使王季子來聘以上天王使聘魯者七聘隠桓者桓王也周禮天子時聘以結諸侯之好東遷諸侯不共王職而王室乃屢下聘雖下聘猶不享覲於是乎有求賻求車之使矣莊公再主王姬之昬莊王嘗錫命桓公而僖王無使至魯聘僖公者襄王也僖公兩朝王所而王使其冢宰兼三公者來聘於是魯始上聘京師則以晉文之伯也文公之世襄王錫公命歸成風含且賵且來㑹葬故不復下聘於是王未葬來求金矣頃王匡王無使至魯定王來徴聘宣公乃使仲孫蔑如京師明年王季子來報仲孫蔑之聘也成公之世定王志崩不志葬而簡王且來錫公命靈王景王無使於襄昭定公之末敬王使來歸脤而已定十四年秋天王使石尚來歸脤以上王使來歸脤者一周禮大行人歸脤以交諸侯之福入春秋無歸脤者葢屢聘而不來錫命而不朝賵妾母㑹之葬而王命愈褻固無以歸脤為也自王季子來聘後王臣不至於魯則幣帛之將命者不給而襃恤之典亦不足懐諸侯矣於是敬王使來歸脤王室之情可見也以歸脤之書見春秋於王命無不書者矣來聘歸脤皆王者所得以交於下故皆不月以别於錫命來求弔葬之非禮莊元年冬十月王使榮叔來錫桓公命蒙陳侯卒月文元年夏四月天王使毛伯來錫公命蒙葬僖公月成八年秋七月天王使召伯來錫公命以上王使來錫命三錫桓公者追錫也禮諸侯嗣位喪畢以士服朝天子天子賜之黻冕圭璧謂之受命周官王命諸侯則大宗伯儐是也末世諸侯喪畢不朝有請命者而後有來錫命有生不請命者而後有追錫之命追錫桓公者莊王也桓不朝聘天子而王追錫之者桓身戕於齊而天子使魯主王姬之昬夏王姬至魯秋築王姬館于外於是齊魯之仇始聞于天子故王追錫桓公命以振恤之錫文公命者襄王也錫成公命者簡王也襄昭而後無復錫命而傳載襄十二年靈王使劉定公賜齊侯命昭七年衞齊惡告喪于周且請命景王使成簡公如衞弔且追命襄公他國猶有其事也其追命之辭曰叔父陟恪在我先王之左右以佐事上帝余敢忘髙圉亞圉則追錫桓公亦此類錫成公命書月著例也凡蒙上事月者以著例決之他皆倣此隠元年秋七月天王使宰咺來歸惠公仲子之賵文元年春二月天王使叔服來㑹葬五年春王正月王使榮叔歸含且賵三月辛亥葬我小君成風王使召伯來㑹葬以上王使來弔喪者二㑹葬者二周禮宰夫凡邦之弔事掌其戒令與其幣器財用則諸侯告喪王室來弔有常制矣而春秋所書唯此四事者魯不以時告喪也惠公之喪王室聞之而後來弔故緩且併歸仲子之賵者黄先生曰惠公再娶時嘗請命于朝故王室知有仲子惠公薨魯人不告喪于京師隠公攝立亦不請于天子故王室併歸仲子之賵以警告之明其子之貴當立也僖公嘗朝聘故王使來㑹葬文公欲追崇妾母而以成風之喪告于天子故成風薨在前年十一月而正月王使即至又來㑹葬也魯於天王葬有不㑹而成風之喪王汲汲然弔而㑹其葬以此見魯君之喪或不告或告不以時則王室亦不以禮來弔爾王不稱天說在變文篇歸賵含書月著例隠三年秋武氏子來求賻桓十五年春二月天王使家父來求車文九年春毛伯來求金以上王使來求者三榖梁傳曰歸死者曰賵歸生者曰賻求賻以平王崩而魯人遂不復㑹葬求車以桓王將崩備喪具也而桓王七年始葬求金之嵗叔孫得臣始㑹葬襄王以後無來求者矣求車書月求賻求金不月者非王命也六十七外臣來聘皆稱使私相為好不稱使莊二十五年春陳侯使女叔來聘以上陳使聘魯者一說見前公子友如陳莊二十三年春祭叔來聘以上祭叔聘魯者一祭與魯同出周公故來聘魯祭叔者祭公之弟不言天王使則非王命矣不言祭公使者王臣無外交無其禮則不得襲其文與卿為君逆不稱使同或槩言王臣私相為好非也自非天子諸侯不得言聘祭畿内諸侯故得以聘書志其實也隠七年夏齊侯使其弟年來聘桓三年冬齊侯使其弟年來聘僖三十三年春齊侯使國歸父來聘宣十年冬齊侯使國佐來聘襄二十七年春齊侯使慶封來聘以上齊使聘魯者五齊僖聘魯者再隠七年結艾之盟桓三年致夫人故魯皆不荅聘齊昭來聘一報公子遂之聘也齊惠受賂立宣公其結援以私而不交聘齊頃來聘一宣十年即位而魯往聘故來報也齊靈與魯有怨朝聘禮絶齊莊新立魯始脩好于齊而莊不報齊伐晉而魯為晉侵齊故也齊景襄二十七年立即來聘通嗣君也成三年冬晉侯使荀庚來聘為下盟月八年冬晉侯使士燮來聘十一年春晉侯使郤犫來聘十八年夏晉侯使士匄來聘襄元年冬晉侯使荀罃來聘八年冬晉侯使士匄來聘十二年夏晉侯使士魴來聘二十六年夏晉侯使荀呉來聘二十九年夏晉侯使士鞅來聘昭二年春晉侯使韓起來聘二十一年夏晉侯使士鞅來聘以上晉使聘魯者十一晉景來聘二成三年尋盟八年言伐剡晉厲來聘一十一年冬涖盟晉悼來聘四十八年即位而拜朝襄元年聘嗣君八年拜公之辱十二年拜師晉平來聘三二十六年召公討衞二十九年拜城把昭二年韓宣子為政而聘與國也頃公二十一年即位來聘通嗣君也晉自景而後始來聘魯文襄之伯雖受魯朝聘而不報也成四年春宋公使華元來聘八年春宋公使華元來聘襄十五年春宋公使向戌來聘昭十二年夏宋公使華定來聘以上宋使聘魯者四共公來聘二四年通嗣君時成公立未乆故報其聘八年聘共姬為將納幣因聘而納采也故魯不報襄十五年平公來聘尋盟元公昭十一年即位來聘通嗣君也文四年秋衞侯使甯俞來聘成三年冬衞侯使孫良夫來聘襄元年冬衞侯使公孫剽來聘七年冬衞侯使孫林父來聘為下盟月以上衞使聘魯者四成公來聘一成公見執於伯主幾不免焉僖公為請於王與晉侯而釋之數年之間衞罹外患未已於是衞始服於晉國勢稍安而武子來聘以拜僖公之賜故魯不報衞定成三年立來聘且尋盟衞獻來聘新君故七年報之而林父來聘且尋盟凡尋盟之聘不報也襄五年夏鄭伯使公子發來聘以上鄭使聘魯者一鄭僖以二年即位來聘通嗣君也終春秋魯未嘗聘鄭文十二年秋秦伯使術來聘以上秦使聘魯者一秦穆既使人來歸僖公成風之禭於是又來聘且言伐晉故張氏謂其用逺交近攻之術終春秋魯不聘秦莊二十三年夏荆人來聘文九年冬楚子使椒來聘襄三十年春王正月楚子使薳罷來聘以上楚使聘魯者三楚成即位欲窺上國故來聘使介辭命未能成禮魯不廟受故稱人齊桓方有事於楚故魯不報楚穆欲圖中國於是伐鄭而魯㑹晉救鄭故來聘始能成禮故書之同中國魯方事晉故不報襄公二十八年如楚楚康卒郟敖立又明年來聘以聘報朝也嫌於伯者故特書月以異之詳見謹内外篇襄二十九年夏呉子使札來聘以上吳使聘魯者一晉既通吳呉子餘祭欲窺上國故來聘未至魯而呉子弑於閽魯後雖服於呉然有職貢而無聘六十八外臣以事來者言其事事不可書但言來隠八年三月鄭伯使宛來歸祊以上鄭使來歸魯地一凡來歸田邑皆不月鄭莊以其先祖助祭之賜邑易田結魯為亂故月以異之成八年春晉侯使韓穿來言汶陽之田歸之于齊以上晉使來言者一晉景既得齊故使魯反所取田于齊歸田本合書史直文為韓穿來言故也凡來乞師有筆削别見成八年夏宋公使公孫夀來納幣以上宋使來納幣一昬禮有六一納采二問名三納吉四納徴五請期六親迎請期以上五者皆不應使卿亦不書于䇿當時以納幣方契成或有重其事而使卿者在春秋唯宋魯各一見葢史以國卿納幣踰制書而非為志昬禮也傳釋華元來聘曰聘共姬也釋公孫夀來納幣曰禮也杜氏因謂昬聘不應使卿納幣應使卿皆循傳為說而非經意夫六禮之外豈復别有昬聘葢華元因聘而納采既以聘行則重在聘自合使卿魯桓宣成皆娶于齊不書卿納幣苟應使卿而不使寧不獲戾于大國乎觀傳記晉侯執陳無宇之事可見矣僖二十一年冬楚人使宜申來獻捷以上楚使來獻捷一楚成執宋公伐宋使來獻捷以威魯楚子變文稱人筆削之法也凡變文皆别為篇閔元年冬齊仲孫來以上齊臣來者一時吾君幼不以賔禮接故不言使季友以兩臣相見故不書名傳言其情曰省難史録大體但言來比而觀之則齊桓不早平魯亂以致閔公再弑其失自見宣五年冬齊髙固及子叔姬來以上外大夫及吾女來者一内女非夫人歸寧不書此以髙固偕子叔姬反馬非禮書杜氏曰禮送女留其送馬謹不敢自安三月廟見遣使反馬孔氏曰士昬禮婦車出於夫家諸侯嫁女自乗其家之車故大夫以上有留車反馬之事留車妻之道也反馬壻之義也唯髙固不宜親行爾啖氏曰大夫非公事與妻出竟非禮也時叔姬初嫁未合歸寧六十九外微者以事來但書人文九年冬秦人來歸僖公成風之襚以上秦人來歸襚一䇿書之法凡大國之下大夫小國之卿皆稱人二傳謂之微者秦穆始假弔贈以通好于魯來者非卿故書人凡書人來皆不言使不以賔禮接也莊六年冬齊人來歸衞俘以上齊人來歸俘一文姜請于齊襄以說魯文十五年十二月齊人來歸子叔姬以上齊人來歸吾女為其夫人者一齊人終以王故許單伯請而來歸子叔姬史録其事與單伯如齊相為本末故與直出者異文定十年夏齊人來歸鄆讙龜隂田以上齊人來歸田一齊景㑹夾谷之後歸魯田結叛晉也傳言夾谷之㑹魯要齊歸汶陽之田故齊人來歸三邑杜氏曰三邑即汶陽田也七十事無專使不言來公在外受之言歸我文十五年夏齊人歸公孫敖之喪宣十年春齊人歸我濟西田哀八年冬齊人歸讙及闡以上齊歸内大夫喪一歸田二仲遂公孫嬰齊皆卒于外喪至不書者本以使出喪還無假君命公孫敖以奔出必有君命喪乃得還史以君命書之而世卿之彊可見矣齊人為孟氏謀飾棺寘諸堂阜惠叔請于朝取而殯之故言歸不言來孔氏曰非有專使持來是矣齊惠以宣公事齊之專故還所賂之田公在齊受之故言歸我齊悼以魯入邾以邾子益歸故取二邑至是魯歸邾子益及齊平齊魯交遣人涖盟而歸二邑於魯無專使故亦言歸而已或生他義者非春秋屬辭卷五
