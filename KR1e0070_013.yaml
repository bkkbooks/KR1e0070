body:
  text: 春秋屬辭卷十三元趙汸撰特筆以正名第六特筆者所以正名分決嫌疑也筆削不足以盡義然後有變文若夫亂久禍極大分不明而又有非常之故焉則變文亦不足以盡義是故有特筆凡特筆皆謂有所是正者也夫變文雖曰有損益然猶史氏恆辭爾至於有所是正則非復恆辭矣衛君輒待孔子而為政子曰必也正名乎而又推極名不正之害至於使民無所措手足此經世之先務也春秋世變極矣父子君臣之間人所難言者多矣豈史氏恆辭所能盡其分哉今考春秋凡辭㫖卓異與史文弗類者皆人事之變恆辭不足以盡義而後聖人特筆是正之非史氏所及也然所是正者不過片言而三綱五常赫然復正故曰非聖人其孰能修之莊周氏曰春秋以道名分蓋亦得其大意云一諱㑹天王以王狩書僖二十八年冬天王狩於河陽傳曰是㑹也晉侯召王以諸侯見且使王狩仲尼曰以臣召君不可以訓故書曰天王狩於河陽蓋時田常禮不告諸侯借令因㑹而狩史法亦不得書此意當時必有所受但曰召曰使乃左氏深文以顯經義決非史策成言其仲尼曰云云者亦未必真得當時之語陳氏遂謂史曰晉侯召王以諸侯見則直以左氏釋經之言為魯史舊文矣不知策書有體與史氏雜記不同借令直書亦不過曰天王㑹諸侯於河陽而已如汲冢竹書載周襄王㑹諸侯於河陽蓋追録策書之語而損益之古史遺法猶可見也晉侯負其豐功偉烈不能朝王而致天子於會書曰王㑹諸侯則徒章上替未損下陵非尊王之道也改正之曰天王狩於河陽則天威赫然臨於下土有不可以彊弱論者而晉侯蓋世之功微矣上以尊天子下以全晉侯而貴王賤伯之意溢于辭表諸家發義甚多惟榖梁傳曰諱㑹天王也蓋此經之逸義云二嗣王在喪稱王配名卒稱子昭二十二年夏劉子單子以王猛居於皇秋劉子單子以王猛入於王城冬十月王子猛卒諸侯嗣子未葬稱名既葬稱子在喪之稱天子與諸侯不異此年冬書王子猛卒雖既葬而未及葬節故稱子稱名與諸侯在喪未葬之稱同此國史定法也則居皇入王城王下皆當稱子稱名今但稱名不稱子與下文異者蓋所稱與羣王子無别特去其子字乃夫子深意也景王穆后大子夀早夭猛與丐皆其同母弟也王寵庶長子朝欲立之單旗劉狄欲立王子猛王欲殺二子㑹王崩子朝作亂魯史書曰王室亂而已諸侯未知孰為正也晉雖舉籍談荀躒之師而不能正子朝之罪二十四年三月庚戌晉侯使士景伯涖問周故士伯立於乾祭而問於介衆晉人乃辭王子朝不納其使則前乎此晉人猶觀望兩間未能辨其曲直也子朝在王城時謂之西王敬王居狄泉時謂之東王則雖周人亦未知適從也而况於天下後世乎夫子以王猛實宜立者而其在喪之稱疑於羣王子與後書王子朝無異辭故於二簡特去子而稱王猛則猛當為王朝實為逆不待加一辭矣卒仍舊史者存周制以顯筆削之微權也三嗣君出奔復歸稱世子桓十五年夏鄭世子忽復歸于鄭桓十一年鄭莊卒九月書突歸於鄭鄭忽出奔衛突以爭國去屬忽以去位不得稱子此史法也忽嘗有惡於魯魯桓終始右突則忽之復歸非魯人意也魯史必不能正忽以世子之名夫世子者大子未嗣位之稱也忽君鄭五月而後出於史法亦不得稱世子其復歸以世子稱非魯史舊文明矣夫忽與突適庶之分素定始於出奔終於見弒鄭亂幾二十年則由祭仲畏難以立突宋魯二君同惡相濟使人倫不明以至於斯故夫子超越史氏恆法舉其世國本稱則突與祭仲宋魯之罪亦不辨而明矣不得稱爵者忽未踰年出奔未嘗正君位也蒯聵出入皆稱世子蓋史舊文夫子因之以正名實與此相發而不以入例者非特筆也四所納應立雖未在位稱子莊九年夏公伐齊納子糾九月齊人取子糾殺之凡嗣君未踰年稱子者以其即柩前之位也子糾為魯所納未入國而小白已自莒先入立葬襄公矣戰敗魯師乃來脅殺子糾子糾未嘗一日立在喪之位乃得稱子何也凡爭國公子或稱納或稱歸或入或出皆去屬不以正不正若糾與捷菑突忽羈赤小白陽生之類皆是則史固不得異文何獨於糾之納與殺而以嗣君在喪之號稱之此春秋特筆也案史記子糾母魯女也小白母衛女也魯女班當在衛女上則糾貴應立然以才則小白賢以黨則小白有國髙為內主論其事則子糾見殺而小白成一匡天下之功苟後世但以小白為賢為有功而不知糾貴之應立則自賢者必醜正恃功者可奪適斯有國者禍亂之原也春秋正誼不謀利明道不計功是故於納稱子明其應立以别於外納不正而後書者於殺稱子同於在位以别於兩下相殺而不書者則糾與小白正不正之分不辨而明矣二傳皆作伐齊納糾孔頴達曰今左氏定本糾上有子字蓋唐初學者校定春秋古經以正二傳之失五以庶孽易適嗣未踰年見弒稱殺其君之子僖九年冬晉里克殺其君之子奚齊記曰君薨大子號稱子待猶君也故遇弒雖未踰年稱君此國史定法若齊公子商人弒其君舍是也史於里克殺奚齊當書弒其君與齊舍同而乃書殺其君之子與恆辭異者里克弒逆之罪易見而獻公首惡之名難知故孔子特筆是正之上以明申生無罪見殺之由下為萬世匹適之戒見里克之不臣由獻公之不父也學者以晉侯殺其世子申生晉里克殺其君之子奚齊比而觀之則春秋之教明矣趙伯循曰奚齊以本不正故曰君之子明國人不以為嗣獨君意立之此說為得經意在喪遇弒稱君例見辭從主人篇中六妾母繼室卒稱君氏隱三年夏四月辛卯君氏卒君氏者隱公之母聲子也聲子者惠公夫人孟子之娣姪古者諸侯不冉娶元妃卒則次妃攝治內事謂之繼室故孟子卒聲子繼室生隱公而惠公復違禮冉取仲子為夫人生桓公惠公薨桓公幼隱公追成父志立桓為大子而已攝君位以夫人禮成仲子之喪則聲子猶娣姪而已娣姪之喪史不書於策於是以吾君之喪其母史不可不書也史法苟適夫人喪不用夫人禮則亦書曰某氏卒而無異稱如姒氏孟子是也而聲子獨稱君氏故說者疑之公羊榖梁作尹氏以為天子之大夫也然史法天子大夫卒當書氏書名如劉卷是也若曰尹氏卒則是舉族皆死之文矣古史謹嚴又經聖人修定寧有此等書法哉然而聲子特稱君氏文獨卓異者實夫子特筆也仲子以冉娶稱夫人而聲子書子氏卒既無以異於衆娣姪且嫌於適夫人之不成喪者而名實亂矣禮妾為女君之黨服攝女君則不為女君之黨服此攝女君之明文也聲子以攝女君之貴則異乎衆娣姪經於女君稱小君則攝女君得稱君氏故特書君氏卒以明聲子繼室之為正惠公冉取之非禮立桓為大子已攝君位以夫人禮成仲子之喪隱公之處事變庶幾無憾而桓卒弒隱則桓惡大矣此修春秋之意也七王人救列國兼稱字莊六年春王正月王人子突救衛魯史之法非卿稱人筆削之義諸侯與大夫略其恆稱則稱人皆未有稱人而又稱字者此王人兼稱字乃特筆也衛侯朔讚殺二公子而立又得罪於天子天子命立黔牟而出朔齊襄乃合魯宋陳蔡抗王命以伐衛而納之其事甚逆於是王人救衛救黔牟也夫子以救衛稱王人前與諱四國之君無異而後與諱王子虎之文同朔之罪既不見於經惟王人之救可證出朔立君為天子之意若復從其恆稱則是非不白故王人雖非卿特字以尊異之見王人救衛為正則朔與諸侯之罪明矣八諸侯滅吾同宗之國稱名僖二十五年春王正月丙午衛侯燬滅邢春秋之法諸侯不生名有二君則名之卒名之其書滅國君將除楚子外惟衛侯滅邢齊侯滅萊二事而衛侯特稱名二傳皆有滅同姓名之說則異姓豈可滅乎故學者不能無疑於此黃先生曰凡蔣邢茅胙祭皆周公之𦙍成王以周公有大勳勞於天下既封伯禽於魯又封其支子六人所以答周公之勳至春秋時往往為大國吞併今邢人為衛滅矣邢與魯同出周公則邢之存亡於魯甚相關衛既忍於滅周公之後而魯不能為之請於天子請於大國請於衛以復存其社稷故書曰衛侯燬滅邢雖罪衛侯而實繫於魯也汸案禮為同姓臨於宗廟同宗臨於祖廟二傳知衛與邢為同姓而不知魯與邢為同宗知衛滅同姓為伐本而不知魯不救同宗為無親春秋滅國復興者多矣豈齊桓能存亡國而晉文獨不能哉當衛侯鄭之冉執也魯之君臣以同姓故且為納玉於王與晉侯而請歸之使念其同大祖之國而以存亡繼絶為請晉文方有討於衛宜無不從者魯人不知出此此邢之所以滅而不復興也故聖人特名衛侯以示親親之道當知所先後蓋一本之教也若滅同姓之有罪則不待異其文而後見矣九宋昭公之大夫特書官文八年冬宋殺其大夫司馬宋司城來奔十五年三月宋司馬華孫來盟諸侯大夫稱名氏殺則稱其大夫未有不名而以官稱者而宋昭公之大夫既不名且獨稱其官此春秋之特筆也春秋以弒君書者二十四未有上通君祖母下結六卿公族以及國人盡殺大夫之忠於君者而使其黨為卿以卒成其篡弒如公子鮑者亦未有以世適嗣位外㑹諸侯內奉宗廟前亂臣而後賊子徒擁虛器十年而坐受篡奪如宋昭公者是故昭公之大夫皆書其官不書其官則見殺而不名者嫌於曹大夫出奔而不名者嫌於反國之蔡季來盟不稱使且不名者嫌於齊髙子矣夫公子鮑之弒械動於昭公未即位之前而卒成於十年之久使非有貴戚彊家囊橐其門則鮑雖姦襄夫人雖惡昭公安能拱手就戮於一婦人邪屬辭比事而求之則宋人殺其大夫司馬而使華孫代之且來盟然後弒其君則知身為世鄉外結援鄰國內假手於襄夫人以成鮑之篡者華氏之族也華元司寇華御事之子也而代公子成為右師此蓋鮑與夫人所位置者而昭公豈能用之如華元者固知晉大夫可以貨取而盟主為不足忌於是使華耦來盟於魯既而晉衛陳鄭伐宋討弒君者而魯不與晉人受賂立文公而還華元卒相宋公皆華氏之始謀也夫子於此蓋深致意焉是故特書其官然公孫固大司馬也不書官者昭公未即位官非其官也公子卬始代樂豫為司馬既而亦為大司馬乃以舊官書者宋大司馬僭王官不可書也子哀不書官者其為卿與晉郤缺趙穿同杜氏所謂散位從卿者也自左氏舍所録之事而妄解書法學者但知其例之不通而不知其事之可據蓋其事可據者皆列國史志之成言而所以為例者乃左氏之陋見也為其學者往往自不能深考而獨宋昭公無道見弒之說至今猶誦於口而筆於書未有辨其誣者然則春秋特筆之義其可不明乎十諸侯㑹圍邑繫國戍邑繫國圍其父所居邑雖外大夫主兵不繫國襄元年春仲孫蔑㑹晉欒黶宋華元衛寧殖曹人莒人邾人滕人薛人圍宋彭城十年冬戌鄭虎牢哀三年春齊國夏衛石曼姑帥師圍戚襄二年㑹於戚遂城虎牢不繫鄭者伯主之令以內辭書史恆辭也楚取宋邑以居宋之叛者故晉為宋合諸侯之師以討之晉降彭城而歸諸宋宜也據襄二十六年傳文故圍雖有宋人猶繫彭城於宋明諸侯分地有制非惟楚不當取晉亦不可受也晉取虎牢以逼鄭者九年矣而鄭不服於是又命諸侯戌之雖以伯令書猶繫虎牢於鄭者明鄭服則歸之而非取其地也蒯聵在戚而國夏曼姑圍戚齊人助子圍父也故雖有齊卿主兵而不繫戚於衛以蒯聵居戚故也戚不繫衛則輒不當有國父不可圍而齊人黨逆之罪重矣春秋有相易以成其義者謂此類也自夫子為正名之論當時髙弟如子路猶不能無疑修春秋時蒯聵猶在戚也蓋靈公嘗欲立郢而卒不立者知蒯聵在晉晉人必將納之郢雖立猶不立也而衛人立輒以拒父衛為無父之國矣是故蒯聵出入皆稱世子而圍戚不繫衛以鄭世子忽宋彭城鄭虎牢三特筆比而觀之春秋之法明矣十一諸侯敵王命敗績稱人莊二十八年春王三月甲寅齊人伐衛衛人及齊人戰衛人敗績敗者稱師衛何以不稱師此榖梁發義也而所釋未是趙伯循曰敗稱人罪衛之不服王命故異其文得經㫖矣蓋非師不言敗者史文也衛有立子頽之罪齊桓以王命討之而衛人敢於拒戰嫌與敵國同文故變師言人明不當較也史本無日伐之例惟日戰是其恆法此舉戰之日加之伐之上日其伐以尊王命明與他伐國者不同而不日其戰以罪衛人明非以主及客者可例論也十二師及齊師戰書公圍成昭二十六年夏公圍成傳曰齊侯使公子鉏帥師從公齊師圍成師及齊師戰於炊鼻此史文之實録也齊侯納公而不盡力季孫據國以拒君言之可謂詳矣聖經外略齊師內諱及戰特書公圍成雖若為國諱恥而尊尊之義愈至其所以示君臣之教嚴矣十三城成周晉人執宋大夫以歸書執於京師定元年春王三月晉人執宋仲幾於京師合十國大夫城成周於無伯之世晉人可謂有功王室然尋盟狄泉魏舒干位以蒞政是僭王官也執宋大夫不請於天子而以歸是京師晉也傳言正月晉人執宋仲幾以歸三月歸於京師此策書實録之文而經不然者周室東遷而後下陵上替己久鄭莊公言天既厭周德晉女叔寬以萇𢎞謀王室為違天邪說誣民非一日矣然天子一命城成周而諸侯大夫奔走恐後則人心猶不忘周也執大夫以歸知其不可而卒歸諸京師則猶有所畏也夫人心在周則天命未絶於周矣故既削狄泉之盟黜魏舒不序而沒晉人執大夫以歸之文但書城成周晉人執宋仲幾於京師而月以異之上以尊王室下以全諸侯城成周之功而宋大夫不受功晉人專執其罪皆不可掩此聖人知天命為東周之微意作春秋之本義也十四鄭伯之弟段出奔書鄭伯克段隱元年夏五月鄭伯克段於鄢案傳曰段入於鄢公伐諸鄢五月辛丑大叔出奔共準魯史恆法當書鄭伯之弟段出奔共若秦伯之弟針出奔晉之比其諸侯自攻叛邑魯史不書若欒盈奔曲沃晉人圍之晉人克欒盈于曲沃盡殺欒氏之族但書晉人殺欒盈是也孔子以段大都耦國完聚圖逆鄭伯處心積慮志在於殺皆非一日與秦針陳黃宋辰不同不可一例書故特書鄭伯克段於鄢則段之罪固無所逃鄭伯之情亦不可掩矣左氏謂如二君故曰克稱鄭伯譏失教也此為得之謂段不弟故不言弟則未盡時段形迹已具故去屬比篡公子爾杜氏亦謂此夫子改舊史以明義但指傳中所稱書不書故書書曰之類皆為孔子變例則左氏學者之陋爾十五紀侯出奔書去國莊四年夏紀侯大去其國此紀侯出奔也不書出奔者筆削之法被兵而出不書若許莊公莒共公楚昭王是也必國滅不死社稷而後書若談子弦子溫子徐子是也夫被兵而出者內有忠力之臣外有大國之救敵去國存猶可復歸紀侯迫於彊齊請援於鄰國歸女於京師而猶不得免焉已不能下齊以國與季無復歸之望不得與被兵出奔者比矣國滅不死位者勢窮力屈宗廟既夷社稷既墟不能效死而猶脫身以逃者也紀侯不忍殘民以爭必亡之國又不忍五廟之不祀故使季以紀事齊而已獨委國去之亦與國滅不死社稷者不同是故不書出奔而特異其文書去其國其所寓之國不足志矣古之君子不以其所養人者害人孟子曰民為貴社稷次之君為輕紀侯其知此矣故聖人特筆以明之大者紀侯之名從史文也十六鄭髙克出奔師潰書鄭棄其師閔二年十二月鄭棄其師傳曰鄭人惡髙克使帥師次於河上久而弗召師潰而歸髙克奔陳鄭人為之賦清人詩清人序曰髙克好利而不顧其君文公欲逺之不能公子素惡髙克之進不以禮文公退之不以道危國亡師之本故作是詩也準魯史恆法不過書曰鄭髙克出奔陳而已孔子以文公失馭臣之道誠有如詩人所譏者時政不在大夫大夫出奔無與乎國之大故古者君行師從卿行旅從則師重於大夫故特書鄭棄其師而髙克之奔不足志矣十七楚君殺弒君者别稱人宣十一年冬十月楚人殺陳夏徴舒丁亥楚子入陳納公孫寧儀行父於陳傳曰楚子為陳夏氏亂故伐陳謂陳人無動將討於少西氏遂入陳殺夏徴舒此楚子入陳而後殺夏徴舒之實也楚自君將稱君以來終春秋所書楚事皆所以治其罪也而入陳殺陳夏徴舒滅陳殺陳孔奐文與事皆相似楚䖍蔡般皆嘗弒君者而䖍誘般殺之以滅蔡一是討弒君者而存其國一是身負大惡而假討賊之名以滅人國皆不可無辨況討賊乃天下大義不可以楚故而不明故特書楚人殺陳夏徴舒於上以示義然後書丁亥楚子入陳納二卿從其恆辭以見實蓋討賊名義既正則與楚䖍懷惡挾詐者不同矣春秋於楚莊王事取節焉者以弒君賊必不可無討苟能討之而不為利雖蠻荆猶與之信大義於天下也是故入陳書日以别之黃先生曰齊晉為中國盟主俱有功於天下然皆包容弒君賊置而不問故聖人於楚子入陳一事先正其討賊之義然後書楚子入陳便與稱兵肆亂不同乃聖人與人為善止遏亂略處此書法所以為妙也十八戰稱楚人敗稱楚師書入郢定四年冬十一月庚午蔡侯以吳子及楚人戰於柏舉楚師敗績庚辰吳入郢凡入國曰國入邑曰邑未有入國而言邑者此入國矣而言邑何也中國諸侯皆王者所封無自號其國者自號其國者皆僭竊也是故赤狄嘗自號其國曰潞以歸稱潞子得從其自號以配爵滅稱赤狄潞氏不得從其自號以名國故滅不言潞言滅潞則與三代建國無辨矣此史氏之法也戰稱楚人敗稱楚師入稱郢特筆之義蓋取諸此楚之先熊繹事周至成王始以子男田封諸荆山入春秋至莊公末年猶稱荆僖元年伐鄭始稱楚蓋荆其本號楚乃僭王後所自改之號也春秋書楚事凡所以謹內外之辨者無不致其嚴矣惟始終稱楚無異辭蓋非入滅皆得以號舉也於是蔡侯以吳子戰敗楚師書入郢而不言入楚以其叛周自立僭天子大號以爭諸侯不得與三代建國無辜見入者同文也是故吳得稱子楚囊瓦書人而入書日許蔡侯以復世讎而吳之入郢亦不可與凌弱暴寡之師例論也春秋屬辭卷十三
