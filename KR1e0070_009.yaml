body:
  text: 春秋屬辭卷九元趙汸撰假筆削以行權第二之二四十三外特相盟會不書雖參以上不書必有關於天下之故而後書隱二年冬紀子帛莒子盟于密三年十二月齊侯鄭伯盟于石門定七年秋齊侯鄭伯盟于鹹齊侯衛侯盟于沙八年冬衛侯鄭伯盟于曲濮隱八年秋七月庚午宋公齊侯衛侯盟于瓦屋桓十一年春正月齊人衛人鄭人盟于惡曹僖十九年夏六月宋公曹人邾人盟于曹南以上諸侯書特相盟者五參盟三密與石門天下無王諸侯私相結也自鹹而後晉伯既失諸侯復散也故陳氏曰特相盟不書必有關於天下之故而後書紀莒無足道也齊鄭合天下始多故矣是故書齊鄭盟于石門以志諸侯之合書齊鄭盟于鹹以志諸侯之散是春秋之始終也今案春秋之初王綱既墜有特相盟而後有參盟諸侯合而為亂也有參盟而後有主盟則伯者興矣自有主盟而後無外特相盟故外特相盟雖伯主不書如僖二十八年晉侯齊侯盟于斂盂宣十八年齊侯會晉侯盟于緡之類是也舍伯主亦無敢特相盟者苟無盟主則參盟復作又不但特相盟而已曹南之盟齊桓既卒而宋襄圖伯以取敗中國之勢為之一變舍是諸侯無參盟矣惟晉弗主盟而後有參盟故昭十六年齊侯伐徐徐子及郯人莒人會齊侯盟于蒲隧十九年宋公伐邾邾人郳人徐人會宋公同盟于蟲陳氏曰參盟再見也於鄟陵始書之今案經書齊宋二君伐徐伐邾則諸侯之散已可見矣蒲隧與蟲雖專盟一二小國猶夫叛盟主也故不書至鹹與沙則齊衛鄭皆叛晉矣此特相盟所以復見於經雖參以上不得有二義鄟陵乃公會之與有筆有削者不同凡外參盟日有微者不日君稱人同微者不日離盟不日苟諸侯復散則皆不月桓二年秋七月蔡侯鄭伯會于鄧月間上事定十年冬齊侯衛侯鄭遊速會于安甫十四年秋齊侯宋公會于洮以上諸侯書特相會者二參會一外特相會雖王卿士不書如昭五年單子會韓宣子于戚是也會于鄧中國始懼楚會于安甫于洮皆叛晉以後之事凡外離會不月雖參以上不月唯會鄧以始懼楚月凡伯國盟會皆天下之故此不序互見下篇四十四外胥命相遇書與特相盟會同桓三年夏齊侯衛侯胥命于蒲以上書諸侯胥命一傳曰不盟也公羊傳曰結言而退蓋歃血相誓為盟相結以言為胥命此志齊衛之合也春秋之初齊鄭一黨也宋衛一黨也齊衛之合於是始故特書之義與石門之盟同若莊二十一年鄭虢胥命于弭則不書或有謂齊衛相命以伯者雖陳氏亦引齊僖小伯及黎之臣子責衛以方伯連率之事證成其説則失其實矣蓋所謂伯者為諸侯盟主也當時諸國齊為大衛後於陳蔡無能為也齊自胥命後不能一日主諸侯之政而況於衛乎隱八年春宋公衛侯遇于垂莊四年夏齊侯陳侯鄭伯遇于垂三十二年夏宋公齊侯遇于梁丘以上書諸侯相遇三蓋以禮相見為會不行會禮為遇特相遇唯莊以前見之齊僖欲平三國宋公有疑故請與衛侯先相見是故有明年鄭宋連兵報復之禍齊襄欲滅紀故與陳鄭遇垂紀侯是以去其國齊為楚伐鄭故請會諸侯宋公請先見于齊侯是以緩於伐楚皆有關於天下之故四十五平不書有關於天下之故則書隱六年春鄭人來渝平定十年春王三月及齊平十一年冬及鄭平以上書內平三傳曰及鄭平始叛晉也陳氏曰凡平不書必有關於天下之故而後書書鄭渝平以志諸侯之合書及鄭平以志諸侯之散據文十六年及齊平襄二十年及莒平哀八年及齊平皆不書穀梁云外平不道非獨外也凡平皆月唯魯鄭二平有關魯與諸侯合散故不月以别之及齊平月者猶未叛晉也宣十五年夏五月宋人及楚人平昭六年冬齊侯伐北燕七年春王正月暨齊平以上書外平二陳氏曰凡平不書必有關於天下之故而後書有與楚平者矣於陳不書於鄭不書至宋始書之宋嘗及楚平矣至莊王始書之必宋從楚必莊王得宋天下將有南北之勢春秋特致意焉靈公以來齊首敗伯主之約納北燕伯猶庶幾天下之大義而卒與之平是黨亂臣賊子也是故昭定而下春秋多罪齊外平不書據隱七年宋及鄭平陳及鄭平宣七年鄭及宋平之類陳及楚平在文九年宣五年鄭及楚平見文九年宣十二年襄八年四十六王臣會盟有所諱則不書僖八年春王正月公會王人齊侯宋公衛侯許男曹伯陳世子𣢾盟于洮二十八年五月癸丑公會晉侯齊侯宋公蔡侯鄭伯衛子莒子盟于踐土傳王子虎盟諸侯于王庭要言曰皆奬王室成十七年夏公會尹子單子晉侯齊侯宋公衛侯曹伯邾人伐鄭六月乙酉同盟于柯陵襄三年六月公會單子晉侯宋公衛侯鄭伯莒子邾子齊世子光己未同盟于雞澤昭十三年秋公會劉子晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯把伯小邾子于平丘八月甲戌同盟于平丘哀十三年夏公會晉侯及吳子于黃池傳公會單平公晉定公吳夫差于黃池以上王臣書會諸侯盟者一與盟不書一同盟者三與會不書一周禮天子巡守則有方嶽之盟不巡守則有殷同之盟皆謂諸侯既朝見受政事乃退而自相與盟王官之伯臨之而已伯猶不盟而況卿士乎夫盟以結信非所以施於尊者是以葵丘之盟齊桓盛時也宰周公不與臯鼬之盟晉弗伯久矣劉子不與其次則黑壤之盟王叔桓公臨之以謀不睦猶為近之經書王人與諸侯盟自洮始天子將崩世子近懼子帶之難逺懲子頽之禍王臣出盟諸侯事非得已不必諱也晉文公一戰而伯作王宮致天子天子命為侯伯猶不能自信於諸侯而親屈王臣於盟襄王下勞晉侯策命專征猶不能委任方伯而復使大臣盟諸侯于王所是以天子與斯盟也故經沒王子虎不書使若諸侯自相與盟者為王與晉侯諱之也所謂不以天子與是盟者義蓋在此傳言王子虎實盟諸侯故於翟泉釋曰尋踐土之盟也使踐土之盟王子不與則翟泉尋盟王子何與焉杜氏謂踐土王子不歃陳氏誤從之非傳意也柯陵晉久不競而厲公有鄢陵之績雞澤悼公初興而未集平丘晉不復伯其請王臣出會猶曰假公義以建盟主而立中國庶幾天下知有王室而已雖皆與盟不足諱矣至於黃池魯君會晉侯及吳夫差而單平公與焉則未知何以為禮何以為辭乎故經沒單子不書為周室諱也蓋春秋於是終焉四十七王臣會伐非有關於天下之故不書莊十四年春齊人陳人曹人伐宋夏單伯會伐宋文三年冬晉陽處父帥師伐楚以救江傳晉以江故告于周王叔桓公陽處父伐楚以救江成十三年夏五月公自京師遂會晉侯齊侯宋公衛侯鄭伯曹伯邾人滕人伐秦傳公及諸侯朝王遂從劉康公成肅公會晉侯伐秦十六年秋公會尹子晉侯齊國佐邾人伐鄭十七年夏公會尹子單子晉侯齊侯宋公衛侯曹伯邾人伐鄭冬公會單子晉侯宋公衛侯曹伯齊人邾人伐鄭定四年三月公會劉子晉侯宋公蔡侯衛侯陳子鄭伯許男曹伯莒子邾子頓子胡子滕子薛伯把伯小邾子齊國夏于召陵侵楚八年秋晉士鞅帥師侵鄭遂侵衛傳晉士鞅會成桓公圍蟲報伊闕也以上王臣書會伐者四會侵一齊桓之與欲假王命以示大順故請師于周而單伯會伐宋桓公因以成其伯業晉伯中衰厲公敗楚子鄭師于鄢陵鄭猶不服三請王臣會伐鄭而鄭從楚益堅中國無伯劉文公合十八國諸侯于召陵以謀伐楚無功而諸侯復散三者皆天下之大故王伯升降之會也故悉書王臣無所諱焉晉襄末年大夫始專經書陽處父帥師伐楚以救江為大夫將書大夫之始而楚卒滅江故王叔桓公與伐而經不書者不以救江纍王室也秦晉交兵四世矣然為中國患者楚也至厲公初年乃與楚成而修秦怨十三國之伐雖敗秦師而經不書敗績故劉子成子實與伐而亦不書者不以伐秦纍王室也諸侯既叛晉王室愈卑鄭人因子朝之徒以叛王伐周天王處于姑蕕劉單復辟而成桓公晉士鞅侵鄭如列國報復之為者經不忍書也王叔劉成實以師會不書杜陳皆謂不親伐非經傳之意四十八大夫會城干位尋盟不書昭三十二年冬仲孫何忌會晉韓不信齊髙張宋仲幾衛世叔申鄭國參曹人莒人薜人把人小邾人城成周以上大夫會城不書盟一據傳晉魏舒韓不信如京師合諸侯之大夫于狄泉尋盟且令城成周魏子南面魏舒以國卿干盟主之位尋諸侯平丘之盟於王都禮樂征伐自大夫出其弊至此故翟泉之盟與魏舒皆削不書四十九大夫會而不能分災譏不在魯不書魯大夫襄三十年冬晉人齊人宋人衛人鄭人曹人莒人邾人滕人薛人把人小邾人會于澶淵宋災故以上會不書魯大夫者一傳曰為宋災故諸侯之大夫會以謀歸宋財既而無歸於宋故不書其人不書魯大夫諱之也今案侯伯有救患分災之義此責在晉也魯於宋為舅甥之國譏不在魯故不書其大夫五十中國外裔特相盟會不書雖參以上不書必有關於天下之故而後書疑於盟主雖公會之盟不書城下之盟雖內不書僖二十一年春宋人齊人楚人盟于鹿上宣十一年夏楚子陳侯鄭伯盟于辰陵僖二十年秋齊人狄人盟于邢三十二年秋衛人及狄盟僖二十一年秋宋公楚子陳侯蔡侯鄭伯許男曹伯會于盂昭四年夏楚子蔡侯陳侯鄭伯許男徐子滕子頓子胡子沈子小邾子宋世子佐淮夷會于申宣十一年秋晉侯會狄于攢函哀七年夏公會吳于鄫十三年夏公會晉侯及吳子于黃池以上書楚與中國盟二中國與狄盟二楚會諸侯二盟主會狄一公會吳不書盟二皆中國無伯與晉伯不競之事齊桓公卒宋人為鹿上之盟以求諸侯於楚是以有會盂之禍陳鄭既盟辰陵又不忍叛晉楚入陳圍鄭宋及楚平馴至於有申之會齊桓公逐狄以存邢而齊人與狄盟于邢晉文公將卒而衛人及狄盟晉景公會狄于攢函則楚盟辰陵之嵗也皆非細故矣據成十二年晉士燮會楚公子罷盟于宋西門外十六年鄭子駟從楚子盟于武城襄四年晉魏絳盟諸戎之類皆不書文十年陳侯鄭伯會楚子于息雖參會不書非中國外裔所以興衰則不録也若襄五年公會晉悼公十一國吳人于戚傳言九月丙午盟不書哀七年公會吳于鄫傳言盟于繒衍十三年公會晉侯及吳子于黃池傳言七月辛丑盟皆不書者陳氏曰為晉諱也吳晉之盟春秋終諱之不以吳晉同主盟也蠻荒僭號雖以諸侯禮會晉而徴百牢於魯又將以公見晉侯長此安窮非他外裔比矣萊門之盟雖內不書者城下之盟有國所恥故為內諱之也五十一諸侯勤王不書必無功而後書昭二十三年春晉人圍郊以上書諸侯圍畿內叛邑者一子頽之亂虢鄭成復辟之功子帶之亂晉文成復辟之功雖其績甚偉然皆臣子之分所當為事無可議者故皆不書子朝之亂晉籍談荀躒以十月帥師納王于王城而王師敗績于郊十一月王子猛卒敬王即位十二月晉師軍于隂于侯氏于溪泉次于社閏月晉箕遺樂徴右行跪濟師取前城軍其東南王師軍于京楚辛丑伐京毁其西南春正月壬寅二師圍郊郊鄩潰王使告間遂還亂未弭而王告間必二卿不親兵師不肅也明年三月晉侯使士景伯涖問周故於介衆乃辭子朝不納其使則前是豈無觀望之罪乎既而徴會于諸侯則曰明年明年會于黃父謀納王則又曰明年其怠於勤王如此故經書晉人圍郊於此而下書天王居于狄泉尹氏立王子朝以著其罪晉卿書人説在變文篇五十二外次不書必有關於天下之故而後書莊十年夏六月齊師宋師次于郎定九年秋齊侯衛侯次于五氏十三年春齊侯衛侯次于垂葭十五年夏齊侯衛侯次于渠蒢以上書齊宋師次者一齊衛君次者三春秋之初諸侯不王日尋干戈荆楚志吞中夏天下有倒懸之急齊桓既得國即圖伯故經沒其伐我而郎之次特書之晉世主夏盟諸侯宗之王室賴焉及其衰也齊景公不度德量力欲伐之而代興故經不忍言伐晉而五氏垂葭渠蒢之次屢書之是皆有關於天下之故矣若晉悼公既却楚師討宋叛者以伐鄭之師侵楚及陳而晉侯衛侯次于戚非伯業之所以興衰則經不書也文十年冬楚子蔡侯次于厥貉以上書楚次者一晉靈少楚人欲圖北方於是陳侯鄭伯會楚子于息遂及蔡侯次于厥貉將伐宋宋公道以田孟諸既而新城之盟諸侯皆在則宋陳鄭之君豈誠服乎楚者故諸侯會楚不足書而厥貉書次為君將稱君之始此春秋天下盛衰之機也陳氏以內次合而論之既非經意又以次郎次厥貉均為圖伯而未集則重失之五十三凡戍不書必有關於天下之故而後書僖二十八年春公子買戍衛不卒戍刺之襄五年冬戍陳十年冬戍鄭虎牢以上書戍而不卒戍者一書戍二晉文之興魯猶為楚戍衛諸侯皆從楚矣一侵曹伐衛而魯急殺其戍公子以説焉見晉文得諸侯之易悼公戍陳而卒失陳戍虎牢而僅得鄭見晉悼復伯之難皆天下大勢所關故書之據桓六年諸侯戍齊閔公二年齊公子無虧戍衛僖十三年十六年諸侯戍周皆備戎狄之難不書雖晉在不書唯宣十年諸侯戍鄭備楚事淺不足書也五十四內乞師不書乞諸外裔則書僖二十六年夏公子遂如楚乞師以上書內如楚乞師者一齊桓公攘強楚以安中國天下被其賜魯君蓋無役不從也桓公卒僖公有齊怨遽乞師于楚以伐齊此天下之大變故特書之若乞諸中國則無可議者故成二年臧宣叔如晉乞師不書五十五外乞師不書必伯主而後書成十三年春晉侯使卻錡來乞師十六年夏晉侯使欒黶來乞師十七年秋晉侯使荀罃來乞師十八年冬晉侯使士魴來乞師以上書伯主來乞師者四凡徴師諸侯以伐叛討二乃伯者之義所得為晉至厲公諸侯每二於楚於是將伐秦伐楚恐伯令不足以風動列國故五年之中三遣其貴卿乞師於諸侯悼公初立亦襲其禮蓋晉之伯業日卑矣若列國相乞師則無足議者故隱四年宋公使來乞師不書五十六公及小國戰不言我師敗績納所宜納與大國戰言我師敗績僖二十二年秋八月丁未及邾人戰于升陘以上公及小國戰不言我師敗績者一為公諱之説併在變文篇莊九年夏公伐齊納子糾八月庚申及齊師戰于乾時我師敗績以上公及大國戰言我師敗績者一上書伐齊納子糾則義已直矣雖戰而敗績非所諱也五十七外言戰言敗績義不繫於伐者但書及戰必義繫於伐而後兼言之苟略之言伐不言戰敗績桓十三年春二月公會紀侯鄭伯己巳及齊侯宋公衛侯燕人戰齊師宋師衛師燕師敗績成二年夏四月丙戌衛孫良夫帥師及齊師戰于新築衛師敗績六月癸酉季孫行父臧孫許叔孫僑如公孫嬰齊帥師會晉郤克衛孫良夫曹公子首及齊侯戰于鞍齊師敗績哀二年秋八月甲戌晉趙鞅帥師及鄭罕達帥師戰于鐵鄭師敗績十一年五月甲戌齊國書帥師及吳戰于艾陵齊師敗績獲齊國書以上書戰敗績者五皆從其恆辭前四事本非侵伐伐齊以公會書僖十五年十一月壬戌晉侯及秦伯戰于韓獲晉侯二十二年冬十一月己巳朔宋公及楚人戰于泓宋師敗績文二年春王二月甲子晉侯及秦師戰于彭衙秦師敗績成十六年夏六月甲午晦晉侯及楚子鄭伯戰于鄢陵楚子鄭師敗績以上書及戰不書來伐者四凡伐國不必於戰唯主人不服然後戰故言戰則以主及客上書來伐下舉應兵主客之辭也韓之戰本秦伯伐晉泓之戰本楚人伐宋以救鄭彭衙之戰本秦人伐晉以報殽之役鄢陵之戰本楚子救鄭皆不書來伐者以無他義不悉書書及戰則主客之分已明其悉書者必有故也莊二十八年春王三月甲寅齊人伐衛衛人及齊人戰衛人敗績僖十八年春王正月宋公曹伯衛人邾人伐齊五月戊寅宋師及齊師戰于甗齊師敗績二十八年春楚人救衛夏四月己巳晉侯齊師宋師秦師及楚人戰于城濮楚師敗績宣十二年春楚子圍鄭夏六月乙卯晉荀林父帥師及楚子戰于邲晉師敗績以上書伐而及戰者二救而及戰一圍而及戰一衛人叛王立子頽罪當誅絶齊桓奉王命以伐之此侯伯之職也故書伐衛而特書日宋襄以三國伐齊殺長立少卒成五公子篡奪之禍故書伐齊而特書月義繫於伐其旨明矣城濮之戰楚子以救衛致敗而晉文以興故書救衛見東諸侯皆已從楚邲之戰荀林父以救鄭取敗而晉遂失鄭故書圍鄭以正楚罪此四戰所以書伐書救書圍書敗績而不可略也成十三年夏五月公自京師遂會晉侯齊侯宋公衛侯鄭伯曹伯邾人滕人伐秦傳及秦師戰于麻隧秦師敗績襄十一年冬秦人伐晉傳秦庶長鮑庶長武帥師伐晉以救鄭士魴御之秦晉戰于櫟晉師敗績以上書伐不言戰敗績者二晉趙穿侵崇欲以求成於秦秦兵復出秦桓公既與晉厲公為令狐之盟歸而背之於是有十三國之伐戰于麻隧秦師敗績而經不書秦景公乞師于楚欲以伐晉晉復伐秦於是二庶長伐晉以救鄭士魴卿也戰于櫟晉師敗績而經亦不書夫晉人求成於楚而用兵於秦可謂不知類矣雖一戰勝秦而不足以取威定伯徒堅秦楚之交而已秦人委志於楚而世修晉怨雖戰勝而歸無益於國徒自擯於蠻荒而已故其戰敗皆不書不足詳也是故自韓原以來秦師無君大夫令狐而後晉大夫將皆不書後傳於此深得經意孟子曰春秋無義戰聖筆或詳或略者所以明義也五十八王師敗績于中國不書敗于戎則書之成元年秋王師敗績于茅戎傳劉康公徼戎將遂伐之三月癸未敗績于徐吾氏以上書王師敗績于戎者一王者無敵於天下故不言師敗績若桓五年蔡人衛人陳人從王伐鄭戰于繻葛王卒大敗祝聃射王中肩僖二十四年頽叔桃子奉大叔以狄師伐周大敗周師獲周公忌父原伯毛伯富辰昭二十二年鞏簡公敗績于京司徒醜以王師敗績于前城之類皆不書為王室諱也雖有狄師亦不志者母弟之難起於蕭牆唯書天王出居以見義而公卿之獲皆不忍言也既非王者聲教所及故直書王師敗績于茅戎不必諱可也五十九外相敗不書唯晉特書之僖三十三年夏四月辛巳晉人及薑戎敗秦師于殽以上書外相敗者一陳氏曰外相敗不書秦晉之構怨自是始經三君交戰無虛歲曽不十年晉遂不競而楚興故特書之凡外相敗不書據成四年鄭疆許田許敗之展陂十六年鄭伐宋宋敗之汋陂之類其諸侯伐鄭鄭敗諸丘輿等義主書伐不入例六十中國敗外裔不書唯晉特書之僖三十三年秋晉人敗狄于箕成十二年秋晉人敗狄于交剛昭元年夏晉荀吳帥師敗狄于大鹵以上書中國敗狄者三陳氏曰中國敗外裔不書唯書晉者皆病晉也晉率天下諸侯以禦外侮存中國也前年狄侵齊去年狄侵衛而晉不救於是伐晉蓋僅而後勝之也凡中國敗外裔不書據隱八年鄭人大敗戎師桓六年鄭大子忽救齊大敗戎師之類戎侵中國而敗之無可議者文九年楚公子朱伐陳陳人敗之宣九年鄭伯敗楚師于栁棼無益於從晉之實也六十一外裔敗中國不書唯荆特書之莊十年秋九月荆敗蔡師于莘以蔡侯獻舞歸以上書荆敗中國者一荆始南出至於敗蔡師以其君歸春秋之大變也若定三年鮮虞敗晉于平中晉失諸侯而甘心於羣狄於是見敗不足書矣六十二外裔交相敗獲不書必敗其從中國者若中國之從外裔者而後書必其君以敗卒而後書僖十五年冬楚人敗徐于婁林昭二十三年秋七月吳敗頓胡沈蔡陳許之師于雞父胡子髠沈子逞滅獲陳夏齧為胡子沈子滅日以上書楚敗徐者一吳敗諸侯之從楚者君滅獲大夫一外裔交相敗獲不書如襄十三年楚人敗吳師獲公子黨十四年楚伐吳吳人敗之獲公子宜穀之類以其無與於中國之故也徐本建國而列之外裔者其先僭叛同荆吳故齊桓之伯徐即諸夏楚人伐之雖見敗而不稱師也陳氏曰桓公合七國之衆以救徐而徐卒敗於楚以是為盟主病矣蓋桓伯有盛衰中國之勢又將一變也故書之諸侯之師與小國之從楚者經每不書雞父之戰從楚諸侯師敗君滅大夫獲焉於是吳入郢沈許頓胡相繼亡滅楚盡失其所從之諸侯而春秋終焉是故詳之也定十四年五月於越敗吳于檇李吳子光卒以上書於越敗吳吳君卒者一外裔相敗經不書此為吳子光卒書見其以敗卒也吳越深謀相報復而越卒亡吳蓋於是始春秋嚴于內外故特詳焉或不日或不月解在日月篇諸篇離析經文因義發例有不可隨事通釋者放此六十三公追戎不言其來與弗及莊十八年夏公追戎于濟西以上書公追戎者一案僖二十八年齊人侵我西鄙公追齊師至酅弗及書侵我書追書弗及與此詳略不同者齊孝公討洮向二盟既侵我西鄙復伐我北鄙是以有用楚師伐齊取穀之役為中國之大變故詳言之患小師微則其辭略言追則見侵可知其弗及不足詳矣六十四外伐國取邑不書雖取諸我不書春秋之初則書之隱四年春莒人伐把取牟婁為下事月五年冬宋人伐鄭圍長葛六年冬宋人取長葛以上書外取邑者二公羊傳曰外取邑不書此何以書疾取邑也其例是其説非穀梁傳曰外取邑不志此其志何也久之也為圍長葛言之可也陳氏曰春秋之初猶以取邑為重也得之矣據桓十四年宋伐鄭取牛首僖二十三年楚伐陳取焦夷文八年秦伐晉取武城十年春晉伐秦取少梁夏秦伐晉取北徴之類皆不書雖成二年齊侯伐我北鄙取龍不書春秋重滅國自書齊鄭入許而後取邑不復書傳曰疆埸之邑一彼一此何常之有書之則不勝書故書其重者而已六十五外取師不書侵伐必伐與取異事而後悉書之哀九年春宋皇瑗帥師取鄭師于雍丘十三年春鄭罕達帥師取宋師于嵒以上書取師者二鄭人圍宋雍丘故皇瑗圍鄭師而取之宋向巢伐鄭圍嵒故罕達圍宋師而取之經不書伐國圍邑但書取某師則貪土地以喪師者自見其罪矣隱十年秋宋人衛人入鄭宋人蔡人衛人伐戴鄭伯伐取之以上書入書伐書取之者一宋衛入鄭是一事蔡人從之伐戴是一事鄭伯圍戴取三師又是一事故悉書之昭二十三年武城人取邾師非君命無將帥史不書六十六外入郛不書唯齊特書之文十五年冬齊侯侵我西鄙遂伐曹入其郛以上書伐國入郛者一陳氏曰入郛皆不書唯齊特書之晉襄公卒齊獨為亂階執天子之使加兵於魯於是伐曹晉遂不競而諸侯二故悉書之也入郛不書據隱五年鄭伐宋入其郛襄元年夏韓厥荀偃伐鄭入其郛之類六十七外伐國不書圍邑有關於天下之故則書之隱五年冬宋人伐鄭圍長葛僖六年夏公會齊侯宋公陳侯衛侯曹伯伐鄭圍新城二十三年春齊侯伐宋圍緡二十六年冬楚人伐宋圍緡襄十二年春莒人伐我東鄙圍台為下救月十五年夏齊侯伐我北鄙圍成十六年秋齊侯伐我北鄙圍郕十七年秋齊侯伐我北鄙圍桃髙厚帥師伐我北鄙圍防以上伐國書圍邑者四伐我書圍邑者五穀梁傳曰伐國不言圍邑此其言圍何久之也此為長葛發傳又曰伐國不言圍邑舉重也取邑不書圍邑安足書此通春秋言之陳氏據傳僖十八年邢狄圍衛菟圃不書至二十六年楚人伐宋圍緡之後皆不書而言自僖以前則書之其義皆未竟今案宋圍長葛期歲卒取之穀梁子謂久之是也入春秋宋鄭始連兵構怨而宋為戎首故特詳之書圍新城譏齊桓合五國伐鄭而僅圍其邑也書齊圍緡於宋襄傷敗之後書楚圍緡於楚人陳蔡鄭許圍宋之先見中國無伯齊徒以強凌弱楚不盡得諸侯不止也莒伐我書圍邑者晉悼力衰於伐鄭蕭魚甫會莒已背盟也齊伐我四書圍邑者中國又無伯齊將叛盟主也六十八諸侯滅畿內國不書為夷狄所滅則書僖十年春狄滅溫以上書狄滅畿內國者一傳僖五年晉滅虢遂襲虞滅之經皆不書杜氏謂晉修虞祀而歸其職貢於王故不言滅黨亂之辭也陳氏謂虢與虞皆自亡故不詳所以滅之之罪詭激非王道皆不可通於春秋蓋畿內諸侯食天子之邑與列國不同故晉滅虞虢不書諱諸侯滅三公封國同叛王室也若桓七年鄭人齊人衛人伐盟向定六年鄭伐馮滑胥靡負黍狐人闕外雖魯史不忍書也夷狄王者不畜故滅溫不諱者所以深外之若僖十一年揚拒泉臯伊雒之戎入王城雖魯史亦不忍書也此一條本第一篇變例以畿內國異庶邦故特詳焉六十九諸侯被兵出奔者不書必國滅而後書莊十年冬十月齊師滅談談子奔莒僖五年秋楚人滅弦弦子奔黃十年春狄滅溫溫子奔衛昭三十年冬十二月吳滅徐徐子章羽奔楚以上書國滅君奔者四陳氏曰凡奔非其罪不書奔非其罪莫甚於被兵者也必國滅而後書國滅而後書奔者以不死社稷也據齊魯鄭入許許男奔衛吳入郢楚子奔隨不書若須句子來奔經不書滅不為例徐子書名説見後篇奔不言出國滅無所出從史文七十遷國不書避難而遷則書僖元年夏六月邢遷于夷儀三十一年十二月衛遷于帝丘成十五年冬許遷于葉昭九年春許遷于夷十八年冬許遷于白羽定四年夏許遷于容城哀二年十一月蔡遷于州來以上書遷國者七皆迫於危亡臨難而遷者也據文十三年邾遷于繹成六年晉遷于新田皆不書以其擇地以利民無與存亡之故也邢衛之遷違狄難也許四遷畏鄭逼也蔡遷避楚仇也許畏鄭而請遷于楚以其世服於蠻夷故皆不月以别於中國遷者蔡亦請遷于吳然蔡侯既以吳子敗楚入郢復其世仇於是楚圍蔡使疆于漢汝之間則其依吳以立國非得已也故得同中國遷者書月七十一諸侯連兵伯主有事舉重不悉書隱四年夏宋公陳侯蔡人衛人伐鄭秋翬帥師會宋公陳侯蔡人衛人伐鄭傳五年四月鄭人侵衛牧以報東門之役衛人以燕師伐鄭鄭二公子以制人敗燕師于北制以上鄭衛連兵不悉書四年傳言秋諸侯復伐鄭是四國再舉兵明矣先儒誤通前事為一役故有辭重義復變文特筆之説非事實也使果一役當從再見書人之例不得有二説五年鄭衛交兵皆不書者上書四國再伐鄭而繼書衛人殺州吁立晉則大義已明綱常復正諸侯輔篡之罪亦無所逃二國忿兵相加不足議矣隱十年春王二月公會齊侯鄭伯于中丘夏翬帥師會齊人鄭人伐宋六月壬戌公敗宋師于菅辛未取郜辛巳取防秋宋人衛人入鄭宋人蔡人衛人伐戴鄭伯伐取之傳九月戊寅鄭伯入宋十一年冬十月鄭伯以虢師伐宋壬戌大敗宋師以報其入鄭也宋不告命故不書以上鄭宋連兵不悉書傳曰宋不告命非也自宋公黨州吁欲以諸侯伐鄭去馮鄭伯為王卿士以王命伐宋討其不王之罪連兵至此宋實首亂故書宋人衛人入鄭以重其罪略鄭人報復之過不悉書而公敗宋師取二邑以甚之書日入郕以討違王命書日各當其罪也歸祊以來魯鄭同心仇宋宋雖不告鄭亦必告傳言不告誤矣唯知魯史有不書之例而不知聖筆亦有所刪蓋不修春秋左氏亦不及見也僖三十年秋晉人秦人圍鄭傳春晉人侵鄭以觀其可攻與否以上晉侵鄭不書陳氏曰舉重在圍文七年夏四月戊子晉人及秦人戰于令狐傳八年夏秦人伐晉取武城十年傳春晉人伐秦取少梁夏秦伐晉襄十年夏晉師伐秦傳九年齊景公乞師于楚將以伐晉楚子師于武城以為秦援秦人侵晉十年夏晉荀罃伐秦報其侵也以上晉秦連兵不悉書陳氏曰秦晉再交兵不書故十年書秦伐晉今案令狐晉秦再構怨而曲在晉於是秦人報復不已皆以其私也故不悉書悼公之世秦人侵晉淺事不足書晉荀罃以一軍伐秦徒曰報其侵而已則非伯者之略也故但書師而明年書秦人伐晉僖三十三年冬晉人陳人鄭人伐許傳討其二於楚也楚令尹子上侵陳蔡陳蔡成遂伐鄭晉陽處父侵蔡楚子上救之與晉師夾泜而軍文三年秋楚人圍江傳晉先僕伐楚以救江陳氏曰先僕非卿冬晉陽處父帥師伐楚以救江四年秋楚人滅江以上晉襄公繼伯晉楚有事不悉書襄公初年經書晉陳鄭伐許而楚子上侵陳蔡陳蔡成遂伐鄭皆不書者城濮餘烈未逺終襄之世陳蔡無役不從楚亦僅此侵伐而止不足移二國內向之志也陽處父侵蔡楚子上救之晉先僕伐楚救江皆不書者蔡近楚襄公力盡於敵秦既不足以服楚又安能得蔡經書其合五國之師以伐沈而沈潰以大夫專將救江而江滅則其伯略可知況以微者伐楚救江豈足議也文九年春楚人伐鄭傳楚子師于狼淵以伐鄭囚公子堅公子尨及樂耳鄭及楚平公子遂會晉人宋人衛人許人救鄭傳夏楚侵陳克壺丘以其服於晉也秋楚公子朱自東夷伐陳陳人敗之獲公子茷陳懼乃及楚平十年冬楚子蔡侯次于厥貉傳陳侯鄭伯會楚子于息冬遂及蔡侯次于厥貉將以伐宋宋人逆楚子勞且聽命十五年夏晉郤缺帥師伐蔡戊申入蔡宣元年秋楚子鄭人侵陳遂侵宋晉趙盾帥師救陳宋公陳侯衛侯曹伯會晉師于棐林伐鄭傳楚蒍賈救鄭冬晉人宋人伐鄭二年夏晉人宋人衛人陳人侵鄭傳楚鬭椒救鄭三年傳春晉侯伐鄭及郔鄭及晉平夏楚人侵鄭四年冬楚子伐鄭五年冬楚人伐鄭傳楚子伐鄭陳及楚平晉荀林父救鄭伐陳六年春晉趙盾衛孫免侵陳傳冬楚人伐鄭取成而還九年秋晉荀林父帥師伐陳冬楚子伐鄭晉卻缺帥師救鄭傳鄭敗楚師于栁棼十年夏晉人宋人衛人曹人伐鄭傳鄭及楚平諸侯之師伐鄭取成而還冬楚子伐鄭傳晉士會救鄭逐楚師于潁北諸侯之師戍鄭十一年傳春楚子伐鄭及櫟夏楚子陳侯鄭伯盟于辰陵楚左尹子重侵宋王待諸郔冬十月丁亥楚子入陳十二年春楚子圍鄭夏六月乙卯晉荀林父帥師及楚子戰于邲晉師敗績冬十二月戊寅楚子滅蕭宋師伐陳十三年夏楚子伐宋十四年夏晉侯伐鄭秋楚子圍宋為下葬月十五年夏五月宋人及楚人平以上晉自靈公成公至景公三世晉楚有事不悉書楚欲圖北方楚子親師鄭及楚平於是書伐鄭新城之盟陳鄭皆在郤缺入蔡以城下之盟還於是書伐蔡楚再侵陳公子朱伐陳不書必楚既得鄭侵陳又侵宋而後書蔡最近楚陳次之鄭介兩間春秋於是三國者未嘗無先後緩急之差也傳言厥貉之次陳侯鄭伯在焉不書至辰陵而後書宣三年晉侯伐鄭鄭及晉平不書六年楚人伐鄭取成十一年楚子伐鄭鄭從楚皆不書者晉成之世鄭猶不忍叛晉辰陵而後傳言鄭又徼事于晉而陳侯亦如晉於是楚子入陳圍鄭則二國之反覆乎晉楚之間濵于滅亡而不悔者豈得已哉故書晉楚之所侵伐則陳鄭之向背可知而凡以侵伐取成者不悉書雖晉君自將亦不書也靈成政在大夫既失齊又失魯晉遂不競而楚興雖君將豈足議乎於是終失陳鄭而邲敗之後不復救宋諸侯皆楚之從中國之勢為之一變矣是故靈公盟會諸侯皆不序而陽處父伐楚救江為大夫將書大夫之始公子遂會晉人宋人衛人許人救鄭大夫復不書而次厥貉侵陳遂侵宋為楚君將稱君之始然景公既失陳鄭而書晉侯伐鄭者鞍戰而後齊魯俱服伐齊同盟蟲牢救鄭同盟馬陵同盟于蒲四合諸侯皆其君親之景公稍能自強也凡救不悉書别説見後成二年冬楚師鄭師侵衛三年春公會晉侯宋公衛侯曹伯伐鄭為下日葬月公子偃帥師禦之敗諸丘輿皇戍如楚獻捷夏鄭公子去疾帥師伐許冬鄭伐許四年冬鄭伯伐許傳晉欒書荀首救許伐鄭取汜祭楚子反救鄭鄭伯與許男訟焉六年秋楚公子嬰齊帥師伐鄭冬晉欒書帥師救鄭傳晉師遂侵蔡楚公子申公子成以申息之師救蔡八年傳晉侵沈獲沈子揖事在侵蔡前七年秋楚公子嬰齊帥師伐鄭公會晉侯齊侯宋公衛侯曹伯莒子邾子把伯救鄭八年春晉欒書帥師侵蔡傳遂侵楚獲申驪鄭伯會晉師門于許九年秋晉人執鄭伯傳春楚人以重賂求鄭鄭伯會楚公子成于鄧晉欒書帥師伐鄭傳楚子重侵陳以救鄭晉侯禮鍾儀使歸求成冬楚公子嬰齊帥師伐莒庚申莒潰楚人入鄆鄭人圍許十年春衛侯之弟黑背帥師侵鄭夏公會晉侯齊侯宋公衛侯曹伯伐鄭傳晉立大子州蒲為君而會諸侯伐鄭辛巳鄭伯歸十二年夏公會晉侯衛侯于瑣澤傳宋華元克合晉楚之成會于瑣澤成故也十四年秋鄭公子喜帥師伐許十五年夏楚子伐鄭傳遂侵衛及首止鄭子罕侵楚取新石十六年夏鄭公子喜帥師侵宋傳楚子自武城使公子成以汝隂之田求成于鄭鄭叛晉子駟從楚子盟于武城夏鄭子罕伐宋宋將鉏樂懼敗諸汋陂鄭人覆之獲將鉏樂懼衛侯伐鄭至于鳴堆晉侯將伐鄭楚子救鄭六月甲午晦晉侯及楚子鄭伯戰于鄢陵楚子鄭師敗績秋公會尹子晉侯齊國佐邾人伐鄭傳知武子以諸侯之師侵陳遂侵蔡諸侯遷于潁上鄭子罕宵軍之宋齊衛皆失軍十七年春衛北宫括帥師侵鄭傳正月鄭子駟侵晉衛北宫括救晉侵鄭夏公會尹子單子晉侯齊侯宋公衛侯曹伯邾人伐鄭傳楚子重救鄭師于首止諸侯還冬公會單子晉侯宋公衛侯曹伯齊人邾人伐鄭傳十月庚午圍鄭楚公子申救鄭師于汝上諸侯還以上晉景公至厲公再世晉楚有事不悉書景公自鞍之戰諸侯始服從厲公有鄢陵之捷中國之勢稍振然始終唯爭鄭而卒於失鄭者內治不足故也景公會諸侯伐鄭鄭敗諸丘輿雖史不志存大體也欒書以救許伐鄭不書因救鄭遂侵沈獲沈子揖遂侵蔡皆不書因侵蔡遂侵楚亦不書晉不能得鄭而為許伐鄭不能保鄭而為鄭侵沈侵蔡不能服楚而因侵蔡遂侵楚皆非伯者素定之略不足書也於是楚人以重賂求鄭鄭遂從楚晉人執鄭伯使鍾儀歸楚求成伐鄭以歸鄭伯而僅能服鄭雖華元克合晉楚之成而楚子背盟伐鄭鄭亦再貪楚賂而背晉伐宋則以晉楚皆中衰而向背之權唯在鄭也楚伐鄭之役遂侵衛不書楚方失鄭不足以病衛也晉伐鄭之役知武子以諸侯之師侵陳遂侵蔡不書義與上同凡一役而再有事非有關於天下之故則不書也鄭嘗侵楚取新石不書無益於從違而深楚怨事與栁棼同也嘗侵晉不書為中國諱也鄢陵之後晉侯三請王臣以伐鄭而遇楚救輒還能數合諸侯而不復能一戰此鄭之所以堅於從楚也凡楚救鄭皆不書諸侯非楚所當有方其得之則不與救也其詳别見成十八年夏楚子鄭伯伐宋傳納宋魚石向為人鱗朱向帶魚府以三百乘戍之而還冬楚人鄭人侵宋傳晉侯師于台谷以救宋楚師還襄元年春仲孫蔑會晉欒黶宋華元衛寧殖曹人莒人邾人滕人薛人圍宋彭城夏晉韓厥帥師伐鄭仲孫蔑會齊崔杼曹人邾人把人次于鄫傳東諸侯之師次于鄫以待晉師晉師自鄭以鄫之師侵楚焦夷及陳晉侯衛侯次于戚以為之援秋楚公子壬夫帥師侵宋傳楚子辛救鄭侵宋吕留鄭子然侵宋取犬丘二年春鄭師伐宋夏晉師宋師衛寧殖侵鄭冬遂城虎牢傳鄭人乃成三年六月公會單子晉侯宋公衛侯鄭伯莒子邾子齊世子光己未同盟于雞澤陳侯使袁僑如會戊寅叔孫豹及諸侯之大夫及陳袁僑盟傳楚司馬公子何忌侵陳冬晉荀罃帥師伐許四年傳夏楚彭名侵陳冬陳人圍頓傳楚人使頓間陳而侵伐之故五年冬戍陳楚公子貞帥師伐陳公會晉侯宋公衛侯鄭伯曹伯齊世子光救陳七年冬楚公子貞帥師圍陳十二月公會晉侯宋公陳侯衛侯曹伯莒子邾子于鄬陳侯逃歸八年夏鄭人侵蔡獲蔡公子燮冬楚公子貞帥師伐鄭九年冬公會晉侯宋公衛侯曹伯莒子邾子滕子薛伯把伯小邾子齊世子光伐鄭楚子伐鄭十年夏楚公子貞鄭公孫輒帥師伐宋傳六月庚午圍宋衛侯救宋師于襄牛鄭皇耳帥師侵衛秋楚子囊鄭子耳伐我西鄙還圍蕭克之九月子耳侵宋北鄙秋公會晉侯宋公衛侯曹伯莒子邾子齊世子光滕子薛伯把伯小邾子伐鄭冬楚公子貞帥師救鄭十一年傳宋向戌侵鄭大獲夏鄭公孫舍之帥師侵宋公會晉侯宋公衛侯曹伯齊世子光莒子邾子滕子薛伯把伯小邾子伐鄭秋楚子鄭伯伐宋公會晉侯宋公衛侯曹伯齊世子光莒子邾子滕子薛伯把伯小邾子伐鄭會于蕭魚以上晉悼公復伯十有一年之中再合大夫九合諸侯始於救宋終於復鄭當楚鄭之侵宋也晉侯師于台谷以救宋楚師還雖君將不書者楚每得鄭然後圖宋悼公之興楚卒失鄭何宋之及圖故救宋無關於伯體不書而以圍彭城伐鄭序績當務為急也次鄫之役晉師自鄭以鄫之師侵楚及陳晉侯衛侯次于戚皆不書者悼公之伯略未足以侵陳伐楚也范宣子曰陳近於楚民朝夕急有陳非吾事也無之而後可不待陳侯逃歸而晉人已置陳於度外矣故鄫之次徒以吾大夫會外大夫存䇿書之大體而已楚何忌侵陳彭名侵陳使頓侵陳皆不書者下書伐陳圍陳舉重鄭子然侵宋不書下書伐宋子耳侵宋不書上書伐宋皆舉重也此陳氏本例餘可以類推之鄭皇耳帥師侵衛衛人獲皇耳不書者與成十五年楚伐鄭不書侵衛同撥亂之機務當其會也故因陳氏例更考經傳以明筆削之旨陳氏謂善救雖君將不書亦非序見後凡外侵伐此不悉序互見下篇七十二凡救不悉書伯者救中國必足以示名義而後書諸侯相救以叛伯無伯書楚救必不能而後書狄救諸國以無伯書閔元年春齊人救邢僖元年春齊師宋師曹師次于聶北救邢曹師從二傳六年秋諸侯遂救許以上書伯主救與國者三陳氏曰救必無功而後書今以經傳考之王師唯救衛一事內師若救成救台師出而寇還會救若救鄭救許救徐終桓公之伯三國無役不從不可槩謂無功晉楚救陳鄭筆削詳略亦各不同蓋內師無不書王師令苟及魯無不書會救亦無不書但會救無功則人其大夫以見義陳氏之言非達例也以齊桓之盛不能逐狄全邢乃宿師聶北待其潰而遷之此亦陳氏所謂以無功書者然邢能以亡為存者桓公二救之力也楚人圍許蓋攻其所必救以解新城之圍諸侯遂救許得事之宜也故皆書之以示伯主救中國之名義若十六年齊伐厲不克救徐而還非有關於伯體則以會救舉重襄二十四年晉平合諸侯于夷儀楚子伐鄭諸侯還救鄭經但書會于夷儀而伐齊與遂救皆不書以十一國伐齊而不能師不得與齊桓伐鄭遂救許同文也文三年冬晉陽處父帥師伐楚以救江以上書伯國伐救者一亦陳氏所謂以無功書者也春秋未有書伐救者於宣五年晉荀林父伐陳救鄭不書猶曰遷怒而非伐敵也成四年伐鄭救許不書許終屬楚鄭不忘晉非可以敵言也先僕嘗伐楚以救江伐敵矣亦不書非卿易其事也於是晉又以江故告于周陽處父帥師門于方城而楚之伐江者還然後書之所以示伐救之名義也但晉方撓於秦不能復為江出師故江卒滅於楚而前救亦不為功耳謂必無功而後書豈筆削之旨乎宣元年秋晉趙盾帥師救陳九年冬晉郤缺帥師救鄭成六年冬晉欒書帥師救鄭以上書伯國專救與國者三楚既得鄭而侵陳宋晉趙盾救陳陳事晉者猶數年不可謂救陳非功楚既得陳而伐鄭晉郤缺救鄭鄭伯敗楚師于栁棼楚子再伐鄭士會救鄭逐楚師于潁北皆不可謂無一時之功者然郤缺救鄭之後繼書諸侯伐鄭而士會之救不書以晉救不足賴鄭終折而歸楚不悉書也晉景既得鄭同盟于蟲牢明年欒書救鄭而楚師還又明年大會諸侯以救鄭而鄭人囚鄖公鍾儀亦不可謂救無功然鄭終叛晉觀悼公既戍陳又合諸侯以救之而陳侯逃歸豈非晉之伯略苟未能服楚則諸侯之從晉者終不敢恃以為安乎然伯者救中國之名義則有不容泯者功有小大屬辭比事而可知矣聖人豈責晉人以一救之力而長有諸侯哉僖二十八年春楚人救衛襄十年冬楚公子貞帥師救鄭以上書楚救與國者二僖二十二年楚人伐宋以救鄭不書三十三年晉陽處父侵蔡楚子上救之亦不書而救鄭之役特書之故陳氏謂見晉文之興楚欲救而不能也鄭之反覆乎晉楚之間凡楚救皆不書宣元年蒍賈二年鬭椒成三年子反九年子重十七年子重子申皆不書鄢陵之役雖楚子救鄭不書而公子貞之救特書之故陳氏謂見晉悼之興楚欲救而不能也蓋筆削之旨當楚得諸侯則楚救不書不與其救也不與其救者嫌以諸侯與楚也故必不能救而後書其抑強楚尊中國大義昭然不可與伯者救中國例論明矣至定五年秦師救楚亦不書所以外之也宣十二年冬衛人救陳哀七年冬鄭駟𢎞帥師救曹以上書列國相救者二清丘之盟宋衛皆在宋討陳二而衛救之叛晉也宋圍曹而鄭救之諸侯無伯久矣故宋卒滅曹僖十八年夏狄救齊哀十年冬吳救陳以上書外裔救諸國者二齊桓公卒宋襄公伐齊而立孝公故狄救齊春秋之末陳即吳楚伐陳而吳救之皆中國無伯之事七十三兵事言遂不悉書必有關於天下之故而後書僖四年春王正月公會齊侯宋公陳侯衛侯鄭伯許男曹伯侵蔡蔡潰遂伐楚六年夏公會齊侯宋公陳侯衛侯曹伯伐鄭圍新城秋楚人圍許諸侯遂救許十五年三月公會齊侯宋公陳侯衛侯鄭伯許男曹伯盟于牡丘遂次于匡二十八年冬公會晉侯齊侯宋公蔡侯鄭伯陳子莒子邾子秦人于溫諸侯遂圍許文十五年冬齊侯侵我西鄙遂伐曹入其郛宣元年秋楚子鄭人侵陳遂侵宋襄十年春公會晉侯宋公衛侯曹伯莒子邾子滕子薛伯把伯小邾子齊世子光會吳于柤夏五月甲午遂滅逼陽二十三年秋齊侯伐衛遂伐晉昭四年秋七月楚子蔡侯陳侯許男頓子胡子沈子淮夷伐吳遂滅賴定八年秋晉士鞅帥師侵鄭遂侵衛以上兵事言遂者十穀梁傳曰遂繼事也陳氏曰春秋舉重凡師再有事不悉書據成六年晉欒書救鄭遂侵蔡但書救鄭八年晉欒書侵蔡遂侵楚但書侵蔡之類苟悉書也則以遂言之兵事言遂必天下之大故也今案經書遂事有三有以遂為功者若遂伐楚遂次于匡之類是也有以遂為罪者遂滅逼陽遂滅賴之類是也有遂事與本事等者侵陳遂侵宋侵鄭遂侵衛之類是也經書遂事以此其不書者或非義所存或非力所及事不足記也説已見前七十四春秋之初戎狄侵諸國不書自有伯而後書以之伐與國不書苟有召之者亦不書莊二十四年冬戎侵曹三十二年冬狄伐邢閔二年十二月狄入衛僖八年夏狄伐晉十年春狄滅溫十三年春狄侵衛十四年秋狄侵鄭十八年夏狄救齊二十一年春狄侵衛二十四年夏狄伐鄭三十年夏狄侵齊三十一年冬狄圍衛三十三年夏狄侵齊文四年夏狄侵齊九年夏狄侵齊十年冬狄侵宋十一年秋狄侵齊十三年冬狄侵衛宣三年秋赤狄侵齊四年夏赤狄侵齊以上書戎侵中國一狄侵十二伐三圍一入一滅一救一皆中國有伯後事春秋戎人疆索不分雖無荆楚并吞之志而近逼王畿東方諸侯咸被其害然經於隱九年北戎侵鄭桓六年北戎伐齊皆不書者諸侯無王自相侵伐故中國之勢不尊春秋治在諸侯既書戎伐凡伯則無藩屏之義可知而戎為列國患不復書急先務也齊桓始伯嘗一伐戎而戎侵曹不能治既伐山戎又親伐北戎而揚拒泉臯伊雒之戎入王城不能救狄為邢衛患桓公有存亡國之功然邢潰而後遷邢衛滅而後戍衛甚至滅溫以侵畿甸而不能討晉文代興亦治不及狄焉蓋以荆楚之禍有大於戎狄者二君既盡力於彼則於此有不及圖也春秋既與齊晉以伯而詳書狄患如此亦所以責之備與然齊嘗平戎于王又平戎于晉而猶不免再徴諸侯以戍周桓公卒狄且救齊齊人為邢謀衛難亦與狄盟而使侵衛衛既再遷而齊反受狄患不已皆有以來之也晉襄以薑戎敗秦師猶曰禦寇也宋辭蟲牢之會而晉人亦以伊雒之戎陸渾蠻氏侵之豈盟主服與國之道乎故經略而不書為諸國諱也是故赤狄伐晉以先縠之召不書苟有召之者則是患在蕭牆矣若戎入王城狄伐京師則魯史諱言之也晉自文公奔狄君臣皆納隗氏遂與狄為昏姻而赤狄最強能服役衆狄其後衆狄畔之而服于晉晉因得以盡滅赤狄之族唯白狄一從秦人伐晉而止至悼公亦和諸戎以成三駕之功蓋宣成而降諸戎羣狄皆少衰矣春秋屬辭卷九
