body:
  text: 春秋屬辭卷十元趙汸撰變文以示義第三變文之義有三一曰變文以示義春秋雖有筆有削而所書者皆從主人之辭然或有文同而事異者有事同而文異者其與奪無章而是非不著則非唯不足以盡事變而反足以亂名實矣是故有變文之法焉雖所因革不越乎一二字間而是非得失之故可無辯而自明將使屬辭比事者即其異同詳略以求之所以決嫌疑明是非而非襃貶之謂也然文有可變者有不可變者有異其文以異其事者有併上文以見其罪者諱一也譏在内與譏在外異稱人一也伯主與諸侯異諸侯與外裔異名號一也大夫不名與諸侯異公子稱字與大夫異稽其類不主於辭當其名必辯於物其知者以為文理密察足以有别也其不知者謂之無達例而已然自斯義不明學者弗能深考一字襃貶之説蓋由是而出焉夫既以變文為貶矣而不變者非襃也由是有貶無襃之說生焉又其甚者乃有法書之說焉顧其所以為法者苛刻則幾於申韓踈闊則過於三章視後世所謂八分書者曽不若也其可以論於春秋經世之㫖乎劉侍讀之言曰春秋之文有常有變變之甚微讀者難知則以為史耳乃春秋則欲起問者見善惡也雖其所謂常變者與今異然學者以是求之亦足以知變文之教矣二曰辯名實之際三曰謹内外之辯皆别為篇一文同禮失王不稱天莊元年冬王使榮叔來錫桓公命文五年春王正月王使榮叔歸含且賵三月王使召伯來㑹葬以上錫命王不稱天者一歸含且賵不稱天者一㑹葬不稱天者一文元年書天王使毛伯來錫公命成八年書天子使召伯來錫公命此不稱天者文成二公雖無功德亦無罪惡從其恒稱得失自見桓公負簒弑之罪天王不能討於其薨也反錫命以寵之亂臣賊子無所畏忌矣故文不稱天明其失又與錫二公命不同也隱元年書天王使宰咺來歸惠公仲子之賵此不稱天者仲子乃惠公再娶之夫人因賵惠公兼及仲子猶有所重輕此成妾母之喪開並后匹適之路故文不稱天明其失又與賵惠公仲子不同也文元年書天王使叔服來㑹葬此不稱天者王朝㑹諸侯葬禮所宜有僖公曽朝聘天子故天子遣内史㑹其葬未為失典㑹葬妾母與歸含且賵同故文不稱天明其失又與㑹葬僖公事異矣以此三者皆廢法亂紀自替行私之事與恩數有厚薄者不可同年而論也蓋王與天王同是尊稱異其文所以異其事而非以文為貶自先儒以王不稱天為貶而稱天者非襃也故學者得以非之二諱公與王卿士盟不書公同微者僖二十九年夏六月㑹王人晉人宋人齊人陳人蔡人秦人盟于翟泉文十年秋七月及蘇子盟于女栗以上㑹王人外大夫盟不書公者一及王卿士盟不書公者一翟泉之失與踐土不殊而書法不同者踐土乃晉文尊王定伯之始諸侯不可不序故没王子不書以全大體而已翟泉王子又出㑹諸大夫以尋盟而魯君與焉故但書㑹使若微者㑹盟然為公諱也傳曰卿不書罪之也在禮卿不㑹公侯㑹伯子男可也左氏非知筆削之㫖者知卿不當㑹公侯而不知大夫不可盟王子知大夫不書為有罪而不知公盟王臣為當諱也春秋於公㑹外臣不諱唯盟則諱左氏皆不能發例以是知内不書公同微者皆筆削之法襄王卒頃王新立王室無難而蘇子特盟魯侯豈非以晉方不足恃而王臣自出以盟諸侯乎夫諸侯事天子待盟而後信非所以示天下也故但書及使若微者受盟然而蘇子書爵以見實與踐土翟泉有伯主之日異也王子與諸侯大夫皆稱人説見後篇三諱公與大夫盟不書公同微者以大夫盟公去其族文二年三月乙巳及晉處父盟以上公如伯國而及其臣盟者一雖齊晉伯業盛時未嘗使諸侯受盟於其國魯閔公襄公童子侯也桓公出盟閔于落姑悼公出盟襄于長樗不敢以非禮加於列國也魯君如伯國受盟自文公始而晉襄怒其不朝使其大夫盟公以恥之卿不㑹公侯而況於盟乎況於受盟乎晉卑諸侯甚矣然晉文公末年魯既不朝又不朝其嗣君是以取辱故及處父盟不書公而公如晉併沒不書若深諱其事者處父不稱族又以别於來尋盟大夫傳曰以厭之也杜氏曰惡處父也抑以晉為失宗諸侯之道矣成三年十一月丙午及荀庚盟丁未及孫良夫盟十一年三月己丑及郤犨盟襄十五年二月己亥及向戌盟于劉以上外臣來聘而公及之盟者三其事與内臣如外涖盟同凡涖盟皆盟其君習俗既久不知其非春秋皆不書公所以正之也莊二十二年秋七月丙申及齊髙徯盟于防以上公及外臣特相盟者一凡内不書公皆譏在外也若莒人微者齊大夫無君譏不在外則書公及盟從恒辭凡諱公但謂隱避其辭示有所羞惡實則不可掩終春秋無外微者與魯卿盟豈有魯微者得盟伯國正卿之事屬辭比事非内微者可知矣杜氏見左氏此經無傳因謂及髙徯為内微者弗深考爾四諱公為仇人役變公將稱師莊八年春師次于郎以俟陳人蔡人為下治兵月夏師及齊師圍郕秋師還以上諱公將稱師者三陳氏曰此吾君將也何以稱師莊之㑹齊皆譏之今案陳氏據傳公子慶父請伐齊知公在師然僖十八年師救齊不言還史無書師還之例此公至自圍郕之變文也莊公以千乗之國為仇人役故為公諱恥然曰師還則猶以微文見之所以明父子之親示不共戴天之戒非徒隱惡也五諱公與仇人狩外稱人同微者莊四年冬公及齊人狩于禚以上諱公狩外稱人者一公羊傳曰公曷為與微者狩齊侯也齊侯則其稱人何諱與讎狩也何氏曰以不没公知為齊侯也今案公羊學者於此獨得經意然不知㑹伐外稱人圍郕内稱師皆諱也故有其餘從同同之說從同同乃説經之遯辭非筆削之義六諱公與仇㑹伐外稱人同微者莊五年冬公㑹齊人宋人陳人蔡人伐衛以上諱公㑹伐外稱人者一義與諱及仇狩同莊公與仇人接春秋始終諱之併人宋陳蔡者既為内諱不可復存筆削之迹義與僖二十七年人楚君自異穀梁傳曰是齊侯宋公也此説必有所受但曰人諸侯以人公逆王命也則非既曰以逆王命貶則内當没公不書今四國稱人而内獨書公是使公首惡也所謂人諸侯以人公亦竒譎非聖筆氣象凡春秋之有變文所以别嫌疑存大體辯名實而非以文為貶經書伐衛一事人外君以諱㑹仇月救衛字王人以尊王命而五國逆王命之罪自有不可掩者故書公㑹伐從其恒辭而義無不明矣七妾母為昏主婦姜不稱氏文四年夏逆婦姜于齊宣元年三月遂以夫人婦姜至自齊以上婦姜不言氏者二凡夫人有姑稱婦某氏以别於無姑者文四年出姜有適姑聲姜在而實成風以妾祖姑為昏主蓋妾母既稱夫人聲姜避不敢主也宣元年穆姜無適姑敬嬴其妾姑也成十四年齊姜穆姜其適姑也皆以婦禮至故史皆稱婦姜氏夫子以尊崇妾母乃時君之意非筆削所加薨葬用夫人禮既悉從史文以見實然適妾之分終不可無辯故於成風敬嬴以妾姑主昏逆婦之日婦姜特不稱氏使不得與適姑逆婦同文以明妾母僭竊之非禮也氏與不氏同為婦姜異其文者異其事也陳氏曰有成風則出姜不氏有敬嬴則穆姜不氏所以别適姑也最得經㫖公羊氏以不稱姜氏為譏喪取既與出姜異義又曰内無貶公之道而貶夫人愈支而鑿矣變文所以别嫌明微若喪取則不待異文而後見者凡不待異文而後見者皆從其恒辭蓋不勝辯也八夫人不稱姜氏莊元年三月夫人孫于齊以上夫人孫不稱姜氏者一夫人以前年與公如齊而公薨于齊此年夫人又孫于齊自是兩事不得相蒙若據史氏恒法無不書姜氏之理夫子以桓公之弑賊由姜氏其孫也亦以與弑而不容於魯其實只是一事而首尾相因其反既不書至故孫不稱姜氏特用一事再見蒙上文之例使人比而觀之則公與夫人姜氏如齊公薨于齊夫人孫于齊總為一事而書而夫人與弑之罪自見其罪既見則夫人當絶于魯可知而非以去姜氏為絶之之文也僖元年十二月丁巳夫人氏之喪至自齊以上夫人氏不稱姜者一上書夫人薨于夷齊人以歸不言喪見以罪討不成喪也此言夫人氏之喪而不言姜見即齊人以歸之姜氏也既齊人殺之以歸不成其喪則義絶于魯明魯人不當請其喪而以夫人禮成之公穀以夫人不稱姜氏皆為貶先儒謂既諱其殺不宜有貶故杜氏以來皆以為闕文竊謂經文二事不應所闕適同屬辭比事知是筆削之㫖但二傳以去姜氏為貶絶之文故不通耳不成喪則不言葬史文也九凡執恒稱人必伯討而後稱君僖五年冬晉人執虞公十九年春王三月宋人執滕子嬰齊六月己酉邾人執鄫子用之二十八年冬晉人執衛侯歸之于京師成九年秋晉人執鄭伯襄十六年春晉人執莒子邾子以歸十九年春晉人執邾子哀四年春宋人執小邾子夏晉人執戎蠻子赤歸于楚以上執國君稱人者九被執稱名者一外裔之君見執稱名者一啖氏曰春秋時以彊暴弱故執皆稱人亂辭也今案衛人君臣之禍實晉文公有以致之故雖伯主執諸侯歸之于京師亦稱人其執鄭伯以下説見上篇趙氏曰諸侯被執失地則名不然則否今案虞公天子三公雖失地不名從史文也滕子嬰齊戎蠻子赤皆不得復國者也蓋追書其名以别之而滕子又書月詳中國也鄫子見執用之以祭社直文以見實故不名而特書日以異其事僖二十八年三月丙午晉侯入曹執曹伯畀宋人成十五年春晉侯執曹伯歸之于京師以上伯主執諸侯稱君者二公羊傳曰稱侯而執者伯討稱人而執者非伯討也今案凡執恒稱人從史文也必伯討而後稱君蓋變文以與之左氏見史法執唯稱人而不知經意故發例舛謬公羊此義必有所受矣曹伯叛中國而從楚負芻簒立皆伯者之義所當討故二執稱君執曹伯畀宋人雖蒙入曹之文不别稱晉侯其義一也陸氏謂承上文不可重言晉人此史法也案獲麟後史書陳宗豎自楚復入于陳陳人殺之不言殺陳宗豎者省文也鄭伯有事與陳宗豎同而經書曰鄭良霄出奔許自許入于鄭鄭人殺良霄文不省者以大夫自外入國與國人討而殺之各是一義於經不得相蒙也劉侍讀嘗發此義計夫子改正舊史若此者多矣使執曹伯别是一義不得蒙上文晉侯則特書晉人執曹伯何不可之有十國君反國不言自必自京師自楚而後言自苟殺其大夫公子而後歸則不言自京師苟能興滅繼絶則不言自楚莊六年夏六月衛侯朔入于衛僖二十八年冬曹伯襄復歸于曹襄二十六年春王二月甲午衛侯衎復歸于衛成十六年秋曹伯歸自京師僖二十八年六月衛侯鄭自楚復歸于衛三十年秋衛侯鄭歸于衛昭十三年秋蔡侯廬歸于蔡陳侯吳歸于陳以上國君反國書入者一書歸者四復歸者三其言自者二凡公子大夫歸國入邑皆言所自者詳其出入所由以見善惡之輕重故悉從其恒稱國君反國不言自者南面之君義得專制善惡在己雖假鄰國之力不足記也自京師必書所以尊王朝且見釋有罪自天子自楚必書所以外四裔且見其叛中國而得免於誅唯衛侯鄭為王所赦事與曹伯同而不言歸自京師者鄭使衛人殺元咺及公子瑕而後入故不以殺大夫公子累京師也又見衛侯雖見釋于天子實以殺二子而後得歸也其蔡侯廬陳侯吳實楚復之而不言自楚者楚滅之再世而立其孫以復國與國君出奔見執而歸者不可同文陳蔡之人納蔡公以圖興復而卒如其志則亦不當言自楚上言滅陳滅蔡而此皆以繼絶稱名其事已著而義無不包矣其曰入曰歸曰復歸或名或不名皆從主人之辭十一奔君自外入邑伯國逆之則不名桓十五年秋九月鄭伯突入于櫟襄二十五年秋八月衛侯入于夷儀蒙上事月以上奔君入邑二不名者一國君出奔有廢立則名辯二君也故鄭伯突衛侯衎出奔皆名其自外入邑事亦相同而衛侯入夷儀獨不名者傳言晉侯使魏舒宛没逆衛侯將使衛與之夷儀則與殺檀伯而遂居櫟者異矣夫衛之所以有二君者晉人為之也剽列於盟主之㑹屢矣而晉侯又逆衎而與之夷儀此剽之所以弑也故衛侯入夷儀獨不名以别於鄭伯譏不在衛侯也詳已見前篇十二大夫奔非君出之不名文八年冬宋司城來奔十四年秋宋子哀來奔以上外大夫出奔不名者二宋人將弑昭公蕩意諸髙子哀皆忠於昭公而見忌於公子鮑之黨是以來奔故一書其官一書其字而不名以别他臣之見逐於君者宋大夫書官說見特筆篇十三公子反國非有罪不名閔元年秋季子來歸桓十五年夏許叔入于許十七年秋蔡季自陳歸于蔡為下葬月以上内公子來歸者一外公子歸國者一入國者一皆字而不名筆削之法大夫公子反國非有罪不書而季友實魯社稷之臣閔公請于伯主而盟以復之蔡季為蔡人所召歸而嗣國許叔因鄭昭復歸乘間得入許能以亡為存三子之反國皆其宗社存亡安危所繫其人雖無罪而其事不可没故不名以别之十四大夫見殺非君臣不名苟殺當其罪則去族莊二十六年夏曹殺其大夫僖二十五年夏宋殺其大夫文七年夏宋人殺其大夫八年冬宋人殺其大夫司馬以上稱國殺大夫不名者二稱人殺大夫不名者二君殺大夫有罪無罪皆名示臣禮也莊僖之世曹宋殺其大夫不名皆無傳陳氏謂曹赤簒而殺其大夫必有不義其君者蓋赤之所殺必忠於羈者於赤無君臣之分赤既君曹以討罪告故稱國以殺經不以君臣之禮治之故不名所以别大夫見殺於其君者宋成公以僖二十三年嗣位次年如楚次年殺其大夫亦不名不知何人何事成公卒昭公未即位穆襄之族率國人以攻公殺公孫固公孫鄭于公宫則稱人謂穆襄之族也此衆殺稱人之例八年傳曰宋襄夫人因戴氏之族以殺襄公之孫孔叔公孫鍾離及大司馬公子卬皆昭公之黨也則稱人者戴氏之族大夫司馬者公子卬也宋人將弑昭公而立鮑則其所殺必忠於昭公者故皆不名以别於討亂稱人者左氏於公子鮑之姦襄夫人之惡公臣賊黨之進退考據精詳而不知書法既以弑君稱君為昭公無道而大夫見殺不名但曰非其罪而已然不害其序事之為實録也若陳氏謂昭公無道而殺大夫則亦不義其君者併失事實矣僖二十八年夏楚殺其大夫得臣文十年夏楚殺其大夫宜申成十五年秋宋殺其大夫山以上殺大夫去族者三是為成得臣鬭宜申蕩山皆討當其罪者也凡譏專殺謂殺有罪不告天子爾春秋書國殺大夫二十二有殺之以說大國者鄭申侯衛孔達蔡公子駟是也有師敗而歸罪者晉先縠楚公子側是也有彊家相傾者晉二趙三郤齊髙厚是也有罪狀未著者鄭公子嘉楚屈申是也有以讒殺者楚成熊郤宛是也有不以其罪殺者晉里克衛甯喜是也其他皆有可議者譏不止專殺也而一以國殺書者若傳記殺㔻鄭者郤芮也而晉侯使以㔻鄭之亂來告則史固以國殺書而已其或君臣同謀或用事之臣先意承指或稟命而行皆從告而書矣然而其間亦有討當其罪者筆削之㫖可無辯與城濮之役子玉違命喪師罪當討也與共王身敗其師於鄢陵而子反以子重之言死者異矣子西以謀弑穆王誅與成熊郤宛以讒見殺者異矣蕩澤弱公室殺公子肥華元為之去國魚石請討乃反使司徒司城率國人攻蕩氏殺子山其亦可與彊家之相傾者同文乎以鄭子産為政而公孫黒三罪俟其傷疾將死而後能加刑則華元之不賴寵以立法亦可謂知官守者矣故夫子於是三臣皆去其族以别於稱國以殺而刑罰不中者其有罪而不以時討如公孫黒亦從其恒稱則筆削之情見矣十五無君相殺稱國文六年冬晉殺其大夫陽處父昭十四年冬莒殺其公子意恢以上兩下相殺稱國殺者二說已併見上篇十六内師加小國言伐加大國言侵苟納所宜納雖大國言伐用楚師言伐諱公及小國戰但言及亟戰大國但言敗隱七年秋公伐邾莊二十六年春公伐戎僖二十一年冬公伐邾二十二年春公伐邾三十三年夏公伐邾宣四年春公伐莒十八年春公伐把哀七年秋公伐邾莊二年夏公子慶父帥師伐於餘丘僖三十三年秋公子遂帥師伐邾文十四年春叔彭生帥師伐邾宣十年秋公孫歸父帥師伐邾襄二十年秋仲孫速帥師伐邾昭十年秋七月季孫意如叔弓仲孫貜帥師伐莒哀元年冬仲孫何忌帥師伐邾二年春王二月季孫斯叔孫州仇仲孫何忌帥師伐邾六年冬仲孫何忌帥師伐邾桓八年秋伐邾以上書公伐者八大夫伐者九微者伐一皆小國其一伐戎莊十年二月公侵宋定六年二月公侵鄭八年春王正月公侵齊二月公侵齊成六年秋仲孫蔑叔孫僑如帥師侵宋襄二十四年春仲孫羯帥師侵齊定八年秋李孫斯仲孫何忌帥師侵衛以上書公侵者四大夫侵者三皆大國莊九年夏公伐齊納子糾僖二十六年冬公以楚師伐齊取穀以上書公伐齊者二諸家釋侵伐義皆未當唯胡氏謂聲罪致討曰伐潛師掠境曰侵考經所書取邑入國皆由伐而後見則胡氏之說得之然經於内師加小國皆言伐加大國皆言侵豈魯人於邾莒小國皆聲罪致討於宋衛大國恒潛師掠境乎凡春秋所書侵伐除伯者伐叛討貳之外莫非為亂而已皆從其恒辭則無以示義皆變其文則無以見實故夫子於内師加小國雖微者言伐見其恃衆凌寡加大國雖公將言侵見犯非其分悉變其文以示義於外師或以大加小而言侵或以外裔干中國而言伐或小國而言伐我或大國而言侵我皆從其恒辭以見實周官大司馬比小事大以和邦國九伐之法馮弱犯寡則眚之此春秋内師書侵伐之義也唯莊公納子糾言伐齊以子糾母是魯女其貴應立當齊無君大夫又嘗來盟則公親伐齊以納其應立之子師出有名非輕犯大國之比唯僖公用楚師言伐齊見其借力於彊楚以讎鄰國為中夏之大變故皆從其恒稱僖二十二年秋八月丁未及邾人戰于升陘以上内師及小國戰不言敗績一傳曰公及邾師戰于升陘我師敗績魯大邾小不能以德服邾而及之戰魯為卑矣而況以爭須句乎故用再見蒙上文之法不申言公併兩事為一役也比而觀之上言公伐邾取須句下言及邾人戰則公能取地而不能服邾之意已見矣故我師敗績為内諱之莊十年春王正月公敗齊師于長勺夏六月公敗宋師于乘丘蒙上次月以上内敗大國不言戰敗績者二傳曰齊師伐我戰于長勺齊師敗績檀弓記魯莊公及宋人戰于乘丘縣賁父御卜國為右馬驚公隊佐車授綏縣賁父卜國死之是二役皆先戰而後敗之也經不書公及齊宋戰但言敗某師者齊既敗魯乾時即遣大夫帥師臨魯脅殺子糾又乘其再克以伐魯長勺戰敗則又挾宋宿師于郎齊之加於魯太亟矣故畧其主客恒辭通前役為一事以譏之桓公既得國即圖伯宋既從次當服魯而魯以子糾故不容遽鄙於齊桓公不能釋魯以為後圖而亟戰喪師非始伯經逺之畧也十七非宼不言敗亟戰不言及戰與伐異事更以伐者及之曲在外言來戰黨惡㑹戰不言地戰拒伯討不言地文七年夏四月戊子晉人及秦人戰于令狐十二年冬十二月戊午晉人秦人戰于河曲以上書及戰者一書戰者一凡敵未陳曰敗某師史録詐戰之辭也襄公卒晉人欲立長君使先蔑士㑹如秦逆公子雍趙盾與諸大夫皆患穆嬴且畏偪乃背先蔑立靈公秣馬蓐食潛師夜起敗秦師于令狐此詐戰之尤者杜氏謂晉人諱之以戰告非也秦非為宼無以戰告之理經書殽與彭衙二役於文公卒之後而晉侯戰與伐皆稱爵與之以繼伯也晉人立君不定背約夜薄秦師其曲在晉嫌書敗秦師與殽同故變文書及戰以異其事也凡戰必言及主客之辭也秦伯伐晉取羈馬趙盾與二帥禦之河曲皆出戰交綏秦師夜遁復侵晉入瑕傳言主客之事甚詳趙伯循曰戰不言及交為主也非也邲之役晉人不主戰而敗績經猶以晉及楚知主客有常分史不以憚戰而易其恒辭明矣令狐而後秦晉交伐不書秦伯伐晉取北徴經畧之但書秦伐晉而秦師復出於是客不言伐而主不言及通前役一譏之也穀梁子曰秦晉之戰已亟故畧之其說是也自秦晉連兵不已經始終唯罪秦令狐北徴河曲雖三役而實一事故皆變文以異之而晉大夫主戰伐稱人同微者於是始各正其罪以明晉伯中衰之由也僖十八年春王正月宋公曹伯衛人邾人伐齊五月戊寅宋師及齊師戰于甗以上書伐者及戰一凡戰皆以主及客而此獨以客及主穀梁傳曰客不言及言及惡宋也鄭康成曰戰言及者别異主客爾宋襄伐喪故反其文以宋及齊穀梁不知宋襄納孝公其曰惡宋謂伐喪也故鄭君釋之如此今據事實以求書法則書伐者為齊人立無虧也書戰者無虧既殺而四公子復與宋師戰也蓋既廢長立少則四公子皆爭立故伐是一事也戰是一事也經變其主客恒辭反以宋及齊戰使宋公若受伐者然明雖一役而實兩事則與孝公爭國者不唯一無虧而齊桓宋襄之失皆可見矣桓十年冬十二月丙午齊侯衛侯鄭伯來戰于郎以上言來戰者一鄭人怨魯以周班後已請師於齊齊亦忿魯助紀故偕衛鄭來戰在史法内受伐當書及戰而經不言及者齊鄭以私害公師出無名故畧其主客之文直書來戰以見外惡明譏不在魯也胡氏曰來戰者罪在彼戰于郎是也徃戰者罪在内戰于宋是也此說似是而非蓋郎之戰魯則有辭宋之戰宋本首惡非無罪者其書戰于宋乃史氏録内之法辭蒙及伐以内為主與經變文不同陳氏曰曰戰于宋薄宋之罪也失亦相類十三年春二月公㑹紀侯鄭伯己巳及齊侯宋公衛侯燕人戰以上㑹戰不言地者一宋以立厲公故多責賂於鄭鄭不堪命公凡四㑹宋公一與之盟而宋公辭平公乃與鄭伯盟于武父遂帥師伐宋戰于宋不言敗績者勝敗相當也故主客之憤未已宋借助於齊衛燕而魯亦援紀以益鄭不復相侵伐惟刻期一戰以決勝負事與㑹戰于鞌同然鞌書地此不書地者鞌乃伯國討貳以救與國此齊衛紀於宋鄭之故初焉無與若存戰地則與戰于宋疑若兩事然故經没其戰地通前役以見之則宋莊魯桓以簒輔簒反覆規利忿兵相加以至於此而齊僖彊不義又挾衛朔同惡相濟罪無不明而所戰之地不足詳矣然戰必有地法所當書故傳曰不書所戰後也劉侍讀駁之曰公既及其戰期矣何故反没戰地乎公羊以為宋與魯戰穀梁以為紀與齊戰皆非事實也莊二十八年春王三月甲寅齊人伐衛衛人及齊人戰以上及戰不言地者一齊桓以王命伐衛討其立子頹也衛人輒又拒戰故經削其戰地以其既亂王室復拒伯討罪與列國交兵不同所戰之地不足詳也穀梁傳曰安戰也戰衛杜氏乃以為史失之者凡在國外史無不地若在國都則書入也餘又見後二篇十八重取畿内邑言滅内滅國不言師僖二年夏虞師晉師滅下陽以上伐取畿内邑書滅者一非國而曰滅此穀梁發義也而所釋未當林氏曰不曰晉取者天子之地非諸侯所得取故云滅使若國然可謂得經意矣蓋虢公者天子三公也下陽其所封國邑也畿内之地天子所制以禄公卿大夫士謂之采邑言不得有其土地人民唯采取其租税而已此不可與列國相爭奪者同文故變伐取言滅與外裔執天子之使變執言伐同虞晉之罪大矣十七年夏滅項以上内滅小國不言師者一傳例曰用大師焉曰滅沈文何曰此既稱滅故知用大師杜氏云不言師諱之劉炫謂既不諱滅何以諱師以規杜過是也僖公自始得國以至于兹諸夏靖安而魯無内外之虞者皆齊伯之力也㑹淮無功而魯又滅項以間之僖為五伯之罪人矣於是有見止之辱而夫人違禮㑹齊侯于卞以釋公故滅項畧不言師使若不出公命而微者在國為之然辭愈簡而義愈深矣春秋屬辭卷十
